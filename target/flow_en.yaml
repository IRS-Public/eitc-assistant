fg-sets:
  /jobs/*/pastPaycheckIncome1:
    question: On the most recent paystub from <fg-show path="/taxYear"/>, what’s the
      gross income per pay period?
  /sCorpPassiveIncome:
    question: Passive income from S-corporations or partnerships you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
  /educatorExpenses/:
    question: Educator expenses <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
      expect to pay in <fg-show path="/taxYear"/>
  /jobs/*/payFrequency:
    question: |-
      How frequently are <span condition="/jobs/*/isFilerAssignmentSelf" operator="isFalse">they</span>
                  <span condition="/jobs/*/isFilerAssignmentSelf" operator="isTrue">you</span>
                  <!-- isIncomplete default needed because this appears before filer selected -->
                  <span condition="/jobs/*/isFilerAssignmentSelf" operator="isIncomplete">you</span> paid?
    options:
      weekly:
        name: Weekly
      biWeekly:
        name: Every two weeks
      semiMonthly:
        name: Twice monthly
      monthly:
        name: Once a month
  /pensions/*/hsaOrFsaContributionsPerPayPeriod:
    question: Amount per pay period
  /jobs/*/pastPaycheckIncome3:
    question: On the third paystub, what’s the gross income per pay period?
  /secondaryFilerIsClaimedOnAnotherReturn:
    question: Can your spouse be claimed as a dependent on someone else's <fg-show
      path="/taxYear"/> tax return?
  /selfEmploymentRetirementPlanContributions:
    question: Self-employed retirement contributions <span condition="/isFilingStatusMFJ"
      operator="isFalse">your</span><span condition="/isFilingStatusMFJ" operator="isTrue">you
      and your spouse</span> expect to make in <fg-show path="/taxYear"/>
  /alimonyPaid:
    question: Alimony you expect to pay in <fg-show path="/taxYear"/>
  /stateAndLocalTaxPayments:
    question: State and local taxes you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  /businessCreditsForEligible:
    question: Eligible business expenses <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
      expect to pay in <fg-show path="/taxYear"/>
  /pensions/*/otherPreTaxContributionsPerPayPeriod:
    question: Amount per pay period
  /pensions/*/startDate:
    question: What’s the first day in <fg-show path="/taxYear"/> <span condition="/pensions/*/notSpouses"
      operator="isTrue">you</span><span condition="/pensions/*/notSpouses" operator="isFalse">they</span>
      expect to receive this pension or annuity?
  /schedule3Line1:
    question: Foreign tax you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  /socialSecuritySources/*/withheldRate:
    question: What percent of your monthly Social Security benefit <span condition="/socialSecuritySources/*/isFutureOrUnknown"
      operator="isTrue">is</span><span condition="/socialSecuritySources/*/isFutureOrUnknown"
      operator="isFalse">was</span> withheld for federal tax?
    options:
      twelve:
        name: 12%
      zero:
        name: 0%
      seven:
        name: 7%
      ten:
        name: 10%
      twentyTwo:
        name: 22%
  /socialSecuritySources/*/endDate:
    question: What’s the last day in <fg-show path="/taxYear"/> <span condition="/socialSecuritySources/*/notSpouses"
      operator="isTrue">you</span><span condition="/socialSecuritySources/*/notSpouses"
      operator="isFalse">they</span> expect to receive Social Security?
  /qualifiedMortgageInterestAndInvestmentInterestExpenses:
    question: Qualified interest you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  /pensions/*/averagePayPerPayPeriodForWithholding:
    question: What’s the gross income for the most recent pension or annuity payment?
  /preTaxRetirementAccountIncome:
    question: Total distributions you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> expect to receive from pre-tax retirement accounts in <fg-show
      path="/taxYear"/>
  /primaryTaxpayerElectsForSeniorDeduction:
    question: Do you plan to take the additional senior deduction?
  /jobs/*/retirementPlanContributionsToDate:
    question: Amount so far in <fg-show path="/taxYear"/>
  /hsaContributionAmount:
    question: HSA contributions <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
      condition="/isFilingStatusMFJ" operator="isTrue">you or your spouse</span> expect
      to make in <fg-show path="/taxYear"/>
  /pensions/*/healthInsuranceContributionsPerPayPeriod:
    question: Amount per pay period
  /medicalAndDentalExpenses:
    question: Medical and dental expenses you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to pay in <fg-show path="/taxYear"/>
  /pensions/*/mostRecentPayDate:
    question: What’s the date of <span condition="/pensions/*/notSpouses" operator="isTrue">your</span><span
      condition="/pensions/*/notSpouses" operator="isFalse">their</span> most recent
      pension or annuity payment?
  /pensions/*/isAllYear:
    question: Do <span condition="/pensions/*/notSpouses" operator="isTrue">you</span><span
      condition="/pensions/*/notSpouses" operator="isFalse">they</span> expect to
      have this pension or annuity all year or only part of the year?
    options:
      'true':
        name: All year (January 1–December 31, <fg-show path="/taxYear"/>)
      'false':
        name: Part of the year
  /jobs/*/consistentPay:
    question: How steady is the pay from paycheck to paycheck?
    options:
      'true':
        name: The pay is about the same each paycheck
      'false':
        name: The pay is very different each paycheck
  /otherDeductionsTotal:
    question: Estimated other deductions in <fg-show path="/taxYear"/>
  /jobs/*/overtimeCompensationRate:
    question: What is the rate at which you get paid overtime?
    options:
      onePointFive:
        name: 1.5 times my regular pay
      two:
        name: 2.0 times my regular pay
  /qBIDeductionOverrideAmount:
    question: Estimated QBI for you <span condition="/isFilingStatusMFJ" operator="isTrue">and
      your spouse</span> in <fg-show path="/taxYear"/>
  /sCorpNonPassiveIncome:
    question: Non-passive income from S-corporations or partnerships you <span condition="/isFilingStatusMFJ"
      operator="isTrue">and your spouse</span> expect to earn in <fg-show path="/taxYear"/>
  /selfEmploymentSources/*/workRelatedExpenses:
    question: Total self-employment work-related expenses <span condition="/selfEmploymentSources/*/notSpouses"
      operator="isTrue">you</span><span condition="/selfEmploymentSources/*/notSpouses"
      operator="isFalse">they</span> expect to deduct in <fg-show path="/taxYear"/>
  /qualifyingStudents:
    question: Number of college students
  /jobs/*/pastPaycheckIncome2:
    question: On the second paystub, what’s the gross income per pay period?
  /jobs/*/hsaOrFsaContributionsToDate:
    question: Amount so far in <fg-show path="/taxYear"/>
  /jobs/*/isAllYear:
    question: |-
      Do <span condition="/jobs/*/isFilerAssignmentSelf" operator="isFalse">they</span>
                  <span condition="/jobs/*/isFilerAssignmentSelf" operator="isTrue">you</span>
                  <!-- isIncomplete default needed because this appears before filer selected -->
                  <span condition="/jobs/*/isFilerAssignmentSelf" operator="isIncomplete">you</span> expect to have this job all year or only part of the year?
    options:
      'true':
        name: All year (January 1-December 31, <fg-show path="/taxYear"/>)
      'false':
        name: Part of the year
  /wantsStandardDeduction:
    question: Choose if you want to take the standard deduction or itemize your deductions.
    options:
      'true':
        name: Use the standard deduction (<fg-show path="/standardDeduction"/>)
      'false':
        name: Itemize deductions
