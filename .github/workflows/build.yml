# Builds static site and verifies output directory exists and is non-empty.

name: Build & Verify

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build static site
        run: npm run build

      - name: Verify generated site output
        run: |
          set -euo pipefail

          if [ ! -d "out" ]; then
            echo "ERROR: 'out/' directory doesn't exist"
            exit 1
          fi

          if [ -z "$(ls -A out)" ]; then
            echo "ERROR: 'out/' is empty"
            exit 1
          fi

          echo "SUCCESS: 'out/' exists and is not empty"
          ls -AlF out/
