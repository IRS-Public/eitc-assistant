name: Deploy

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

permissions:
  contents: read
  id-token: write

# Cancel redundant builds on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # do not cancel redundant builds on main or release branches
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build-deploy-credit-assistant:
    if: vars.build == 'true'
    uses: IRSDigitalService/shared-actions/.github/workflows/build-scan-deploy.yml@e1ba7f9f0fbd96d7d7353c264afe6273e2a1f4d7
    permissions:
      id-token: write
      contents: read
      packages: read
    with:
      app: "credit-assistant"
    secrets: inherit
