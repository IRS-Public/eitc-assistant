name: Release

on:
  push:
    branches: [ "main" ]
    paths: [ ".github/VERSION" ]

permissions:
  contents: read
  id-token: write

# Cancel redundant builds on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # do not cancel redundant builds on main or release branches
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') }}

jobs:
  release-credit-assistant:
      if: vars.release == 'true'
      uses: IRSDigitalService/shared-actions/.github/workflows/release.yml@main
      secrets: inherit
      with:
        sha: ${{ github.sha }}
