  h3-a7b819: 'AGI của quý vị là:'
  fg-alert-334e2e:
    heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được (EITC).
    p-f3c23d: Dựa trên những số tiền bản thân đã nhập, quý vị không thể yêu cầu tín
      thuế thu nhập kiếm được vì có AGI vượt quá hạn mức đối với tư cách khai thuế
      và số lượng trẻ em đủ điều kiện của quý vị.
    p-93a6b5: ' Để biết thêm thông tin về các hạn mức thu nhập cho Tín Thuế Thu Nhập
      Kiếm Được, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">xem</a>
      .'
  modal-wages-salaries-tips:
    heading: Tôi nên bao gồm khoản thu nhập nào?
    h3-53ed11: Tiền lương và tiền boa
    p-40d79a: Nhà tuyển dụng của bạn đã báo cáo tiền công, tiền lương, tiền boa và
      khoản thù lao khác của bạn trong ô 1 của Mẫu W-2 của bạn.
    p-ab967b: Chủ lao động của quý vị đã báo cáo thu nhập, tiền lương, tiền boa và
      các khoản bồi thường khác của quý vị ở ô 1 trong Mẫu W-2 của quý vị. Bao gồm
      toàn bộ số tiền boa và thu nhập làm thêm giờ trong tính toán thu nhập kiếm được
      khi xác định tính đủ điều kiện nhận tín thuế thu nhập do lao động, ngay cả khi
      tất cả hoặc một phần được khấu trừ.
    p-cb2522: Bao gồm mọi số tiền được khai báo trong Box 1 của Mẫu W-2 cho cả quý
      vị và người phối ngẫu của quý vị nếu quý vị đang khai thuế chung với người phối
      ngẫu của mình.
    p-1f7f24: Don't Include các khoản đóng góp trước thuế trong Mẫu W-2 của quý vị
      trong mục đóng góp trước thuế.
    h3-af3590: Lương Quân Nhân & Lương Chiến Đấu
    p-3fdb7d: Quý vị cũng có thể chọn gộp khoản lương chiến đấu không chịu thuế của
      mình vào thu nhập kiếm được để nhận EITC. Chủ lao động của quý vị đã khai báo
      khoản lương chiến đấu không chịu thuế của quý vị trong Box 12 với Code Q trên
      Mẫu W-2 của quý vị.
    p-d9b0e5: 'Lựa chọn này có thể làm tăng hoặc giảm EITC của quý vị. Để biết thêm
      thông tin, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2025_publink1000297672">xem</a> '
    h3-84091c: Bảo Hiểm Khuyết Tật Tạm Thời & Ngắn Hạn
    p-bee3d8: Nếu quý vị nghỉ nuôi con hoặc bị thương tật tạm thời trong năm và được
      chủ lao động trả tiền, họ sẽ khai báo thu nhập của quý vị trên W-2 của quý vị.
      Nhập khoản thu nhập đó vào đây.
  modal-work-no-taxes-withheld:
    heading: Thu nhập không bị khấu trừ thuế liên bang
    p-7ca214: Báo cáo thu nhập kiếm được từ công việc tự do, ngay cả khi đó là công việc phụ, bán thời gian hoặc tạm thời.
    p-9048f5: Nhập thu nhập vào đây nếu bạn kiếm tiền từ một công việc ngay cả khi thuế thu nhập không bị khấu trừ. Bạn có thể đã nhận hoặc chưa nhận được Mẫu 1099 cho tất cả thu nhập.
    p-8f1d83: 'Thu nhập có thể kiếm được thông qua một ứng dụng hoặc trang web để:'
    ul-0:
      li-014f6e: Lái xe cho các chuyến đi hoặc giao hàng đã đặt
      li-816827: Chạy việc vặt hoặc hoàn thành nhiệm vụ
      li-ac1297: Cung cấp các dịch vụ sáng tạo hoặc chuyên nghiệp
      li-743818: Cung cấp công việc tạm thời, theo yêu cầu hoặc tự do khác
    p-ccdadf: Tổng thu nhập của bạn bao gồm tất cả thu nhập bạn nhận được. Chúng tôi sẽ trừ chi phí của bạn sau.
    p-5465af: Để biết thêm thông tin, hãy truy cập <a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">Quản lý thuế cho công việc tự do của bạn</a>
  modal-self-employment-gross-income:
    heading: Tổng Thu Nhập Tự Kinh Doanh
    p-3ef7b9: 'Nếu quý vị:'
    ul-0:
      li-0d8073: Tự doanh
      li-f5836c: Kiếm tiền từ việc cung cấp công việc, dịch vụ hoặc hàng hóa theo
        yêu cầu
      li-d6da48: Điều hành một doanh nghiệp hoặc nông trại
      li-604ec3: Là mục sư hoặc thành viên của một dòng tu
      li-de3005: Là một mục sư hoặc thành viên của một dòng tu
    p-ccdadf: 'Để biết thêm thông tin, truy <a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">cập</a> '
    p-a21d1b: Để biết thêm thông tin, hãy truy cập <a target="_blank" class="usa-link"
      href="https://www.irs.gov/businesses/small-businesses-self-employed/self-employed-individuals-tax-center">Trung
      tâm thuế cho cá nhân tự kinh doanh</a>
  modal-disability-retirement:
    heading: Thu Nhập Kiếm Được Từ Trợ Cấp Hưu Trí Khuyết Tật
    p-514b79: Nếu quý vị nghỉ hưu vì khuyết tật, chúng tôi xem xét các khoản trợ cấp
      chịu thuế mà quý vị nhận được theo chương trình hưu trí khuyết tật của chủ lao
      động là thu nhập kiếm được cho các mục đích của EITC cho đến khi quý vị đạt
      đến tuổi nghỉ hưu tối thiểu. Tuổi nghỉ hưu tối thiểu là độ tuổi sớm nhất mà
      quý vị có thể nhận được lương hưu hoặc niên kim nếu quý vị không bị khuyết tật.
    p-e7df54: Tuổi nghỉ hưu tối thiểu là độ tuổi sớm nhất mà bạn có thể nhận được
      lương hưu hoặc niên kim nếu bạn không bị khuyết tật.
    p-2e7e6e: Bao gồm khuyết tật tạm thời hoặc ngắn hạn trong tiền lương của quý vị.
  modal-inmate-pay:
    heading: Tiền Lương Kiếm Được trong thời gian là Tù Nhân
    p-0ced8d: Tiền bạn nhận được cho công việc bạn thực hiện trong khi là tù nhân
      trong cơ sở cải huấn không phải là thu nhập kiếm được khi tính toán tín dụng
      thu nhập kiếm được.
    p-435d89: Điều này bao gồm công việc được trả lương được thực hiện trong một chương
      trình vừa học vừa làm hoặc khi ở trong nhà nửa đường.
    p-1dc488: Ấn Phẩm 596, Tín Thuế Thu Nhập Kiếm Được (EIC), Thu Nhập Của Tù Nhân
      (tiếng Anh)
  modal-foreign-income-non2555:
    heading: Thu nhập kiếm được ở nước ngoài
    p-6821fc: Thu nhập kiếm được ở nước ngoài là thu nhập kiếm được khi sống và làm
      việc bên ngoài Hoa Kỳ, Đặc khu Columbia hoặc các thuộc địa hoặc vùng lãnh thổ
      của Hoa Kỳ.
    p-86d28e: xNếu quý vị là nhân viên chính phủ Hoa Kỳ làm việc bên ngoài Hoa Kỳ,
      thu nhập đó không được coi là kiếm được ở nước ngoài.
    p-231cd1: Nếu quý vị không phải là nhân viên chính phủ và quý vị làm việc tại
      đại sứ quán, chúng tôi coi thu nhập đó là kiếm được từ nước ngoài.
    p-87f12e: Để biết thêm thông tin, hãy xem <a target="_blank" class="usa-link"
      href="https://www.irs.gov/forms-pubs/about-form-2555">Mẫu 2555</a>, Thu nhập
      kiếm được ở nước ngoài.
    p-90826b: 'Lưu ý: Nếu quý vị chọn nộp Mẫu 2555, quý vị không đủ điều kiện để yêu
      cầu EITC.'
  modal-taxable-pension:
    heading: Lương hưu
    p-a523b6: Nếu quý vị nhận trợ cấp hưu trí dưới hình thức thanh toán lương hưu
      hoặc niên kim từ một chương trình hưu trí của chủ lao động đủ điều kiện, tất
      cả hoặc một phần số tiền quý vị nhận được có thể phải chịu thuế.
    p-ce034e: 'Tất cả đều phải chịu thuế nếu:'
    ul-0:
      li-21fe33: Quý vị đã không đóng góp hoặc không được coi là đã đóng góp vào lương
        hưu hoặc niên kim của quý vị
      li-c4c784: Chủ lao động của quý vị đã không khấu lưu các khoản đóng góp từ tiền
        lương của quý vị, hoặc
      li-a75167: Quý vị đã nhận được mọi khoản đóng góp của mình mà không phải đóng
        thuế trong những năm trước
    p-63555f: 'Một phần của khoản đó phải chịu thuế nếu:'
    ul-1:
      li-6d40a9: Quý vị đã đóng góp các khoản tiền sau thuế (sử dụng Quy Tắc Chung
        và Phương Pháp Đơn Giản Hóa để tính toán)
    p-24ecdd: Các quy tắc bổ sung được áp dụng nếu quý vị nhận được các khoản thanh
      toán trước 59 tuổi rưỡi, là người sống sót hoặc người thụ hưởng, hoặc có các
      tình huống khác.
  modal-unemployment-compensation:
    heading: Bồi Thường Thất Nghiệp (Bảo hiểm)
    p-ec0a26: Đối với EITC, hãy liệt kê toàn bộ các khoản bồi thường thất nghiệp của
      quý vị. Quý vị sẽ tìm thấy thu nhập này trên Mẫu 1099-G.
    p-97117c: Nếu quỹ của chủ lao động của quý vị cung cấp các quyền lợi bổ sung,
      hãy liệt kê bất kỳ số tiền nào được khai báo trong Mẫu W-2, Box 1.
  modal-social-security:
    heading: Quyền Lợi An Sinh Xã Hhội Và Hưu Trí Đường Sắt
    p-f2d061: Đối với EITC, chỉ bao gồm số tiền chịu thuế của Trợ cấp An sinh Xã hội
      và hưu trí đường sắt của bạn.
    p-e8b50a: 'Để biết thêm thông tin, truy <a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc423">cập</a> '
    p-2b31f6: Để tính số tiền chịu thuế từ các khoản trợ cấp của bạn, hãy xem &quot;Nên
      sử dụng bảng tính nào&quot; trong <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-915">Ấn
      phẩm 915</a>, An sinh Xã hội và Trợ cấp Hưu trí Đường sắt Tương đương.
  modal-scholarship-grants:
    heading: Học Bổng hoặc Trợ Cấp Nghiên Cứu
    p-0e0c43: Nhập bất kỳ số tiền học bổng chịu thuế nào không được báo cáo trên Mẫu
      W-2 của bạn.
    p-ce8e34: 'Số tiền này bao gồm tiền học bổng hoặc tiền trợ cấp không có trên Mẫu
      W-2 của bạn nếu tiền đó là:'
    ul-0:
      li-13d8db: Được sử dụng cho các phụ phí, chẳng hạn như tiền ăn ở, đi lại và
        thiết bị tùy chọn
      li-b94d4b: Nhận được như một khoản thanh toán cho việc giảng dạy, nghiên cứu
        hoặc các dịch vụ khác được yêu cầu như một điều kiện để nhận học bổng hoặc
        trợ cấp nghiên cứu
    p-adf913: Vui lòng không bao gồm số tiền quý vị nhận được cho các dịch vụ được
      yêu cầu bởi Chương Trình Học Bổng Quân Đoàn Dịch Vụ Y Tế Quốc Gia, Học Bổng
      Chuyên Gia Y Tế Lực Lượng Vũ Trang và Chương Trình Hỗ Trợ Tài Chính, hoặc một
      chương trình dịch vụ vừa học vừa làm toàn diện cho sinh viên do một trường đại
      học vừa học vừa làm điều hành.
    p-0c59d8: 'Để biết thêm thông tin, truy <a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc421">cập</a> '
  fg-alert-64891c:
    heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được (EITC).
    p-cdf53e: Dựa trên những số tiền bản thân đã nhập, quý vị không thể yêu cầu tín
      thuế thu nhập kiếm được vì có thu nhập kiếm được vượt quá hạn mức đối với tư
      cách khai thuế và số trẻ đủ điều kiện của quý vị.
    p-93a6b5: ' Để biết thêm thông tin về các hạn mức thu nhập cho Tín Thuế Thu Nhập
      Kiếm Được, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">xem</a>
      .'
  fg-alert-8b7db9:
    heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được (EITC).
    p-3abe5f: 'Để yêu cầu EITC, bạn phải có thu nhập kiếm được (ví dụ: tiền lương
      hoặc thu nhập ròng từ việc tự kinh doanh). Dựa trên thu nhập bạn đã nhập, thu
      nhập kiếm được của bạn trong năm <fg-show path="/taxYear"/> bằng không hoặc
      ít hơn, vì vậy bạn không đủ điều kiện nhận EITC.'
    p-93a6b5: Để biết thêm thông tin, hãy xem <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Ấn phẩm 596</a>, Tín dụng Thu nhập
      Kiếm được.
    p-d04ce1: Quý vị không thể yêu cầu tín thuế thu nhập kiếm được nếu thu nhập đầu
      tư của quý vị nhiều hơn <fg-show path="/eitcInvestmentIncomeLimit"/>.
    p-241cb8: 'Thu nhập đầu tư bao gồm:'
    ul-0:
      li-12d3b7: Tiền lãi (cả chịu thuế và miễn thuế)
      li-0a9a83: Cổ tức
      li-e74f5d: Thu nhập lãi vốn
      li-e42b99: Một số tiền thuê và tiền bản quyền hoặc
      li-7c0731: Thu nhập ròng từ các hoạt động đầu tư thụ động
    p-9c482c: Để biết thêm thông tin, hãy xem <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p550">Ấn phẩm 550</a>, Thu nhập và Chi
      phí Đầu tư. Để tính tổng thu nhập đầu tư của bạn, bạn nên sử dụng Bảng tính
      1 trong <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Ấn
      phẩm 596</a>, Tín dụng Thu nhập Kiếm được.
  modal-self-employment-deductions:
    heading: Các chi phí được khấu trừ khi tự kinh doanh là gì?
    p-4838ea: Khi bạn tự kinh doanh, làm nghề tự do hoặc sở hữu và điều hành một doanh
      nghiệp, bạn có thể đã có thể khấu trừ một số chi phí kinh doanh nhất định khỏi
      thu nhập của mình để nộp ít thuế hơn.
    p-f24032: 'Chi phí kinh doanh có thể bao gồm:'
    ul-0:
      li-6a4179: Chi phí văn phòng tại nhà
      li-e2f63f: Chi phí xe hơi và xe tải
      li-7f4118: Tiền thuê
      li-9f53a8: Lương nhân viên và lương hưu
      li-eaff1b: Bảo hiểm
      li-6c49ac: Lãi suất trên các khoản nợ
      li-761662: Phí pháp lý và chuyên môn
      li-719fec: Thuế
      li-849c98: Du lịch và ăn uống
    p-9ff7b2: Những khoản khấu trừ này khác với các khoản khấu trừ cá nhân bạn đã
      thực hiện nếu bạn chọn ghi thành từng khoản các khoản khấu trừ của mình. Bạn
      có thể khấu trừ chi phí kinh doanh của mình ở đây và sau đó vẫn chọn khoản khấu
      trừ tiêu chuẩn.
    p-0651e4: <strong>Làm thế nào để kiểm tra tờ khai thuế năm ngoái?</strong>
    p-a81df3: Nếu bạn làm nghề tự do vào năm <fg-show path="/taxYear"/>, bạn có thể
      tìm thấy các chi phí được khấu trừ của mình ở dòng 28 của Bản kê C.
    p-4ca1ce: <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p334#en_US_2024_publink1000313491">Tìm
      hiểu thêm về chi phí kinh doanh</a>
  modal-estimate-interest-income-en:
    heading: Thu nhập tiền lãi là gì và làm thế nào tôi có thể tính toán nó?
    p-cda131: Các loại thu nhập tiền lãi phổ biến bao gồm tiền lãi kiếm được từ tài khoản ngân hàng hoặc từ việc cho vay tiền.
    p-bc395c: <strong>Cách kiểm tra tờ khai thuế năm ngoái</strong>
    p-ec3579: 'Nếu bạn có thu nhập tiền lãi trong năm <fg-show path="/taxYear"/>, hãy kiểm tra số tiền trong:'
    ul-0:
      li-7b5662: Dòng 2b trên Mẫu 1040 của tờ khai thuế liên bang năm <fg-show path="/taxYear"/> của bạn
  modal-investment-income:
    heading: Thu nhập đầu tư
    p-b07c20: 'Thu nhập đầu tư cho EITC bao gồm:'
    ul-0:
      li-12d3b7: Tiền lãi (cả chịu thuế và miễn thuế)
      li-0a9a83: Cổ tức
      li-81f254: Thu nhập lãi vốn
      li-498151: Một số tiền thuê và tiền bản quyền hoặc
      li-7c0731: Thu nhập ròng từ các hoạt động đầu tư thụ động
    p-4c8f5e: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-550">Xem</a>  để
      biết thêm thông tin.
    p-df5956: 'Sử dụng Bảng tính 1 trong <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Ấn
      phẩm 596</a>, Tín dụng Thu nhập Kiếm được, để tính thu nhập đầu tư của bạn nếu
      bất kỳ điều nào sau đây là đúng cho năm 2025:'
    ul-1:
      li-0f3c1b: Quý vị đang nộp Bảng E (Mẫu 1040).
      li-782dae: Quý vị đang khai báo thu nhập từ việc cho thuê tài sản cá nhân không
        được sử dụng trong thương mại hoặc kinh doanh.
      li-e0ebc1: Quý vị đang khai báo từ Mẫu 8814 (liên quan đến lựa chọn khai báo
        tiền lãi và cổ tức của trẻ em).
      li-a00ee1: Quý vị có thu nhập hoặc tổn thất từ một hoạt động đầu tư thụ động.
      li-143cd9: Quý vị đang nộp Mẫu 4797 (liên quan đến việc mua bán tài sản kinh
        doanh).
  modal-other-taxable-income:
    heading: các loại thu nhập khác
    p-ba0ae2: 'Các loại thu nhập khác bao gồm:'
    ul-0:
      li-83fa6a: Khoản phân phối Sắp Xếp Hưu Trí Cá Nhân (IRA) (ngoại trừ Roth IRA)
      li-7ae32a: Lỗ vốn (không phải lãi)
      li-248c6a: Các khoản trợ cấp ly hôn mà quý vị nhận được theo thỏa thuận ly hôn
        hoặc ly thân được ký kết trước năm 2020
      li-6dac33: Bất động sản cho thuê, tiền bản quyền, công ty hợp doanh, công ty
        S, quỹ ủy thác, v.v.
      li-13b588: Thu nhập từ việc cho thuê tài sản cá nhân nếu quý vị cho thuê tài
        sản để thu lợi nhuận nhưng không kinh doanh cho thuê tài sản đó
      li-ad5cc5: Khoản phân phối chịu thuế từ tài khoản tiết kiệm giáo dục Coverdell
        (ESA) và lợi tức từ chương trình học phí đủ điều kiện
      li-ece5cb: Lợi tức từ chương trình học phí đủ điều kiện
      li-0f1015: Phần thưởng, giải thưởng và tiền thắng bài bạc
      li-7e9756: Phí bồi thẩm đoàn
      li-737e99: Cổ tức Quỹ Thường Trực Tiểu Bang Alaska
      li-e833f1: Các khoản hoàn trả hoặc các khoản khác nhận được cho những khoản
        được khấu trừ trong năm trước đó, chẳng hạn như chi phí y tế, thuế bất động
        sản hoặc tiền lãi vay thế chấp nhà
    p-fda53f: 'Vui lòng không bao gồm:'
    ul-1:
      li-0eb181: Các khoản trợ cấp ly hôn quý vị nhận được theo thỏa thuận ly hôn
        hoặc ly thân được chấp nhận sau năm 2019
      li-e46f68: Trợ cấp con cái
      li-b144cb: Những quyền lợi trợ cấp xã hội như Chương Trình Trợ Giúp Tạm Thời
        Cho Các Gia Đình Gặp Khó Khăn (TANF), phiếu trợ cấp thực phẩm, tiền trợ cấp
        thuê nhà để ở theo mục 8
      li-63523b: Các khoản thanh toán chăm sóc nuôi dưỡng không chịu thuế
      li-a8d386: Những quyền lợi không chịu thuế của nhân viên như hỗ trợ giáo dục
      li-f2a3d6: Phúc lợi cho cựu chiến binh, bao gồm cả các khoản thanh toán phục
        hồi chức năng của Bộ Cựu Chiến Binh
      li-080a95: Thù lao cho người lao động
      li-57e5cb: Số tiền bảo hiểm nhân thọ nhận được do một người qua đời
      li-764dd4: Tiền hoặc tài sản mà quý vị được thừa kế, được hưởng theo di chúc
        hoặc nhận được như một món quà
      li-6f920a: Bồi thường thất nghiệp
    p-745735: Ấn Phẩm 525, Thu Nhập Chịu Thuế Và Không Chịu Thuế (tiếng Anh)
  modal-student-loan-interest:
    heading: Khấu Trừ Lãi Khoản Vay Sinh Viên
    p-3ac7ce: Nhập tối đa $2.500 tiền lãi mà quý vị đã trả cho khoản vay sinh viên
      đủ điều kiện của mình. Quý vị có thể tìm thấy mục này trên Mẫu 1089-E nếu đã
      trả nhiều hơn $600 tiền lãi.
    p-e4b825: 'Khoản vay phải được dùng để trả chi phí giáo dục đại học đủ điều kiện
      để theo học tại một cơ sở giáo dục đủ điều kiện. Ngoài ra, các chi phí phải:'
    ul-0:
      li-bb1c73: Đối với quý vị, vợ/chồng của quý vị, hoặc một người là người phụ
        thuộc của quý vị tại thời điểm quý vị nhận được khoản vay;
      li-829f26: Được trả hoặc phát sinh trong một khoảng thời gian hợp lý trước hoặc
        sau khi bạn nhận khoản vay; và
      li-562ff0: Đối với dịch vụ giáo dục được cung cấp trong suốt thời gian học tập
        cho một học sinh/sinh viên đủ điều kiện.
    p-75f422: Quý vị không thể yêu cầu khoản khấu trừ nếu không có nghĩa vụ pháp lý
      phải thanh toán khoản vay.
    p-1f2dd3: Để biết thêm thông tin, <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-970"
      class="usa-link">xem</a> .
  modal-educator-expenses:
    heading: Khấu Trừ Chi Phí Của Giáo Viên
    p-e117c8: 'Nếu quý vị là giáo viên, hãy nhập tối đa <fg-show path="/maxEducatorExpensesNonMFJ"/>
      (<fg-show path="/maxEducatorExpensesLimit"/> nếu vợ chồng quý vị khai chung
      hồ sơ thuế và cả quý vị và người phối ngẫu của quý vị đều là giáo viên) cho
      những chi phí chưa được hoàn lại như:'
    ul-0:
      li-8829c6: Phí tham gia các khóa học nâng cao nghiệp vụ
      li-751127: Sách và vật tư
      li-0c78ca: Thiết bị máy tính (bao gồm phần mềm và dịch vụ liên quan)
      li-6ef6c8: Thiết bị khác
      li-6d4170: Tài liệu bổ sung mà quý vị sử dụng trong lớp học
    p-86c6e4: 'Để biết thêm thông tin, <a target="_blank" href="https://www.irs.gov/taxtopics/tc458"
      class="usa-link">xem</a> '
  modal-ira-contributions:
    heading: Khấu Trừ IRA
    p-5979d5: Nhập bất kỳ khoản đóng góp cho IRA nào mà quý vị đã thực hiện ngoài
      khoản đóng góp trong sổ lương của mình.
    p-a49375: 'Để biết thêm thông tin, <a target="_blank" href="https://www.irs.gov/retirement-plans/ira-deduction-limits"
      class="usa-link">xem</a> '
  modal-self-employed-retirement:
    heading: 'SEP, SIMPLE và các chương trình đủ điều kiện khác:'
    p-ca0a8f: 'Nếu tự kinh doanh, quý vị sẽ tính toán khoản bồi thường từ chương trình
      đủ điều kiện của mình bằng cách trừ đi những khoản sau vào thu nhập ròng từ
      công việc tự doanh:'
    p-0d133f: 'Để đủ điều kiện, bạn hoặc vợ/chồng của bạn phải có:'
    ul-0:
      li-6c246a: Phần được khấu trừ của thuế tự doanh của quý vị từ tờ khai thuế theo
        Mẫu 1040, trang 1, và
      li-a2595a: Số tiền đóng góp cho chương trình hưu trí của quý vị từ tờ khai thuế
        theo Mẫu 1040, trang 1, ở dòng dành cho SEP, SIMPLE và các chương trình đủ
        điều kiện của người tự doanh
      li-f6cddf: Đã có một công ty trách nhiệm hữu hạn
    p-3622b4: 'Các kế hoạch đủ điều kiện có thể bao gồm:'
    ul-1:
      li-ff93fe: Kế hoạch Lương hưu Nhân viên Đơn giản hóa (SEP)
      li-200ab4: Kế hoạch Khớp Khuyến khích Tiết kiệm cho Nhân viên
      li-e7dbe4: Solo-401(k)
      li-765afa: Các kế hoạch hưu trí đủ điều kiện khác
    p-af5a4a: <strong>Không bao gồm</strong> các khoản đóng góp cho Thỏa thuận Hưu trí Cá nhân (IRA).
    p-add56c: Bạn phải sử dụng một quy tắc đặc biệt để tính các khoản đóng góp cho kế hoạch hưu trí cho chính mình.
    p-3248f2: Các Cá Nhân Tự Kinh Doanh – Tính Toán Khoản Đóng Góp và Khấu Trừ Cho
      Chương Trình Hưu Trí của Bản Thân Quý Vị
  modal-hsa-deductions:
    heading: 'Khấu Trừ Tài Khoản Tiết Kiệm Y Tế:'
    p-2ab752: Nhập bất kỳ khoản đóng góp nào cho Tài Khoản Tiết Kiệm Y Tế (HSA) mà
      quý vị đã không bao gồm trong HSA, FSA hoặc "chương trình phúc lợi tự chọn"
      ở trên.
    p-a7d9fc: Ấn Phẩm 969, Tài Khoản Tiết Kiệm Y Tế Và Các Gói Bảo Hiểm Y Tế Được
      Ưu Đãi Về Thuế Khác (tiếng Anh)
  modal-alimony-paid:
    heading: Trợ Cấp Ly Hôn Đã Được Chi Trả
    p-fa1de9: Nếu quý vị đã thực hiện khoản tiền trợ cấp ly hôn hay khoản tiền cấp
      dưỡng sau ly thân theo án lệnh được thực hiện trước ngày 1 tháng 1 năm 2019
      và lệnh đó không nêu cụ thể rằng quý vị không thể khấu trừ các khoản thanh toán
      của mình, hãy nhập số tiền quý vị đã trả trong  tại đây.
    p-7b97e1: 'Vui lòng không bao gồm những khoản mà quý vị đã trả cho:'
    p-7948e4: <strong>Hỗ trợ gia đình hoặc trẻ em</strong>
    p-358bc5: Ngoài ra cũng không bao gồm các khoản tiền nếu án lệnh đã được sửa đổi
      và tuyên bố rằng quý vị không thể khấu trừ các khoản thanh toán của mình.
    p-06a405: Tiền cấp dưỡng hoặc tiền cấp dưỡng ly thân được thực hiện theo lệnh của tòa án được thi hành sau ngày 31 tháng 12 năm 2024
    p-4b335c: 'Để biết thêm thông tin, truy <a target="_blank" href="https://www.irs.gov/taxtopics/tc452"
      class="usa-link">cập</a> '
  modal-early-withdrawal:
    heading: Tiền phạt do rút tiền tiết kiệm trước hạn
    p-7e8d5b: Nếu rút tiền từ chứng thư gửi tiền định kỳ hoặc tài khoản tiền lãi được
      hoãn khác trước hạn, quý vị có thể phải chịu một khoản tiền phạt. Quý vị có
      thể tìm thấy thông tin về khoản tiền phạt này trên Mẫu 1099-INT trong Box 2.
      Nhập khoản đó tại đây.
  modal-moving-expenses:
    heading: chi phí chuyển nhà
    p-6f18fd: 'Nếu quý vị là thành viên của quân độ đang tại ngũ và quân đội đã ra
      lệnh cho quý vị thay đổi vĩnh viễn nơi làm nhiệm vụ của mình, hãy nhập bất kỳ
      chi phí thuyên chuyển nào mà quân đội không hoàn trả cho quý vị vào đây. Các
      chi phí thuyên chuyển bao gồm:'
    ul-0:
      li-60efa3: Di chuyển thẳng từ nhà cũ đến nhà mới của quý vị
      li-efbbb1: Chi phí đóng gói và di chuyển đồ đạc cá nhân của quý vị
    p-6536cb: 'Để biết thêm thông tin, truy <a target="_blank" href="https://www.irs.gov/taxtopics/tc455"
      class="usa-link">cập</a> '
  modal-employee-business-expenses:
    heading: Một Số Chi Phí Công Việc Của Nhân Viên
    p-c92011: 'Nếu quý vị là:'
    ul-0:
      li-9bde67: Quân nhân dự bị của Quân Đội
      li-053ac1: Nghệ sĩ biểu diễn đủ điều kiện
      li-e03b09: Quan chức chính phủ địa phương hoặc tiểu bang nhận lương từ phí
      li-0d1488: Nhân viên có chi phí công việc liên quan đến tình trạng khuyết tật
    p-cc9b68: Quý vị có thể bao gồm những chi phí phổ biến và được chấp nhận trong
      lĩnh vực thương mại, kinh doanh hoặc nghề nghiệp của mình hoặc chi phí cho những
      thứ hữu ích và thích hợp cho doanh nghiệp của quý vị.
    p-d46373: Nếu không phù hợp với một trong những loại được liệt kê, quý vị có thể
      không kê khai các mục điều chỉnh cho những chi phí này.
    p-eb68a5: Để biết thêm thông tin và danh sách các chi phí đủ điều kiện, <a target="_blank"
      href="https://www.irs.gov/forms-pubs/about-form-2106" class="usa-link">xem</a>
      .
  modal-self-employed-health-insurance:
    heading: 'Khấu Trừ Bảo Hiểm Y Tế Tự Doanh:'
    p-598073: Nhập số tiền quý vị đã trả cho bảo hiểm y tế cho bản thân, người phối
      ngẫu và những người phụ thuộc của mình, nếu quý vị tự kinh doanh.
    p-d60394: Các khoản phí bảo hiểm đủ điều kiện là bảo hiểm y tế, nha khoa, thị lực và chăm sóc dài hạn. Hợp đồng bảo hiểm có thể dành cho chính bạn, vợ/chồng bạn và những người phụ thuộc của bạn. Hợp đồng bảo hiểm cũng có thể bao trả cho con bạn dưới 27 tuổi vào cuối năm, ngay cả khi đứa trẻ đó không phải là người phụ thuộc của bạn.
    p-13dece: Để biết thêm thông tin, xem Chương 6 <a target="_blank" href="https://www.irs.gov/instructions/i7206"
      class="usa-link">của</a> .
/qualifying-children:
  title: Trẻ Đủ Điều Kiện
  h2-dbaf54: Trẻ Đủ Điều Kiện
  p-9b177d: Dựa trên thông tin đầu vào mà quý vị cung cấp trước đây, quý vị không
    có bất kỳ trẻ đủ điều kiện nào. Nếu điều này không chính xác, vui lòng quay lại
    <a class="usa-link" href="/app/eitc/filing-status/">Filing Status</a> và thay
    đổi câu trả lời của quý vị.
  p-c1a0dd: Vui lòng chuyển sang bước tiếp theo để xem kết quả của quý vị.
  p-3178be: Trong bước này, chúng tôi sẽ xem có bao nhiêu người con hoặc người thân
    khác của quý vị là trẻ đủ điều kiện để yêu cầu và tính toán EITC. Quý vị có thể
    khai tối đa ba trẻ đủ điều kiện để nhận EITC.
  p-e28c1e: Quý vị có thể khai tối đa ba trẻ đủ điều kiện để nhận EITC
  p-adf161: Để đủ điều kiện nhận EITC, bạn phải có ít nhất một trẻ em đủ điều kiện.
  collection/familyAndHousehold:
    /familyAndHousehold/*/livedWithYouUS:
      question: Trẻ này đã sống với quý vị hơn nửa năm <fg-show path="/taxYear"/>
        tại Hoa Kỳ phải không?
      modalLink: <modal-link for="modal-residency">Điều gì được coi là thời gian sống
        cùng bạn?</modal-link>
    fg-alert-b7d816:
      heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được
      p-7666ea: Để biết thêm thông tin, xem <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
        596</a>, Earned Income Credit..
    /familyAndHousehold/*/someoneElseCanClaim:
      question: Người khác có thể khai trẻ này để nhận EITC không?
      modalLink: <modal-link for="modal-claimed-someone-else">Nếu có nhiều hơn một
        người có thể yêu cầu họ thì sao?</modal-link>
    /familyAndHousehold/*/isClaimingQCRegardless:
      question: Quý vị không thể kê khai một đứa trẻ để nhận EITC nếu chúng cũng được
        kê khai bởi một số người đủ điều kiện khác. Quý vị vẫn muốn kê khai đứa trẻ
        này chứ?
      modalLink: <modal-link for="modal-claimed-someone-else">Điều gì xảy ra nếu nhiều
        hơn một người có thể yêu cầu họ?</modal-link>
    /familyAndHousehold/*/marriedFilingJointly:
      question: Có phải đứa trẻ này đã kết hôn và sẽ khai thuế chung với người phối
        ngẫu của trẻ cho <fg-show path="/taxYear"/> không?
      modalLink: <modal-link for="modal-joint-return">Tôi có thể yêu cầu một người
        nộp tờ khai chung không?</modal-link>
    /familyAndHousehold/*/mfjForRefundOnly:
      question: Có phải đứa trẻ này khai thuế chung cho <fg-show path="/taxYear"/>
        chỉ để yêu cầu hoàn lại tiền thuế bị khấu lưu hoặc khoản thuế ước tính đã
        nộp và sẽ không yêu cầu bất kỳ khoản tín thuế nào như EITC không?
      modalLink: <modal-link for="modal-joint-return-with-another-person-exception">Khi
        nào bạn có thể yêu cầu một người nộp tờ khai chung?</modal-link>
    /familyAndHousehold/*/isPermanentlyDisabled:
      question: Đứa trẻ này có bị tàn tật toàn phần và vĩnh viễn không?
      modalLink: <modal-link for="modal-disabled">Điều gì được coi là khuyết tật vĩnh
        viễn và hoàn toàn?</modal-link>
    /familyAndHousehold/*/relationship:
      question: 'Chọn mối quan hệ của đứa trẻ này với quý vị:'
      modalLink: <modal-link for="modal-relationship">Ai được coi là con riêng, con
        nuôi hoặc con nuôi tạm thời?</modal-link>
      options:
        childStepFoster:
          name: Con, con riêng của vợ/chồng, con nuôi chính thức, hoặc con nuôi tạm
        sibling:
          name: Anh chị em ruột, anh chị em cùng cha khác mẹ hay cùng mẹ khác cha
            hoặc anh chị em kế
        descendant:
          name: 'Các cháu nội/ngoại, các cháu là con của anh/chị/em '
        none:
          name: Không điều nào kể trên
    /familyAndHousehold/*/ageRange:
      question: Đứa trẻ này bao nhiêu tuổi tại thời điểm cuối năm <fg-show path="/taxYear"/>?
      options:
        under19:
          name: 18 tuổi trở xuống
        between19And23:
          name: Từ 19 đến 23 tuổi
        over24:
          name: 24 tuổi trở lên
    /familyAndHousehold/*/isFullTimeStudent:
      question: Đứa trẻ có phải là học sinh/sinh viên toàn thời gian trong một khoảng
        thời gian của 5 tháng bất kỳ trong năm đó không?
      modalLink: <modal-link for="modal-student">Làm sao tôi biết nếu họ là sinh viên
        toàn thời gian?</modal-link>
    /familyAndHousehold/*/isQCYoungerThanSelfOrSpouse:
      question: Người phụ thuộc có ít tuổi hơn quý vị không?
      modalLink: <modal-link for="modal-age-comparison">Tại sao chúng tôi lại hỏi
        liệu họ có nhỏ tuổi hơn <span condition="/isFilingStatusMFJ" operator="isFalse">bạn
        không?</span><span condition="/isFilingStatusMFJ" operator="isTrue">bạn hoặc
        vợ/chồng bạn không?</span></modal-link>
    /familyAndHousehold/*/validSSN:
      question: Đứa trẻ này có số an sinh xã hội hợp lệ được cấp vào hoặc trước ngày
        đến hạn của tờ khai thuế (đã bao gồm khoảng gia hạn) không?
      modalLink: <modal-link for="modal-valid-ssn-qc">Số An Sinh Xã Hội Hợp Lệ là
        bắt buộc</modal-link>
    fg-alert-a004cd:
      heading: Xin lưu ý
      p-8374d8: Đứa trẻ này là trẻ đủ điều kiện của quý vị. Tuy nhiên, bởi vì chúng
        không có SSN hợp lệ, đứa trẻ này không giúp quý vị đủ điều kiện nhận tín thuế
        thu nhập kiếm được đã được tăng.
    h2-eaf308: Trẻ này đủ điều kiện để yêu cầu và tính toán EITC.
  p-5aea65: Dựa trên thông tin đầu vào của quý vị, quý vị có 3 trẻ đủ điều kiện có
    số An Sinh Xã Hội hợp lệ và đã đạt đến số lượng tối đa được kê khai để nhận EITC.
  fg-alert-9510e7:
    heading: Yêu cầu về trẻ em đủ điều kiện
    p-b6bd9e: Quý vị không đủ điều kiện nhận EITC nếu không có trẻ đủ điều kiện trừ
      khi quý vị hoặc vợ/chồng của quý vị  từ 25 đến 64 tuổi nếu khai thuế chung.
    p-93a6b5: Để biết thêm thông tin, xem <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
  fg-alert-64891c:
    heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được (EITC).
    p-cdf53e: Dựa trên những số tiền bản thân đã nhập, quý vị không thể yêu cầu tín
      thuế thu nhập kiếm được vì có thu nhập kiếm được vượt quá hạn mức đối với tư
      cách khai thuế và số trẻ đủ điều kiện của quý vị.
    p-93a6b5: Để biết thêm thông tin, xem <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
  h2-34370a: Dựa trên thông tin đầu vào của quý vị, quý vị có <fg-show path="/eitcQualifyingChildren"/>
    trẻ đủ điều kiện với số An Sinh Xã Hội hợp lệ.
  modal-residency:
    heading: Bài kiểm tra cư trú
    h3-7c913b: Sống cùng Quý Vị
    p-ff8f12: “Trẻ đủ điều kiện phải sống cùng nhà chính với quý vị trong hơn nửa
      năm <fg-show path="/taxYear"/> và nhà đó phải ở Hoa Kỳ. Hoa Kỳ bao gồm 50 tiểu
      bang và Quận Columbia. Nó không bao gồm Puerto Rico hoặc các lãnh thổ của Hoa
      Kỳ như Guam. Đối với Tín Thuế Thu Nhập Kiếm Được (Earned Income Tax Credit (EITC),
      Sở Thuế Vụ (Internal Revenue Service (IRS) coi các quân nhân Hoa Kỳ đóng quân
      bên ngoài Hoa Kỳ trong thời gian làm nhiệm vụ kéo dài có nhà chính ở Hoa Kỳ
      trong thời gian làm nhiệm vụ đó.
    h3-46d8f4: Sự Ra Đời hoặc Qua Đời Của Một Đứa Trẻ
    p-e27b79: Nếu đứa trẻ được sinh ra hoặc qua đời vào <fg-show path="/taxYear"/>,
      đứa trẻ đó bắt buộc phải sống với quý vị hơn một nửa thời gian của năm đó khi
      mà trẻ còn sống.
    h3-16617c: Con Nuôi Chính thức và Con Nuôi Tạm
    p-c623b2: 'Nếu quý vị nhận nuôi trẻ vào năm <fg-show path="/taxYear"/>, trẻ được
      giao cho quý vị làm con nuôi hợp pháp vào năm <fg-show path="/taxYear"/>, hoặc
      trẻ đó là con nuôi tạm đủ điều kiện được giao cho quý vị trong năm <fg-show
      path="/taxYear"/>3, thì nhà chính của quý vị phải là nhà chính của trẻ này hơn
      một nửa thời gian kể từ khi trẻ được nhận làm con nuôi hoặc được giao cho quý
      vị vào năm <fg-show path="/taxYear"/>4. '
    h3-6839b6: Vắng Mặt Tạm Thời
    p-658cca: 'Đối với EITC, thời gian vắng mặt tạm thời được tính là thời gian sống
      cùng quý vị. Các ví dụ bao gồm:'
    ul-0:
      li-76cf60: Bệnh tật hoặc nhập viện
      li-1b3986: Đến trường, kỳ nghỉ, kinh doanh hoặc nghĩa vụ quân sự
      li-dae417: Giam giữ tại cơ sở dành cho vị thành niên
      li-de99d6: Trẻ bị bắt cóc
    p-8b99ed: 'Lựa chọn này có thể làm tăng hoặc giảm EITC của quý vị. Để biết thêm
      thông tin, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">xem</a> '
  modal-joint-return:
    heading: Khai Thuế Chung với Một Người Khác
    p-9b8921: Nói chung, quý vị không thể kê khai một người đã kết hôn là trẻ đủ điều
      kiện để nhận EITC nếu người đó khai thuế chung.
    p-bdfc89: Ấn Phẩm 596, Tín Thuế Thu Nhập Kiếm Được (EIC), Yêu Cầu Tờ Khai Chung
      (tiếng Anh)
  modal-joint-return-with-another-person-exception:
    heading: Trường Hợp Ngoại Lệ Khai Thuế Chung với Một Người Khác
    p-93a25e: Quý vị có thể kê khai một người đã kết hôn mà nộp hồ sơ khai thuế chung
      với tư cách là một trẻ đủ điều kiện để nhận EITC nếu người đó và người phối
      ngẫu của họ nộp hồ sơ khai thuế chung chỉ để yêu cầu hoàn lại tiền thuế thu
      nhập bị khấu lưu từ tiền lương hoặc thuế ước tính mà họ đã trả. Họ có thể không
      được yêu cầu bất kỳ khoản tín thuế nào trên tờ khai thuế, chẳng hạn như EITC.
    p-bdfc89: Ấn Phẩm 596, Tín Thuế Thu Nhập Kiếm Được (EIC), Yêu Cầu Tờ Khai Chung
      (tiếng Anh)
  modal-disabled:
    heading: Bị Tàn Tật Toàn Phần Và Vĩnh Viễn
    p-a09e23: 'Đối với EITC, chúng tôi coi trẻ bị tàn tật toàn phần và vĩnh viễn nếu
      cả hai điều sau đều đúng:'
    ul-0:
      li-35e112: Trẻ không thể thực hiện các nhiệm vụ quan trọng trong một khoảng
        thời gian hợp lý trong khi làm việc để được trả công hoặc lợi nhuận trong
        một môi trường công việc cạnh tranh cho ít nhất là mức lương tối thiểu do
        tình trạng thể chất hoặc tinh thần, đồng thời
      li-f9618f: Bác sĩ xác định tình trạng này đã kéo dài hoặc có thể kéo dài liên
        tục trong ít nhất một năm hoặc có thể dẫn đến tử vong
    p-de127e: Ấn Phẩm 596, Tín Thuế Thu Nhập Kiếm Được (EIC), Khuyết Tật Vĩnh Viễn
      Và Toàn Bộ (tiếng Anh)
  modal-relationship:
    heading: Định nghĩa Mối quan hệ với Trẻ em
    h3-523a2e: Con Riêng Của Vợ/Chồng
    p-3a1769: Mối quan hệ giữa cha dượng/mẹ kế và con riêng của vợ/chồng là mối quan
      hệ được hình thành bởi một cuộc hôn nhân. Đối với EITC, một mối quan hệ được
      hình thành bởi một cuộc hôn nhân, chẳng hạn như con gái riêng của vợ/chồng,
      con trai riêng của vợ/chồng, anh/chị/em kế, sẽ không kết thúc nếu cuộc hôn nhân
      kết thúc.
    h3-3cc097: Con Nuôi Chính Thức
    p-165b15: Con nuôi chính thức luôn được coi như con ruột của quý vị. Thuật ngữ
      này bao gồm một đứa trẻ được cho làm con nuôi hợp pháp của quý vị.
    h3-872822: Con Nuôi Tạm
    p-d91342: Quý vị chỉ có thể kê khai con nuôi tạm nếu đứa trẻ đó được bố trí ở
      với quý vị bởi một cơ quan sắp xếp được ủy quyền hoặc theo án lệnh.
    h3-2fd110: Cơ quan sắp xếp được ủy quyền
    p-b80621: Thuật ngữ này bao gồm cơ quan chính phủ địa phương hoặc tiểu bang hay
      chính phủ bộ lạc da đỏ. Nó cũng bao gồm một tổ chức được miễn thuế được cấp
      phép bởi một tiểu bang hoặc chính phủ bộ lạc da đỏ.
  modal-student:
    heading: Học Sinh/Sinh Viên Toàn Thời Gian
    h3-f803ae: Học Sinh/Sinh Viên Toàn Thời Gian
    p-ef6d3a: Để được coi là toàn thời gian, học sinh/sinh viên phải đăng ký số giờ
      hoặc những khóa học mà trường học coi đó là đi học toàn thời gian.
    p-69b838: Học sinh/sinh viên làm việc theo các giai đoạn xen kẽ với các kỳ học
      (công việc "co-op") trong ngành kinh doanh tư nhân như là một phần của khóa
      học chính quy của trường và đào tạo thực hành được coi là sinh viên toàn thời
      gian.
    h3-754ddf: Định Nghĩa Trường Học
    p-dfaecc: 'Đối với EITC, trường học:'
    ul-0:
      li-5f78b0: Trường tiểu học
      li-f8aab3: Trường trung học đệ nhất cấp hoặc trung học đệ nhị cấp
      li-39d2fa: Trường đại học hoặc cao đẳng
      li-96892f: Trường kỹ thuật, thương mại hoặc cơ khí
    p-986cc5: 'Trường học không:'
    ul-1:
      li-775eb9: Lớp huấn luyện thực hành ngay trên công việc đương nhiệm
      li-b2e8f2: Trường học hàm thụ
      li-767c35: Trường chỉ cung cấp các khóa học qua Internet
    p-81198a: Để biết thêm thông tin, xem <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
  modal-valid-ssn-qc:
    heading: Số An Sinh Xã Hội Hợp Lệ cho Trẻ Đủ Điều Kiện
    p-d68f7a: Số tiền EITC của quý vị phụ thuộc vào số lượng trẻ đủ điều kiện mà quý
      vị có với số SSN hợp lệ. Mỗi đứa trẻ hoặc thân nhân mà quý vị kê khai cho mục
      đích tính số tiền EITC phải có số An Sinh Xã Hội (SSN) hợp lệ do Cơ Quan Quản
      Lý An Sinh Xã Hội cấp vào hoặc trước ngày đến hạn của tờ khai thuế (đã bao gồm
      khoảng gia hạn).
    p-0464ad: Đối với EITC, SSN là một số SSN hợp lệ trừ khi dòng chữ "Không Hợp Lệ
      Để Làm Việc" được in trên thẻ an sinh xã hội và mã số này được cấp chỉ để cho
      phép người nhận SSN đăng ký hoặc nhận phúc lợi do liên bang tài trợ.  Một ví
      dụ về phúc lợi do liên bang tài trợ là Medicaid.
    p-a708ff: Chúng tôi chỉ chấp nhận thẻ an sinh xã hội có ghi "Hợp lệ để làm việc
      với sự cho phép của Bộ An Ninh Nội Địa Hoa Kỳ (DHS)" miễn là sự ủy quyền của
      DHS vẫn còn hiệu lực.
    p-558a40: 'Đối với EITC, chúng tôi không chấp nhận:'
    ul-0:
      li-5e5f3e: Số nhận dạng cá nhân đóng thuế (ITIN) của IRS
      li-5fc9b7: Mã số người đóng thuế cho việc nhận con nuôi (ATIN)
      li-19d3d7: Số An Sinh Xã Hội được cấp chỉ để cho phép người nhận số SSN đăng
        ký hoặc nhận phúc lợi do liên bang tài trợ, chẳng hạn như Medicaid
  modal-claimed-someone-else:
    heading: Được Kê Khai trên Tờ Khai Thuế Của Người Khác
    p-9b277e: Chỉ có một người có thể kê khai từng trẻ để nhận EITC. Nếu có nhiều
      người kê khai đứa trẻ đó, thì IRS sẽ áp dụng quy tắc tie-breaker.
    p-911aff: Ấn Phẩm 596, Tín Thuế Thu Nhập Kiếm Được (EIC), Chỉ Một Người Được Khai
      Trẻ Đủ Điều Kiện Của Quý Vị Để Yêu Cầu EIC (tiếng Anh)
  modal-age-comparison:
    heading: Trẻ Phải Nhỏ Tuổi Hơn Quý Vị hoặc Người Phối Ngẫu Của Quý Vị
    p-626c78: Để trở thành trẻ đủ điều kiện, đứa trẻ phải ít tuổi hơn quý vị trừ khi
      đứa trẻ đó bị tàn tật toàn phần và vĩnh viễn tại bất kỳ thời điểm nào trong
      <fg-show path="/taxYear">.
    p-1a035f: Để biết thêm thông tin, hãy xem <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596#en_US_2019_publink1000298140">Ấn
      phẩm 596</a>, Tín dụng Thu nhập Kiếm được, Bài kiểm tra tuổi.
/results:
  title: Kết Quả
  h2-88e7ef: Kết Quả Của Quý Vị
  fg-alert-64891c:
    heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được
    p-cdf53e: Dựa trên thông tin quý vị đã cung cấp, quý vị không thể yêu cầu tín
      thuế thu nhập kiếm được vì thu nhập kiếm được của quý vị vượt quá hạn mức đối
      với tư cách khai thuế và số lượng trẻ đủ điều kiện của quý vị.
    p-93a6b5: Để biết thêm thông tin, hãy xem <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Ấn phẩm 596</a>, Tín dụng Thu nhập
      Kiếm được.
  p-578b13: 'Dựa trên thông tin mà bản thân đã cung cấp, quý vị đủ điều kiện nhận
    khoản ước tính Tín Thuế Thu Nhập Kiếm Được là:'
  p-adf6bb: Khoản tín thuế này sẽ giảm thuế <fg-show path="/taxYear"/> của quý vị
    khi quý vị nộp tờ khai thuế cho IRS. Nếu tín thuế này giảm tiền thuế của quý vị
    xuống dưới 0, quý vị có thể nhận được tiền hoàn thuế.
  h2-259962: 'Các Bước Tiếp Theo: Cách nộp tờ khai để nhận EITC'
  p-508e29: Để nhận được số tiền ước tính là <strong><fg-show path="/earnedIncomeCredit"/></strong>*,
    quý vị phải nộp tờ khai thuế liên bang của <fg-show path="/taxYear"/> của mình.
    Nếu quý vị yêu cầu EITC, theo luật, IRS không thể cấp tiền hoàn thuế của quý vị
    trước thời điểm giữa tháng 2 <fg-show path="/nextTaxYear"/>, ngay cả phần không
    liên quan tới EITC.
  h3-54f664: Trực Tuyến
  p-a5939a: Nếu muốn khai thuế trực tuyến, quý vị đủ điều kiện để sử dụng Chương Trình
    Khai Thuế Miễn Phí Của IRS. Xin lưu ý rằng chương trình chỉ áp dụng từ tháng 1
    đến tháng 10.
  p-3ef53a: <a target="_blank" class="usa-link" href="https://www.irs.gov/filing/free-file-do-your-federal-taxes-for-free">
    Nộp trực tuyến ngay bây giờ<span class="usa-sr-only"> (opens in a new tab)</span>        </a>
  h3-792a4e: Gặp Mặt Trực Tiếp
  p-787398: Nếu muốn làm việc với người giúp khai thuế trực tiếp, quý vị có thể chọn
    thực hiện theo phương án này tại một văn phòng Chương trình Trợ Giúp Khai Thuế
    Thu Nhập Tự Nguyện (VITA) của IRS.
  p-25a83e: <a target="_blank" class="usa-link" href="https://www.irs.gov/individuals/free-tax-return-preparation-for-qualifying-taxpayers">
    Trợ giúp trực tiếp miễn phí<span class="usa-sr-only"> (opens in a new tab)</span>        </a>
  h3-c7457b: Mẫu Đơn Giấy
  p-b8834f: Vì bạn có trẻ em đủ điều kiện, bạn phải điền vào        <a target="_blank"
    class="usa-link" href="https://www.irs.gov/forms-pubs/about-schedule-eic-form-1040">
    Bản kê EIC (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        và
    đính kèm vào        <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    Mẫu 1040 (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        hoặc        <a
    target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    Mẫu 1040-SR (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        cho
    năm tính thuế <fg-show path="/taxYear"/>.
  h2-a3da4a: Tóm Tắt Thông Tin Của Quý Vị
  p-5a6eac: Bảng dưới đây tóm tắt lại thông tin mà quý vị đã nhập vào công cụ. Nếu
    bất kỳ thông tin nào trong số này không chính xác, vui lòng nhấp vào chỉnh sửa
    để cập nhật, nếu không điều này có thể ảnh hưởng đến kết quả của quý vị.
