/:
  title: Thông Tin Chung
  h2-5e286b: Thông Tin Chung
  p-c2c8a0: Trả lời một số câu hỏi nhanh về bản thân để xem liệu quý vị có đủ điều
    kiện hay không.
  /chosenTaxYear:
    question: 'Chọn niên thuế quý vị muốn kiểm tra tính đủ điều kiện để nhận EITC
      của mình đối với:'
    modalLink: <modal-link for="modal-tax-year">Tôi nên sử dụng năm nào?</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien:
    question: Quý vị là Công Dân Hoa Kỳ hay Ngoại Nhân Thường Trú cho cả năm <fg-show
      path="/taxYear"/>?
    modalLink: <modal-link for="modal-citizen">Tôi có đủ điều kiện là công dân hoặc
      cư dân Hoa Kỳ cho EITC không?</modal-link>
    options:
      'true':
        name: Có
      'false':
        name: Không
  fg-alert-8b7db9:
    heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được (EITC).
    p-091688: Quý vị phải là công dân Hoa Kỳ hoặc ngoại nhân thường trú để yêu cầu
      Tín Thuế Thu Nhập Kiếm Được. Xem <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit. để xác định xem liệu quý vị có phải là ngoại
      nhân thường trú Hoa Kỳ trong cả năm đó hay không.
    p-f72c3e: ' Chọn yes nếu quý vị đang khai thuế chung với người phối ngẫu của mình
      cho <fg-show path="/taxYear"/> và quý vị hoặc người phối ngẫu là Công Dân Hoa
      Kỳ hoặc Ngoại Nhân Thường Trú trong cả năm.'
    p-b85d77: Quý vị không thể yêu cầu EITC vì quý vị không có số an sinh xã hội hợp
      lệ được cấp vào hoặc trước ngày đến hạn của tờ khai thuế của quý vị.
    p-93a6b5: Để biết thêm thông tin, xem <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
    p-4c0c0d: Bạn không thể yêu cầu tín dụng thu nhập kiếm được nếu bạn nộp <a target="_blank"
      class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">Mẫu 2555</a>,
      Thu nhập kiếm được ở nước ngoài.
    p-236b69: Ấn Phẩm 54, Hướng Dẫn Về Thuế Cho Công Dân Hoa Kỳ Và Thường Trú Nhân
      Người Nước Ngoài Ở Hải Ngoại (tiếng Anh),
    p-5e637b: Quý vị không đủ điều kiện nhận EITC nếu là trẻ đủ điều kiện để nhận
      EITC của một người khác.
    p-ec145e: Để biết thêm thông tin về việc liệu có ai đó có thể yêu cầu bạn là trẻ
      em đủ điều kiện cho EITC hay không, hãy xem <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Ấn phẩm 596</a>, Tín dụng Thu nhập
      Kiếm được, Bạn Không Thể Là Trẻ Em Đủ Điều Kiện Của Một Người Nộp Thuế Khác.
    p-363ef2: Quý vị không đủ điều kiện nhận EITC nếu là người phụ thuộc của người
      khác trừ khi quý vị có một đứa trẻ đủ điều kiện để yêu cầu EITC.
  /hasValidSSN:
    question: Quý vị có số an sinh xã hội hợp lệ đã được cấp vào hoặc trước ngày đến
      hạn của tờ khai thuế năm <fg-show path="/taxYear"/> của quý vị (đã bao gồm khoảng
      gia hạn) không?
    modalLink: <modal-link for="modal-valid-ssn-filer">Số An Sinh Xã Hội Hợp Lệ là
      bắt buộc</modal-link>
    options:
      'true':
        name: Có
      'false':
        name: Không
  /hasForeignEarnedIncome:
    question: Quý vị có đang nộp Mẫu 2555, Thu Nhập Kiếm Được Ở Nước Ngoài không?
    modalLink: <modal-link for="modal-foreign-income">Thu Nhập Kiếm Được Ở Nước Ngoài
      không bao gồm trong Tổng Thu Nhập</modal-link>
    options:
      'true':
        name: Có
      'false':
        name: Không
  /isClaimedAsDependent:
    question: Có người nào sẽ kê khai quý vị là người phụ thuộc hoặc trẻ đủ điều kiện
      để nhận EITC trên tờ khai thuế của họ không?
    modalLink: <modal-link for="modal-claimed-dependent">Quý vị là Người Phụ Thuộc
      hoặc Trẻ Đủ Điều Kiện</modal-link>
    options:
      'true':
        name: Có
      'false':
        name: Không
  /ageRange:
    question: Vui lòng chọn nhóm tuổi của quý vị ở thời điểm cuối năm <fg-show path="/taxYear"/>.
    options:
      under24:
        name: 24 tuổi trở xuống
      age25to64:
        name: Từ 25 đến 64
      65andOlder:
        name: 65 tuổi trở lên
  modal-tax-year:
    heading: Niên Thuế
    p-aa5a47: 'Đối với lương bổng và thu nhập kiếm được khác trong:'
    ul-0:
      li-28dd34: 2025, chọn 2025
      li-174a8b: 2024, chọn 2024
      li-0a25dc: 2023, chọn 2023
  modal-citizen:
    heading: Công Dân Hoa Kỳ hay Ngoại Nhân Thường Trú
    p-18e680: Nếu không phải là công dân Hoa Kỳ, quý vị được coi là ngoại nhân.
    p-fe70ca: Quý vị được coi là ngoại nhân thường trú cho xét duyệt EITC nếu có thẻ
      xanh hoặc đã sống ở Hoa Kỳ trong hơn một số ngày nhất định.
    p-2c8f8f: Để biết thêm thông tin và các trường hợp ngoại lệ quan trọng, xem <a
      target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit.
  modal-valid-ssn-filer:
    heading: Số An Sinh Xã Hội Hợp Lệ
    p-527528: Quý vị phải có Số An Sinh Xã Hội (Social Security number, SSN) hợp lệ
      do Cơ Quan An Sinh Xã Hội (Social Security Administration) cấp vào hoặc trước
      ngày đến hạn khai thuế năm 2025 (bao gồm cả thời gian gia hạn).
    p-45ae0e: Nếu thẻ An Sinh Xã Hội của quý vị ghi "Hợp lệ để làm việc với sự cho
      phép của Bộ An Ninh Nội Địa" (Department of Homeland Security, DHS) hoặc "Hợp
      lệ để làm việc với sự cho phép của Sở Di Trú Và Nhập Tịch" (Immigration and
      Naturalization Service, INS) trên đó thì đó là SSN hợp lệ nếu ủy quyền vẫn còn
      hiệu lực.
    p-558a40: 'Đối với Tín Dụng Thuế Thu Nhập Kiếm Được (Earned Income Tax Credit,
      EITC), chúng tôi không chấp nhận:'
    ul-0:
      li-5e5f3e: Số nhận dạng cá nhân đóng thuế (ITIN) của IRS
      li-5fc9b7: Mã số người đóng thuế cho việc nhận con nuôi (ATIN)
      li-9f487b: Số An Sinh Xã Hội được cấp chỉ để cho phép người nhận số SSN đăng
        ký hoặc nhận phúc lợi do liên bang tài trợ, chẳng hạn như Medicaid
      li-a69a30: Số An Sinh Xã Hội được cấp chỉ để đăng ký hoặc nhận phúc lợi do liên
        bang tài trợ như Medicaid
    p-f554f7: Xem Ấn Bản 596 để biết thêm thông tin về Số An Sinh Xã Hội hợp lệ.
  modal-foreign-income:
    heading: Thu Nhập Kiếm Được Ở Nước Ngoài không bao gồm trong Tổng Thu Nhập
    p-f45b03: 'Điều này đề cập đến thu nhập quý vị kiếm được bên ngoài Hoa Kỳ, Đặc
      Khu Columbia hoặc các khu vực thuộc sở hữu hay lãnh thổ của Hoa Kỳ mà quý vị
      đã lựa chọn loại trừ <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">trên</a> '
  modal-claimed-dependent:
    heading: Quý vị là Người Phụ Thuộc hoặc Trẻ Đủ Điều Kiện
    p-faf8d8: Trong hầu hết các trường hợp, quý vị không thể là người phụ thuộc hoặc
      trẻ đủ điều kiện của người đóng thuế khác đồng thời yêu cầu EITC.
    p-98d6db: Trong hầu hết các trường hợp, nếu quý vị chưa đủ 19 tuổi hoặc là học
      sinh/sinh viên dưới 24 tuổi và sống với cha mẹ hoặc thân nhân khác của quý vị
      ở Hoa Kỳ trong hơn nửa năm, hãy chọn <strong>Yes</strong>.
    p-038f13: Nếu quý vị đã kết hôn và khai thuế chung, quý vị không thể khai là người
      phụ thuộc trừ khi quý vị khai thuế chung chỉ để yêu cầu hoàn thuế thu nhập đã
      khấu lưu hoặc thuế ước tính đã trả.
    p-ceda6c: 'Để biết thêm thông tin về việc liệu ai đó có thể kê khai quý vị là
      người phụ thuộc hay không, truy <a target="_blank" class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">cập</a> '
    p-d11380: Để biết thêm thông tin về việc liệu ai đó có thể kê khai quý vị là trẻ
      đủ điều kiện để nhận EITC, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2021_publink1000298540">xem</a>
      .
    p-16aba9: Chúng tôi sẽ hỏi về trẻ em hoặc thân nhân mà quý vị có thể kê khai sau.
  modal-primary-claimed-as-dependent:
    heading: Làm cách nào để biết tôi có phải là người phụ thuộc của ai đó hay không?
    p-d3187d: Nếu bạn phụ thuộc vào một người khác (không phải là vợ/chồng của bạn) để được hỗ trợ trong năm <fg-show path="/taxYear"/>, họ có thể yêu cầu bạn là người phụ thuộc trên tờ khai thuế liên bang của họ.
    p-762495: 'Có một vài yếu tố xác định xem liệu ai đó có thể yêu cầu bạn là người phụ thuộc hay không, bao gồm:'
    ul-0:
      li-b17276: Mối quan hệ của bạn với người đó
      li-c82d5e: Họ đã hỗ trợ bạn bao nhiêu, về mặt tài chính và các khía cạnh khác
      li-5a5073: Bạn có sống cùng họ không và trong bao lâu
    p-752de3: Xem lại Bảng 5 trong <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000196863">Ấn phẩm 501 của IRS</a> để xác định xem liệu có người khác có thể yêu cầu bạn là người phụ thuộc hay không.
    p-5a0201: Hãy nhớ rằng bạn không phải là người phụ thuộc của người khác nếu bạn (hoặc vợ/chồng bạn) đã tự chi trả cho hơn một nửa mức sống của chính mình.
  modal-confirm-tax-year-change:
    heading: 'Chú ý:'
    p-31c7da: Việc thay đổi <strong>năm</strong> sẽ xóa dữ liệu bạn đã nhập trước
      đó. Bạn có vẫn muốn tiếp tục không?
    button-70d9be: Xác nhận
    button-ea4788: Hủy
/filing-status:
  title: Tư Cách Khai Thuế
  h2-c01d87: Tư Cách Khai Thuế
  p-9bda8f: Ở bước này, quý vị sẽ được hỏi về cách bản thân dự định nộp thuế của <fg-show
    path="/taxYear"/>.
  /knowsFilingStatus:
    question: Quý vị có biết tư cách khai thuế mà quý vị sẽ sử dụng khi khai thuế
      năm <fg-show path="/taxYear"/> của mình không?
  /initialFilingStatus:
    question: 'Vui lòng chọn tư cách khai thuế mà quý vị sẽ sử dụng khi khai thuế
      của năm <fg-show path="/taxYear"/>:'
    modalLink: <modal-link for="modal-filing-status">Tôi nên sử dụng tình trạng khai
      thuế nào?</modal-link>
    options:
      single:
        name: Độc thân
      marriedFilingJointly:
        name: Vợ Chồng Khai Chung Hồ Sơ Thuế
      marriedFilingSeparately:
        name: Vợ Chồng Khai Riêng Hồ Sơ Thuế
      headOfHousehold:
        name: Chủ Gia Đình
      qualifiedSurvivingSpouse:
        name: Vợ/Chồng Của Người Đã Mất Đủ Điều Kiện
  /maritalStatus:
    question: Tình trạng hôn nhân của quý vị vào ngày 31 tháng 12 năm <fg-show path="/taxYear"/>
      là gì?
    modalLink: <modal-link for="modal-legal-separation">Đã kết hôn và ly thân hợp
      pháp có nghĩa là gì?</modal-link>
    options:
      married:
        name: Đã kết hôn
      divorced:
        name: Ly Hôn hoặc Ly Thân Về Mặt Pháp Lý
      widowed:
        name: Vợ/Chồng Của Người Đã Mất Đủ Điều Kiện
      single:
        name: Chưa bao giờ kết hôn
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: Người phối ngẫu của quý vị qua đời khi nào?
    options:
      taxYear:
        name: Trong <fg-show path="/taxYear"/>
      taxYearMinusOneOrTwo:
        name: Trong 2023 hoặc 2024
      beforeTaxYearMinusTwo:
        name: Trước 2023
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: Người phối ngẫu của quý vị qua đời khi nào?
    options:
      taxYear:
        name: Trong 2024
      taxYearMinusOneOrTwo:
        name: Trong 2022 hoặc 2023
      beforeTaxYearMinusTwo:
        name: Trước 2022
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: Người phối ngẫu của quý vị qua đời khi nào?
    options:
      taxYear:
        name: Trong 2023
      taxYearMinusOneOrTwo:
        name: Trong 2021 hoặc 2022
      beforeTaxYearMinusTwo:
        name: Trước 2021
  /isHOHMarried:
    question: Quý vị đã kết hôn chưa?
  /intendsToFileJointlyWidow:
    question: Quý vị có ý định khai thuế chung với người phối ngẫu đã qua đời của
      mình cho <fg-show path="/taxYear"/> không?
    modalLink: <modal-link for="modal-joint-deceased-spouse">Quý vị có quyền nộp hồ
      sơ khai thuế chung với người phối ngẫu của mình trong năm mà họ qua đời không?</modal-link>
  /intendsToFileJointlyMFJ:
    question: Quý vị và người phối ngẫu của mình có dự định khai thuế chung không?
    modalLink: <modal-link for="modal-joint-return-mfj">Vợ Chồng Khai Chung Hồ Sơ
      Thuế</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: Quý vị và người phối ngẫu của quý vị có sinh sống trong cùng nơi cư
      chú chính với quý vị trong 6 tháng cuối của năm <fg-show path="/taxYear"/> không?
    modalLink: <modal-link for="modal-spouse-lived-together">Vợ chồng sống chung có
      nghĩa là gì?</modal-link>
  /samePrincipalResidenceLast6Months:
    question: Quý vị và người phối ngẫu của quý vị có sinh sống trong cùng nơi cư
      chú chính với quý vị trong 6 tháng cuối của năm <fg-show path="/taxYear"/> không?
  /writableSeparationAgreement:
    question: Quý vị đã ly thân hợp pháp theo luật tiểu bang của mình theo thỏa thuận
      ly thân bằng văn bản hoặc theo quyết định cấp dưỡng ly thân và quý vị không
      sống cùng vợ/chồng vào ngày cuối cùng của năm <fg-show path="/taxYear"/> không?
  /entitledToPreviouslyFileJointReturn:
    question: Quý vị có quyền nộp hồ sơ khai thuế chung với người phối ngẫu của mình
      trong năm mà họ qua đời không?
  /paidMoreThanHalfHomeCostsForChild:
    question: Trong <fg-show path="/taxYear"/>, quý vị có phải trả hơn một nửa chi
      phí để duy trì ngôi nhà mà bản thân đang sống mà cũng là nhà chính của người
      con phụ thuộc, con riêng của vợ/chồng hoặc con nuôi tạm của quý vị trong suốt
      <fg-show path="/taxYear"/> (bao gồm bất kỳ sự vắng mặt tạm thời nào) không?
    modalLink: <modal-link for="modal-keeping-up-home">Làm cách nào để tính toán &quot;Duy
      trì một ngôi nhà&quot;?</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: Quý vị có thể kê khai con của mình hoặc con riêng của vợ/chồng mình,
      người mà đã sống cùng quý vị như một người phụ thuộc trong <fg-show path="/taxYear"/>
      không?
    modalLink: <modal-link for="modal-claiming-dependents">Tôi Có Thể Yêu Cầu Ai Là
      Người Phụ Thuộc? (tiếng Anh)</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: 'Bạn có thể yêu cầu con ruột hoặc con riêng của mình là người phụ thuộc
      NGOẠI TRỪ việc, trong năm <fg-show path="/taxYear"/>: 1) Đứa trẻ có tổng thu
      nhập cao hơn mức ngưỡng là <fg-show path="/eitcChildGrossIncomeLimit"/> cho
      năm <fg-show path="/taxYear"/>; 2) Đứa trẻ đã nộp một tờ khai chung; hoặc 3)
      Bạn có thể được yêu cầu là người phụ thuộc trên tờ khai của người khác?'
    modalLink: <modal-link for="modal-claiming-dependents">Tôi Có Thể Yêu Cầu Ai Là
      Người Phụ Thuộc? (tiếng Anh)</modal-link>
  /homeUpkeepScenario:
    question: Quý vị có phải trả hơn 50% chi phí duy trì ngôi nhà không?
    modalLink: <modal-link for="modal-keeping-up-home">Làm sao tôi tính được &quot;Duy
      trì một ngôi nhà&quot;?</modal-link>
    options:
      livedWithDependent:
        name: Nơi quý vị đã sống hơn nửa năm với người phụ thuộc (chẳng hạn như con,
          các cháu nội/ngoại, anh chị em, các cháu là con của anh/chị/em, cha/mẹ hoặc
          ông bà)
      custodialParentNonDependent:
        name: Nơi quý vị đã sống hơn nửa năm với một đứa trẻ không phải là người phụ
          thuộc của mình mặc dù quý vị là cha mẹ giám hộ (theo phán quyết dành cho
          đứa con của cha mẹ ly hôn hoặc ly thân)
      dependentParentElsewhere:
        name: Đối với cha mẹ, quý vị có thể kê khai là người phụ thuộc trừ khi họ
          không sống với quý vị
      none:
        name: Không điều nào kể trên
  /secondaryFilerHasValidSSN:
    question: Người phối ngẫu của quý vị có số An Sinh Xã Hội hợp lệ đã được cấp vào
      hoặc trước ngày đến hạn của tờ khai thuế năm <fg-show path="/taxYear"/> của
      quý vị (đã bao gồm khoảng gia hạn) không?
    modalLink: <modal-link for="modal-valid-ssn">Số An Sinh Xã Hội Hợp Lệ là bắt buộc</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: Người phối ngẫu của quý vị có số An Sinh Xã Hội hợp lệ vào ngày họ qua
      đời không?
    modalLink: <modal-link for="modal-valid-ssn">Số An Sinh Xã Hội Hợp Lệ là bắt buộc</modal-link>
  /spouseAliveEndOfTaxYear:
    question: Người phối ngẫu của quý vị có còn sống vào ngày 31 tháng 12 năm <fg-show
      path="/taxYear"/> không?
  /ageRangeSecondary:
    question: Vui lòng chọn nhóm tuổi mô tả chính xác nhất tuổi của người phối ngẫu
      của quý vị vào cuối <fg-show path="/taxYear"/>.
    options:
      under24:
        name: 24 tuổi trở xuống
      age25to64:
        name: Từ 25 đến 64
      65andOlder:
        name: 65 tuổi trở lên
  /primaryFilerIsClaimingQualifyingChildren:
    question: Quý vị có dự định khai con hoặc người thân khác có số An Sinh Xã Hội
      hợp lệ để nhận EITC không?
    modalLink: <modal-link for="modal-qualifying-child-eitc">Người khác có thể khai
      trẻ này để nhận EITC không?</modal-link>
  /hasLivedInUSMore6Months:
    question: Nhà chính của quý vị có ở Hoa Kỳ trong hơn nửa <fg-show path="/taxYear"/>
      không?
    modalLink: <modal-link for="modal-main-home-us">Điều gì được coi là ngôi nhà chính
      ở Hoa Kỳ?</modal-link>
  h2-7864de: Dựa trên những lựa chọn của quý vị, tư cách khai thuế của quý vị là <fg-show
    path="/flowReadableFilingStatus"/>.
  fg-alert-334e2e:
    heading: Quý vị không đủ điều kiện nhận Tín Thuế Thu Nhập Kiếm Được (EITC).
    p-b6bd9e: Quý vị không đủ điều kiện nhận EITC nếu không có trẻ đủ điều kiện trừ
      khi quý vị hoặc vợ/chồng của quý vị  từ 25 đến 64 tuổi nếu khai thuế chung.
    p-ae739d: Để biết thêm thông tin, hãy xem <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Ấn phẩm 596, Tín dụng Thu nhập
      Kiếm được</a>.
    p-47ef52: Quý vị có thể yêu cầu EIC nếu quý vị đã kết hôn, không khai thuế chung,
      có con đủ điều kiện sống với quý vị trên nửa năm <fg-show path="/taxYear"/>
      và một trong hai trường hợp sau đây được áp dụng.
    ul-0:
      li-207749: 'Quý vị sống ly thân với vợ/chồng trong 6 tháng cuối năm <fg-show
        path="/taxYear"/>, hoặc '
      li-93a6ef: Quý vị được ly thân hợp pháp theo luật tiểu bang của quý vị theo
        thỏa thuận ly thân bằng văn bản hoặc nghị định cấp dưỡng ly thân và quý vị
        không sống trong cùng một hộ gia đình với vợ/chồng của mình vào cuối năm <fg-show
        path="/taxYear"/>.
    p-3630b4: 'Để biết thêm thông tin, hãy <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501"
      class="usa-link">xem</a> '
    p-99f873: Quý vị không thể yêu cầu EITC vì người phối ngẫu của quý vị không có
      số an sinh xã hội hợp lệ được cấp vào hoặc trước ngày đến hạn của tờ khai thuế
      của quý vị.
    p-91ee91: Quý vị không thể yêu cầu EITC nếu chọn khai thuế chung với người phối
      ngẫu đã qua đời của mình vì người phối ngẫu của quý vị không có số an sinh xã
      hội hợp lệ vào ngày họ qua đời.
    p-d4d927: Quý vị có thể đủ điều kiện nhận EITC nếu không khai thuế chung với người
      phối ngẫu đã qua đời của mình.
    p-065d1b: Để yêu cầu EITC, nhà của quý vị phải ở Hoa Kỳ trong hơn nửa năm đó.
      Hoa Kỳ bao gồm 50 tiểu bang và Đặc Khu Columbia.
  modal-filing-status:
    heading: Tôi nên sử dụng tình trạng khai thuế nào?
    p-c0b92c: Nếu không có sự thay đổi nào về tình trạng hôn nhân hoặc hoàn cảnh gia
      đình của bạn trong năm nay, thì bạn có thể muốn sử dụng cùng một tình trạng
      khai thuế từ tờ khai thuế <fg-show path="/lastTaxYear"/> của mình.
    p-391f95: Nếu tình trạng hôn nhân hoặc gia đình của bạn có thay đổi trong năm
      qua, bạn có thể cần sử dụng tình trạng khai thuế khác để có ước tính chính xác
      hơn.
    p-496916: Mỗi tình trạng khai thuế có các yêu cầu khác nhau.
    p-49f30f: Độc thân
    ul-0:
      li-c717a5: Bạn không thể đã kết hôn
    p-5f63cd: Vợ Chồng Khai Chung Hồ Sơ Thuế
    ul-1:
      li-6aab7e: Bạn đã kết hôn hoặc vợ/chồng của bạn đã qua đời trong năm
    p-80c02f: Vợ Chồng Khai Riêng Hồ Sơ Thuế
    ul-2:
      li-595e35: Quý vị đã kết hôn chưa?
      li-1e72dd: Bạn không có kế hoạch nộp chung với vợ/chồng của mình (hầu hết các
        cặp vợ chồng tiết kiệm tiền bằng cách nộp chung)
    p-d69332: Chủ Gia Đình
    ul-3:
      li-dfe41a: Bạn không thể đã kết hôn (hoặc bạn được coi là chưa kết hôn vì mục
        đích thuế)
      li-38ff2f: Bạn đã trả hơn một nửa chi phí duy trì một ngôi nhà cho một thành
        viên trong gia đình hoặc thành viên trong hộ gia đình của bạn trong một khoảng
        thời gian cụ thể, và họ phải đáp ứng các yêu cầu nhất định
    p-57317d: <strong>Vợ/chồng sống sót đủ điều kiện:</strong>
    ul-4:
      li-2bf38a: Vợ/chồng của bạn đã qua đời vào năm <fg-show path="/lastTaxYear"/>
        hoặc <fg-show path="/taxYearMinusTwo"/>
      li-4ef74f: Bạn đã không tái hôn trước năm <fg-show path="/taxYear"/>
      li-939762: Bạn có một người con phụ thuộc sống cùng bạn cả năm
      li-bad5a3: Quý vị đã trả hơn một nửa chi phí duy trì ngôi nhà cho năm đó.
    p-5b3ae2: <a target="_blank" href="https://www.irs.gov/filing/filing-status">Tìm
      hiểu thêm về tình trạng khai thuế<span class="usa-sr-only"> (opens in a new
      tab)</span>.</a>
  modal-qualifying-child-eitc:
    heading: Trẻ đủ điều kiện
    p-7356ad: Để yêu cầu EITC với một đứa trẻ đủ điều kiện, đứa trẻ phải có SSN hợp
      lệ do Cơ Quan An Sinh Xã Hội cấp vào hoặc trước ngày đến hạn khai thuế năm <fg-show
      path="/taxYear"/> của quý vị (bao gồm cả gia hạn).
    p-ac8914: Nếu thẻ An sinh Xã hội có ghi &quot;Hợp lệ để làm việc khi có sự ủy
      quyền của DHS&quot; hoặc &quot;Hợp lệ để làm việc khi có sự ủy quyền của INS&quot;
      trên đó, thì đó là SSN hợp lệ nếu sự ủy quyền đó vẫn còn hiệu lực.
    p-558a40: 'Đối với EITC, chúng tôi không chấp nhận:'
    ul-0:
      li-5e5f3e: Số nhận dạng cá nhân đóng thuế (ITIN) của IRS
      li-5fc9b7: Mã số người đóng thuế cho việc nhận con nuôi (ATIN)
      li-9f487b: Số An Sinh Xã Hội được cấp chỉ để cho phép người nhận số SSN đăng
        ký hoặc nhận phúc lợi do liên bang tài trợ, chẳng hạn như Medicaid
      li-19d3d7: Số An Sinh Xã Hội được cấp chỉ để đăng ký hoặc nhận phúc lợi do liên
        bang tài trợ như Medicaid
    p-0d323a: 'Con quý vị là trẻ đủ điều kiện nếu con quý vị đáp ứng bốn bài kiểm
      tra. Bốn bài kiểm tra là:'
    ul-1:
      li-fbc977: Mối quan hệ,
      li-9d8d2d: Độ tuổi,
      li-23863d: Cư trú và
      li-ca34c2: Khai Thuế Chung
    p-e00960: 'Để biết thêm thông tin, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">xem</a> '
  modal-main-home-us:
    heading: Nhà Chính ở Hoa Kỳ
    p-9cbbc6: Nhà của quý vị có ở Hoa Kỳ trong hơn nửa năm đó không?
    p-775779: 'Nhà của quý vị phải ở Hoa Kỳ trong hơn nửa <fg-show path="/taxYear"/>
      . Hoa Kỳ bao gồm 50 tiểu bang và Đặc Khu Columbia. Hoa Kỳ không bao gồm các
      vùng lãnh thổ thuộc sở hữu của Hoa Kỳ như Guam, Quần Đảo Virgin hoặc Puerto
      Rico. '
    h3-398dfd: Quân Nhân Đóng Quân Bên Ngoài Hoa Kỳ
    p-7dbfa0: Nếu quý vị là một thành viên của quân đội Hoa Kỳ và đang đóng quân bên
      ngoài Hoa Kỳ trong thời gian tại ngũ được gia hạn, hãy chọn yes.
  modal-keeping-up-home:
    heading: Duy Trì Ngôi Nhà
    p-c0958f: Nếu tổng số tiền quý vị đã trả nhiều hơn một nửa tổng chi phí, quý vị
      đáp ứng yêu cầu trả hơn một nửa chi phí duy trì ngôi nhà.
    h3-e8b30a: Chi phí bao gồm
    ul-0:
      li-b9b2e1: Tiền thuê nhà, lãi suất thế chấp, thuế bất động sản và bảo hiểm nhà
      li-313963: Sửa chữa và tiện ích
      li-61e699: Thức ăn ăn trong nhà
    p-fec463: 'Ghi: Chi phí được trả bằng trợ cấp công cộng được coi là chi phí do
      người đóng thuế trả.'
    h3-3e0b53: 'Chi phí không bao gồm:'
    ul-1:
      li-edaa99: Chi phí quần áo, giáo dục và kỳ nghỉ
      li-40b84f: Điều trị y tế, thanh toán bảo hiểm y tế và thuốc theo đơn
      li-5eae2b: Bảo hiểm nhân thọ
      li-c64365: Chi phí vận chuyển như bảo hiểm, thanh toán tiền thuê nhà hoặc phương
        tiện giao thông công cộng
      li-04dec0: Giá trị dịch vụ của quý vị hoặc của một thành viên trong gia đình
        quý vị
  modal-legal-separation:
    heading: Ly thân hợp pháp và Thông luật
    h3-ef7665: Ly Thân Về Mặt Pháp Lý
    p-198345: “Ly thân về mặt pháp lý" cho mục đích này có nghĩa là tình trạng ly
      thân theo như phán quyết chính thức về ly hôn hoặc việc cấp dưỡng sau ly thân.
    h3-357344: Hôn Nhân Theo Tập Tục Không Cần Phải Làm Giấy Hôn Thú
    p-f560ea: Một số tiểu bang cho phép hôn nhân theo thông luật. Kiểm tra đối với
      tiểu bang của quý vị để xem liệu quý vị có được coi là đã kết hôn theo thông
      luật không.
  modal-joint-return-mfj:
    heading: Khai Thuế Chung
    p-75997a: Quý vị có thể chọn khai chung hồ sơ thuế với người phối ngẫu của mình
      bằng cách chọn <strong> trong tư cách khai thuế của quý vị. Điều này cho phép
      quý vị kết hợp thu nhập và chi phí của hai người khi tính toán các khoản tín
      thuế, khoản khấu trừ và trách nhiệm trả thuế.
  modal-joint-deceased-spouse:
    heading: Khai Thuế Chung với Người Phối Ngẫu Đã Qua Đời
    p-85e581: Nếu người phối ngẫu của quý vị đã qua đời trong <fg-show path="/taxYear"/>,
      quý vị có thể chọn khai chung hồ sơ thuế với người phối ngẫu của mình bằng cách
      chọn <fg-show path="/taxYear"/> trong tư cách khai thuế. Điều này cho phép quý
      vị kết hợp thu nhập và chi phí của hai người khi tính toán các khoản tín thuế,
      khoản khấu trừ và trách nhiệm trả thuế.
  modal-spouse-lived-together:
    heading: Người Phối Ngẫu - Sống Chung
    p-906815: 'Một người được coi là đã sống với quý vị trong các khoảng thời gian
      khi một hoặc cả hai người quý vị tạm thời vắng mặt vì những hoàn cảnh đặc biệt
      như:'
    ul-0:
      li-8ec6de: Bệnh tật,
      li-de7a22: Giáo dục,
      li-d6e6cb: Kinh doanh,
      li-2c48dd: Kỳ nghỉ, hoặc
      li-8fdca6: Nghĩa vụ quân sự.
    p-2392bb: Bắt buộc phải có tính chất hợp lý khi giả định rằng người vắng mặt sẽ
      trở về nhà sau thời gian tạm vắng.
  modal-valid-ssn:
    heading: Số An Sinh Xã Hội Hợp Lệ
    p-527528: Quý vị phải có Số An Sinh Xã Hội (Social Security number, SSN) hợp lệ
      do Cơ Quan An Sinh Xã Hội (Social Security Administration) cấp vào hoặc trước
      ngày đến hạn khai thuế năm 2025 (bao gồm cả thời gian gia hạn).
    p-45ae0e: Nếu thẻ An Sinh Xã Hội của quý vị ghi "Hợp lệ để làm việc với sự cho
      phép của Bộ An Ninh Nội Địa" (Department of Homeland Security, DHS) hoặc "Hợp
      lệ để làm việc với sự cho phép của Sở Di Trú Và Nhập Tịch" (Immigration and
      Naturalization Service, INS) trên đó thì đó là SSN hợp lệ nếu ủy quyền vẫn còn
      hiệu lực.
    p-558a40: 'Đối với Tín Dụng Thuế Thu Nhập Kiếm Được (Earned Income Tax Credit,
      EITC), chúng tôi không chấp nhận:'
    ul-0:
      li-5e5f3e: Số nhận dạng cá nhân đóng thuế (ITIN) của IRS
      li-5fc9b7: Mã số người đóng thuế cho việc nhận con nuôi (ATIN)
      li-9f487b: Số An Sinh Xã Hội được cấp chỉ để cho phép người nhận số SSN đăng
        ký hoặc nhận phúc lợi do liên bang tài trợ, chẳng hạn như Medicaid
      li-a69a30: Số An Sinh Xã Hội được cấp chỉ để đăng ký hoặc nhận phúc lợi do liên
        bang tài trợ như Medicaid
    p-f554f7: Xem Ấn Bản 596 để biết thêm thông tin về Số An Sinh Xã Hội hợp lệ.
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: Xác nhận
    p-30861e: Thay đổi từ <strong>Kết hôn nộp chung</strong> sang một tình trạng khai
      thuế khác sẽ xóa dữ liệu trẻ em đủ điều kiện mà bạn đã nhập trước đó. Bạn có
      vẫn muốn tiếp tục không?
    button-70d9be: Xác nhận
    button-ea4788: Hủy
  modal-claiming-dependents:
    heading: Tôi Có Thể Yêu Cầu Ai Là Người Phụ Thuộc? (tiếng Anh)
    p-fc792e: 'Người phụ thuộc thường là:'
    ul-0:
      li-7673e2: Trẻ em dưới 19 tuổi;
      li-e9750c: Học sinh/Sinh viên dưới 24 tuổi sống cùng cha mẹ
      li-9a6fc3: Người thân hoặc thành viên trong gia đình bạn, những người nhận được
        hơn một nửa sự hỗ trợ tài chính từ bạn và có tổng thu nhập dưới <fg-show path="/eitcChildGrossIncomeLimit"/>
    p-6b3acc: Bạn không thể yêu cầu vợ/chồng mình là người phụ thuộc nếu bạn nộp hồ
      sơ chung.
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/dependents">Tìm
      hiểu thêm về người phụ thuộc.</a>
/agi:
  title: Tổng Thu Nhập Điều Chỉnh (AGI)
  h2-c0af17: Ước Tính Tổng Thu Nhập Điều Chỉnh Của Quý Vị (AGI)
  p-308236: Trong bước này, chúng tôi sẽ ước tính thu nhập kiếm được chung của quý
    vị và người phối ngẫu của quý vị, tổng thu nhập điều chỉnh và bất kỳ mục điều
    chỉnh nào đối với thu nhập đó.
  p-100130: Vui lòng chọn và nhập thu nhập và các mục điều chỉnh của năm <fg-show
    path="/taxYear"/> của quý vị. Chỉ chọn một mục cho mỗi nguồn.
  p-bb8818: Bảo đảm bao gồm cả thu nhập và các mục điều chỉnh của người phối ngẫu
    của quý vị.
  h3-40c7ae: Thu Nhập Kiếm Được
  fg-detail-c90011:
    summary: tiền lương, tiền công hoặc tiền boa
    /jobsIncomeTotal:
      question: Tiền lương, tiền công hoặc tiền boa tại nơi mà thuế thu nhập liên
        bang bị khấu lưu
      modalLink: <modal-link for="modal-wages-salaries-tips">Tôi nên bao gồm khoản
        thu nhập nào?</modal-link>
  fg-detail-c0e18b:
