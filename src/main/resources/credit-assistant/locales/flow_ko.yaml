/:
  title: 일반 정보
  h2-5e286b: 일반 정보
  p-c2c8a0: 적격인지 확인하기 위해 자신에 대한 간단한 몇 가지 질문에 답하세요.
  /chosenTaxYear:
    question: 귀하의 EITC 적격성을 확인하기 원하는 과세연도를 선택하세요.
    modalLink: <modal-link for="modal-tax-year">어느 연도를 사용해야 합니까?</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien:
    question: <fg-show path="/taxYear"/>년 내내 미국 국민 혹은 영주 체류자였습니까?
    modalLink: <modal-link for="modal-citizen">미국 시민권자 또는 거주자로서 EITC 자격이 있습니까?</modal-link>
    options:
      'true':
        name: 네
      'false':
        name: 아니요
  fg-alert-8b7db9:
    heading: 근로 소득 세액 공제(EITC)를 받을 자격이 없습니다.
    p-091688: 귀하는 반드시 미국 시민이거나 영주 체류자이어야 근로 소득 세액공제를 신청할 수 잇습니다. 해당 연도 전체에 미국 영주 체류자였는지
      확인하기 위해 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit.를 확인하세요.
    p-f72c3e: ' 만약 귀하가 <fg-show path="/taxYear"/>년에 배우자와 공동신고서를 제출했거나 귀하와 귀하의 배우자
      각각이 전체 연도에 미국 시민 혹은 영주 체류자였다면 yes 선택하세요.'
    p-b85d77: 귀하는 세금 신고서의 기한 이전에 사회보장국에서 발급한 유효한 사회 보장 번호(SSN)가 없기 때문에 EITC를 신청할 수
      없습니다.
    p-93a6b5: 자세한 정보는  <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-519"> 간행물 519, 외국인을 위한 미국 세금 안내(영어)</a>를 확인하세요.
    p-4c0c0d: 해외 근로 소득에 대한 <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">양식
      2555</a>를 제출하는 경우 근로 소득 세액 공제를 청구할 수 없습니다.
    p-236b69: 간행물 54, 해외의 미국 시민 그리고 영주 체류자를 위한 세금 안내(영어)
    p-5e637b: 귀하가 누군가 다른 사람의 EITC를 위한 적격 자녀라면 귀하는 EITC에 적격이 아닙니다.
    p-ec145e: 다른 사람이 귀하를 EITC의 적격 자녀로 청구할 수 있는지에 대한 자세한 내용은 <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">간행물 596</a>, 근로 소득 세액 공제, 귀하는 다른
      납세자의 적격 자녀가 될 수 없습니다를 참조하십시오.
    p-363ef2: 귀하가 누군가 다른 사람의 EITC를 위한 부양가족이라면 귀하가 EITC를 위한 적격 자녀를 갖지 않는 한 EITC에 적격이
      아닙니다.
  /hasValidSSN:
    question: 귀하는 <fg-show path="/taxYear"/>년 세금 신고서의 기한 이전에(연장 포함) 사회보장국에서 발급한 유효한
      사회 보장 번호(SSN)가 있습니까?
    modalLink: <modal-link for="modal-valid-ssn-filer">유효한 사회 보장 번호가 요구됩니다.</modal-link>
    options:
      'true':
        name: 네
      'false':
        name: 아니요
  /hasForeignEarnedIncome:
    question: 귀하는 양식 2555, 해외 근로 소득을 신고했습니까?
    modalLink: <modal-link for="modal-foreign-income">총 소득에서 제외된 해외 근로 소득</modal-link>
    options:
      'true':
        name: 네
      'false':
        name: 아니요
  /isClaimedAsDependent:
    question: 누군가가 세금 신고서에 EITC를 위한 부양가족 혹은 적격 자녀로서 귀하를 신청할까요?
    modalLink: <modal-link for="modal-claimed-dependent">부양가족 혹은 적격 자녀로서의 자신</modal-link>
    options:
      'true':
        name: 네
      'false':
        name: 아니요
  /ageRange:
    question: <fg-show path="/taxYear"/>년 말에 귀하의 나이가 해당하는 범위를 선택하세요.
    options:
      under24:
        name: 24세 이하
      age25to64:
        name: 25세~64세
      65andOlder:
        name: 65세 이상
  modal-tax-year:
    heading: 과세 연도
    p-aa5a47: '임금 혹은 기타 근로 소득:'
    ul-0:
      li-28dd34: 2025년, 2025년 선택
      li-174a8b: 2024년, 2024년 선택
      li-0a25dc: 2023년, 2023년 선택
  modal-citizen:
    heading: 미국 국민 혹은 영주 체류자
    p-18e680: 귀하가 미국 국민이 아니라면, 외국인으로 고려됩니다.
    p-fe70ca: 귀하가 그린 카드를 갖고 있거나 특정 일수 이상을 미국에 살고 있다면 EITC를 위한 영주 체류자로 고려됩니다.
    p-2c8f8f: 자세한 정보는  <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit.를 확인하세요.
  modal-valid-ssn-filer:
    heading: 유효한 사회 보장 번호
    p-527528: <fg-show path="/taxYear"/> 년 세금 신고서(연장 포함) 마감일 또는 그 이전에 사회보장국에서 발급한
      유효한 사회보장번호(SSN)가 있어야 합니다.
    p-45ae0e: 사회 보장 카드에 "DHS 승인 시 취업 가능(Valid for work with DHS authorization)” 또는
      “INS 승인 시 취업 가능(Valid for work with INS authorization)”이라고 표시되어 있다면, 해당 승인 상태가
      여전히 유효할 경우 이 사회보장번호(SSN)는 유효한 것으로 간주됩니다.
    p-558a40: 'EITC의 경우 다음을 허용하지 않습니다:'
    ul-0:
      li-5e5f3e: 국세청 개인 납세자 식별 번호(ITIN)
      li-5fc9b7: 입양 납세자 식별 번호(ATIN)
      li-9f487b: 오직 SSN 수령자가 메디케이드 같은 연방 지원 혜택 신청하거나 받는 것을 허락하는 사회 보장 번호를 발급받았습니다.
      li-a69a30: 메디케이드와 같은 연방 자금 지원 혜택을 신청하거나 받기 위한 용도로만 발급된 사회보장번호
    p-f554f7: 유효한 사회 보장 번호에 대한 자세한 내용은 간행물 596을 참조하십시오.
  modal-foreign-income:
    heading: 총 소득에서 제외된 해외 근로 소득
    p-f45b03: 이는 <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">귀하가</a>  에서
      예외로 선택한 외국, 컬럼비아 특별구 혹은 미국령(possessions, territory)외에서 얻은 소득을 의미합니다.
  modal-claimed-dependent:
    heading: 부양가족 혹은 적격 자녀로서의 자신
    p-faf8d8: 대부분의 경우에 귀하는 다른 납세자의 부양가족 혹은 적격 자녀가 될 수 없습니다. EITC를 신청하세요.
    p-98d6db: 대부분의 경우, 귀하가 만 19세 미만이거나 만 24세 미만의 학생이며 부모님이나 친척과 함께 미국에서 반년 이상 살고 있다면  <strong>네</strong>를
      선택하세요.
    p-038f13: 결혼하여 공동 세금 신고서를 제출하는 경우, 원천징수된 소득세나 납부한 추정세의 환급만을 청구하기 위한 목적이 아닌 이상
      부양가족으로 청구될 수 없습니다.
    p-ceda6c: 누군가를 부양가족으로 신청 가능한지에 대한 자세한 <a target="_blank" class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">정보는</a>  를
      방문하세요.
    p-d11380: 누군가 귀하를 EITC를 위한 적격 자녀로 신청할 수 있는지에 대한 자세한 <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596#en_US_2021_publink1000298540">정보는</a>
      를 확인하세요.
    p-16aba9: 우리는 귀하가 이후에 신청할 자녀 혹은 친척에 대해 질문합니다.
  modal-primary-claimed-as-dependent:
    heading: 내가 누군가의 부양가족인지 어떻게 알 수 있나요?
    p-d3187d: <fg-show path="/taxYear"/>년에 귀하가 (배우자 외의) 다른 사람에게 부양을 의존했다면, 그 사람은 연방 연방 소득세 신고서에서 귀하를 부양가족으로 청구할 수 있습니다.
    p-762495: '누군가 귀하를 부양가족으로 청구할 수 있는지 여부를 결정하는 몇 가지 요소가 있습니다. 여기에는 다음이 포함됩니다:'
    ul-0:
      li-b17276: 해당 사람과의 관계
      li-c82d5e: 재정적 및 기타 방식으로 그들이 귀하를 얼마나 지원했는지
      li-5a5073: 그들과 함께 살았는지 여부와 그 기간
    p-752de3: 다른 사람이 귀하를 부양가족으로 청구할 수 있는지 확인하려면 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000196863">IRS 간행물 501</a>의 표 5를 검토하십시오.
    p-5a0201: 귀하가 자신의 부양비 절반 이상을 부담한 경우(또는 배우자가 부담한 경우)에는 다른 사람의 부양가족이 아니라는 점을 명심하십시오.
  modal-confirm-tax-year-change:
    heading: '주의:'
    p-31c7da: <strong>연도</strong>를 변경하면 이전에 입력한 데이터가 지워집니다. 계속 진행하시겠습니까?
    button-70d9be: 확인
    button-ea4788: 취소
/filing-status:
  title: 신고 지위
  h2-c01d87: 신고 지위
  p-9bda8f: 이 단계에서는 어떻게 귀하의 <fg-show path="/taxYear"/>년 세금을 신고하려고 하는지에 대해 질문할 것입니다.
  /knowsFilingStatus:
    question: 귀하가 <fg-show path="/taxYear"/>년 세금을 신고할 때, 사용할 신고 지위를 알고 있습니까?
  /initialFilingStatus:
    question: 귀하가 <fg-show path="/taxYear"/>년 세금을 신고할 때, 사용할 신고 지위를 선택하세요.
    modalLink: <modal-link for="modal-filing-status">어떤 보고 상태를 사용해야 합니까?</modal-link>
    options:
      single:
        name: 미혼
      marriedFilingJointly:
        name: 부부 공동 제출
      marriedFilingSeparately:
        name: 부부 개별 제출
      headOfHousehold:
        name: 세대주
      qualifiedSurvivingSpouse:
        name: 적격 생존 배우자
  /maritalStatus:
    question: <fg-show path="/taxYear"/>년 귀하의 결혼 상태는 무엇입니까?
    modalLink: <modal-link for="modal-legal-separation">결혼하고 법적으로 별거 중이라는 것은 무슨 뜻입니까?</modal-link>
    options:
      married:
        name: 기혼
      divorced:
        name: 이혼 혹은 법적 별거
      widowed:
        name: 적격 생존 배우자
      single:
        name: 미혼
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: 귀하의 배우자는 언제 사망했습니까?
    options:
      taxYear:
        name: <fg-show path="/taxYear"/> 년도에
      taxYearMinusOneOrTwo:
        name: 2023 년 혹은 2024 년도에
      beforeTaxYearMinusTwo:
        name: 2023 년 이전에
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: 귀하의 배우자는 언제 사망했습니까?
    options:
      taxYear:
        name: 2024 년도에
      taxYearMinusOneOrTwo:
        name: 2022 년 혹은 2023 년도에
      beforeTaxYearMinusTwo:
        name: 2022 년 이전에
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: 귀하의 배우자는 언제 사망했습니까?
    options:
      taxYear:
        name: 2023 년도에
      taxYearMinusOneOrTwo:
        name: 2021 년 혹은 2022 년도에
      beforeTaxYearMinusTwo:
        name: 2021 년 이전에
  /isHOHMarried:
    question: 기혼입니까?
  /intendsToFileJointlyWidow:
    question: <fg-show path="/taxYear"/>년에 사망한 배우자와 함께 공동신고를 제출할 의향이 있습니까?
    modalLink: <modal-link for="modal-joint-deceased-spouse">귀하는 배우자가 사망한 해에 귀하의 배우자와
      공동 신고를 제출할 자격이 됩니다.</modal-link>
  /intendsToFileJointlyMFJ:
    question: 귀하와 귀하의 배우자가 공동 신고서를 제출할 의향이 있습니까?
    modalLink: <modal-link for="modal-joint-return-mfj">부부 공동 제출</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: 귀하와 귀하의 배우자는 <fg-show path="/taxYear"/>년의 마지막 6개월 동안 같은 본적지를 갖고 있었습니까?
    modalLink: <modal-link for="modal-spouse-lived-together">배우자가 함께 산다는 것은 무슨 뜻입니까?</modal-link>
  /samePrincipalResidenceLast6Months:
    question: 귀하와 귀하의 배우자는 <fg-show path="/taxYear"/>년의 마지막 6개월 동안 같은 본적지를 갖고 있었습니까?
  /writableSeparationAgreement:
    question: '귀하가 주 법에 따라 서면 별거 합의서나 별거 유지 판결문에 의해 법적으로 별거 상태였으며, <fg-show path="/taxYear"/>년
      마지막 날에 배우자와 함께 거주하지 않았습니까? '
  /entitledToPreviouslyFileJointReturn:
    question: 귀하는 배우자가 사망한 해에 귀하의 배우자와 공동 신고를 제출할 자격이 됩니다.
  /paidMoreThanHalfHomeCostsForChild:
    question: <fg-show path="/taxYear"/>,년에 귀하는 부양자녀, 의붓자녀 혹은 위탁 자녀의  <fg-show path="/taxYear"/>년
      내내(일시적 부재를 포함하여) 주거지였던 가정을 부양하기 위한 비용의 반 이상을 부담하였습니다.
    modalLink: <modal-link for="modal-keeping-up-home">&quot;가정 유지&quot;를 어떻게 계산합니까?</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: <fg-show path="/taxYear"/>년에 부양가족으로 귀하와 동거했던 귀하의 자녀 혹은 의붓 자녀를 신청할 수
      있습니까?
    modalLink: <modal-link for="modal-claiming-dependents">제가 피부양자로 신청할 수 있는 사람은 누구입니까?(영어)</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: '<fg-show path="/taxYear"/>년에 대해 다음을 제외하고 자녀 또는 의붓자녀를 부양가족으로 청구할 수 있습니까:
      1) 자녀의 총소득이 <fg-show path="/taxYear"/>년도 임계값인 <fg-show path="/eitcChildGrossIncomeLimit"/>를
      초과했습니다; 2) 자녀가 공동 보고서를 제출했습니다; 또는 3) 귀하가 다른 사람의 보고서에 부양가족으로 청구될 수 있습니다?'
    modalLink: <modal-link for="modal-claiming-dependents">제가 피부양자로 신청할 수 있는 사람은 누구입니까?(영어)</modal-link>
  /homeUpkeepScenario:
    question: 집을 유지하는 데 드는 비용의 50% 이상을 지불했습니까?
    modalLink: <modal-link for="modal-keeping-up-home">제가 &quot;가정 유지&quot;를 어떻게 계산합니까?</modal-link>
    options:
      livedWithDependent:
        name: 부양가족(예를 들어 자녀, 손자녀, 형제, 질녀, 조카 부모 조부모)과 함께 반년 이상 살았던 곳
      custodialParentNonDependent:
        name: 양육권이 있는 부모일지라도 귀하의 부양가족이 아닌 자녀와 함께 반년 이상 살았던 곳(이혼 혹은 별거 중인 부모의 자녀의 규칙에
          따라)
      dependentParentElsewhere:
        name: 귀하가 부양가족으로 신청한 하지만 귀하와 함께 살고 있지 않은 부모
      none:
        name: 위에 해당 사항 없음
  /secondaryFilerHasValidSSN:
    question: 귀하의 배우자는 <fg-show path="/taxYear"/>년 세금 신고서의 기한 이전에 발급된 유효한 사회보장 번호를
      갖고 있나요?
    modalLink: <modal-link for="modal-valid-ssn">유효한 사회 보장 번호가 요구됩니다.</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: 귀하의 배우자는 사망하던 날에 유효한 사회 보장 번호를 보유하고 있었나요?
    modalLink: <modal-link for="modal-valid-ssn">유효한 사회 보장 번호가 요구됩니다.</modal-link>
  /spouseAliveEndOfTaxYear:
    question: <fg-show path="/taxYear"/> 년도에
  /ageRangeSecondary:
    question: <fg-show path="/taxYear"/>년 말에 귀하의 배우자의 나이를 가장 잘 설명한 나이대를 선택하세요.
    options:
      under24:
        name: 24세 이하
      age25to64:
        name: 25세~64세
      65andOlder:
        name: 65세 이상
  /primaryFilerIsClaimingQualifyingChildren:
    question: 유효한 사회보장번호를 가진 자녀 또는 기타 친척에 대한 EITC를 신청할 계획입니까?
    modalLink: <modal-link for="modal-qualifying-child-eitc">다른 사람이 이 아이를 EITC에 청구할
      수 있습니까?</modal-link>
  /hasLivedInUSMore6Months:
    question: <fg-show path="/taxYear"/> 년도에 반 이상 미국에 귀하의 주거지가 있었습니까?
    modalLink: <modal-link for="modal-main-home-us">미국 내 주 거주지로 간주되는 것은 무엇입니까?</modal-link>
  h2-7864de: 귀하의 선택에 따라 귀하의 신고지위는 <fg-show path="/flowReadableFilingStatus"/>입니다.
  fg-alert-334e2e:
    heading: 근로 소득 세액 공제(EITC)를 받을 자격이 없습니다.
    p-b6bd9e: 귀하 또는 귀하의 배우자가 공동 신고서를 제출하고 나이가 25세에서 64세 사이가 아니라면, 귀하는 적격 자녀가 없는 EITC에
      적격하지 않습니다.
    p-ae739d: 자세한 내용은 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">간행물
      596, 근로 소득 세액 공제</a>를 참조하십시오.
    p-47ef52: 귀하가 결혼한 상태이고 배우자와 부부 공동 제출을 하지 않을 경우, 적격 자녀와 반년 이상 거주했거나 <fg-show path="/taxYear"/>년의
      지난 6개월 동안 귀하의 배우자와 떨어져 거주한 경우가 아니라면, EITC를 청구할 수 없습니다. 또는 <fg-show path="/taxYear"/>년의
      지난 6개월 동안 귀하의 배우자와 떨어져 거주하지 않았지만 <fg-show path="/taxYear"/>3년 말에는 떨어져 거주한 경우,
      주법에 의거한 서면 별거 합의 또는 별거 수당 법령에 따라 법적으로 별거 상태입니다.
    ul-0:
      li-207749: <fg-show path="/taxYear"/>년 마지막 6개월 동안 배우자와 별거했거나
      li-93a6ef: 귀하는 주법에 따라 서면 별거 합의서 또는 별거 유지 판결문에 의해 법적으로 별거 중이었으며, <fg-show path="/taxYear"/>년
        말 현재 배우자와 같은 가구에 거주하지 않았습니다.
    p-3630b4: 자세한 내용은 <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501"
      class="usa-link">간행물</a> .
    p-99f873: 귀하의 배우자가 귀하의 세금 신고기한 이전에 발급된 유효한 사회보장 번호가 없기 때문에 귀하는 EITC를 신청할 수 없습니다.
    p-91ee91: 귀하의 배우자가 사망 일에 유효한 사회보장 번호를 갖고 있지 않았기 때문에 귀하의 사망한 배우자와 함께 공동신고서를 제출하도록
      선택한다면 EITC를 신청할 수 없습니다.
    p-d4d927: 귀하가 귀하의 사망한 배우자와 함께 공동신고서를 제출하지 않으면 EITC에 적격일 수 있습니다.
    p-065d1b: EITC를 신청하기 위해서 귀하의 거주지가 반드시 미국에서 반년 이상 있었어야 합니다. 미국은 50개 주와 컬럼비아 특별구를
      의미합니다.
  modal-filing-status:
    heading: 어떤 보고 상태를 사용해야 합니까?
    p-c0b92c: 올해 혼인 상태나 가족 상황에 변화가 없는 경우, <fg-show path="/lastTaxYear"/> 세금 보고서와 동일한
      보고 상태를 사용하는 것이 좋을 수 있습니다.
    p-391f95: 지난 한 해 동안 혼인 상태나 가구에 변화가 있었다면 더 정확한 추정을 위해 다른 보고 상태를 사용해야 할 수도 있습니다.
    p-496916: 각 보고 상태에는 다른 요구 사항이 있습니다.
    p-49f30f: 미혼
    ul-0:
      li-c717a5: 결혼할 수 없습니다
    p-5f63cd: 부부 공동 제출
    ul-1:
      li-6aab7e: 기혼이거나 연중 배우자가 사망했습니다
    p-80c02f: 부부 개별 신고
    ul-2:
      li-595e35: 기혼입니까?
      li-1e72dd: 배우자와 함께 신고할 계획이 없습니다(대부분의 부부는 공동 신고로 돈을 절약합니다)
    p-d69332: 세대주
    ul-3:
      li-dfe41a: 결혼할 수 없습니다(또는 세금 목적으로 미혼으로 간주됩니다)
      li-38ff2f: 특정 기간 동안 가족 구성원이나 가구원을 위해 집을 유지하는 비용의 절반 이상을 지불했으며, 그들은 특정 요구 사항을
        충족해야 합니다
    p-57317d: <strong>적격 생존 배우자:</strong>
    ul-4:
      li-2bf38a: 배우자가 <fg-show path="/lastTaxYear"/> 또는 <fg-show path="/taxYearMinusTwo"/>년에
        사망했습니다
      li-4ef74f: <fg-show path="/taxYear"/>년 전에 재혼하지 않았습니다
      li-939762: 일년 내내 함께 사는 부양 자녀가 있습니다
      li-bad5a3: 귀하가 해당 연도에 가정을 부양하기 위한 비용의 반 이상을 납부했습니다.
    p-5b3ae2: <a target="_blank" href="https://www.irs.gov/filing/filing-status">보고
      상태에 대해 자세히 알아보기<span class="usa-sr-only"> (opens in a new tab)</span>.</a>
  modal-qualifying-child-eitc:
    heading: 적격 아동
    p-7356ad: 적격 자녀와 함께 EITC를 청구하려면 해당 자녀는 2025년 신고서(연장 포함) 마감일 또는 그 이전에 사회보장국에서 발급한
      유효한 SSN을 가지고 있어야 합니다.
    p-ac8914: 사회 보장 카드에 &quot;DHS 승인이 있는 경우에만 근로 유효&quot; 또는 &quot;INS 승인이 있는 경우에만
      근로 유효&quot;라고 적혀 있다면 해당 승인이 여전히 유효한 경우 유효한 SSN입니다.
    p-558a40: 'EITC의 경우 다음을 허용하지 않습니다:'
    ul-0:
      li-5e5f3e: 국세청 개인 납세자 식별 번호(ITIN)
      li-5fc9b7: 입양 납세자 식별 번호(ATIN)
      li-9f487b: 오직 SSN 수령자가 메디케이드 같은 연방 지원 혜택 신청하거나 받는 것을 허락하는 사회 보장 번호를 발급받았습니다.
      li-19d3d7: 메디케이드와 같은 연방 자금 지원 혜택을 신청하거나 받기 위한 용도로만 발급된 사회보장번호
    p-0d323a: 귀하의 자녀가 다음 네 가지 요건을 모두 충족하면 ‘적격 자녀’로 간주됩니다. 네 가지 요건은 다음과 같습니다.
    ul-1:
      li-fbc977: 관계,
      li-9d8d2d: 연령,
      li-23863d: 거주, 및
      li-ca34c2: 공동 신고
    p-e00960: 자세한 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">정보는</a>
      을 확인하세요.
  modal-main-home-us:
    heading: 미국에 주거지
    p-9cbbc6: 미국에 귀하의 거주지가 반년 이상 있었나요?
    p-775779: 귀하의 거주지가 미국 내에 <fg-show path="/taxYear"/> 년의 반 동안 있어야 합니다. 미국은 50개 주와
      컬럼비아 특별구를 포함합니다. 괌, 버진아일랜드, 푸에르토리코등 미국령은 포함하지 않습니다.
    h3-398dfd: 미국 외로 배치된 군인력
    p-7dbfa0: 귀하가 미군 소속이며 현역 복무의 연장으로 미국 외 지역으로 배치되었다면 네를 선택하세요.
  modal-keeping-up-home:
    heading: 주택 유지 요건
    p-c0958f: 주택 유지에 지출한 금액이 전체 비용의 절반을 초과하면, 주택 유지 비용을 절반 이상 부담해야 하는 요건을 충족합니다.
    h3-e8b30a: 비용에는 다음이 포함됩니다.
    ul-0:
      li-b9b2e1: 임대료, 모기지 이자, 부동산세 및 주택 보험
      li-313963: 수리 및 공공요금
      li-61e699: 가정 내 식사비
    p-fec463: '메모: 공공 보조금으로 지불한 비용은 납세자가 지불한 비용으로 간주됩니다.'
    h3-3e0b53: '비용에 포함되지 않는 항목:'
    ul-1:
      li-edaa99: 의복, 교육비, 여행비
      li-40b84f: 치료, 의료보험료, 처방약
      li-5eae2b: 생명보험
      li-c64365: 자동차 보험료, 리스료, 대중교통비 등 교통 관련 비용
      li-04dec0: 귀하 또는 가족 구성원이 제공한 무급 노동의 가치
  modal-legal-separation:
    heading: 법적 별거 및 관습법
    h3-ef7665: 법적 별거
    p-198345: 이 목적으로 "법적으로 별거"는 이혼 혹은 별거 명령에 따라 법적으로 별거했다는 의미입니다.
    h3-357344: 관습법 혼인
    p-f560ea: 일부 주는 사실혼을 허용합니다. 귀하의 주를 확인하고 귀하가 관습법에 따라 결혼한 상태로 고려되는지 확인하세요.
  modal-joint-return-mfj:
    heading: 공동 신고
    p-75997a: 귀하는  <strong> 를 귀하의 신고 지위로 선택하여  배우자와 함께 하나의 신고서를 제출하도록 선택할 수 있습니다.
      이는 귀하가 세액공제, 소득공제 그리고 세금 채무를 계산할 때 소득과 지출을 합하도록 허용합니다.
  modal-joint-deceased-spouse:
    heading: 사망한 배우자와 공동신고
    p-85e581: 만약 귀하의 배우자가 <fg-show path="/taxYear"/>년에 사망했다면, 귀하의 신고 지위로서 <fg-show
      path="/taxYear"/>를 선택하여 귀하의 배우자와 하나의 신고서 제출을 선택할 수 있습니다. 이는 자신의 세액공제, 소득공제,
      세금 채무를 계산할 때 자신의 소득과 지출을 합산할 수 있도록 합니다.
  modal-spouse-lived-together:
    heading: 배우자 - 함께 사는
    p-906815: 동거인과 귀하 둘 중 하나 혹은 모두가 특별한 상황에서 일시적 부재였던 기간동안 귀하와 함께 산 것으로 간주합니다.
    ul-0:
      li-8ec6de: 질병
      li-de7a22: 교육
      li-d6e6cb: 사업
      li-2c48dd: 휴가 혹은
      li-8fdca6: 군복무
    p-2392bb: 일시적 부재 후에 집으로 돌아올 것이라는 가정을 하는 것은 타당합니다.
  modal-valid-ssn:
    heading: 유효한 사회 보장 번호
    p-527528: <fg-show path="/taxYear"/> 년 세금 신고서(연장 포함) 마감일 또는 그 이전에 사회보장국에서 발급한
      유효한 사회보장번호(SSN)가 있어야 합니다.
    p-45ae0e: 사회 보장 카드에 "DHS 승인 시 취업 가능(Valid for work with DHS authorization)” 또는
      “INS 승인 시 취업 가능(Valid for work with INS authorization)”이라고 표시되어 있다면, 해당 승인 상태가
      여전히 유효할 경우 이 사회보장번호(SSN)는 유효한 것으로 간주됩니다.
    p-558a40: 'EITC의 경우 다음을 허용하지 않습니다:'
    ul-0:
      li-5e5f3e: 국세청 개인 납세자 식별 번호(ITIN)
      li-5fc9b7: 입양 납세자 식별 번호(ATIN)
      li-9f487b: 오직 SSN 수령자가 메디케이드 같은 연방 지원 혜택 신청하거나 받는 것을 허락하는 사회 보장 번호를 발급받았습니다.
      li-a69a30: 메디케이드와 같은 연방 자금 지원 혜택을 신청하거나 받기 위한 용도로만 발급된 사회보장번호
    p-f554f7: 유효한 사회 보장 번호에 대한 자세한 내용은 간행물 596을 참조하십시오.
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: 확인
    p-30861e: <strong>부부 공동 보고</strong>에서 다른 보고 상태로 변경하면 이전에 입력한 적격 자녀 데이터가 지워집니다.
      계속 진행하시겠습니까?
    button-70d9be: 확인
    button-ea4788: 취소
  modal-claiming-dependents:
    heading: 제가 피부양자로 신청할 수 있는 사람은 누구입니까?(영어)
    p-fc792e: '부양가족은 일반적으로 다음과 같습니다:'
    ul-0:
      li-7673e2: 만 19세 미만 자녀
      li-e9750c: 부모와 함께 거주하는 24세 미만의 학생
      li-9a6fc3: 귀하로부터 재정 지원의 절반 이상을 받고 총소득이 <fg-show path="/eitcChildGrossIncomeLimit"/>
        미만인 친척 또는 가구원
    p-6b3acc: 공동으로 신고하는 경우 배우자를 부양가족으로 청구할 수 없습니다.
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/dependents">부양가족에
      대해 자세히 알아보기.</a>
/agi:
  title: 총조정소득(AGI)
  h2-c0af17: 귀하의 조정 총소득(AGI)을 추정합니다.
