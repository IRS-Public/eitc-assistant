/:
  title: 一般信息
  h2-5e286b: 一般信息
  p-c2c8a0: 简要回答关于您本人的几个问题，以确认您是否符合条件。
  /chosenTaxYear:
    question: 选择您想要核实您的 EITC 申请资格的纳税年度：
    modalLink: <modal-link for="modal-tax-year">我应该使用哪一年？</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien:
    question: 您在 <fg-show path="/taxYear"/> 是否全年都是美国公民或外籍居民？
    modalLink: <modal-link for="modal-citizen">我是否符合作为美国公民或居民申请 EITC 的条件？</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  fg-alert-8b7db9:
    heading: 您没有资格申请劳动所得税抵免 (EITC)
    p-091688: 您必须是美国公民或外籍居民才能申请劳动所得税抵免。请参阅 <a target="_blank"
      class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-519">第519号刊物，美国外国人税收指南（英文）</a>，以确定您是否全年为美国外籍居民。
    p-f72c3e: ' 选择 <strong>是</strong>，如果您与您的配偶联合申报 <fg-show path="/taxYear"/> 的所得，并且您或您的配偶全年都是美国公民或外籍居民。'
    p-b85d77: 您无法申请 EITC，因为您没有在您的报税表的截止日期当日或之前签发的有效社会安全号码。
    p-93a6b5: 欲了解更多信息，请参阅 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第 596 号出版物</a>, 劳动所得抵免。
    p-4c0c0d: 如果您提交了外国赚取收入的<a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">表
      2555</a>，则不能申请所得税抵免。
    p-236b69: 第54号刊物，美国公民和外籍居民税务指南（英文）
    p-5e637b: 如果您是他人申请 EITC 流程中的符合条件的子女，则您本人没有资格申请 EITC。
    p-ec145e: 有关某人是否可以将您申请为符合 EITC 条件的儿童的更多信息，请参阅<a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">第 596 号出版物</a>，所得税抵免，您不能成为其他纳税人符合条件的儿童。
    p-363ef2: 如果您是他人的受抚养人，则您没有资格申请 EITC，除非您有申请 EITC 的符合条件的子女。
  /hasValidSSN:
    question: 您的有效社会安全号码是否是在您的 <fg-show path="/taxYear"/> 的报税表的截止日期（包括延期）当日或之前签发的？
    modalLink: <modal-link for="modal-valid-ssn-filer">有效社会安全号码必填</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  /hasForeignEarnedIncome:
    question: 您是否正在申报表格2555，国外劳动所得（英文）？
    modalLink: <modal-link for="modal-foreign-income">不计入总收入的外国收入</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  /isClaimedAsDependent:
    question: 是否有其他人会在其报税表中将您申报为受抚养人或符合条件的子女，以申请 EITC？
    modalLink: <modal-link for="modal-claimed-dependent">您作为受抚养人或符合条件的子女</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  /ageRange:
    question: 请选择 <fg-show path="/taxYear"/> 年底时最接近您的年龄范围。
    options:
      under24:
        name: 未满 24 周岁
      age25to64:
        name: 25 至 64 周岁
      65andOlder:
        name: 65 岁及以上
  modal-tax-year:
    heading: 纳税年度
    p-aa5a47: 对于工资和其他劳动所得：
    ul-0:
      li-28dd34: 2025 年, 选择 2025 年
      li-174a8b: 2024 年, 选择 2024 年
      li-0a25dc: 2023 年, 选择 2023 年
  modal-citizen:
    heading: 美国公民或外籍居民
    p-18e680: 如果您非美国公民，您即为外籍公民。
    p-fe70ca: 就 EITC 而言，如果您持有绿卡，或者您在美国居住超过一定天数，您将被视为外籍居民。
    p-2c8f8f: 有关更多信息和重要例外情况，请参阅 <a target="_blank"
      class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-519">第519号刊物，美国外国人税收指南（英文）</a>    
  modal-valid-ssn-filer:
    heading: 有效社会安全号码
    p-527528: 您必须在 <fg-show path="/taxYear"/> 年纳税申报表（包括延期）到期日或之前拥有由社保局颁发的有效社会安全号码
      （SSN）。
    p-45ae0e: 如果您的社会保卡上写着“经国土安全部授权可用于工作”或“经 INS 授权可用于工作”，只要该授权仍然有效，则这张卡上的 SSN 仍然有效。
    p-558a40: 对于 EITC，我们不接受：
    ul-0:
      li-5e5f3e: IRS 个人纳税人识别号 (ITIN)
      li-5fc9b7: 领养纳税人识别号 (ATIN)
      li-9f487b: 社会安全号码，仅用于让 SSN 的接收者申请或获得联邦资助的福利，如医疗补助
      li-a69a30: 仅出于申请或领取联邦资助的福利（例如 Medicaid）之目的颁发的社会安全号码
    p-f554f7: 有关有效社会安全号码的更多信息，请参阅《出版物 596》。
  modal-foreign-income:
    heading: 不计入总收入的外国收入
    p-f45b03: 这指的是您在美国、哥伦比亚特区或美国属地或领土之外的劳动所得，<a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">您选择在</a>  中将其排除在外。
  modal-claimed-dependent:
    heading: 您作为受抚养人或符合条件的子女
    p-faf8d8: 在大多数情况下，您不能成为其他纳税人的受抚养人或符合条件的子女，并申请 EITC。
    p-98d6db: 在大多数情况下，如果您未满 19 岁，或是一名未满 24 岁的学生，并且与父母或其他亲属在美国生活了半年以上，请选择 <strong>是</strong>。
    p-038f13: 如果您已婚并提交联合申报表，则不能将您作为受抚养人进行申报，除非您提交联合申报表只是为了申请预扣所得税或已缴纳的预估税款的退税款。
    p-ceda6c: '有关他人是否可将您申报为受抚养人的更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">请访问</a> '
    p-d11380: 有关他人是否可将您申报为受抚养人以申请 EITC 的更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2021_publink1000298540">请参阅</a>
      。
    p-16aba9: 我们将会询问您稍后可能申报的子女或亲属。
  modal-primary-claimed-as-dependent:
    heading: 我如何知道自己是否是别人的受抚养人？
    p-d3187d: 如果在 <fg-show path="/taxYear"/> 年您依靠他人（配偶除外）提供抚养支持，他们也许能在其联邦纳税申报表上将您申报为受抚养人。
    p-762495: '决定是否有人能将您申报为受抚养人有几个因素，包括：'
    ul-0:
      li-b17276: 您与该人的关系
      li-c82d5e: 他们在经济上及其他方面为您提供了多少支持
      li-5a5073: 您是否与他们同住以及同住的时间长短
    p-752de3: 请查阅 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000196863">IRS 第 501 号出版物</a>中的表 5，以确定是否可能有其他人将您申报为受抚养人。
    p-5a0201: 请记住，如果您（或您的配偶）支付了自己生活费的一半以上，您就不属于他人的受抚养人。
  modal-confirm-tax-year-change:
    heading: 注意：
    p-31c7da: 更改<strong>年份</strong>将清除您之前输入的数据。您仍想继续吗？
    button-70d9be: 确认
    button-ea4788: 取消
/filing-status:
  title: 报税状态
  h2-c01d87: 报税状态
  p-9bda8f: 在这一步中，您将被问到您打算如何对您 <fg-show path="/taxYear"/> 的税项进行申报。
  /knowsFilingStatus:
    question: 您是否知道当您提交 <fg-show path="/taxYear"/> 税项时的您将使用的报税状态？
  /initialFilingStatus:
    question: 请选择当您提交 <fg-show path="/taxYear"/> 税项时的报税状态：
    modalLink: <modal-link for="modal-filing-status">我应该使用哪种报税身份？</modal-link>
    options:
      single:
        name: 单身
      marriedFilingJointly:
        name: 已婚夫妇联合申报
      marriedFilingSeparately:
        name: 已婚夫妇单独申报
      headOfHousehold:
        name: 户主
      qualifiedSurvivingSpouse:
        name: 符合条件的未亡配偶
  /maritalStatus:
    question: 在 <fg-show path="/taxYear"/> 12 月 31 日，您的婚姻状况如何？
    modalLink: <modal-link for="modal-legal-separation">已婚合法分居是什么意思？</modal-link>
    options:
      married:
        name: 已婚
      divorced:
        name: 离婚或合法分居
      widowed:
        name: 符合条件的未亡配偶
      single:
        name: 未婚
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: 您的配偶是什么时候去世的？
    options:
      taxYear:
        name: 2025 期间
      taxYearMinusOneOrTwo:
        name: 2023 或 2024 期间
      beforeTaxYearMinusTwo:
        name: 2023 之前
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: 您的配偶是什么时候去世的？
    options:
      taxYear:
        name: 2024 期间
      taxYearMinusOneOrTwo:
        name: 2022 或 2023 期间
      beforeTaxYearMinusTwo:
        name: 2022 之前
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: 您的配偶是什么时候去世的？
    options:
      taxYear:
        name: 2023 期间
      taxYearMinusOneOrTwo:
        name: 2021 或 2022 期间
      beforeTaxYearMinusTwo:
        name: 2021 之前
  /isHOHMarried:
    question: 您是否已婚？
  /intendsToFileJointlyWidow:
    question: 对于 <fg-show path="/taxYear"/>，您是否打算与您去世的配偶进行联合申报？
    modalLink: <modal-link for="modal-joint-deceased-spouse">在您的配偶去世的年份，您是否有权与您的配偶进行联合申报？</modal-link>
  /intendsToFileJointlyMFJ:
    question: 您和您的配偶是否打算进行联合申报？
    modalLink: <modal-link for="modal-joint-return-mfj">已婚夫妇联合申报</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: 您和您的配偶在 <fg-show path="/taxYear"/> 的最后六个月是否居住与同一主要居所？
    modalLink: <modal-link for="modal-spouse-lived-together">配偶住在一起是什么意思？</modal-link>
  /samePrincipalResidenceLast6Months:
    question: 您和您的配偶在 <fg-show path="/taxYear"/> 的最后六个月是否居住与同一主要居所？
  /writableSeparationAgreement:
    question: 您是否依据您所在的州法律根据书面分居协议或根据分居赡养令合法分居，并且，您在 <fg-show path="/taxYear"/> 年的最后一天没有与配偶居住在一起？
  /entitledToPreviouslyFileJointReturn:
    question: 在您的配偶去世的年份，您是否有权与您的配偶进行联合申报？
  /paidMoreThanHalfHomeCostsForChild:
    question: 在 <fg-show path="/taxYear"/>，您是否支付了超过一半的费用来维持您所居住的居所，这所居所也是您的受抚养子女、继子女或寄养子女在整个
      <fg-show path="/taxYear"/>（包括任何暂时缺席）的主要居所？
    modalLink: <modal-link for="modal-keeping-up-home">我该如何计算“维持家庭”？</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: 对于 <fg-show path="/taxYear"/>，您是否可以将与您的共同生活的子女或继子女申报为受抚养人？
    modalLink: <modal-link for="modal-claiming-dependents">我可以申报谁为受抚养人？（英文）</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: 您是否可以将您的孩子或继子女申请为被抚养人，除非在 <fg-show path="/taxYear"/> 年：1) 孩子的总收入高于 <fg-show
      path="/taxYear"/> 年的 <fg-show path="/eitcChildGrossIncomeLimit"/> 门槛；2) 孩子进行了联合申报；或者
      3) 您可以在别人的报税表中被申请为被抚养人？
    modalLink: <modal-link for="modal-claiming-dependents">我可以申报谁为受抚养人？（英文）</modal-link>
  /homeUpkeepScenario:
    question: 您是否支付了超过 50% 的房屋维护费用？
    modalLink: <modal-link for="modal-keeping-up-home">我如何计算&quot;维持家庭&quot;？</modal-link>
    options:
      livedWithDependent:
        name: 这一年中有超过一半的时间与受抚养人共同生活（如子女、孙辈、兄弟姐妹、侄亲、父母或祖父母）
      custodialParentNonDependent:
        name: 这一年中您有超过一半的时间与非您的受抚养人的子女共同生活，虽然您为监护父母（因为对离婚或分居父母的子女的规定）
      dependentParentElsewhere:
        name: 对于父母一方，您可以为不与您共同生活的受抚养人进行申请
      none:
        name: 以上都不是
  /secondaryFilerHasValidSSN:
    question: 您的配偶的有效社会安全号码是否是在您的 <fg-show path="/taxYear"/> 的报税表的截止日期（包括延期）当日或之前签发的？
    modalLink: <modal-link for="modal-valid-ssn">有效社会安全号码必填</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: 在您的配偶去世之日，其是否有有效的社会安全号码？
    modalLink: <modal-link for="modal-valid-ssn">有效社会安全号码必填</modal-link>
  /spouseAliveEndOfTaxYear:
    question: 在 <fg-show path="/taxYear"/> 12 月 31 日，您的配偶是否在世？
  /ageRangeSecondary:
    question: 请选择 <fg-show path="/taxYear"/> 年底时最接近您的配偶年龄的年龄段。
    options:
      under24:
        name: 未满 24 周岁
      age25to64:
        name: 25 至 64 周岁
      65andOlder:
        name: 年满 65 周岁
  /primaryFilerIsClaimingQualifyingChildren:
    question: 您是否打算让子女或其他拥有有效社会保障号码的亲属申请 EITC？
    modalLink: <modal-link for="modal-qualifying-child-eitc">有人能为该子女申请 EITC 吗？</modal-link>
  /hasLivedInUSMore6Months:
    question: 您的主要居所在 <fg-show path="/taxYear"/> 是否有超过一半的时间位于美国？
    modalLink: <modal-link for="modal-main-home-us">什么算是美国的主要居所？</modal-link>
  h2-7864de: 根据您的选择，您的报税状态为 <fg-show path="/flowReadableFilingStatus"/>。
  fg-alert-334e2e:
    heading: 您没有资格申请劳动所得税抵免 (EITC)
    p-b6bd9e: 如果没有符合条件的子女，则没有资格申请 EITC，除非您本人或配偶（如果共同申报）年龄在 25 周岁至 64 周岁。
    p-ae739d: 如需了解更多信息，请参阅<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第
      596 号出版物，所得税抵免</a>。
    p-47ef52: 如果您已婚，且未提交联合申报表，并且在 <fg-show path="/taxYear"/> 年超过一半的时间有一个符合资格的子女与您同住，并且符合以下任意条件，您可以申请
      EIC。
    ul-0:
      li-207749: 您在 <fg-show path="/taxYear"/> 年的最后 6 个月内与配偶分居，或
      li-93a6ef: 根据您所在州的法律，您已根据书面分居协议或分居赡养令合法分居，并且截至 <fg-show path="/taxYear"/> 年底，您与您的配偶已不再居住在同一家庭中。
    p-3630b4: '有关更多信息，<a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501"
      class="usa-link">请参阅关于</a> '
    p-99f873: 您无法申请 EITC，因为您的配偶没有在您的报税表的截止日期当日或之前签发的有效社会安全号码。
    p-91ee91: 如果您选择与已故配偶联合申报，并且您的配偶在去世当天没有有效的社会安全号码，则您不能申请 EITC。
    p-d4d927: 如果您没有与您的已故配偶联合申报，您可能有资格申请 EITC。
    p-065d1b: 要申请 EITC，您的居所在这一年中必须有超过一半的时间位于美国。美国包括 50 个州和哥伦比亚特区。
  modal-filing-status:
    heading: 我应该使用哪种报税身份？
    p-c0b92c: 如果今年您的婚姻状况或家庭情况没有发生变化，那么您可能希望使用 <fg-show path="/lastTaxYear"/> 纳税申报表中相同的报税身份。
    p-391f95: 如果在过去一年中您的婚姻状况或家庭发生变化，您可能需要使用不同的报税身份以获得更准确的估算。
    p-496916: 每种报税身份都有不同的要求。
    p-49f30f: 单身
    ul-0:
      li-c717a5: 您不能已婚
    p-5f63cd: 已婚夫妇联合申报
    ul-1:
      li-6aab7e: 您已婚或您的配偶在年内去世
    p-80c02f: 已婚夫妇单独申报
    ul-2:
      li-595e35: 您是否已婚？
      li-1e72dd: 您不打算与您的配偶共同申报（大多数夫妇通过联合申报来省钱）
    p-d69332: 户主
    ul-3:
      li-dfe41a: 您不能已婚（或者出于税收目的您被视为未婚）
      li-38ff2f: 在特定时间内，您为家庭成员或与您同住的人支付了一半以上的维持家庭费用，并且他们必须满足特定要求
    p-57317d: <strong>符合条件的未亡配偶：</strong>
    ul-4:
      li-2bf38a: 您的配偶在 <fg-show path="/lastTaxYear"/> 或 <fg-show path="/taxYearMinusTwo"/>
        年去世
      li-4ef74f: 您在 <fg-show path="/taxYear"/> 之前没有再婚
      li-939762: 您有一个全年与您同住的受抚养子女
      li-bad5a3: 您支付了这一年超过一半的费用来维持该居所。
    p-5b3ae2: <a target="_blank" href="https://www.irs.gov/filing/filing-status">了解有关报税身份的更多信息<span
      class="usa-sr-only"> (opens in a new tab)</span>。</a>
  modal-qualifying-child-eitc:
    heading: 符合资格的子女
    p-7356ad: 如希望与符合资格的子女一起申请 EITC，该子女必须在 2025 年申报表到期日或之前拥有社保局颁发的有效 SSN（包括延期）。
    p-ac8914: 如果社会保障卡上写着“凭 DHS 授权工作有效”或“凭 INS 授权工作有效”，那么只要授权仍然有效，这就是有效的 SSN。
    p-558a40: 对于 EITC，我们不接受：
    ul-0:
      li-5e5f3e: IRS 个人纳税人识别号 (ITIN)
      li-5fc9b7: 领养纳税人识别号 (ATIN)
      li-9f487b: 社会安全号码，仅用于让 SSN 的接收者申请或获得联邦资助的福利，如医疗补助
      li-19d3d7: 仅出于申请或领取联邦资助的福利（例如 Medicaid）之目的颁发的社会安全号码
    p-0d323a: 如果您的子女通过四项测试，您的子女就是符合资格的子女。这四项测试是：
    ul-1:
      li-fbc977: 关系，
      li-9d8d2d: 年龄，
      li-23863d: 居住权，以及
      li-ca34c2: 联合申报
    p-e00960: '欲了解更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">请参阅</a> '
  modal-main-home-us:
    heading: 主要居所位于美国
    p-9cbbc6: 您的居所在这一年中是否有超过一半的时间位于美国？
    p-775779: 您的居所在 <fg-show path="/taxYear"/> 中必须有超过一半的时间位于美国。美国包括 50 个州和哥伦比亚特区。不包括关岛、维尔京群岛或波多黎各等美国属地。
    h3-398dfd: 驻扎在美国境外的军事人员
    p-7dbfa0: 如果您是美国军人，并且在美国境外进行延期服役，请选择 <strong>是</strong>。
  modal-keeping-up-home:
    heading: 维持家庭开支
    p-c0958f: 如果您支付的总金额超过总费用的一半，则您满足支付一半以上的家庭维护费用的要求。
    h3-e8b30a: 具体费用包括：
    ul-0:
      li-b9b2e1: 租金、抵押贷款利息、房地产税和房屋保险
      li-313963: 修补和公用事业
      li-61e699: 家中吃的食物
    p-fec463: 注意：通过公共援助支付的费用将被视为纳税人支付的费用。
    h3-3e0b53: 费用不包括：
    ul-1:
      li-edaa99: 服装、教育和假期费用
      li-40b84f: 医疗、医疗保险付款和处方药
      li-5eae2b: 人寿保险
      li-c64365: 保险、租赁付款或公共交通等交通费用
      li-04dec0: 您或您家庭成员的服务价值
  modal-legal-separation:
    heading: 合法分居和普通法
    h3-ef7665: 合法分居
    p-198345: 为此，“合法分居”是指根据离婚或赡养费令合法分居。
    h3-357344: 事实婚姻
    p-f560ea: 一些州允许普通法婚姻。 请与您所在的州核实您是否根据普通法被视为已婚。
  modal-joint-return-mfj:
    heading: 联合申报
    p-75997a: 您可以选择 <strong> 为您的报税状态，以与您的配偶提交一份报税表。因此，在计算您的抵免额、扣除额以及纳税金额时，可以将您的收入与支出进行结合。
  modal-joint-deceased-spouse:
    heading: 与已故配偶联合申报
    p-85e581: 如果您的配偶于 <fg-show path="/taxYear"/> 去世，您可以选择 <fg-show path="/taxYear"/>
      为您的报税状态，以与您的配偶提交一份报税表。 因此，在计算您的抵免额、扣除额以及纳税金额时，可以将您的收入与支出进行结合。
  modal-spouse-lived-together:
    heading: 配偶 - 共同生活
    p-906815: 由于以下特殊情况，一方或双方临时缺席期间，双方视为共同生活：
    ul-0:
      li-8ec6de: 生病、
      li-de7a22: 教育、
      li-d6e6cb: 经营、
      li-2c48dd: 假期，或者
      li-8fdca6: 服兵役。
    p-2392bb: 必须合理地假设缺席者在临时缺席后将返回家中。
  modal-valid-ssn:
    heading: 有效社会安全号码
    p-527528: 您必须在 <fg-show path="/taxYear"/> 年纳税申报表（包括延期）到期日或之前拥有由社保局颁发的有效社会安全号码
      （SSN）。
    p-45ae0e: 如果您的社会保卡上写着“经国土安全部授权可用于工作”或“经 INS 授权可用于工作”，只要该授权仍然有效，则这张卡上的 SSN 仍然有效。
    p-558a40: 对于 EITC，我们不接受：
    ul-0:
      li-5e5f3e: IRS 个人纳税人识别号 (ITIN)
      li-5fc9b7: 领养纳税人识别号 (ATIN)
      li-9f487b: 社会安全号码，仅用于让 SSN 的接收者申请或获得联邦资助的福利，如医疗补助
      li-a69a30: 仅出于申请或领取联邦资助的福利（例如 Medicaid）之目的颁发的社会安全号码
    p-f554f7: 有关有效社会安全号码的更多信息，请参阅《出版物 596》。
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: 确认
    p-30861e: 从<strong>已婚联合申报</strong>更改为其他报税身份将清除您之前输入的符合条件的儿童数据。您仍想继续吗？
    button-70d9be: 确认
    button-ea4788: 取消
  modal-claiming-dependents:
    heading: 我可以申报谁为受抚养人？（英文）
    p-fc792e: 受抚养人通常是：
    ul-0:
      li-7673e2: 19 岁以下子女；
      li-e9750c: 与父母同住的 24 岁以下学生
      li-9a6fc3: 从您那里获得一半以上财务支持，且总收入低于 <fg-show path="/eitcChildGrossIncomeLimit"/>
        的亲属或家庭成员
    p-6b3acc: 如果您联合申报，则不能将配偶申请为受抚养人。
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/dependents">了解有关被抚养人的更多信息。</a>
