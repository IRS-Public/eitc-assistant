      tr-0:
        th-537c66: 年
        td-0da7c7: <fg-show path="/taxYear"/>
        td-fba314: <a class="usa-link" href="/app/eitc/">编辑关于您的信息</a>
      tr-1:
        th-c01d87: 报税状态
        td-86d753: <fg-show path="/flowReadableFilingStatus"/>
        td-7a1efb: <a class="usa-link" href="/app/eitc/filing-status/">编辑报税身份</a>
      tr-2:
        th-b1d475: 经调整总所得
        td-5637e9: <fg-show path="/agi"/>
        td-1c1ab4: <a class="usa-link" href="/app/eitc/income/">编辑收入和调整</a>
      tr-3:
        th-40c7ae: 劳动所得
        td-d604bc: 工资和薪水总额<fg-show path="/jobsIncomeTotal"/>
        td-387fc0: <a class="usa-link" href="/app/eitc/income/">编辑收入</a>
      tr-4:
        th-dbaf54: 符合条件的子女
        td-4ea2d8: <fg-show path="/eitcQualifyingChildren"/>
        td-9efa8d: <a class="usa-link" href="/app/eitc/qualifying-children/">编辑符合条件的儿童</a>
  p-35b0d2: 来查看您的退税状态，付款，找到免费的税收准备帮助，注册获取有帮助的税务提示，以及等等！
