  h3-a7b819: 您的调整后总收入为：
  fg-alert-334e2e:
    heading: 您没有资格申请劳动所得税抵免 (EITC)
    p-f3c23d: 根据您输入的款额，您不能申请劳动所得抵免，因为您的 AGI 超出了您的申请状态和符合条件的子女数量的限制。
    p-93a6b5: ' 有关劳动所得抵免的收入限额的更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">请参阅</a>
      。'
  modal-wages-salaries-tips:
    heading: 我应该包括什么收入？
    h3-53ed11: 工资、薪水和小费
    p-40d79a: 您的雇主在您的 W-2 表的方框 1 中报告了您的工资、薪金、小费和其他报酬。
    p-ab967b: 您的雇主在《W-2 表格》的方框 1 中报告了您的工资、薪水、小费和其他报酬。在确定劳动所得税抵免资格时，请将小费和加班收入等全部金额计入收入计算中，即使全部或部分可扣除。
    p-cb2522: 如果您是和您的配偶联合申报，请包括在表格 W-2 的 Box 1 中为您本人和您的配偶申报的所有款额。
    p-1f7f24: 税前供款部分 不包括 在表格 W-2 的税前供款中。
    h3-af3590: 军人薪金和军饷
    p-3fdb7d: 就 EITC 而言，您还可以将您的非应税军饷包括在您的劳动所得中。您的雇主在您的表格 W-2，第 12 栏（代码 Q ） 中申报了您的非应税军饷。
    p-d9b0e5: '这一选择可能会导致您的 EITC 额上下浮动。欲了解更多信息，<a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596#en_US_2025_publink1000297672">请参阅</a> '
    h3-84091c: 临时和短期残障保险
    p-bee3d8: 如果您休了育儿假或在这一年中暂时残障，而您的雇主给您支付了薪酬，并且在您的 W-2 表上申报了您的这一所得。在此处输入该所得。
  modal-work-no-taxes-withheld:
    heading: 未扣缴联邦税的收入
    p-7ca214: 申报从零工中赚取的收入，即使这是副业、兼职或临时工作。
    p-9048f5: 如果您从工作中赚钱，即使没有扣缴所得税，也请在此处输入收入。您可能收到也可能没有收到所有收入的 1099 表格。
    p-8f1d83: '这些收入可能是通过应用程序或网站赚取的，用于：'
    ul-0:
      li-014f6e: 驾驶汽车提供预约乘车或送货服务
      li-816827: 跑腿或完成任务
      li-ac1297: 提供创意或专业服务
      li-743818: 提供其他临时、按需或自由职业工作
    p-ccdadf: 您的总收入包括您收到的所有收入。我们稍后会减去您的费用。
    p-5465af: 欲了解更多信息，请访问<a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">管理零工税务</a>
  modal-self-employment-gross-income:
    heading: 自雇总收入
    p-3ef7b9: 如果您：
    ul-0:
      li-0d8073: 为自雇
      li-f5836c: 通过提供按需工作、服务或商品赚钱
      li-d6da48: 经营企业或农场
      li-604ec3: 为牧师或宗教组织的成员
      li-de3005: 是牧师或宗教组织的成员
    p-ccdadf: '欲了解更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">请访问</a> '
    p-a21d1b: 如需了解更多信息，请访问 <a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/self-employed-individuals-tax-center">自雇人士税务中心</a>
  modal-disability-retirement:
    heading: 残疾退休福利作为劳动收入
    p-514b79: 如果您因残疾而退休，我们会出于 EITC 之目的考虑您在雇主的残疾退休计划下获得的应税福利，直到您达到最低退休年龄。最低退休年龄是您在没有残疾的情况下本应可以领取养老金或年金的最早年龄。
    p-e7df54: 最低退休年龄是如果您没有残疾，您可以领取养老金或年金的最早年龄。
    p-2e7e6e: 将暂时或短期残疾福利计入您的工资。
  modal-inmate-pay:
    heading: 作为囚犯的工资所得
    p-0ced8d: 在计算所得税抵免时，您在作为囚犯在刑事机构服刑期间从事工作所获得的报酬不属于赚取收入。
    p-435d89: 这包括在工作释放计划或在过渡性住房期间从事的有偿工作。
    p-1dc488: 第596号刊物，劳动所得抵免，囚犯收入（英文）
  modal-foreign-income-non2555:
    heading: 境外所得收入
    p-6821fc: 境外所得收入是指在美国、哥伦比亚特区或美国属地或领土以外生活和工作时赚取的收入。
    p-86d28e: 如果您是在美国境外工作的美国政府雇员，则该收入不应视为境外所得收入。
    p-231cd1: 如果您不是政府雇员并且在大使馆工作，我们将该收入视为境外所得收入。
    p-87f12e: 如需了解更多信息，请参阅外国赚取收入的<a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">表
      2555</a>。
    p-90826b: 注意：如果您选择提交《表格 2555》，则您不符合资格申请 EITC。
  modal-taxable-pension:
    heading: 养老金
    p-a523b6: 如果您从合格的雇主退休计划中以养老金或年金付款的形式领取退休福利，您收到的全部或部分金额可能需要纳税。
    p-ce034e: 如果出现以下情况，则全部都需要纳税：
    ul-0:
      li-21fe33: 您没有为您的养老金或年金计划缴纳任何款项或被视为未缴纳任何款项
      li-c4c784: 您的雇主没有从您的工资中扣除供款，或者
      li-a75167: 您之前的供款均为免税
    p-63555f: 如果出现以下情况，部分需要纳税：
    ul-1:
      li-6d40a9: 您的供款是在税后进行的（使用一般规则和简化方法计算）
    p-24ecdd: 如果您在 59 岁半之前收到付款、您是幸存者或受益人，或者有其他情况，则适用附加规则。
  modal-unemployment-compensation:
    heading: 失业补助（保险）
    p-ec0a26: 就 EITC 而言，包括您的全部失业补助福利。您可以在表格 1099-G 中找到此项所得。
    p-97117c: 如果您的雇主提供了补充福利，包括在表格 W-2，第 1 栏 中申报的任何款额。
  modal-social-security:
    heading: 社会保障所得
    p-f2d061: 对于 EITC，只包括您社会保障和铁路退休福利的应纳税金额。
    p-e8b50a: '欲了解更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc423">请访问</a> '
    p-2b31f6: 要计算您福利的应纳税金额，请参阅<a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-915">第
      915 号出版物</a>，社会保障和同等的铁路退休福利中的&quot;使用哪个工作表&quot;。
  modal-scholarship-grants:
    heading: 奖助学金
    p-0e0c43: 输入未在 W-2 表上报告的任何应纳税奖学金金额。
    p-ce8e34: 此金额包括未在您的 W-2 上找到的奖学金或助学金，如果该资金是：
    ul-0:
      li-13d8db: 用于杂费，如食宿、差旅和选用设备
      li-b94d4b: 教学、研究等服务的报酬，这些服务是获得奖助学金的条件
    p-adf913: 不包括您因国家医疗服务团体奖助学金计划、军队医疗专业奖助学金和经济援助计划或职业学院运营的综合学生工作/学习/服务计划所需服务而获得的款额。
    p-0c59d8: '欲了解更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc421">请访问</a> '
  fg-alert-64891c:
    heading: 您没有资格申请劳动所得税抵免 (EITC)
    p-cdf53e: 根据您输入的款额，您不能申请劳动所得抵免，因为您的劳动所得超出了您的申请状态和符合条件的子女数量的限制。
    p-93a6b5: ' 有关劳动所得抵免的收入限额的更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">请参阅</a>
      。'
  fg-alert-8b7db9:
    heading: 您没有资格申请劳动所得税抵免 (EITC)
    p-3abe5f: 要申请 EITC，您必须有赚取的收入（例如，工资或自营职业的净收入）。根据您输入的收入，您在 <fg-show path="/taxYear"/>
      年的赚取收入为零或更少，因此您不符合 EITC 的条件。
    p-93a6b5: 如需了解更多信息，请参阅<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第
      596 号出版物</a>，所得税抵免。
    p-d04ce1: 如果您的投资收入超过 <fg-show path="/eitcInvestmentIncomeLimit"/>，则您不能申请劳动所得抵免。
    p-241cb8: 投资所得包括：
    ul-0:
      li-12d3b7: 权益（包括应税和免税权益）
      li-0a9a83: 红利
      li-e74f5d: 资本利得
      li-e42b99: 部分租金和特许权使用费或
      li-7c0731: 非本业性业务净所得
    p-9c482c: 如需了解更多信息，请参阅<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p550">第
      550 号出版物</a>，投资收入和费用。要计算您的总投资收入，您应该使用<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第
      596 号出版物</a>中的工作表 1，所得税抵免。
  modal-self-employment-deductions:
    heading: 什么是自雇可扣除费用？
    p-4838ea: 当您是自雇人士、零工，或者拥有并经营一家企业时，您可能能够从您的收入中扣除某些业务费用，从而少缴税。
    p-f24032: 业务费用可能包括：
    ul-0:
      li-6a4179: 家庭办公费用
      li-e2f63f: 汽车和卡车费用
      li-7f4118: 租金
      li-9f53a8: 员工工资和养老金
      li-eaff1b: 保险
      li-6c49ac: 债务利息
      li-761662: 法律和专业费用
      li-719fec: 税费
      li-849c98: 差旅和餐饮
    p-9ff7b2: 如果您选择逐项扣除，这些扣除与您个人的扣除不同。您可以在此扣除您的业务费用，并且稍后仍可选择标准扣除额。
    p-0651e4: <strong>如何查看去年的纳税申报表？</strong>
    p-a81df3: 如果您在 <fg-show path="/taxYear"/> 年是自雇人士，您可以在附表 C 的第 28 行找到您的可扣除费用。
    p-4ca1ce: <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p334#en_US_2024_publink1000313491">了解有关业务费用的更多信息</a>
  modal-estimate-interest-income-en:
    heading: 什么是利息收入？我该如何计算？
    p-cda131: 常见的利息收入类型包括从银行账户或借出款项中赚取的利息。
    p-bc395c: <strong>如何查看去年的纳税申报表</strong>
    p-ec3579: '如果您在 <fg-show path="/taxYear"/> 年赚取了利息收入，请检查以下项中的金额：'
    ul-0:
      li-7b5662: 您的 <fg-show path="/taxYear"/> 年联邦纳税申报表 1040 表格第 2b 行
  modal-investment-income:
    heading: 投资收益
    p-b07c20: 符合 EITC 资格的投资收入包括：
    ul-0:
      li-12d3b7: 权益（包括应税和免税权益）
      li-0a9a83: 红利
      li-81f254: 资本利得
      li-498151: 部分租金和特许权使用费或
      li-7c0731: 非本业性业务净所得
    p-4c8f5e: 欲了解更多信息，<a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-550">请参阅</a>
      。
    p-df5956: 如果您在 2025 年符合以下任一情况，请使用<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第
      596 号出版物</a>，所得税抵免中的工作表 1 来计算您的投资收入：
    ul-1:
      li-0f3c1b: 您正在提交《附表 E》（《表格 1040》）。
      li-782dae: 您正在设备未用于贸易或业务的个人财产租金收入。
      li-e0ebc1: 您正在根据《表格 8814》进行申报（与选择申报子女的利息和股息有关）。
      li-a00ee1: 您从被动活动中获得收入或损失。
      li-143cd9: 您正在提交《表格 4797》（与商业财产的销售有关）。
  modal-other-taxable-income:
    heading: 其他类型的所得
    p-ba0ae2: 其他类型的所得包括：
    ul-0:
      li-83fa6a: 个人退休账户 (IRA) 分发（Roth 个人退休账户除外）
      li-7ae32a: 资本损失（非利得）
      li-248c6a: 根据 2020 年之前签订的离婚或分居协议，您收到的赡养费
      li-6dac33: 房地产租赁、版税、合伙企业、小型公司、信托等
      li-13b588: 个人财产租赁所得，如果您从事的是营利性租赁，但不是租赁此类财产的业务
      li-ad5cc5: Coverdell 教育储蓄账户 (ESA) 和符合条件的学费计划所得的应税分发
      li-ece5cb: 符合条件的学费计划所得
      li-0f1015: 奖品、奖励和博彩赢款
      li-7e9756: 陪审义务费用
      li-737e99: 阿拉斯加永久基金红利
      li-e833f1: 上一年扣除的项目，如医疗费用、房地产税或住房抵押贷款利息的补偿或其他款额
    p-fda53f: 不包含：
    ul-1:
      li-0eb181: 根据 2019 年后签订的离婚或分居协议，您收到的赡养费
      li-e46f68: 子女抚养
      li-b144cb: 福利待遇，如为贫困家庭提供临时援助 (TANF)、食品券、第 8 节住房津贴
      li-63523b: 非应税寄养费
      li-a8d386: 教育补助等非应税雇员福利
      li-f2a3d6: 退伍军人福利，包括退伍军人康复金
      li-080a95: 工伤补偿金
      li-57e5cb: 因某人死亡而获得的人寿保险收益
      li-764dd4: 继承、因遗嘱指定或作为礼物而获得的金钱或财产
      li-6f920a: 失业救济
    p-745735: 第525号刊物，应税和非应税收入（英文）
  modal-student-loan-interest:
    heading: 学生贷款利息减免
    p-3ac7ce: 输入您就符合条件的学生贷款所支付的最高 2500 美元的利息。如果您支付的利息金额超过 600 美元，则您可以在表格 1098-E 上进行填写。
    p-e4b825: 贷款必须已用于支付符合条件的高等教育费用以进入符合条件的教育机构。另外，该等费用必须已：
    ul-0:
      li-bb1c73: 针对您本人、您的配偶或您申请贷款时的受抚养人；
      li-829f26: 在您获得贷款之前或之后的合理时间内支付或产生的；以及
      li-562ff0: 针对在学术期间为符合条件的学生提供的教育。
    p-75f422: 如果您在法律上没有义务偿还该贷款，则您没有资格进行抵免申请。
    p-1f2dd3: 欲了解更多信息，<a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-970"
      class="usa-link">请参阅</a> 。
  modal-educator-expenses:
    heading: 教育人员支出扣减
    p-e117c8: 如果您是一名教师，请输入最高 250 美元（如果是已婚夫妇联合申报，且您和您的配偶均为教师，则为 500 美元）的未补偿费用，例如：
    ul-0:
      li-8829c6: 参加专业发展课程的费用
      li-751127: 书籍和用品
      li-0c78ca: 计算机设备（包括相关软件和服务）
      li-6ef6c8: 其他设备
      li-6d4170: 课堂上使用的辅助材料
    p-86c6e4: '欲了解更多信息，<a target="_blank" href="https://www.irs.gov/taxtopics/tc458"
      class="usa-link">请参阅</a> '
  modal-ira-contributions:
    heading: 个人退休计划扣减
    p-5979d5: 输入您在工资供款之外的任何个人退休账户供款。
    p-a49375: '欲了解更多信息，<a target="_blank" href="https://www.irs.gov/retirement-plans/ira-deduction-limits"
      class="usa-link">请参阅</a> '
  modal-self-employed-retirement:
    heading: SEP、SIMPLE 和其他符合条件的计划：
    p-ca0a8f: 如果您为自雇者，请从自雇净收入中减去以下项来计算您的符合条件的计划补助金：
    p-0d133f: '为了符合资格，您或您的配偶必须具备：'
    ul-0:
      li-6c246a: 1040 报税表第 1 页中自雇税的可减免部分，以及
      li-a2595a: 1040 报税表第 1 页自雇、SEP、SIMPLE和符合条件的计划行中的退休计划供款款额
      li-f6cddf: 擁有有限責任公司
    p-3622b4: '符合条件的计划可能包括：'
    ul-1:
      li-ff93fe: 简化员工养老金 (SEP) 计划
      li-200ab4: 员工储蓄激励匹配计划
      li-e7dbe4: 单人 401(k)
      li-765afa: 其他符合条件的退休计划
    p-af5a4a: <strong>不要包括</strong>个人退休安排 (IRA) 缴款。
    p-add56c: 您必须使用特殊规则来计算自己的退休计划缴款。
    p-3248f2: 自雇个人 - 计算个人退休计划供款和扣减额（英文）
  modal-hsa-deductions:
    heading: 医疗储蓄账户扣减：
    p-2ab752: 输入您任何健康储蓄账户 (HSA) 供款（未包括在上面的医疗储蓄账户、灵活支出安排或其他“自助餐式福利计划”中）。
    p-a7d9fc: 关于<a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-969"
      class="usa-link">第969号刊物，医疗储蓄账户和其他税收优惠的医疗计划（英文）</a>
  modal-alimony-paid:
    heading: 赡养费支出
    p-fa1de9: 如果您根据 2019 1 月 1 日之前执行的法院命令支付了赡养费或分居赡养费，并且该命令没有明确说明您不能进行抵税，请在此处输入您在  期间支付的款额。
    p-7b97e1: 不要包含如下已支付的款额：
    p-7948e4: <strong>家庭或子女抚养费</strong>
    p-358bc5: 此外，如果法院命令被修改，并且声明您不能进行抵税，则不要包含该等相关款额。
    p-06a405: 在 2024 年 12 月 31 日之后执行的法院命令下提供的赡养费或分居抚养费
    p-4b335c: '欲了解更多信息，<a target="_blank" href="https://www.irs.gov/taxtopics/tc452"
      class="usa-link">请访问</a> '
  modal-early-withdrawal:
    heading: 提前支取储蓄金的罚金
    p-7e8d5b: 如果您在存单或其他递延利息账户到期前支取资金，您可能需要支付罚金。您可以在 第 2 栏 的表格 1099-INT 中找到此项罚金。在此处输入款额。
  modal-moving-expenses:
    heading: 迁移支出
    p-6f18fd: 如果您为现役军人，军方命令您永久改变任职地点，请在此处输入军方没有补偿的任何迁移支出。迁移支出包括：
    ul-0:
      li-60efa3: 从旧房子到新家的直线旅途
      li-efbbb1: 打包和运输个人物品的费用
    p-6536cb: '欲了解更多信息，<a target="_blank" href="https://www.irs.gov/taxtopics/tc455"
      class="usa-link">请访问</a> '
  modal-employee-business-expenses:
    heading: 某些雇员业务支出
    p-c92011: 如果您为：
    ul-0:
      li-9bde67: 武装部队预备役军人
      li-053ac1: 符合条件的表演艺术家
      li-e03b09: 付费式州或地方政府官员
      li-0d1488: 需承担障碍相关工作支出的雇员
    p-cc9b68: 您可以包括在您的贸易、业务或专业领域中常见且可接受的支出，或对您的业务有益且合适的支出。
    p-d46373: 如果您的支出不属于所列类别之一，您可能无法申请这些支出的调整。
    p-eb68a5: 有关更多信息和符合条件的支出列表，<a target="_blank" href="https://www.irs.gov/forms-pubs/about-form-2106"
      class="usa-link">请参阅</a> 。
  modal-self-employed-health-insurance:
    heading: 自雇医疗保险扣减：
    p-598073: 如果您为自雇者，请输入您为本人、您的配偶和您的受抚养人支付的医疗保险款额。
    p-d60394: 符合条件的保费是医疗、牙科、视力和长期护理保险。该保单可以是为您自己、您的配偶和您的受抚养人购买的。该保单也可以涵盖年底未满 27 岁的子女，即使该子女不是您的受抚养人。
    p-13dece: 欲了解更多信息，<a target="_blank" href="https://www.irs.gov/instructions/i7206"
      class="usa-link">请参阅</a>  第 6 章。
/qualifying-children:
  title: 符合条件的子女
  h2-dbaf54: 符合条件的子女
  p-9b177d: 根据您之前的输入，您没有任何符合条件的子女。如果此项有误，请返回 <a class="usa-link" href="/app/eitc/filing-status/">报税状态</a>，然后更改您的回复。
  p-c1a0dd: 请进入下一步查看结果。
  p-3178be: 在这一步中，我们将了解有多少子女或其他亲属是您符合申请和计算 EITC 条件的子女。您最多可以为三个符合条件的子女申请 EITC。
  p-e28c1e: 您有 3 个符合条件的子女，并且已达到可申请 EITC 的符合条件子女的最大数量。你不需要再回答任何问题了。
  p-adf161: 要获得 EITC 的资格，您必须至少有一个符合条件的儿童。
  collection/familyAndHousehold:
    /familyAndHousehold/*/livedWithYouUS:
      question: 子女必须在 <fg-show path="/taxYear"/> 年有一半以上的时间与您在美国境内共同生活？
      modalLink: <modal-link for="modal-residency">什么算是与您一起生活的时间？</modal-link>
    fg-alert-b7d816:
      heading: 查看是否有资格获得劳动所得税抵免。
      p-7666ea: 欲了解更多信息，请参阅 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第 596 号出版物</a>, 劳动所得抵免。
    /familyAndHousehold/*/someoneElseCanClaim:
      question: 有人能为该子女申请 EITC 吗？
      modalLink: <modal-link for="modal-claimed-someone-else">如果不止一个人可以申请他们怎么办？</modal-link>
    /familyAndHousehold/*/isClaimingQCRegardless:
      question: 如果某子女被其他符合条件的个人申报，则您可能无法为其进行 EITC 申报。您依然想要为该子女进行 EITC 申报吗？
      modalLink: <modal-link for="modal-claimed-someone-else">如果不止一个人可以申请他们怎么办？</modal-link>
    /familyAndHousehold/*/marriedFilingJointly:
      question: 该子女是否结婚，并且会与其配偶就 <fg-show path="/taxYear"/> 的所得进行联合申报？
      modalLink: <modal-link for="modal-joint-return">我可以申请提交联合申报表的人吗？</modal-link>
    /familyAndHousehold/*/mfjForRefundOnly:
      question: 该子女是否会就 <fg-show path="/taxYear"/> 的所得进行联合申报，仅为了申请预扣税或已缴预估税退税，并且不会申请任何税收抵免，如
        EITC？
      modalLink: <modal-link for="modal-joint-return-with-another-person-exception">您什么时候可以申请提交联合申报表的人？</modal-link>
    /familyAndHousehold/*/isPermanentlyDisabled:
      question: 该子女是否永久、完全残障？
      modalLink: <modal-link for="modal-disabled">什么算是永久性和完全残疾？</modal-link>
    /familyAndHousehold/*/relationship:
      question: 选择该子女与您的关系：
      modalLink: <modal-link for="modal-relationship">谁算是继子女、养子女或寄养子女？</modal-link>
      options:
        childStepFoster:
          name: 孩子、继子女、领养子女或寄养子女
        sibling:
          name: 兄弟姐妹、半同胞或继兄弟姐妹
        descendant:
          name: 孙辈、侄亲
        none:
          name: 以上都不是
    /familyAndHousehold/*/ageRange:
      question: 到 <fg-show path="/taxYear"/> 年底，该子女有多大？
      options:
        under19:
          name: 未满 18 周岁（含）
        between19And23:
          name: 19 至 23 岁
        over24:
          name: 24 岁（含）以上
    /familyAndHousehold/*/isFullTimeStudent:
      question: 该子女在这一年的任何 5 个月的部分时间内是否为全日制学生？
      modalLink: <modal-link for="modal-student">我怎么知道他们是否是全日制学生？</modal-link>
    /familyAndHousehold/*/isQCYoungerThanSelfOrSpouse:
      question: 这一受抚养人是否比您年龄小？
      modalLink: <modal-link for="modal-age-comparison">我们为什么要问他们是否比<span condition="/isFilingStatusMFJ"
        operator="isFalse">您</span><span condition="/isFilingStatusMFJ" operator="isTrue">您或您的配偶</span>年轻？</modal-link>
    /familyAndHousehold/*/validSSN:
      question: 这名子女是否有在您的报税表的截止日期（包括延期）当日或之前签发的有效社会安全号码？
      modalLink: <modal-link for="modal-valid-ssn-qc">有效社会安全号码必填</modal-link>
    fg-alert-a004cd:
      heading: 请注意
      p-8374d8: 这名子女是您的符合条件的子女。但是，因为其没有有效的社会安全号码，因此您没有资格申请提高劳动所得抵免额。
    h2-eaf308: 该子女符合申请和计算 EITC 的条件。
  p-5aea65: 根据您输入的信息，您有 3 名符合条件的子女，他们都有有效的社会保障号码，并已达到可申请 EITC 的最大人数。
  fg-alert-9510e7:
    heading: 符合条件的儿童要求
    p-b6bd9e: 如果没有符合条件的子女，则没有资格申请 EITC，除非您本人或配偶（如果共同申报）年龄在 25 周岁至 64 周岁。
    p-93a6b5: 欲了解更多信息，请参阅 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第 596 号出版物</a>, 劳动所得抵免。
  fg-alert-64891c:
    heading: 您没有资格申请劳动所得税抵免 (EITC)
    p-cdf53e: 根据您输入的款额，您不能申请劳动所得抵免，因为您的劳动所得超出了您的申请状态和符合条件的子女数量的限制。
    p-93a6b5: 欲了解更多信息，请参阅 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第 596 号出版物</a>, 劳动所得抵免。
  h2-34370a: 根据您的输入，您有 <fg-show path="/eitcQualifyingChildren"/> 个具有有效社会保障号码的合格子女。
  modal-residency:
    heading: 居住地测试
    h3-7c913b: 与您共同生活
    p-ff8f12: 符合条件的子女必须在 <fg-show path="/taxYear"/> 年有一半以上的时间内在同一主要住所与您同住，且该住所必须位于美国境内。美国包括
      50 个州和哥伦比亚特区。美国不包括波多黎各或关岛等美国领地。就 EITC 而言，国税局认为在美国境外驻扎超期服役的美国军人服役期间在美国境内有一处主要住所。
    h3-46d8f4: 子女出生或夭折
    p-e27b79: 如果这名子女于 <fg-show path="/taxYear"/> 出生或去世，则这名子女在世的这一年中必须有超过一半的时间与您共同生活。
    h3-16617c: 收养和寄养子女
    p-c623b2: 如果您在 <fg-show path="/taxYear"/> 年收养了该子女，该子女在 <fg-show path="/taxYear"/>
      年被合法安置在您身边供您合法收养，或者该子女是在 <fg-show path="/taxYear"/>3 年与您同住的合格寄养儿童，则自 <fg-show
      path="/taxYear"/>4 年该子女被收养或安置在您身边以来，您的主要住所必须有一半以上的时间是该子女的主要住所。
    h3-6839b6: 临时缺席
    p-658cca: 就 EITC 而言，临时缺席视为与您共同生活。例子包括：
    ul-0:
      li-76cf60: 生病或住院
      li-1b3986: 上学、度假、业务服务或服兵役
      li-dae417: 少管所扣押
      li-de99d6: 被绑架的子女
    p-8b99ed: '这一选择可能会导致您的 EITC 额上下浮动。欲了解更多信息，<a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">请参阅</a> '
  modal-joint-return:
    heading: 与他人联合申报的
    p-9b8921: 通常情况下，如果成婚者进行了联合申报，则您不能将该名成婚者作为符合条件的子女进行 EITC 申请。
    p-bdfc89: 第596号刊物， 劳动所得抵免，您的符合条件的子女不能被超过一人申报（英文）
  modal-joint-return-with-another-person-exception:
    heading: 与他人联合申报的例外
    p-93a25e: 如果成婚者及其配偶进行联合申报，仅为申请薪金预扣所得税或已缴预估税退税，则您可以将该名成婚者作为符合条件的子女进行 EITC 申请。这种情况下，成婚者及其配偶不得在其报税表上进行抵免申请，例如EITC。
    p-bdfc89: 第596号刊物， 劳动所得抵免，您的符合条件的子女不能被超过一人申报（英文）
  modal-disabled:
    heading: 永久、完全残障
    p-a09e23: 就 EITC 而言，如果以下两项条件均满足，则我们将一名子女视为永久、完全残障：
    ul-0:
      li-35e112: 在竞争性工作环境中，由于身体或精神状况，孩子无法在合理的时间内以最低工资为报酬或营利工作，并且
      li-f9618f: 医生确定病情已持续或可能持续至少一年，或可能导致死亡
    p-de127e: 第596号刊物，劳动所得抵免（英文），永久、完全残障
  modal-relationship:
    heading: 孩子关系定义
    h3-523a2e: 继子女
    p-3a1769: 继亲关系是由婚姻形成的关系。就 EITC 而言，即使婚姻终止，但是婚姻形成的关系，例如继女、继子、继兄弟或继姊妹关系，不会终止。
    h3-3cc097: 领养子女
    p-165b15: 领养子女始终视为您本人的子女。领养子女包括合法收养的子女。
    h3-872822: 寄养子女
    p-d91342: 只有经授权的安置机构或法院命令将子女安置于您处，您才可将其申请为寄养子女。
    h3-2fd110: 授权安置机构
    p-b80621: 其包括州或地方政府机构或印第安部落政府。还包括州或印第安部落政府许可的免税组织。
  modal-student:
    heading: 全日制学生
    h3-f803ae: 全日制学生
    p-ef6d3a: 全日制学生报名的课时或课程数量必须符合学校对全日制学生的定义。
    p-69b838: 作为学校正规课程和实践培训一部分、在私营企业进行带薪实习的学生被视为全日制学生。
    h3-754ddf: 学校定义
    p-dfaecc: 就 EITC 而言，学校为：
    ul-0:
      li-5f78b0: 小学
      li-f8aab3: 初中或高中
      li-39d2fa: 学院或大学
      li-96892f: 技术、贸易或机械学校
    p-986cc5: 学校不是：
    ul-1:
      li-775eb9: 在职培训课程
      li-b2e8f2: 函授学校
      li-767c35: 仅通过互联网授课的学校
    p-81198a: 欲了解更多信息，请参阅 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第 596 号出版物</a>, 劳动所得抵免。
  modal-valid-ssn-qc:
    heading: 符合条件的孩子的有效社会安全号码
    p-d68f7a: 您的 EITC 的款额取决于您拥有的符合条件的子女（有有效社会安全号码）的人数。为计算 EITC 的款额而申报的每名孩子或亲属必须有由社会安全局在您的报税表的截止日期（包括延期）当日或之前签发的有效社会安全号码
      (SSN)。
    p-0464ad: 就 EITC 而言，社会安全号码即为有效社会安全号码，除非社会保障卡上印有“工作无效”字样，并且社会安全号码的签发仅用于让 SSN 的接收者申请或获得联邦资助的福利。  联邦资助的福利一个例子是医疗补助。
    p-a708ff: 只有在 DHS 授权仍然有效的情况下，我们才会接受卡上印有“DHS 授权工作有效”字样的社会安全卡。
    p-558a40: 对于 EITC，我们不接受：
    ul-0:
      li-5e5f3e: IRS 个人纳税人识别号 (ITIN)
      li-5fc9b7: 领养纳税人识别号 (ATIN)
      li-19d3d7: 社会安全号码，仅用于让 SSN 的接收者申请或获得联邦资助的福利，如医疗补助
  modal-claimed-someone-else:
    heading: 在其他人的报税表上进行了申报
    p-9b277e: 仅一个人可以为一名子女申请 EITC。如果超过一个人为该名子女进行申请，那么 IRS 将适用决胜规则。
    p-911aff: 第596号刊物， 劳动所得抵免，您的符合条件的子女不能被超过一人申报（英文）
  modal-age-comparison:
    heading: 孩子必须比您或您的配偶年龄小
    p-626c78: 要成为符合条件的子女，这名子女必须比您年龄小，除非这名子女于 <fg-show path="/taxYear"/> 期间的任何时间永久、完全残障。
    p-1a035f: 如需了解更多信息，请参阅<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2019_publink1000298140">第
      596 号出版物</a>，所得税抵免，年龄测试。
/results:
  title: 结果
  h2-88e7ef: 您的结果
  fg-alert-64891c:
    heading: 查看是否有资格获得劳动所得税抵免。
    p-cdf53e: 根据您提供的信息，您不能申请劳动所得税抵免，因为您的收入超过了您的申报状态和合格子女人数的限额。
    p-93a6b5: 如需了解更多信息，请参阅<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第
      596 号出版物</a>，所得税抵免。
  p-578b13: 根据您提供的信息，您有资格申请劳动所得税抵免，估计款额为：
  p-adf6bb: 您向 IRS 进行报税时，这一抵免额可减少您的 <fg-show path="/taxYear"/> 的税额。如果该抵免将您的税额减少到低于零，您可获得退税。
  h2-259962: 后续步骤：如何申请 EITC
  p-508e29: 为了收到 <strong><fg-show path="/earnedIncomeCredit"/></strong>* 的预估款额，您必须提交您的
    <fg-show path="/taxYear"/> 联邦报税表。如果您申请 EITC，根据法律规定，IRS 无法在 <fg-show path="/nextTaxYear"/>
    月中旬之前为您办理退税，即使是与 EITC 无关的部分。
  h3-54f664: 在线
  p-a5939a: 如果您想要在线报税，则您可以使用 IRS 免费申报计划。请注意，该计划仅在 1 月至 10 月期间提供。
  p-3ef53a: <a target="_blank" class="usa-link" href="https://www.irs.gov/filing/free-file-do-your-federal-taxes-for-free">
    立即在线申报<span class="usa-sr-only"> (opens in a new tab)</span>        </a>
  h3-792a4e: 上门
  p-787398: 如果您青睐与报税员一起完成，您可以前往 IRS 志愿者所得税援助 (VITA) 服务处。
  p-25a83e: <a target="_blank" class="usa-link" href="https://www.irs.gov/individuals/free-tax-return-preparation-for-qualifying-taxpayers">
    免费面对面帮助<span class="usa-sr-only"> (opens in a new tab)</span>        </a>
  h3-c7457b: 纸质表格
  p-b8834f: 因为您有符合条件的儿童，您必须填写        <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-schedule-eic-form-1040">
    附表 EIC (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        并将其附加到您的        <a
    target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    表 1040 (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        或        <a
    target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    表 1040-SR (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        针对纳税年度
    <fg-show path="/taxYear"/>。
  h2-a3da4a: 您的信息概述
  p-5a6eac: 下表汇总了您在该工具中输入的信息。如果其中任何信息有误，请单击“编辑”进行更新，否则可能会影响您的结果。
