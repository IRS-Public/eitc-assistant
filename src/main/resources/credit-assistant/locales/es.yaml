# Note that these errors use CamelCase because they come from the Fact Graph. Some of these errors
# are user errors (i.e. they entered an amount larger than the limit) but not all of them are (i.e.
# if the limit is misconfigured). I've tried to the denote the ones that should only appear if
# there's a bug that needs to be fixed.
errors:
  # Dollar errors
  CombinedHyphensAndParentheses: "Ingrese solo números y un decimal."
  # Not obvious to me why the fact graph breaks down invalid characters
  # this way but I don't think it needs to be exposed to the user
  InvalidCharacters: "Ingrese solo números y un decimal."
  InvalidDollar: "Ingrese solo números y un decimal."
  InvalidHyphens: "Ingrese solo números y un decimal."
  InvalidParentheses: "Ingrese solo números y un decimal."
  TooManyDecimals: "Ingrese un número con solo un decimal."
  TooManyFractionalDigits: "Ingrese solo dos dígitos después del decimal."

  # Day errors
  InvalidDay: "Ingrese un día válido."
  InvalidDayDueToLeapYear: "Día inválido debido a año bisiesto."
  InvalidMonth: "Ingrese un mes válido."
  InvalidDate: "Ingrese una fecha válida."
  InvalidLimit: "Límite inválido establecido."
  IncompleteWritableDate: "Ingrese una fecha completa o deje en blanco."

  # Enum errors
  BlankEnum: "El valor estaba en blanco."
  InvalidEnum: "Valor no encontrado."

  Required: 'Se necesita la respuesta a la pregunta para continuar'
  Default: "Lo sentimos, algo salió mal."

  # Limit errors
  #
  # There are a few other limits types in the Fact Graph, but we don't use them for TWE. Strangely,
  # Dollar et. al. have their own limit validations, like ExceedsMaxLimit. I don't know under what
  # circumstances those would trigger; I think it's a vestige of a different way of setting limits
  #
  # Yes, it would be nice to do proper parameterization rather than just appending the limit value
  # to the end of the string
  Max: "Ingrese una cantidad menor a"
  Min: "Ingrese una cantidad mayor a"

