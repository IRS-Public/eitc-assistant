# Note that these errors use CamelCase because they come from the Fact Graph. Some of these errors
# are user errors (i.e. they entered an amount larger than the limit) but not all of them are (i.e.
# if the limit is misconfigured). I've tried to the denote the ones that should only appear if
# there's a bug that needs to be fixed.
errors:
  # Dollar errors
  CombinedHyphensAndParentheses: "Chỉ nhập số và dấu thập phân."
  # Not obvious to me why the fact graph breaks down invalid characters
  # this way but I don't think it needs to be exposed to the user
  InvalidCharacters: "Chỉ nhập số và dấu thập phân."
  InvalidDollar: "Chỉ nhập số và dấu thập phân."
  InvalidHyphens: "Chỉ nhập số và dấu thập phân."
  InvalidParentheses: "Chỉ nhập số và dấu thập phân."
  TooManyDecimals: "Chỉ nhập số có một dấu thập phân."
  TooManyFractionalDigits: "Chỉ nhập hai chữ số sau dấu thập phân."

  # Day errors
  InvalidDay: "Nhập một ngày hợp lệ."
  InvalidDayDueToLeapYear: "Ngày không hợp lệ do năm nhuận."
  InvalidMonth: "Nhập một tháng hợp lệ."
  InvalidDate: "Nhập một ngày hợp lệ."
  InvalidLimit: "Giới hạn được thiết lập không hợp lệ."
  IncompleteWritableDate: "Nhập ngày đầy đủ hoặc để trống."

  # Enum errors
  BlankEnum: "Giá trị bị trống."
  InvalidEnum: "Không tìm thấy giá trị."

  Required: "Bắt buộc phải trả lời câu hỏi này để tiếp tục."
  Default: "Rất tiếc, đã xảy ra lỗi."

  # Limit errors
  #
  # There are a few other limits types in the Fact Graph, but we don't use them for TWE. Strangely,
  # Dollar et. al. have their own limit validations, like ExceedsMaxLimit. I don't know under what
  # circumstances those would trigger; I think it's a vestige of a different way of setting limits
  #
  # Yes, it would be nice to do proper parameterization rather than just appending the limit value
  # to the end of the string
  Max: "Nhập số tiền nhỏ hơn"
  Min: "Nhập số tiền lớn hơn"

