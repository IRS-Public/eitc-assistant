# Note that these errors use CamelCase because they come from the Fact Graph. Some of these errors
# are user errors (i.e. they entered an amount larger than the limit) but not all of them are (i.e.
# if the limit is misconfigured). I've tried to the denote the ones that should only appear if
# there's a bug that needs to be fixed.
errors:
  # Dollar errors
  CombinedHyphensAndParentheses: "Antre sèlman nimewo ak yon pwen desimal."
  # Not obvious to me why the fact graph breaks down invalid characters
  # this way but I don't think it needs to be exposed to the user
  InvalidCharacters: "Antre sèlman nimewo ak yon pwen desimal."
  InvalidDollar: "Antre sèlman nimewo ak yon pwen desimal."
  InvalidHyphens: "Antre sèlman nimewo ak yon pwen desimal."
  InvalidParentheses: "Antre sèlman nimewo ak yon pwen desimal."
  TooManyDecimals: "Antre yon nimewo ak yon sèl desimal."
  TooManyFractionalDigits: "Antre sèlman de chif apre desimal la."

  # Day errors
  InvalidDay: "Antre yon jou valab."
  InvalidDayDueToLeapYear: "Jou a pa valab akoz ane bisektil."
  InvalidMonth: "Antre yon mwa valab."
  InvalidDate: "Antre yon dat valab."
  InvalidLimit: "Limit ki fikse a pa valab."
  IncompleteWritableDate: "Antre yon dat konplè oswa kite li vid."

  # Enum errors
  BlankEnum: "Valè a te vid."
  InvalidEnum: "Nou pa jwenn valè a."

  Required: "Kesyon sa a obligatwa"
  Default: "Eskize nou, gen yon pwoblèm ki pase."

  # Limit errors
  #
  # There are a few other limits types in the Fact Graph, but we don't use them for TWE. Strangely,
  # Dollar et. al. have their own limit validations, like ExceedsMaxLimit. I don't know under what
  # circumstances those would trigger; I think it's a vestige of a different way of setting limits
  #
  # Yes, it would be nice to do proper parameterization rather than just appending the limit value
  # to the end of the string
  Max: "Antre yon montan ki mwens pase"
  Min: "Antre yon montan ki plis pase"

