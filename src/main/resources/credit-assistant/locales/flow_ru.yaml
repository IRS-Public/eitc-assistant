  h3-a7b819: 'Ваш AGI составляет:'
  fg-alert-334e2e:
    heading: Вы не имеете права на налоговый зачет за заработанный доход (EITC).
    p-f3c23d: Исходя из введенных вами сумм, вы не можете претендовать на налоговый
      зачет за заработанный доход, поскольку ваш AGI превышает лимит для вашего статуса
      подачи документов и количества детей, отвечающих требованиям.
    p-93a6b5: ' Для получения дополнительной информации о лимитах доходов для налогового
      зачета за заработанный доход <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">см</a>
      .'
  modal-wages-salaries-tips:
    heading: Какой доход мне следует включить?
    h3-53ed11: Заработная плата, оклады и чаевые
    p-40d79a: Ваш работодатель указал вашу заработную плату, оклады, чаевые и другие
      компенсации в графе 1 вашей Формы W-2.
    p-ab967b: Ваш работодатель указал вашу заработную плату, оклады, чаевые и другие
      выплаты в Box 1 Формы W-2. Включите полную сумму чаевых и дохода за сверхурочную
      работу в расчет заработанного дохода при определении права на налоговый зачет
      за заработанный доход, даже если вся или часть этой суммы подлежит вычету.
    p-cb2522: Включите все суммы, указанные в Box 1 формы W-2 для вас и вашего супруга,
      если вы подаете совместную налоговую декларацию с супругом.
    p-1f7f24: Don't Include свои взносы до уплаты налогов по форме W-2 в разделе Взносы
      до уплаты налогов.
    h3-af3590: Надбавка за участие в боевых действиях и плата военнослужащим
    p-3fdb7d: Вы также можете включить не облагаемую налогом денежную надбавку за
      участие в боевых действиях в заработанный доход для получения EITC. Ваш работодатель
      указал необлагаемую налогом надбавку за участие в боевых действиях в Box 12
      с Code Q  в вашей форме W-2.
    p-d9b0e5: 'Этот выбор может увеличить или уменьшить ваш EITC. Для получения дополнительной
      информации <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2025_publink1000297672">смотрите</a> '
    h3-84091c: Страхование временной и краткосрочной нетрудоспособности
    p-bee3d8: Если в течение года вы брали отпуск по уходу за ребенком или были временно
      нетрудоспособны, и ваш работодатель платил вам, то он указал ваш доход в W-2.
      Укажите этот доход здесь.
  modal-work-no-taxes-withheld:
    heading: Доходы, с которых не удерживались федеральные налоги
    p-7ca214: Сообщайте о доходах, полученных от разовой работы, даже если это подработка, частичная занятость или временная работа.
    p-9048f5: Введите доход здесь, если вы зарабатываете деньги на работе, даже если подоходный налог не удерживался. Вы могли получить или не получить форму 1099 на все доходы.
    p-8f1d83: 'Доход мог быть получен через приложение или веб-сайт для:'
    ul-0:
      li-014f6e: Вождение автомобиля для забронированных поездок или доставки
      li-816827: Выполнение поручений или заданий
      li-ac1297: Предоставление творческих или профессиональных услуг
      li-743818: Предоставление другой временной, разовой или внештатной работы
    p-ccdadf: Ваш валовой доход включает все полученные вами доходы. Мы вычтем ваши расходы позже.
    p-5465af: Для получения дополнительной информации посетите <a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">Управление налогами для вашей разовой работы (на английском языке)</a>
  modal-self-employment-gross-income:
    heading: Валовой доход от индивидуальной трудовой деятельности
    p-3ef7b9: 'Если вы:'
    ul-0:
      li-0d8073: Являются самозанятыми
      li-f5836c: Зарабатывайте деньги, предоставляя работу, услуги или товары по требованию
      li-d6da48: Ведите бизнес или занимайтесь фермерским хозяйством
      li-604ec3: Являетесь священнослужителем или членом религиозного ордена
      li-de3005: Являетесь священнослужителем или членом религиозного ордена
    p-ccdadf: 'Для получения дополнительной информации перейдите по <a target="_blank"
      class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">ссылке</a> '
    p-a21d1b: Для получения дополнительной информации посетите <a target="_blank"
      class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/self-employed-individuals-tax-center">Налоговый
      центр для самозанятых лиц</a>
  modal-disability-retirement:
    heading: Пенсионная нетрудоспособность как заработанный доход
    p-514b79: Если вы вышли на пенсию по инвалидности, мы считаем налогооблагаемые
      пособия, которые вы получили в соответствии с пенсионным планом вашего работодателя
      по инвалидности, заработанным доходом для целей EITC до достижения вами минимального
      пенсионного возраста. Минимальный пенсионный возраст – это самый ранний возраст,
      в котором вы могли бы получать пенсию или аннуитет, если бы не были нетрудоспособны.
    p-e7df54: Минимальный пенсионный возраст — это самый ранний возраст, в котором
      вы могли бы получать пенсию или аннуитет, если бы не были инвалидом.
    p-2e7e6e: Включите временную или краткосрочную нетрудоспособность в свой заработок.
  modal-inmate-pay:
    heading: Оплата, заработанная в качестве заключенного
    p-0ced8d: Оплата, которую вы получали за работу, выполненную во время пребывания
      в качестве заключенного в исправительном учреждении, не является заработанным
      доходом при расчете налогового зачета за заработанный доход.
    p-435d89: Сюда входит оплачиваемая работа, выполняемая во время участия в программе
      освобождения для работы или во время пребывания в реабилитационном центре.
    p-1dc488: Публикация 596, Налоговый зачет за заработанный доход, Заработок во
      время нахождения в заключении
  modal-foreign-income-non2555:
    heading: Доход, полученный за рубежом
    p-6821fc: Доход, полученный за рубежом, — это доход, полученный во время проживания
      и работы за пределами Соединенных Штатов, округа Колумбия или владений или территорий
      США.
    p-86d28e: Если вы являетесь государственным служащим США, работающим за пределами
      Соединенных Штатов, этот доход не считается полученным за рубежом.
    p-231cd1: Если вы не являетесь государственным служащим и работаете в посольстве,
      мы считаем этот доход полученным за рубежом.
    p-87f12e: Для получения дополнительной информации см. <a target="_blank" class="usa-link"
      href="https://www.irs.gov/forms-pubs/about-form-2555">Форму 2555</a>, Доход,
      заработанный за рубежом.
    p-90826b: 'Примечание: Если вы решите подать Форму 2555, вы не имеете права на
      получение EITC.'
  modal-taxable-pension:
    heading: Пенсия
    p-a523b6: Если вы получаете пенсионные выплаты в виде пенсии или аннуитета от
      отвечающего требованиям пенсионного плана работодателя, вся или часть получаемых
      вами сумм может подлежать налогообложению.
    p-ce034e: 'Вся сумма подлежит налогообложению, если:'
    ul-0:
      li-21fe33: Вы ничего не вносили или не считаетесь лицом, сделавшим взнос для
        получения пенсии или аннуитета
      li-c4c784: Ваш работодатель не удерживал взносы из вашей зарплаты, или
      li-a75167: Вы получили все свои взносы без уплаты налогов в предыдущие годы
    p-63555f: 'Часть суммы подлежит налогообложению, если:'
    ul-1:
      li-6d40a9: Вы внесли доллары после уплаты налогов (для расчета используйте Общее
        правило и Упрощенный метод)
    p-24ecdd: Дополнительные правила применяются, если вы получали выплаты до исполнения
      вам 59 с половиной лет, являетесь выжившим супругом или бенефициаром, либо в
      других ситуациях.
  modal-unemployment-compensation:
    heading: Пособие по безработице (страхование)
    p-ec0a26: Для получения EITC включите все свои пособия по безработице. Вы найдете
      этот доход в форме 1099-G.
    p-97117c: Если фонд вашего работодателя предоставлял дополнительные льготы, включите
      все суммы, указанные в форме W-2, Box 1.
  modal-social-security:
    heading: Доход от выплат по программам социального обеспечения
    p-f2d061: Для EITC включите только налогооблагаемую сумму ваших пособий по социальному
      обеспечению и пенсионных пособий на железнодорожном транспорте.
    p-e8b50a: 'Для получения дополнительной информации перейдите по <a target="_blank"
      class="usa-link" href="https://www.irs.gov/taxtopics/tc423">ссылке</a> '
    p-2b31f6: Чтобы рассчитать налогооблагаемую сумму ваших пособий, см. раздел &quot;Какую
      таблицу использовать&quot; в <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-915">Публикации
      915</a>, Пособия по социальному обеспечению и эквивалентные пособия при выходе
      на пенсию на железнодорожном транспорте.
  modal-scholarship-grants:
    heading: Стипендии или стипендиальные гранты
    p-0e0c43: Введите любую сумму налогооблагаемой стипендии, не указанную в вашей
      Форме W-2.
    p-ce8e34: 'Эта сумма включает стипендию или грант, не указанные в вашей форме
      W-2, если эти деньги были:'
    ul-0:
      li-13d8db: Используется для прочих расходов, таких как проживание и питание,
        проезд и дополнительное оборудование
      li-b94d4b: Полученные в качестве оплаты за преподавание, исследования или другие
        услуги, необходимые в качестве условия для получения стипендии или стипендиального
        гранта
    p-adf913: Не включайте суммы, которые вы получили за услуги, предусмотренные стипендиальной
      программой Национального корпуса медицинской службы, программой стипендий и
      финансовой помощи для медицинских профессий вооруженных сил или комплексной
      студенческой программой «работа-обучение-служба», осуществляемой рабочим колледжем.
    p-0c59d8: Для получения дополнительной информации см. <a target="_blank" class="usa-link"
      href="https://www.irs.gov/taxtopics/tc421">link</a>
  fg-alert-64891c:
    heading: Вы не имеете права на налоговый зачет за заработанный доход (EITC).
    p-cdf53e: Исходя из введенных вами сумм, вы не можете претендовать на налоговый
      зачет за заработанный доход, поскольку ваш доход превышает лимит для вашего
      статуса подачи документов и количества детей, отвечающих требованиям.
    p-93a6b5: ' Для получения дополнительной информации о лимитах доходов для налогового
      зачета за заработанный доход <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">см</a>
      .'
  fg-alert-8b7db9:
    heading: Вы не имеете права на налоговый зачет за заработанный доход (EITC).
    p-3abe5f: Чтобы претендовать на EITC, у вас должен быть заработанный доход (например,
      заработная плата или чистый доход от самозанятости). Судя по доходу, который
      вы ввели, ваш заработанный доход за <fg-show path="/taxYear"/> год был равен
      нулю или меньше, поэтому вы не соответствуете требованиям для получения EITC.
    p-93a6b5: Для получения дополнительной информации см. <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Публикацию 596</a>, Налоговый зачет
      за заработанный доход.
    p-d04ce1: Вы не можете претендовать на налоговый зачет за заработанный доход,
      если ваш доход от инвестиций превышает <fg-show path="/eitcInvestmentIncomeLimit"/>.
    p-241cb8: 'Доход от инвестиций включает:'
    ul-0:
      li-12d3b7: Проценты (как облагаемые, так и необлагаемые налогом)
      li-0a9a83: Дивиденды
      li-e74f5d: Доход от прироста капитала
      li-e42b99: Некоторые виды арендной платы и авторских вознаграждений или
      li-7c0731: Чистый доход от пассивной деятельности
    p-9c482c: Для получения дополнительной информации см. <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p550">Публикацию 550</a>, Инвестиционные
      доходы и расходы. Чтобы рассчитать ваш общий инвестиционный доход, вам следует
      использовать Таблицу 1 в <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Публикации
      596</a>, Налоговый зачет за заработанный доход.
  modal-self-employment-deductions:
    heading: Каковы вычитаемые расходы для самозанятых?
    p-4838ea: Если вы были самозанятым, работали по краткосрочным контрактам или владели
      и управляли бизнесом, вы могли бы вычесть определенные деловые расходы из своего
      дохода, чтобы платить меньше налогов.
    p-f24032: 'Деловые расходы могут включать:'
    ul-0:
      li-6a4179: Расходы на домашний офис
      li-e2f63f: Расходы на легковые и грузовые автомобили
      li-7f4118: Аренда
      li-9f53a8: Оплата труда сотрудников и пенсии
      li-eaff1b: Страхование
      li-6c49ac: Проценты по долгам
      li-761662: Юридические и профессиональные услуги
      li-719fec: Налоги
      li-849c98: Поездки и питание
    p-9ff7b2: Эти вычеты отличаются от личных вычетов, которые вы сделали, если решили
      детализировать свои вычеты. Вы можете вычесть свои деловые расходы здесь и по-прежнему
      выбрать стандартный вычет позже.
    p-0651e4: <strong>Как проверить налоговую декларацию за прошлый год?</strong>
    p-a81df3: Если вы были самозанятым в <fg-show path="/taxYear"/> году, вы можете
      найти свои вычитаемые расходы в строке 28 Приложения C.
    p-4ca1ce: <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p334#en_US_2024_publink1000313491">Узнайте
      больше о деловых расходах</a>
  modal-estimate-interest-income-en:
    heading: Что такое процентный доход и как его рассчитать?
    p-cda131: Распространенные виды процентного дохода включают проценты, полученные от банковских счетов или от предоставления денег в долг.
    p-bc395c: <strong>Как проверить налоговую декларацию за прошлый год</strong>
    p-ec3579: 'Если вы получили процентный доход в <fg-show path="/taxYear"/> году, проверьте сумму в:'
    ul-0:
      li-7b5662: Строке 2b формы 1040 вашей федеральной налоговой декларации за <fg-show path="/taxYear"/> год
  modal-investment-income:
    heading: Инвестиционный доход
    p-b07c20: 'Инвестиционный доход для EITC включает:'
    ul-0:
      li-12d3b7: Проценты (как облагаемые, так и необлагаемые налогом)
      li-0a9a83: Дивиденды
      li-81f254: Доход от прироста капитала
      li-498151: Некоторые виды арендной платы и авторских вознаграждений или
      li-7c0731: Чистый доход от пассивной деятельности
    p-4c8f5e: Более подробную информацию см. <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-550">link</a>.
    p-df5956: 'Используйте Таблицу 1 в <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Публикации
      596</a>, Налоговый зачет за заработанный доход, чтобы рассчитать ваш инвестиционный
      доход, если какое-либо из следующих утверждений верно для 2025 года:'
    ul-1:
      li-0f3c1b: Вы подаете Приложение E (Форма 1040).
      li-782dae: Вы указываете доход от сдачи в аренду личного имущества, не используемого
        в торговле или бизнесе.
      li-e0ebc1: Вы подаете отчет по Форме 8814 (относящейся к выбору отчета о процентах
        и дивидендах на ребенка).
      li-a00ee1: Вы имеете доход или убыток от пассивной деятельности.
      li-143cd9: Вы подаете Форму 4797 (относящуюся к продаже коммерческой недвижимости).
  modal-other-taxable-income:
    heading: другие виды дохода
    p-ba0ae2: 'К другим видам дохода относятся:'
    ul-0:
      li-83fa6a: Распределение средств с индивидуального пенсионного счета (IRA) (кроме
        IRA Рота)
      li-7ae32a: Капитальные убытки (не прибыль)
      li-248c6a: 'Алименты, которые вы получали по соглашению о разводе или раздельном
        проживании, заключенному до 2020 года '
      li-6dac33: Арендная недвижимость, лицензионные платежи, товарищества, корпорации
        типа «S», трасты и т.д.
      li-13b588: Доход от аренды личного имущества, если вы занимались арендой с целью
        получения прибыли, но не занимались бизнесом по сдаче в аренду такого имущества
      li-ad5cc5: Налогооблагаемые распределения с образовательного сберегательного
        счета Коверделла (ESA) и заработок по программе отвечающего критериям обучения
      li-ece5cb: Заработок по соответствующей программе обучения
      li-0f1015: Призы, награды и выигрыши в азартных играх
      li-7e9756: Оплата услуг присяжных
      li-737e99: Дивиденды Постоянного фонда Аляски
      li-e833f1: Возмещение или другие суммы, полученные за предметы, вычтенные в
        предыдущем году, такие как медицинские расходы, налоги на недвижимость или
        проценты по ипотеке на дом
    p-fda53f: 'Не включать:'
    ul-1:
      li-0eb181: 'Алименты, которые вы получили на основании соглашения о разводе
        или раздельном проживании, заключенного после 2019 года '
      li-e46f68: Алименты на ребенка
      li-b144cb: Социальные пособия, такие как временная помощь нуждающимся семьям
        (TANF), талоны на приобретение продовольственных товаров, пособие на жилье
        по разделу 8
      li-63523b: Необлагаемые налогом выплаты по патронатному воспитанию
      li-a8d386: Не облагаемые налогом льготы для сотрудников, такие как помощь в
        получении образования
      li-f2a3d6: Льготы для ветеранов, включая реабилитационные выплаты VA
      li-080a95: Компенсация работникам
      li-57e5cb: Доход от страховки жизни, полученный в связи со смертью человека
      li-764dd4: Деньги или имущество, которые были унаследованы, завещаны вам или
        получены в подарок
      li-6f920a: Пособия по безработице
    p-745735: Публикация 525, Облагаемый и не облагаемый налогом доход
  modal-student-loan-interest:
    heading: Вычет процентов по студенческому кредиту
    p-3ac7ce: Укажите до <fg-show path="/maxStudentLoanDeduction"/> процентов, которые
      вы выплатили по соответствующей ссуде на обучение. Вы можете найти это в форме
      1098-E, если вы заплатили более $600 в виде процентов.
    p-e4b825: 'Ссуда должна покрывать соответствующие требованиям расходы на получение
      высшего образования для обучения в соответствующем учебном заведении. Кроме
      того, расходы должны:'
    ul-0:
      li-bb1c73: Для вас, вашего супруга или лица, которое находилось на вашем иждивении,
        когда вы брали кредит;
      li-829f26: Оплаченные или понесенные в течение разумного периода времени до
        или после того, как вы взяли кредит; и
      li-562ff0: За образование, предоставляемое в течение академического периода
        отвечающему требованиям студенту.
    p-75f422: Вы не можете претендовать на вычет, если по закону вы не обязаны производить
      выплаты по кредиту.
    p-1f2dd3: Более подробную информацию <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-970"
      class="usa-link">смотрите</a> .
  modal-educator-expenses:
    heading: Вычет на расходы преподавателя
    p-e117c8: 'Если вы учитель, укажите сумму до <fg-show path="/maxEducatorExpensesNonMFJ"/>
      (<fg-show path="/maxEducatorExpensesLimit"/>, если вы состоите в браке и оба
      супруга являются учителями) на невозмещенные расходы, такие как:'
    ul-0:
      li-8829c6: Плата за участие в курсах повышения квалификации
      li-751127: Книги и расходные материалы
      li-0c78ca: Компьютерное оборудование (включая соответствующее программное обеспечение
        и услуги)
      li-6ef6c8: Прочее оборудование
      li-6d4170: Дополнительные материалы, которые вы используете в классе
    p-86c6e4: 'Более подробную информацию можно найти на <a target="_blank" href="https://www.irs.gov/taxtopics/tc458"
      class="usa-link">сайте</a> '
  modal-ira-contributions:
    heading: Вычет по IRA
    p-5979d5: Введите любые взносы IRA, которые вы сделали помимо взносов в фонд заработной
      платы.
    p-a49375: 'Для получения дополнительной информации <a target="_blank" href="https://www.irs.gov/retirement-plans/ira-deduction-limits"
      class="usa-link">смотрите</a> '
  modal-self-employed-retirement:
    heading: 'SEP, УПРОШЕННЫЙ и другие отвечающие требованиям планы:'
    p-ca0a8f: 'Если вы ведете самостоятельную трудовую деятельность, вы рассчитываете
      свою компенсацию по соответствующему плану, вычитая из своего чистого дохода
      от самостоятельной трудовой деятельности следующее:'
    p-0d133f: 'Чтобы соответствовать требованиям, вы или ваш супруг/супруга должны были:'
    ul-0:
      li-6c246a: Вычитаемая часть налога SE из вашей декларации по форме 1040, страница
        1, и
      li-a2595a: Сумма взноса в пенсионный план из вашей формы 1040, страница 1, в
        строке для самозанятых SEP, УПРОЩЕННЫЙ и соответствующих планов
      li-f6cddf: Иметь компанию с ограниченной ответственностью (LLC)
    p-3622b4: 'Соответствующие планы могли включать:'
    ul-1:
      li-ff93fe: План упрощенного пенсионного обеспечения сотрудников (SEP)
      li-200ab4: План стимулирования сбережений для сотрудников (SIMPLE)
      li-e7dbe4: Solo-401(k)
      li-765afa: Другие квалифицированные пенсионные планы
    p-af5a4a: <strong>Не включайте</strong> взносы на Индивидуальный пенсионный счет (IRA).
    p-add56c: Вы должны были использовать специальное правило для расчета взносов в пенсионный план для себя.
    p-3248f2: Самозанятые лица - расчет взноса и вычета по пенсионному плану
  modal-hsa-deductions:
    heading: 'Вычет с медицинского сберегательного счета:'
    p-2ab752: Введите любые взносы на Медицинский сберегательный счет (HSA), которые
      вы не включили в раздел HSA, FSA или другой «план кафетерия» выше.
    p-a7d9fc: О публикации 969 Сберегательные медицинские счета и другие льготные
      планы медицинского страхования
  modal-alimony-paid:
    heading: Выплаченные алименты
    p-fa1de9: Если вы выплачивали алименты или содержание супругу(е) после заключения
      юридического соглашения о раздельном жительстве по решению суда, принятого до
      1 января 2019, и в решении не было указано, что вы не можете вычитать свои выплаты,
      введите здесь сумму, которую вы выплатили в течение .
    p-7b97e1: 'Не включайте суммы, за которые вы заплатили:'
    p-7948e4: <strong>Поддержка семьи или детей</strong>
    p-358bc5: Также не включайте суммы, если решение суда было изменено и гласит,
      что вы не можете вычитать свои платежи.
    p-06a405: Алименты или отдельное содержание, выплачиваемые по решению суда, вынесенному после 31 декабря 2024 года
    p-4b335c: 'Для получения дополнительной информации перейдите по <a target="_blank"
      href="https://www.irs.gov/taxtopics/tc452" class="usa-link">ссылке</a> '
  modal-early-withdrawal:
    heading: Штраф за досрочное изъятие сбережений
    p-7e8d5b: Если вы снимете средства с депозитного сертификата или другого счета
      с отложенным процентом до наступления установленного срока, с вас может быть
      взыскан штраф. Вы можете найти этот штраф в вашей форме 1099-INT в Box 2. Введите
      эту сумму здесь.
  modal-moving-expenses:
    heading: Издержки в связи с переездом
    p-6f18fd: 'Если вы служите в вооруженных силах на действительной службе, и военные
      приказали вам постоянно менять место службы, укажите здесь все расходы на переезд,
      которые военные не возместили вам. Издержки в связи с переездом включают:'
    ul-0:
      li-60efa3: Прямой переезд из старого дома в новый
      li-efbbb1: Стоимость упаковки и перевозки ваших личных вещей
    p-6536cb: 'Для получения дополнительной информации перейдите по <a target="_blank"
      href="https://www.irs.gov/taxtopics/tc455" class="usa-link">ссылке</a> '
  modal-employee-business-expenses:
    heading: Определенные Расходы на сотрудников, связанные с производственной или
      коммерческой деятельностью
    p-c92011: 'Если вы:'
    ul-0:
      li-9bde67: Резервист вооруженных сил
      li-053ac1: Соответствующий требованиям исполнитель
      li-e03b09: Должностное лицо штата или местного органа власти на платной основе
      li-0d1488: Работник с трудовыми расходами, связанными с потерей трудоспособности
    p-cc9b68: Вы можете включить расходы, которые являются привычными и принятыми
      в вашей сфере торговли, бизнеса или профессии, или расходы на вещи, которые
      полезны и подходят для вашего бизнеса.
    p-d46373: Если вы не подходите ни под одну из перечисленных категорий, вы не можете
      требовать поправок на эти расходы.
    p-eb68a5: Более подробную информацию и список соответствующих расходов см. <a
      target="_blank" href="https://www.irs.gov/forms-pubs/about-form-2106" class="usa-link">в</a>
      .
  modal-self-employed-health-insurance:
    heading: 'Вычет на медицинское страхование для самозанятых:'
    p-598073: Введите сумму, которую вы заплатили за медицинское страхование для себя,
      своего супруга или супруги и своих иждивенцев, если вы ведете собственный бизнес.
    p-d60394: Соответствующими критериям страховыми премиями были взносы на медицинское, стоматологическое страхование, страхование зрения и долгосрочный уход. Полис мог быть на вас, вашего супруга/супругу и ваших иждивенцев. Полис также мог покрывать вашего ребенка, которому на конец года не исполнилось 27 лет, даже если этот ребенок не был вашим иждивенцем.
    p-13dece: Для получения дополнительной информации см. главу <a target="_blank"
      href="https://www.irs.gov/instructions/i7206" class="usa-link">6</a> .
/qualifying-children:
  title: Отвечающие требованиям дети
  h2-dbaf54: Отвечающие требованиям дети
  p-9b177d: Согласно вашим предыдущим данным, у вас нет детей, отвечающих требованиям.
    Если это не так, пожалуйста, вернитесь к <a class="usa-link" href="/app/eitc/filing-status/">Filing
    Status</a> и измените свои ответы.
  p-c1a0dd: Перейдите к следующему шагу, чтобы увидеть свои результаты.
  p-3178be: 'На данном этапе мы выясним, сколько ваших детей или других родственников
    могут быть квалифицированы как дети, отвечающие требованиям для подачи заявления
    и расчета EITC. Вы можете заявить до трех детей, соответствующих установленным
    требованиям, на получение EITC. '
  p-e28c1e: Вы можете заявить до трех детей, соответствующих установленным требованиям,
    на получение EITC.
  p-adf161: Чтобы иметь право на получение EITC, у вас должен быть как минимум один
    ребенок, соответствующий требованиям.
  collection/familyAndHousehold:
    /familyAndHousehold/*/livedWithYouUS:
      question: Проживал ли этот ребенок с вами более половины <fg-show path="/taxYear"/>
        года в США?
      modalLink: <modal-link for="modal-residency">Что считается временем проживания
        с вами?</modal-link>
    fg-alert-b7d816:
      heading: Вы не имеете права на получение налогового зачета за заработанный доход
      p-7666ea: Более подробную информацию смотрите <a target="_blank" class="usa-link"
        href="https://www.irs.gov/publications/p596">Publication 596</a>, Earned Income
        Credit..
    /familyAndHousehold/*/someoneElseCanClaim:
      question: Может ли другое лицо использовать данные этого ребенка для оформления
        налогового зачёта за заработанный доход (EITC)?
      modalLink: <modal-link for="modal-claimed-someone-else">Что делать, если на
        них может претендовать более одного человека?</modal-link>
    /familyAndHousehold/*/isClaimingQCRegardless:
      question: Вы не можете претендовать на получение EITC на ребенка, если на него
        также претендуют определенные лица, имеющие на это право. Вы все еще хотите
        претендовать на этого ребенка?
      modalLink: <modal-link for="modal-claimed-someone-else">Что если на них может
        претендовать более одного человека?</modal-link>
    /familyAndHousehold/*/marriedFilingJointly:
      question: Женат ли этот ребенок и будет ли он подавать совместную декларацию
        со своим супругом или супругой за <fg-show path="/taxYear"/>?
      modalLink: <modal-link for="modal-joint-return">Могу ли я претендовать на кого-то,
        кто подает совместную декларацию?</modal-link>
    /familyAndHousehold/*/mfjForRefundOnly:
      question: Этот ребенок подает совместную декларацию за <fg-show path="/taxYear"/>
        только для того, чтобы потребовать возврата удержанных налогов или уплаченных
        расчетных налогов, и не будет претендовать на какие-либо налоговые зачеты,
        такие как EITC?
      modalLink: <modal-link for="modal-joint-return-with-another-person-exception">Когда
        вы можете претендовать на кого-то, кто подает совместную декларацию?</modal-link>
    /familyAndHousehold/*/isPermanentlyDisabled:
      question: Является ли этот ребенок инвалидом с постоянной или временной инвалидностью?
      modalLink: <modal-link for="modal-disabled">Что считается постоянной и полной
        инвалидностью?</modal-link>
    /familyAndHousehold/*/relationship:
      question: 'Выберите отношение этого ребенка к вам:'
      modalLink: <modal-link for="modal-relationship">Кто считается пасынком/падчерицей,
        приемным ребенком или ребенком, взятым на воспитание?</modal-link>
      options:
        childStepFoster:
          name: Ребенок, пасынок/падчерица, приемный или переданный на воспитание
            ребенок
        sibling:
          name: Родные братья и сестры или сводные братья и сестры
        descendant:
          name: 'Внук, племянница или племянник '
        none:
          name: Ничего из вышеперечисленного
    /familyAndHousehold/*/ageRange:
      question: Сколько лет было этому ребенку в конце <fg-show path="/taxYear"/>?
      options:
        under19:
          name: 18 лет и младше
        between19And23:
          name: Между 19 и 23
        over24:
          name: 24 и старше
    /familyAndHousehold/*/isFullTimeStudent:
      question: Был ли ребенок студентом дневного отделения в течение какой-либо части
        любых 5 месяцев в течение года?
      modalLink: <modal-link for="modal-student">Как узнать, являются ли они студентами
        очной формы обучения?</modal-link>
    /familyAndHousehold/*/isQCYoungerThanSelfOrSpouse:
      question: Иждивенец младше вас?
      modalLink: <modal-link for="modal-age-comparison">Почему мы спрашиваем, моложе
        ли они <span condition="/isFilingStatusMFJ" operator="isFalse">вас?</span><span
        condition="/isFilingStatusMFJ" operator="isTrue">вас или вашего супруга(и)?</span></modal-link>
    /familyAndHousehold/*/validSSN:
      question: Есть ли у данного ребенка действующее социальное страхование, выданное
        на дату подачи декларации (включая продление) или до этой даты?
      modalLink: <modal-link for="modal-valid-ssn-qc">Требуется действительный номер
        социального обеспечения</modal-link>
    fg-alert-a004cd:
      heading: Пожалуйста учтите
      p-8374d8: Данный отвечающий критериям ребенок является вашим. Но, поскольку
        у него/неё нет действительного SSN, данный ребёнок не даёт вам право на получение
        повышенного зачета за заработанный доход.
    h2-eaf308: Этот ребенок соответствует требованиям для целей подачи заявления на
      получение EITC и его расчета.
  p-5aea65: Согласно вашим данным, у вас есть 3 ребенка с действующими номерами социального
    страхования, и вы достигли максимального числа таких детей, на которых можно претендовать
    для получения EITC.
  fg-alert-9510e7:
    heading: Требование к ребенку, соответствующему требованиям
    p-b6bd9e: Вы не имеете права на оформление EITC при отсутствии ребенка, соответствующиего
      требованиям, за исключением ситуации, когда вы или ваш супруг(-а) при подаче
      совместной декларации находитесь в возрасте от 25 до 64 лет.
    p-93a6b5: Более подробную информацию смотрите <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Publication 596</a>, Earned Income
      Credit..
  fg-alert-64891c:
    heading: Вы не имеете права на налоговый зачет за заработанный доход (EITC).
    p-cdf53e: Исходя из введенных вами сумм, вы не можете претендовать на налоговый
      зачет за заработанный доход, поскольку ваш доход превышает лимит для вашего
      статуса подачи документов и количества детей, отвечающих требованиям.
    p-93a6b5: Более подробную информацию смотрите <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Publication 596</a>, Earned Income
      Credit..
  h2-34370a: Согласно вашим данным, у вас есть <fg-show path="/eitcQualifyingChildren"/>
    детей, соответствующих установленным требованиям, с действительными номерами социального
    страхования.
  modal-residency:
    heading: Тест на резидентство
    h3-7c913b: Жил с вами
    p-ff8f12: Ребенок, соответствующий требованиям, должен проживать в одном с вами
      основном доме в течение более половины <fg-show path="/taxYear"/> года, и этот
      дом должен находиться в США. Соединенные Штаты Америки включают в себя 50 штатов
      и округ Колумбия. В это число не входят Пуэрто-Рико и территории США, такие
      как Гуам. Для получения Налогового зачета за заработанный доход (EITC) Налоговое
      управление США рассматривает американских военнослужащих, находящихся за пределами
      США на длительной действительной службе, как имеющих основной дом в США в течение
      этого периода службы.
    h3-46d8f4: Рождение или смерть ребенка
    p-e27b79: Если ребенок родился или умер в <fg-show path="/taxYear"/>, ребенок
      должен прожить с вами более половины части года, в течение которого он был жив.
    h3-16617c: Усыновленные и приемные дети
    p-c623b2: 'Если вы усыновили ребенка в <fg-show path="/taxYear"/> году, либо ребенок
      был законно переселён к вам для законного усыновления в <fg-show path="/taxYear"/>
      году, или же ребенок является приемным, он соответствует требованиям и был переселён
      к вам в <fg-show path="/taxYear"/>3 году, то ваше основное место жительства
      должно быть основным местом жительства этого ребенка более половины времени
      с момента его усыновления или переселения к вам в <fg-show path="/taxYear"/>4
      году. '
    h3-6839b6: Временное отсутствие
    p-658cca: 'Для получения EITC временное отсутствие засчитывается как время, прожитое
      с вами. Примеры включают:'
    ul-0:
      li-76cf60: Болезнь или госпитализация
      li-1b3986: Посещение школы, отпуск, бизнес или служба в армии
      li-dae417: Содержание в исправительном учреждении для несовершеннолетних
      li-de99d6: Похищенный ребенок
    p-8b99ed: 'Этот выбор может увеличить или уменьшить ваш EITC. Для получения дополнительной
      информации <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">смотрите</a> '
  modal-joint-return:
    heading: Совместная налоговая декларация с другим лицом
    p-9b8921: Как правило, вы не можете заявить состоящего в браке человека в качестве
      ребенка, отвечающего требованиям для получения EITC, если он или она подает
      совместную декларацию.
    p-bdfc89: Публикация 596, Налоговый зачет за заработанный доход, проверка совместно
      подаваемой налоговой декларации
  modal-joint-return-with-another-person-exception:
    heading: Совместная налоговая декларация с другим лицом Исключение
    p-93a25e: Вы можете указать ребенка, состоящего в браке и подающего совместную
      декларацию, в качестве ребенка, отвечающего требованиям для получения EITC,
      если ребенок и его супруг(а) подают совместную декларацию только для того, чтобы
      потребовать возврата удержанных подоходных налогов из их заработной платы или
      уплаченных ими расчетных налогов. Они не могут требовать в своей декларации
      каких-либо зачетов, таких как EITC.
    p-bdfc89: Публикация 596, Налоговый зачет за заработанный доход, проверка совместно
      подаваемой налоговой декларации
  modal-disabled:
    heading: Постоянная и полная инвалидность
    p-a09e23: 'Для EITC мы считаем ребенка постоянно и полностью нетрудоспособным,
      если верны оба следующих условия:'
    ul-0:
      li-35e112: Ребенок не может выполнять значительные обязанности в течение определенного
        периода времени, работая за плату или прибыль в конкурентной рабочей ситуации
        за минимальную заработную плату из-за физического или психического состояния,
        и
      li-f9618f: Врач определяет, что состояние длится или, как можно ожидать, будет
        продолжаться не менее года или может привести к смерти
    p-de127e: Публикация 596, Зачет за заработанный доход, постоянная и полная инвалидность
  modal-relationship:
    heading: Определения родственных связей с ребенком
    h3-523a2e: Пасынок или падчерица
    p-3a1769: Сводные отношения - это отношения, возникшие в результате брака. Для
      EITC отношения, возникшие в браке, такие как падчерица, пасынок, сводный брат
      или сводная сестра, не прекращаются, если брак заканчивается.
    h3-3cc097: Приемный ребенок
    p-165b15: К усыновленному ребенку всегда относятся как к родному. Это понятие
      включает ребенка, который был передан вам на законных основаниях на усыновление.
    h3-872822: Переданный на воспитание ребенок
    p-d91342: Вы можете претендовать на приемного ребенка только в том случае, если
      он был передан вам уполномоченным агентством по устройству детей на воспитание
      или по решению суда.
    h3-2fd110: Уполномоченное агентство по трудоустройству
    p-b80621: Этот термин включает в себя агентство штата или местного правительства,
      или правительство индейского племени. Сюда также входит организация, освобожденная
      от уплаты налогов и имеющая лицензию штата или правительства индейского племени.
  modal-student:
    heading: Студент-очник
    h3-f803ae: Студент-очник
    p-ef6d3a: Для того, чтобы считаться студентом очной формы обучения, он должен
      быть зачислен на то количество часов или курсов, которое школа считает очной
      формой обучения.
    p-69b838: Студенты, которые работают на «кооперативных» работах в частной отрасли
      в рамках регулярного курса аудиторных и практических занятий в школе, считаются
      студентами дневного отделения.
    h3-754ddf: Школа определена
    p-dfaecc: 'Для EITC школа - это:'
    ul-0:
      li-5f78b0: Начальная школа
      li-f8aab3: Младшая или старшая средняя школа
      li-39d2fa: Колледж или университет
      li-96892f: Техническая, торговая или механическая школа
    p-986cc5: 'Школа не является:'
    ul-1:
      li-775eb9: Курс обучения на рабочих местах
      li-b2e8f2: Заочная школа
      li-767c35: Школа, предлагающая курсы только через Интернет
    p-81198a: Более подробную информацию смотрите <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Publication 596</a>, Earned Income
      Credit..
  modal-valid-ssn-qc:
    heading: Действительный номер социального страхования для детей, отвечающих требованиям
    p-d68f7a: Размер вашего EITC зависит от количества отвечающих требованиям детей,
      у которых есть действительные SSN. Каждый ребенок или родственник, на которого
      вы претендуете для целей расчета суммы EITC, должен иметь действительный номер
      социального обеспечения (SSN), выданный Администрацией социального обеспечения
      на дату подачи налоговой декларации (включая продление) или ранее.
    p-0464ad: Для EITC SSN считается действительным, если на карте социального обеспечения
      не стоит надпись «Не действителен для трудоустройства», а номер был выдан исключительно
      для того, чтобы получатель SSN мог подать заявление или получить пособие, финансируемое
      из федерального бюджета.  Примером пособия, финансируемого из федерального бюджета,
      является программа Медикейд.
    p-a708ff: Мы принимаем карту социального обеспечения, на которой написано «Действительно
      для работы с разрешением DHS», только если разрешение DHS все еще действительно.
    p-558a40: 'Для получения налогового зачета за заработанный доход (EITC) мы не
      принимаем:'
    ul-0:
      li-5e5f3e: IRS Индивидуальный идентификационный номер налогоплательщика (ITIN)
      li-5fc9b7: Индивидуальный номер налогоплательщика для приемного ребенка (ATIN)
      li-19d3d7: Номер социального обеспечения, выданный исключительно для того, чтобы
        получатель SSN мог подать заявление или получить пособие, финансируемое из
        федерального бюджета, например, Медикейд
  modal-claimed-someone-else:
    heading: Заявлено в чужой налоговой декларации
    p-9b277e: Только один человек может заявить на каждого ребенка для получения EITC.
      Если на ребенка претендует более одного человека, то IRS применяет решающее
      правило.
    p-911aff: Публикация 596, Налоговый зачет за заработанный доход, Ваш отвечающий
      требованиям ребенок не может быть использован более чем одним лицом
  modal-age-comparison:
    heading: Ребенок должен быть младше вас или вашего супруга (супруги)
    p-626c78: Для того чтобы ребенок соответствовал критериям, он должен быть младше
      вас, если только ребенок не является постоянным и полностью нетрудоспособным
      в любое время в течение <fg-show path="/taxYear">.
    p-1a035f: Для получения дополнительной информации см. <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596#en_US_2019_publink1000298140">Публикацию
      596</a>, Налоговый зачет за заработанный доход, Возрастной критерий.
/results:
  title: Результаты
  h2-88e7ef: Ваши результаты
  fg-alert-64891c:
    heading: Вы не имеете права на получение налогового зачета за заработанный доход
    p-cdf53e: Исходя из предоставленной вами информации, вы не имеете права на получение
      налогового зачета за заработанный доход, поскольку ваш заработанный доход превышает
      предел, установленный для вашего статуса подачи налоговой декларации и числа
      детей, отвечающих требованиям.
    p-93a6b5: Для получения дополнительной информации см. <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Публикацию 596</a>, Налоговый зачет
      за заработанный доход.
  p-578b13: 'На основании предоставленной вами информации, вы имеете право на получение
    налогового зачета на заработанный доход в размере:'
  p-adf6bb: Данная сумма зачета уменьшит ваши налоги за <fg-show path="/taxYear"/>,
    когда вы подадите налоговую декларацию в IRS. Если зачет уменьшит ваш налог менее
    чем до нуля, вы можете получить возмещение.
  h2-259962: 'Следующие шаги: как подать заявление на получение EITC'
  p-508e29: Чтобы получить расчетную сумму в размере <strong><fg-show path="/earnedIncomeCredit"/></strong>*,
    вы должны подать свою федеральную налоговую декларацию за <fg-show path="/taxYear"/>.
    Если вы претендуете на получение EITC, по закону IRS не может выдать вам возврат
    налога до середины февраля <fg-show path="/nextTaxYear"/>, даже ту часть, которая
    не связана с EITC.
  h3-54f664: Онлайн
  p-a5939a: Если вы хотите подать свои налоги онлайн, вы имеете право воспользоваться
    программой IRS Free File. Обратите внимание, что программа доступна только с января
    по октябрь.
  p-3ef53a: <a target="_blank" class="usa-link" href="https://www.irs.gov/filing/free-file-do-your-federal-taxes-for-free">
    Подать онлайн сейчас<span class="usa-sr-only"> (opens in a new tab)</span>        </a>
  h3-792a4e: Очно
  p-787398: Если вы предпочитаете работать с налоговым специалистом лично, у вас есть
    возможность сделать это в клинике программы IRS по оказанию безвозмездной помощи
    по вопросам подоходного налогообложения (VITA).
  p-25a83e: <a target="_blank" class="usa-link" href="https://www.irs.gov/individuals/free-tax-return-preparation-for-qualifying-taxpayers">
    Бесплатная личная помощь<span class="usa-sr-only"> (opens in a new tab)</span>        </a>
  h3-c7457b: Бумажные формы
  p-b8834f: Поскольку у вас есть ребенок, соответствующий требованиям, вы должны заполнить        <a
    target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-schedule-eic-form-1040">
    Приложение EIC (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        и
    прикрепить его к вашей        <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    Форме 1040 (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        или        <a
    target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    Форме 1040-SR (PDF)<span class="usa-sr-only"> (opens in a new tab)</span>        </a>        за
    налоговый год <fg-show path="/taxYear"/>.
  h2-a3da4a: Краткий обзор вашей информации
  p-5a6eac: В таблице ниже приведена сводка информации, которую вы ввели в инструмент.
    Если эти данные неверны, пожалуйста, нажмите кнопку редактировать, чтобы обновить
    их, иначе это может повлиять на ваши результаты.
  table-0:
    tbody-0:
      tr-0:
        th-537c66: Год
