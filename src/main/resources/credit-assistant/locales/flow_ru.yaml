  p-308236: На этом этапе мы оценим ваш и вашего супруга совместный заработанный доход,
    скорректированный валовой доход и любые поправки к нему.
  p-100130: Выберите и введите свои доходы и поправки за <fg-show path="/taxYear"/>.
    Выберите только один пункт для каждого источника.
  p-bb8818: Обязательно укажите также доход вашего супруга и поправки.
