  h3-20a2b1: другие виды дохода
  fg-detail-89425f:
    summary: Доход от инвестиций
    /investmentIncomeTotal:
      question: Доход от инвестиций
      modalLink: '<modal-link for="modal-investment-income">Общий инвестиционный доход:
        </modal-link>'
  fg-detail-fbe1af:
    summary: Доход от инвестиций
    /pensionsIncomeTotal:
      question: Доход от инвестиций
      modalLink: <modal-link for="modal-taxable-pension">Что такое налогооблагаемая
        часть пенсии?</modal-link>
  fg-detail-3fa626:
    summary: Страхование по безработице
    /unemploymentIncome:
      question: Страхование по безработице
      modalLink: <modal-link for="modal-unemployment-compensation">Что считается страхованием
        от безработицы?</modal-link>
  fg-detail-0fb46a:
    summary: Доход от выплат по программам социального обеспечения
    /socialSecurityIncome:
      question: Доходы социального обеспечения или льготы при уходе работника железнодорожного
        транспорта на пенсию
      modalLink: <modal-link for="modal-social-security">Что считается пособиями по
        социальному обеспечению и эквивалентными пособиями при выходе на пенсию на
        железнодорожном транспорте?</modal-link>
  fg-detail-d994db:
    summary: Стипендия или грант, которые должны учитываться как доход
    /taxableScholarship:
      question: Стипендия или грант, которые должны учитываться как доход
      modalLink: <modal-link for="modal-scholarship-grants">Что считается стипендией
        или грантом?</modal-link>
  fg-detail-50ec28:
    summary: Оплата, полученная за работу в качестве заключенного в исправительном
      учреждении
    /inmatePay:
      question: Оплата, полученная за работу в качестве заключенного в исправительном
        учреждении
      modalLink: <modal-link for="modal-inmate-pay">Оплата, полученная за работу в
        качестве заключенного в исправительном учреждении</modal-link>
  fg-detail-7a5ac3:
    summary: другие виды дохода
    /nonSpecificOtherIncome:
      question: другие виды дохода
      hint: Вы должны ввести одну общую сумму для всех остальных доходов.
      modalLink: <modal-link for="modal-other-taxable-income">другие виды дохода</modal-link>
  h3-9fa8b1: Корректировки
  p-233dd3: Выберите и введите любой из этих типов поправок на доход, который вы имели
    в <fg-show path="/taxYear"/>. Не вводите одну и ту же поправку в нескольких местах.
  fg-detail-2c7735:
    summary: Вычет процентов по студенческому кредиту
    /studentLoanInterestAmount:
      question: Проценты по студенческому кредиту, которые <span condition="/isFilingStatusMFJ"
        operator="isFalse">вы</span>  <span condition="/isFilingStatusMFJ" operator="isTrue">вы
        и ваш супруг(а)</span> заплатили в <fg-show path="/taxYear"/> году
      hint: (макс. <fg-show path="/maxStudentLoanDeduction"/>)
      modalLink: <modal-link for="modal-student-loan-interest">Вычет процентов по
        студенческому кредиту</modal-link>
  fg-detail-9166fe:
    summary: Соответствующие требованиям расходы на образование
    /educatorExpenses/:
      question: Расходы преподавателя, которые <span condition="/isFilingStatusMFJ"
        operator="isFalse">вы</span><span condition="/isFilingStatusMFJ" operator="isTrue">вы
        и ваш супруг(а)</span> заплатили в <fg-show path="/taxYear"/> году
      hint: (макс. <fg-show path="/maxEducatorExpensesLimit"/>)
