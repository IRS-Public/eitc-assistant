/:
  title: Общая информация
  h2-5e286b: Общая информация
  p-c2c8a0: Ответьте на несколько коротких вопросов о себе, чтобы узнать, соответствуете
    ли вы требованиям.
  /chosenTaxYear:
    question: 'Выберите налоговый год, за который вы хотите проверить свое право на
      получение EITC:'
    modalLink: <modal-link for="modal-tax-year">Какой год мне следует использовать?</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien:
    question: Были ли вы гражданином США или иностранцем-резидентом в течение всего
      <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-citizen">Соответствую ли я требованиям в качестве
      гражданина или резидента США для получения EITC?</modal-link>
    options:
      'true':
        name: Да
      'false':
        name: Нет
  fg-alert-8b7db9:
    heading: Вы не имеете права на налоговый зачет за заработанный доход (EITC).
    p-091688: Вы должны быть гражданином или иностранцем, проживающим в США, чтобы
      претендовать на получение налогового зачета за заработанный доход. Для определения
      того, являетесь ли вы иностранцем-резидентом США в течение всего года, смотрите
      <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-519"> Публикация 519, Руководство по налогообложению США для иностранцев.</a>
    p-f72c3e: ' Выберите да, если вы подаете совместную декларацию с супругом за
      <fg-show path="/taxYear"/>, и вы или ваш супруг были гражданином или резидентом
      США в течение всего года.'
    p-b85d77: Вы не можете претендовать на получение EITC, потому что у вас нет действительного
      номера социального обеспечения, выданного на дату подачи налоговой декларации
      или до нее.
    p-93a6b5: Более подробную информацию смотрите <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Publication 596</a>, Earned Income
      Credit..
    p-4c0c0d: Вы не можете претендовать на налоговый зачет за заработанный доход,
      если подаете <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">Форму
      2555</a>, Доход, заработанный за рубежом.
    p-236b69: Более подробную информацию смотрите в Публикация 54, Руководство по налогообложению для граждан США и иностранцев-резидентов за рубежом,
    p-5e637b: Вы не имеете права на получение EITC, если вы являетесь чьим-либо ребенком,
      имеющим право на получение EITC.
    p-ec145e: Дополнительную информацию о том, может ли кто-либо заявить вас в качестве
      ребенка, соответствующего требованиям для получения EITC, см. в <a target="_blank"
      class="usa-link" href="https://www.irs.gov/publications/p596">Публикации 596</a>,
      Налоговый зачет за заработанный доход, Вы не можете быть ребенком, соответствующим
      требованиям, другого налогоплательщика.
    p-363ef2: Вы не имеете права на получение EITC, если вы являетесь чьим-либо иждивенцем,
      до тех пор, пока у вас нет ребенка, имеющего право на получение EITC.
  /hasValidSSN:
    question: Имеете ли вы действительный номер социального обеспечения, который был
      выдан на дату или до даты подачи вашей налоговой декларации за <fg-show path="/taxYear"/>
      (включая продления)?
    modalLink: <modal-link for="modal-valid-ssn-filer">Требуется действительный номер
      социального обеспечения</modal-link>
    options:
      'true':
        name: Да
      'false':
        name: Нет
  /hasForeignEarnedIncome:
    question: Подаете ли вы форму 2555, Доход от трудовой деятельности за рубежом?
    modalLink: <modal-link for="modal-foreign-income">Доход, полученный за рубежом,
      исключаемый из валового дохода</modal-link>
    options:
      'true':
        name: Да
      'false':
        name: Нет
  /isClaimedAsDependent:
    question: Будет ли кто-то другой заявлять вас как иждивенца или ребенка, имеющего
      право на получение EITC, в своей налоговой декларации?
    modalLink: <modal-link for="modal-claimed-dependent">Вы как иждивенец или отвечающий
      требованиям ребенок</modal-link>
    options:
      'true':
        name: Да
      'false':
        name: Нет
  /ageRange:
    question: Пожалуйста, выберите диапазон, который описывает ваш возраст на конец
      <fg-show path="/taxYear"/>.
    options:
      under24:
        name: До 24 лет включительно
      age25to64:
        name: В возрасте от 25 до 64 лет включительно
      65andOlder:
        name: 65 лет и старше
  modal-tax-year:
    heading: Налоговый год
    p-aa5a47: 'Для заработной платы и других доходов, заработанных в:'
    ul-0:
      li-28dd34: 2025, выберите 2025
      li-174a8b: 2024, выберите 2024
      li-0a25dc: 2023, выберите 2023
  modal-citizen:
    heading: Гражданин США или постоянно проживающий иностранец
    p-18e680: Если вы не являетесь гражданином США, вы считаетесь иностранцем.
    p-fe70ca: Вы считаетесь иностранцем-резидентом для получения EITC, если у вас
      есть грин-карта или вы прожили в США более определенного количества дней.
    p-2c8f8f: Для получения дополнительной информации и важных исключений, см. <a
      target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-519">Публикация 519, Руководство по налогообложению США для иностранцев.</a>.
  modal-valid-ssn-filer:
    heading: Действительный номер социального страхования
    p-527528: Вы должны иметь действительный номер социального страхования (SSN),
      выданный Управлением социального страхования не позднее установленной даты подачи
      налоговой декларации за <fg-show path="/taxYear"/> год (включая продления).
    p-45ae0e: Если на вашей карточке социального страхования указано «Действительна
      для работы с разрешением DHS» или «Действительна для работы с разрешением INS»,
      то это ваш действительный номер социального страхования, если разрешение все
      еще действительно.
    p-558a40: 'Для получения налогового зачета за заработанный доход (EITC) мы не
      принимаем:'
    ul-0:
      li-5e5f3e: IRS Индивидуальный идентификационный номер налогоплательщика (ITIN)
      li-5fc9b7: Индивидуальный номер налогоплательщика для приемного ребенка (ATIN)
      li-9f487b: Номер социального обеспечения, выданный исключительно для того, чтобы
        получатель SSN мог подать заявление или получить пособие, финансируемое из
        федерального бюджета, например, Медикейд
      li-a69a30: Номер социального страхования, выданный исключительно для подачи
        заявления на получение или получения пособия, финансируемого из федерального
        бюджета, такого как Medicaid
    p-f554f7: Для получения дополнительной информации о действительном номере социального
      страхования см. Публикацию № 596.
  modal-foreign-income:
    heading: Доход, полученный за рубежом, исключаемый из валового дохода
    p-f45b03: 'Это относится к доходам, которые вы заработали за пределами США, округа
      Колумбия, владений или территорий США и которые вы решили исключить <a target="_blank"
      class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">в</a> '
  modal-claimed-dependent:
    heading: Вы как иждивенец или отвечающий требованиям ребенок
    p-faf8d8: В большинстве случаев вы не можете быть иждивенцем или отвечающим требованиям
      ребенком другого налогоплательщика и претендовать на получение EITC.
    p-98d6db: В большинстве случаев, если вам меньше 19 лет или вы студент до 24 лет
      и проживаете с родителями или другими родственниками в США более половины года,
      выберите <strong>да</strong>.
    p-038f13: Если вы состоите в браке и подаете совместную налоговую декларацию,
      вы не можете быть заявлены в качестве иждивенца, за исключением случаев, когда
      вы подаете совместную декларацию исключительно для получения возмещения удержанных
      подоходных налогов или уплаченных предполагаемых налогов.
    p-ceda6c: 'Для получения дополнительной информации о том, может ли кто-то претендовать
      на вас как на иждивенца, <a target="_blank" class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">перейдите</a> '
    p-d11380: Более подробную информацию о том, может ли кто-то заявить вас как ребенка,
      имеющего право на получение EITC, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2021_publink1000298540">смотрите</a>
      .
    p-16aba9: Позже мы спросим о детях или родственниках, на которых вы можете претендовать.
  modal-primary-claimed-as-dependent:
    heading: Как узнать, являюсь ли я чьим-то иждивенцем?
    p-d3187d: Если в <fg-show path="/taxYear"/> году вы находились на содержании у кого-то другого (кроме вашего супруга/супруги), этот человек может указать вас в качестве иждивенца в своей федеральной налоговой декларации.
    p-762495: 'Существует несколько факторов, определяющих, может ли кто-либо указать вас как иждивенца, в том числе:'
    ul-0:
      li-b17276: Ваше родство с этим человеком
      li-c82d5e: Насколько они обеспечивали вас финансово и в других отношениях
      li-5a5073: Жили ли вы с ними и как долго
    p-752de3: Ознакомьтесь с Таблицей 5 в <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000196863">Публикации IRS 501</a>, чтобы определить, может ли кто-то другой указать вас как иждивенца.
    p-5a0201: Имейте в виду, что вы не являетесь чьим-либо иждивенцем, если вы оплачивали более половины своего собственного содержания (или если это делал ваш супруг/супруга).
  modal-confirm-tax-year-change:
    heading: 'Внимания:'
    p-31c7da: Изменение <strong>года</strong> приведет к очистке ранее введенных данных.
      Вы все еще хотите продолжить?
    button-70d9be: Подтвердить
    button-ea4788: Отменить
/filing-status:
  title: Статус подачи документов
  h2-c01d87: Статус подачи документов
  p-9bda8f: На этом шаге вас спросят о том, как вы планируете подавать свои налоги
    за <fg-show path="/taxYear"/>.
  /knowsFilingStatus:
    question: Знаете ли вы, какой статус подачи документов вы будете использовать
      при подаче налогов за <fg-show path="/taxYear"/>?
  /initialFilingStatus:
    question: 'Пожалуйста, выберите статус подачи документов, который вы будете использовать
      при подаче налогов за <fg-show path="/taxYear"/>:'
    modalLink: <modal-link for="modal-filing-status">Какой статус подачи мне следует
      использовать?</modal-link>
    options:
      single:
        name: Не женат/не замужем
      marriedFilingJointly:
        name: Супруги подающие документы совместно
      marriedFilingSeparately:
        name: Супруги подающие документы раздельно
      headOfHousehold:
        name: Глава семьи
      qualifiedSurvivingSpouse:
        name: Соответствующий требованиям вдовец(-ва)
  /maritalStatus:
    question: Каково было ваше семейное положение на 31 декабря <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-legal-separation">Что значит состоять в браке
      и раздельно проживать на законных основаниях?</modal-link>
    options:
      married:
        name: В браке
      divorced:
        name: В разводе или юридически разделены
      widowed:
        name: Соответствующий требованиям вдовец(-ва)
      single:
        name: Никогда не состоял(а) в браке
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: Когда скончался ваш супруг(а)?
    options:
      taxYear:
        name: В течение <fg-show path="/taxYear"/>
      taxYearMinusOneOrTwo:
        name: В течение 2023 или 2024
      beforeTaxYearMinusTwo:
        name: До 2023
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: Когда скончался ваш супруг(а)?
    options:
      taxYear:
        name: В течение 2024
      taxYearMinusOneOrTwo:
        name: В течение 2022 или 2023
      beforeTaxYearMinusTwo:
        name: До 2022
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: Когда скончался ваш супруг(а)?
    options:
      taxYear:
        name: В течение 2023
      taxYearMinusOneOrTwo:
        name: В течение 2021 или 2022
      beforeTaxYearMinusTwo:
        name: До 2021
  /isHOHMarried:
    question: Вы состоите в браке?
  /intendsToFileJointlyWidow:
    question: Собираетесь ли вы подать совместную декларацию с умершим супругом за
      <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-joint-deceased-spouse">Имели ли вы право подать
      совместную с супругом декларацию за год смерти супруга?</modal-link>
  /intendsToFileJointlyMFJ:
    question: Собираетесь ли вы и ваш супруг/супруга подавать совместные декларации?
    modalLink: <modal-link for="modal-joint-return-mfj">Супруги подающие документы
      совместно</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: Имели ли вы и ваш супруг/супруга одно и то же основное место жительства
      в течение последних 6 месяцев <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-spouse-lived-together">Что означает совместное
      проживание супругов?</modal-link>
  /samePrincipalResidenceLast6Months:
    question: Имели ли вы и ваш супруг/супруга одно и то же основное место жительства
      в течение последних 6 месяцев <fg-show path="/taxYear"/>?
  /writableSeparationAgreement:
    question: 'Были ли вы юридически разделены в соответствии с законодательством
      вашего штата на основании письменного соглашения о раздельном проживании или
      постановления о раздельном содержании, и проживали ли вы со своим(ей) супругом(ой)
      в последний день <fg-show path="/taxYear"/> года? '
  /entitledToPreviouslyFileJointReturn:
    question: Имели ли вы право подать совместную с супругом декларацию за год смерти
      супруга?
  /paidMoreThanHalfHomeCostsForChild:
    question: В <fg-show path="/taxYear"/>, оплачивали ли вы более половины расходов
      на содержание дома, в котором вы жили, который также являлся основным домом
      для вашего ребенка-иждивенца, пасынка или приемного ребенка в течение всего
      <fg-show path="/taxYear"/> (включая любые временные отлучки)?
    modalLink: <modal-link for="modal-keeping-up-home">Как рассчитать &quot;Содержание
      дома&quot;?</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: Можете ли вы претендовать на своего ребенка или пасынка/падчерицы, который
      жил с вами в качестве иждивенца в течение <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-claiming-dependents">Кого я могу заявить в качестве
      иждивенца?</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: 'Могли бы вы заявить своего ребенка или пасынка/падчерицу в качестве
      иждивенца ЗА ИСКЛЮЧЕНИЕМ того, что в <fg-show path="/taxYear"/> году: 1) У ребенка
      был валовой доход, превышающий пороговое значение в <fg-show path="/eitcChildGrossIncomeLimit"/>
      за <fg-show path="/taxYear"/> год; 2) Ребенок подал совместную декларацию; или
      3) Вас могли заявить в качестве иждивенца в чьей-то еще декларации?'
    modalLink: <modal-link for="modal-claiming-dependents">Кого я могу заявить в качестве
      иждивенца?</modal-link>
  /homeUpkeepScenario:
    question: Оплачивали ли вы более 50% расходов на содержание дома?
    modalLink: <modal-link for="modal-keeping-up-home">Как мне рассчитать &quot;Содержание
      дома&quot;?</modal-link>
    options:
      livedWithDependent:
        name: Где вы проживали более половины года с иждивенцем (например, ребенком,
          внуком, братом или сестрой, племянницей, племянником, родителем или дедушкой
          или бабушкой)
      custodialParentNonDependent:
        name: Где вы проживали более половины года с ребенком, который не является
          вашим иждивенцем, даже если вы являетесь опекуном (из-за правила для детей
          разведенных или разделенных родителей)
      dependentParentElsewhere:
        name: Для родителя, которого вы можете заявить как иждивенца, но который не
          жил с вами
      none:
        name: Ничего из вышеперечисленного
  /secondaryFilerHasValidSSN:
    question: Имеет ли ваш супруг/супруга действительный номер социального обеспечения,
      который был выдан на дату или до даты подачи вашей налоговой декларации за <fg-show
      path="/taxYear"/> (включая продления)?
    modalLink: <modal-link for="modal-valid-ssn">Требуется действительный номер социального
      обеспечения</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: Был ли у вашего супруга действительный номер социального обеспечения
      на момент его смерти?
    modalLink: <modal-link for="modal-valid-ssn">Требуется действительный номер социального
      обеспечения</modal-link>
  /spouseAliveEndOfTaxYear:
    question: Был ли жив ваш супруг на 31 декабря <fg-show path="/taxYear"/>?
  /ageRangeSecondary:
    question: Пожалуйста, выберите возрастную категорию, которая лучше всего описывает
      возраст вашего супруга на конец <fg-show path="/taxYear"/>.
    options:
      under24:
        name: До 24 лет включительно
      age25to64:
        name: В возрасте от 25 до 64 лет включительно
      65andOlder:
        name: Старше 65 лет
  /primaryFilerIsClaimingQualifyingChildren:
    question: Планируете ли вы заявить детей или других родственников с действительными
      номерами социального страхования для получения EITC?
    modalLink: <modal-link for="modal-qualifying-child-eitc">Может ли другое лицо
      использовать данные этого ребенка для оформления налогового зачёта за заработанный
      доход (EITC)?</modal-link>
  /hasLivedInUSMore6Months:
    question: Было ли ваше основное место жительства в США более половины <fg-show
      path="/taxYear"/>?
    modalLink: <modal-link for="modal-main-home-us">Что считается основным домом в
      США?</modal-link>
  h2-7864de: Согласно вашему выбору, ваш статус подачи документов <fg-show path="/flowReadableFilingStatus"/>.
  fg-alert-334e2e:
    heading: Вы не имеете права на налоговый зачет за заработанный доход (EITC).
    p-b6bd9e: Вы не имеете права на оформление EITC при отсутствии ребенка, соответствующиего
      требованиям, за исключением ситуации, когда вы или ваш супруг(-а) при подаче
      совместной декларации находитесь в возрасте от 25 до 64 лет.
    p-ae739d: Для получения дополнительной информации см. <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Публикацию 596, Налоговый зачет
      за заработанный доход</a>.
    p-47ef52: 'Вы можете претендовать на EIC, если состоите в браке, не подаете совместную
      налоговую декларацию, имеете ребенка, который проживал с вами более половины
      <fg-show path="/taxYear"/> года, и на вас распространяется одно из следующих
      условий:'
    ul-0:
      li-207749: 'Вы проживали отдельно от супруга (супруги) в течение последних 6
        месяцев <fg-show path="/taxYear"/> года, или '
      li-93a6ef: Вы находитесь в статусе юридического раздельного проживания в соответствии
        с законодательством вашего штата на основании письменного соглашения о раздельном
        проживании или постановления о раздельном содержании и не проживали в одном
        домохозяйстве с супругом/супругой на конец <fg-show path="/taxYear"/> года.
    p-3630b4: 'Для получения дополнительной информации см. <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501"
      class="usa-link">Публикацию</a> '
    p-99f873: Вы не можете претендовать на получение EITC, потому что у вашего супруга
      нет действительного номера социального обеспечения, выданного на дату подачи
      налоговой декларации или до нее.
    p-91ee91: Вы не можете претендовать на EITC, если вы решили подать совместную
      декларацию с умершим супругом, потому что ваш супруг не имел действительного
      номера социального обеспечения на день смерти.
    p-d4d927: Вы можете претендовать на получение EITC, если вы не подавали совместную
      декларацию с умершим супругом.
    p-065d1b: Чтобы претендовать на получение EITC, ваше место жительства должно быть
      в США в течение более чем половины года. Соединенные Штаты Америки включают
      50 штатов и округ Колумбия.
  modal-filing-status:
    heading: Какой статус подачи мне следует использовать?
    p-c0b92c: Если в этом году в вашем семейном положении или семейной ситуации не
      произошло изменений, то вы можете использовать тот же статус подачи из вашей
      налоговой декларации за <fg-show path="/lastTaxYear"/> год.
    p-391f95: Если в прошлом году ваше семейное положение или состав семьи изменились,
      вам может потребоваться использовать другой статус подачи для более точной оценки.
    p-496916: Каждый статус подачи имеет различные требования.
    p-49f30f: Не женат/не замужем
    ul-0:
      li-c717a5: Вы не можете состоять в браке
    p-5f63cd: Супруги подающие документы совместно
    ul-1:
      li-6aab7e: Вы состоите в браке или ваш супруг(а) умер(ла) в течение года
    p-80c02f: Супруги подающие документы раздельно
    ul-2:
      li-595e35: Вы состоите в браке?
      li-1e72dd: Вы не планируете подавать документы вместе с супругом(ой) (большинство
        пар экономят деньги, подавая документы совместно)
    p-d69332: Глава семьи
    ul-3:
      li-dfe41a: Вы не можете состоять в браке (или вы считаетесь не состоящим в браке
        для целей налогообложения)
      li-38ff2f: Вы оплатили более половины стоимости содержания дома для члена семьи
        или члена вашей семьи в течение определенного периода времени, и они должны
        соответствовать определенным требованиям
    p-57317d: <strong>Соответствующий требованиям переживший супруг(а):</strong>
    ul-4:
      li-2bf38a: Ваш супруг(а) умер(ла) в <fg-show path="/lastTaxYear"/> или <fg-show
        path="/taxYearMinusTwo"/> году
      li-4ef74f: Вы не вступили в повторный брак до <fg-show path="/taxYear"/> года
      li-939762: У вас есть ребенок-иждивенец, который живет с вами круглый год
      li-bad5a3: Вы оплатили более половины расходов на содержание дома.
    p-5b3ae2: <a target="_blank" href="https://www.irs.gov/filing/filing-status">Узнайте
      больше о статусах подачи<span class="usa-sr-only"> (opens in a new tab)</span>.</a>
  modal-qualifying-child-eitc:
    heading: Ребенок, отвечающий требованиям
    p-7356ad: Чтобы подать заявку на EITC, имея ребенка, отвечающего требованиям,
      ребенок должен иметь действующий номер социального страхования (SSN), выданный
      Управлением социального страхования не позднее установленной даты подачи вашей
      налоговой декларации за <fg-show path="/taxYear"/> год (включая продления).
    p-ac8914: Если на карточке социального обеспечения написано &quot;Действительна
      для работы с разрешением DHS&quot; или &quot;Действительна для работы с разрешением
      INS&quot;, это действительный SSN, если разрешение все еще действительно.
    p-558a40: 'Для получения налогового зачета за заработанный доход (EITC) мы не
      принимаем:'
    ul-0:
      li-5e5f3e: IRS Индивидуальный идентификационный номер налогоплательщика (ITIN)
      li-5fc9b7: Индивидуальный номер налогоплательщика для приемного ребенка (ATIN)
      li-9f487b: Номер социального обеспечения, выданный исключительно для того, чтобы
        получатель SSN мог подать заявление или получить пособие, финансируемое из
        федерального бюджета, например, Медикейд
      li-19d3d7: Номер социального страхования, выданный исключительно для подачи
        заявления на получение или получения пособия, финансируемого из федерального
        бюджета, такого как Medicaid
    p-0d323a: 'Ваш ребенок считается отвечающим требованиям, если он соответствует
      четырем критериям. Четыре критерия:'
    ul-1:
      li-fbc977: Родство,
      li-9d8d2d: Возраст,
      li-23863d: Место жительства и
      li-ca34c2: Налоговая декларация, совместно подаваемая обоими супругами
    p-e00960: 'Для получения дополнительной информации <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">смотрите</a> '
  modal-main-home-us:
    heading: Основной дом в США
    p-9cbbc6: Находились ли вы дома в США более половины года?
    p-775779: 'Ваш дом должен находиться в США более половины <fg-show path="/taxYear"/>
      . Соединенные Штаты Америки включают 50 штатов и округ Колумбия. В него не входят
      владения США, такие как Гуам, Виргинские острова или Пуэрто-Рико. '
    h3-398dfd: Военнослужащие, находящиеся за пределами США
    p-7dbfa0: Если вы являетесь членом вооруженных сил США и находились за пределами
      США на длительной действительной службе, выберите да.
  modal-keeping-up-home:
    heading: Содержание дома
    p-c0958f: Если общая сумма, которую вы заплатили, составляет более половины от
      общих расходов, вы соответствуете требованию об уплате более половины расходов
      на содержание дома.
    h3-e8b30a: 'Расходы включают:'
    ul-0:
      li-b9b2e1: Арендную плату, проценты по ипотеке, налоги на недвижимость и страхование
        жилья
      li-313963: Ремонт и коммунальные услуги
      li-61e699: Еду, потребляемую дома
    p-fec463: 'Примечание: Расходы, оплачиваемые за счет государственной помощи, считаются
      расходами, оплаченными налогоплательщиком.'
    h3-3e0b53: 'Расходы не включают:'
    ul-1:
      li-edaa99: Расходы на одежду, образование и отпуск
      li-40b84f: Медицинское лечение, оплату медицинского страхования и рецептурные
        препараты
      li-5eae2b: Страхование жизни
      li-c64365: Транспортные расходы, такие как страховка, арендные платежи или общественный
        транспорт
      li-04dec0: Стоимость ваших услуг или услуг члена вашей семьи
  modal-legal-separation:
    heading: Юридическое раздельное проживание и гражданское право
    h3-ef7665: Юридически раздельное проживание
    p-198345: «Юридически раздельное проживание» для этой цели означает юридически
      раздельное проживание в соответствии с решением о разводе или раздельном содержании.
    h3-357344: Гражданский брак
    p-f560ea: В некоторых штатах разрешены гражданские браки. Узнайте в своем штате,
      считаетесь ли вы женатыми по гражданскому праву.
  modal-joint-return-mfj:
    heading: Налоговая декларация, совместно подаваемая обоими супругами
    p-75997a: Вы можете подать одну декларацию вместе со своим супругом, выбрав в
      качестве статуса подачи <strong>. Это позволяет объединить ваши доходы и расходы
      при расчете зачетов, вычетов и налоговых обязательств.
  modal-joint-deceased-spouse:
    heading: Совместная декларация с умершим супругом
    p-85e581: Если ваш супруг умер в течение <fg-show path="/taxYear"/>, вы можете
      подать одну декларацию вместе с супругом, выбрав в качестве статуса подачи декларации
      <fg-show path="/taxYear"/>. Это позволяет объединить ваши доходы и расходы при
      расчете зачетов, вычетов и налоговых обязательств.
  modal-spouse-lived-together:
    heading: Супруг/супруга - совместное проживание
    p-906815: 'Лицо считается проживающим с вами в течение периодов времени, когда
      один из вас или оба временно отсутствуют по особым обстоятельствам, таким как:'
    ul-0:
      li-8ec6de: Болезнь,
      li-de7a22: Образование,
      li-d6e6cb: Частное предприятие,
      li-2c48dd: Отпуск, или
      li-8fdca6: Военная служба.
    p-2392bb: Нужно обоснованно предполагать, что отсутствующее лицо вернется в дом
      после кратковременного отсутствия.
  modal-valid-ssn:
    heading: Действительный номер социального страхования
    p-527528: Вы должны иметь действительный номер социального страхования (SSN),
      выданный Управлением социального страхования не позднее установленной даты подачи
      налоговой декларации за <fg-show path="/taxYear"/> год (включая продления).
    p-45ae0e: Если на вашей карточке социального страхования указано «Действительна
      для работы с разрешением DHS» или «Действительна для работы с разрешением INS»,
      то это ваш действительный номер социального страхования, если разрешение все
      еще действительно.
    p-558a40: 'Для получения налогового зачета за заработанный доход (EITC) мы не
      принимаем:'
    ul-0:
      li-5e5f3e: IRS Индивидуальный идентификационный номер налогоплательщика (ITIN)
      li-5fc9b7: Индивидуальный номер налогоплательщика для приемного ребенка (ATIN)
      li-9f487b: Номер социального обеспечения, выданный исключительно для того, чтобы
        получатель SSN мог подать заявление или получить пособие, финансируемое из
        федерального бюджета, например, Медикейд
      li-a69a30: Номер социального страхования, выданный исключительно для подачи
        заявления на получение или получения пособия, финансируемого из федерального
        бюджета, такого как Medicaid
    p-f554f7: Для получения дополнительной информации о действительном номере социального
      страхования см. Публикацию № 596.
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: Подтверждение
    p-30861e: Изменение статуса <strong>Совместная подача в браке</strong> на другой
      статус подачи приведет к удалению ранее введенных данных о ребенке, соответствующем
      требованиям. Вы все еще хотите продолжить?
    button-70d9be: Подтвердить
    button-ea4788: Отменить
  modal-claiming-dependents:
    heading: Кого я могу заявить в качестве иждивенца?
    p-fc792e: 'Иждивенцами обычно являются:'
    ul-0:
      li-7673e2: Дети до 19 лет;
      li-e9750c: Студенты в возрасте до 24 лет, проживающие с родителями
      li-9a6fc3: Родственники или члены вашей семьи, которые получают от вас более
        половины своей финансовой поддержки и чей валовой доход составляет менее <fg-show
        path="/eitcChildGrossIncomeLimit"/>
    p-6b3acc: Вы не можете заявить своего супруга(у) в качестве иждивенца, если подаете
      совместную декларацию.
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/dependents">Узнайте
      больше об иждивенцах.</a>
/agi:
  title: AGI (скорректированный валовой доход)
