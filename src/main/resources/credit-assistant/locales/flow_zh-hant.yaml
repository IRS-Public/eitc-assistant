/:
  title: 一般資訊
  h2-5e286b: 一般資訊
  p-c2c8a0: 回答幾個關於您自己的簡單問題，看看您是否符合資格。
  /chosenTaxYear:
    question: 選擇您要檢查您的 EITC 資格的納稅年度：
    modalLink: <modal-link for="modal-tax-year">我應該使用哪一年？</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien:
    question: 您在 <fg-show path="/taxYear"/> 年全年度中是美國公民還是外籍居民？
    modalLink: <modal-link for="modal-citizen">我是否符合作為美國公民或居民申請 EITC 的條件？</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  fg-alert-8b7db9:
    heading: 您不符合资格获得劳动所得税抵免（EITC）（低收入家庭福利优惠）。
    p-091688: 您必須是美國公民或外籍居民才能申領勞動所得稅務優惠。請參閱 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit. 以判斷您是否全年都是美國外籍居民。
    p-f72c3e: ' 如果您要在 <fg-show path="/taxYear"/> 年與您的配偶共同申報報稅表，並且您或您的配偶在整個一年中都是美國公民或外籍居民，請選擇
      yes。'
    p-b85d77: 您不能申領 EITC，因為您的報稅表到期日或之前未被簽發的有效社會安全號碼。
    p-93a6b5: 如需瞭解更多資訊，請參閱 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit.。
    p-4c0c0d: 如果您提交了外國賺取收入的<a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">表
      2555</a>，則不能申請所得稅抵免。
    p-236b69: 54 號出版物 —— 美國公民和海外居民稅務指南（英文）
    p-5e637b: 如果您是其他人的符合 EITC 資格的子女，則您沒有資格獲得 EITC。
    p-ec145e: 有關某人是否可以將您申請為符合 EITC 條件的兒童的更多資訊，請參閱<a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">第 596 號出版物</a>，所得稅抵免，您不能成為其他納稅人符合條件的兒童。
    p-363ef2: 如果您是其他人的被撫養人，則您沒有資格獲得 EITC，除非您有一個符合 EITC 資格的子女。
  /hasValidSSN:
    question: 您在您 <fg-show path="/taxYear"/> 年的報稅表截止日當日或以前是否被簽發了有效的社會安全號碼（包括延期的申報截止日）？
    modalLink: <modal-link for="modal-valid-ssn-filer">有效的社會安全號碼是必填項</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  /hasForeignEarnedIncome:
    question: 您是否會申報《表格 2555 —— 外國勞動所得》？
    modalLink: <modal-link for="modal-foreign-income">不計入總收入的外國收入</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  /isClaimedAsDependent:
    question: 其他人會在他們的報稅表上針對 EITC 將您申領為被撫養人或符合資格的子女嗎？
    modalLink: <modal-link for="modal-claimed-dependent">您作為被撫養或符合資格的子女</modal-link>
    options:
      'true':
        name: 是
      'false':
        name: 不
  /ageRange:
    question: 請選擇最能描述您在 <fg-show path="/taxYear"/> 年年底的範圍。
    options:
      under24:
        name: 24 歲及以下
      age25to64:
        name: 25 至 64 歲之間
      65andOlder:
        name: 65 歲及以上
  modal-tax-year:
    heading: 稅收年度
    p-aa5a47: 對於工資和其他收入：
    ul-0:
      li-28dd34: 2025，選擇 2025
      li-174a8b: 2024，選擇 2024
      li-0a25dc: 2023，選擇 2023
  modal-citizen:
    heading: 美國公民或外籍居民
    p-18e680: 如果您不是美國公民，您將被視為外國人。
    p-fe70ca: 如果您有綠卡，或者您在美國居住超過一定天數，您在 EITC 方面將被視為的外籍居民。
    p-2c8f8f: 有關更多資訊和重要例外情況，請參閱 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit.
  modal-valid-ssn-filer:
    heading: 有效的社會安全號碼
    p-527528: 您必須在 <fg-show path="/taxYear"/> 年納稅申報表（包括延期）到期日或之前擁有由社保局頒發的有效社會安全號碼
      （SSN）。
    p-45ae0e: 如果您的社會保卡上寫著「經國土安全部授權可用於工作」或「經 INS 授權可用於工作」，只要該授權仍然有效，則這張卡上的 SSN 仍然有效。
    p-558a40: 對於 EITC，我們不接受：
    ul-0:
      li-5e5f3e: 美國國稅局個人納稅人識別號（ITIN）
      li-5fc9b7: 領養納稅識別號碼（ATIN）
      li-9f487b: 僅為允許社會安全號碼的接收者申請或獲得聯邦資助的福利（如聯邦醫療補助）而簽發的社會安全號碼
      li-a69a30: 僅出於申請或領取聯邦資助的福利（例如 Medicaid）之目的頒發的社會安全號碼
    p-f554f7: 有關有效社會安全號碼的更多資訊，請參閱《出版物 596》。
  modal-foreign-income:
    heading: 不計入總收入的外國收入
    p-f45b03: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">這指的是您在</a>  上選擇排除並是在美國、哥倫比亞特區，或美國屬地或領土以外賺取的收入
  modal-claimed-dependent:
    heading: 您作為被撫養或符合資格的子女
    p-faf8d8: 在大多數情況下，您不能同時成為其他納稅人的被撫養人或符合資格的子女並申領 EITC。
    p-98d6db: 在大多數情況下，如果您未滿 19 歲或未滿 24 歲的學生，並且與您的父母或其他親戚在美國生活了半年以上，請選擇 <strong>Yes</strong>。
    p-038f13: 如果您已婚並提交聯合申報表，則不能將您作為受撫養人進行申報，除非您提交聯合申報表只是為了申請預扣所得稅或已繳納的預估稅款的退稅款。
    p-ceda6c: '有關某人是否可以將您作為被撫養人的更多資訊，<a target="_blank" class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">請前往</a> '
    p-d11380: 有關某人是否可以針對 EITC 將您申領為合格子女的更多資訊，<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2021_publink1000298540">請參閱</a>
      。
    p-16aba9: 我們會在後續詢問您可能申領的子女或親屬。
  modal-primary-claimed-as-dependent:
    heading: 我如何知道自己是否是別人的受撫養人？
    p-d3187d: 如果在 <fg-show path="/taxYear"/> 年您依靠他人（配偶除外）提供撫養支持，他們也許能在其聯邦納稅申報表上將您申報為受撫養人。
    p-762495: '決定是否有人能將您申報為受撫養人有幾個因素，包括：'
    ul-0:
      li-b17276: 您與該人的關係
      li-c82d5e: 他們在經濟上及其他方面為您提供了多少支持
      li-5a5073: 您是否與他們同住以及同住的時間長短
    p-752de3: 請查閱 <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000196863">IRS 第 501 號出版物</a>中的表 5，以確定是否可能有其他人將您申報為受撫養人。
    p-5a0201: 請記住，如果您（或您的配偶）支付了自己生活費的一半以上，您就不屬於他人的受撫養人。
  modal-confirm-tax-year-change:
    heading: 注意：
    p-31c7da: 更改<strong>年份</strong>將清除您之前輸入的資料。您仍想繼續嗎？
    button-70d9be: 確認
    button-ea4788: 取消
/filing-status:
  title: 報稅身份
  h2-c01d87: 報稅身份
  p-9bda8f: 在此步驟中，您將被問及您計劃如何申報 <fg-show path="/taxYear"/> 年的稅款。
  /knowsFilingStatus:
    question: 您是否知道在申報 <fg-show path="/taxYear"/> 年的稅務時會使用的報稅身份？
  /initialFilingStatus:
    question: 請選擇您在申報 <fg-show path="/taxYear"/> 年的稅務將使用的報稅身份：
    modalLink: <modal-link for="modal-filing-status">我應該使用哪種報稅身分？</modal-link>
    options:
      single:
        name: 單身
      marriedFilingJointly:
        name: 夫妻共同申報
      marriedFilingSeparately:
        name: 夫妻各自申報
      headOfHousehold:
        name: 戶主
      qualifiedSurvivingSpouse:
        name: 符合資格的喪偶者
  /maritalStatus:
    question: 您的婚姻狀態在 <fg-show path="/taxYear"/> 年 12 月 31 日是？
    modalLink: <modal-link for="modal-legal-separation">已婚合法分居是什麼意思？</modal-link>
    options:
      married:
        name: 已婚
      divorced:
        name: 離婚或合法分居
      widowed:
        name: 符合資格的喪偶者
      single:
        name: 未婚
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: 您的配偶是什麼時候去世的？
    options:
      taxYear:
        name: <fg-show path="/taxYear"/> 年間
      taxYearMinusOneOrTwo:
        name: 2023 或 2024 年間
      beforeTaxYearMinusTwo:
        name: 2023 年前
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: 您的配偶是什麼時候去世的？
    options:
      taxYear:
        name: 2024 年間
      taxYearMinusOneOrTwo:
        name: 2022 或 2023 年間
      beforeTaxYearMinusTwo:
        name: 2022 年前
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: 您的配偶是什麼時候去世的？
    options:
      taxYear:
        name: 2023 年間
      taxYearMinusOneOrTwo:
        name: 2021 或 2022 年間
      beforeTaxYearMinusTwo:
        name: 2021 年前
  /isHOHMarried:
    question: 您結婚了嗎？
  /intendsToFileJointlyWidow:
    question: 您是否打算針對 <fg-show path="/taxYear"/> 與已故配偶申報共同報稅表？
    modalLink: <modal-link for="modal-joint-deceased-spouse">您是否有權在您的配偶去世的那一年與您的配偶共同申報報稅表？</modal-link>
  /intendsToFileJointlyMFJ:
    question: 您和您的配偶是否打算共同申報報稅表？
    modalLink: <modal-link for="modal-joint-return-mfj">夫妻共同申報</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: 和您的配偶在 <fg-show path="/taxYear"/> 年的最後 6 個月是否擁有相同的主要住所？
    modalLink: <modal-link for="modal-spouse-lived-together">配偶住在一起是什麼意思？</modal-link>
  /samePrincipalResidenceLast6Months:
    question: 和您的配偶在 <fg-show path="/taxYear"/> 年的最後 6 個月是否擁有相同的主要住所？
  /writableSeparationAgreement:
    question: 您是否依據您所在的州法律根據書面分居協定或根據分居贍養令合法分居，並且，您在 2025 年的最後一天沒有與配偶居住在一起？
  /entitledToPreviouslyFileJointReturn:
    question: 您是否有權在您的配偶去世的那一年與您的配偶共同申報報稅表？
  /paidMoreThanHalfHomeCostsForChild:
    question: 在 <fg-show path="/taxYear"/> 年中，您是否在房屋修繕費用中支付了半數以上，並且該房屋在 <fg-show path="/taxYear"/>
      年中也是您的被撫養子女、繼子女或寄養子女的主要住所（包括任何暫時缺席）?
    modalLink: <modal-link for="modal-keeping-up-home">我該如何計算“維持家庭”？</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: 您可以申領在 <fg-show path="/taxYear"/> 年做為您的被撫養人與您共同生活的子女或繼子女嗎？
    modalLink: <modal-link for="modal-claiming-dependents">我可以申領誰作為被撫養人？（英文）</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: 您是否可以將您的孩子或繼子女申請為被撫養人，除非在 <fg-show path="/taxYear"/> 年：1) 孩子的總收入高於 <fg-show
      path="/taxYear"/> 年的 <fg-show path="/eitcChildGrossIncomeLimit"/> 門檻；2) 孩子進行了聯合申報；或者
      3) 您可以在別人的報稅表中被申請為被撫養人？
    modalLink: <modal-link for="modal-claiming-dependents">我可以申領誰作為被撫養人？（英文）</modal-link>
  /homeUpkeepScenario:
    question: 您是否支付了超過 50% 的房屋維護費用？
    modalLink: <modal-link for="modal-keeping-up-home">我如何計算&quot;維持家庭&quot;？</modal-link>
    options:
      livedWithDependent:
        name: 您與被撫養人（例如子女、孫子、兄弟姐妹、侄女、侄子、父母或祖父母）住在一起超過半年的地方
      custodialParentNonDependent:
        name: 即使您是監護人，但您與一個不是您的被撫養人的子女一起生活了半年以上（因為離婚或分居父母的子女的規則）
      dependentParentElsewhere:
        name: 您可以申請為被撫養人的父母，但未與您同住
      none:
        name: 以上皆非
  /secondaryFilerHasValidSSN:
    question: 您的配偶在您 <fg-show path="/taxYear"/> 年的報稅表截止日當日或以前是否被簽發了有效的社會安全號碼（包括延期的申報截止日）？
    modalLink: <modal-link for="modal-valid-ssn">有效的社會安全號碼是必填項</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: 您的配偶在去世當天是否有有效的社會安全號碼？
    modalLink: <modal-link for="modal-valid-ssn">有效的社會安全號碼是必填項</modal-link>
  /spouseAliveEndOfTaxYear:
    question: 您的配偶在 <fg-show path="/taxYear"/> 年 12 月 31 日是否仍在世？
  /ageRangeSecondary:
    question: 請選擇最能描述您配偶在 <fg-show path="/taxYear"/> 年年底的年齡層。
    options:
      under24:
        name: 24 歲及以下
      age25to64:
        name: 25 至 64 歲之間
      65andOlder:
        name: 65 歲及以上
  /primaryFilerIsClaimingQualifyingChildren:
    question: 您是否計劃為擁有有效社會安全號碼的子女或其他親屬申請 EITC？
    modalLink: <modal-link for="modal-qualifying-child-eitc">是否有其他人能為該名子女申領 EITC？</modal-link>
  /hasLivedInUSMore6Months:
    question: 您的主要住所在 <fg-show path="/taxYear"/> 年期間是否有超過半年的時間是在美國？
    modalLink: <modal-link for="modal-main-home-us">什麼算是美國的主要居所？</modal-link>
  h2-7864de: 根據您的選擇，您的報稅身份為 <fg-show path="/flowReadableFilingStatus"/>。
  fg-alert-334e2e:
    heading: 您不符合资格获得劳动所得税抵免（EITC）（低收入家庭福利优惠）。
    p-b6bd9e: 除非您或您的配偶（如果共同申報納稅申報單）是 25 歲到 64 歲之間，否則您無法在沒有不符合資格子女的情況下申領 EITC。
    p-ae739d: 如需了解更多資訊，請參閱<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">第
      596 號出版物，所得稅抵免</a>。
    p-47ef52: 如果您已婚，且未提交聯合申報表，並且在 <fg-show path="/taxYear"/> 年超過一半的時間有一個符合資格的子女與您同住，並且符合以下任意條件，您可以申請
      EIC。
    ul-0:
      li-207749: 您在 <fg-show path="/taxYear"/> 年的最後 6 個月內與配偶分居，或
      li-93a6ef: 根據您所在州的法律，您已根據書面分居協定或分居贍養令合法分居，並且截至 <fg-show path="/taxYear"/> 年底，您與您的配偶已不再居住在同一家庭中。
    p-3630b4: '如需瞭解相關更多資訊，<a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501"
      class="usa-link">請參閱</a> '
    p-99f873: 您不能申領 EITC，因為您的配偶在您的報稅表到期日或之前未被簽發的有效社會安全號碼。
    p-91ee91: 如果您選擇與已故配偶共同申報報稅表，則您不能申領 EITC，因為您的配偶在他們去世當天沒有有效的社會安全號碼。
    p-d4d927: 如果您不與已故配偶共同申報報稅表，您可能有資格獲得 EITC。
    p-065d1b: 如要申領 ETIC，您的家在該年中必須有超過一半的時間是在美國。美國包括 50 個州和哥倫比亞特區。
  modal-filing-status:
    heading: 我應該使用哪種報稅身分？
    p-c0b92c: 如果今年您的婚姻狀況或家庭情況沒有發生變化，那麼您可能希望使用 <fg-show path="/lastTaxYear"/> 納稅申報表中相同的報稅身分。
    p-391f95: 如果在過去一年中您的婚姻狀況或家庭發生變化，您可能需要使用不同的報稅身分以獲得更準確的估算。
    p-496916: 每種報稅身分都有不同的要求。
    p-49f30f: 單身
    ul-0:
      li-c717a5: 您不能已婚
    p-5f63cd: 夫妻共同申報
    ul-1:
      li-6aab7e: 您已婚或您的配偶在年內去世
    p-80c02f: 夫妻各自申報
    ul-2:
      li-595e35: 您結婚了嗎？
      li-1e72dd: 您不打算與您的配偶共同申報（大多數夫婦通過聯合申報來省錢）
    p-d69332: 戶主
    ul-3:
      li-dfe41a: 您不能已婚（或者出於稅收目的您被視為未婚）
      li-38ff2f: 在特定時間內，您為家庭成員或與您同住的人支付了一半以上的維持家庭費用，並且他們必須滿足特定要求
    p-57317d: <strong>符合條件的未亡配偶：</strong>
    ul-4:
      li-2bf38a: 您的配偶在 <fg-show path="/lastTaxYear"/> 或 <fg-show path="/taxYearMinusTwo"/>
        年去世
      li-4ef74f: 您在 <fg-show path="/taxYear"/> 之前沒有再婚
      li-939762: 您有一個全年與您同住的受撫養子女
      li-bad5a3: 您支付了一年中房屋修繕一半以上的費用。
    p-5b3ae2: <a target="_blank" href="https://www.irs.gov/filing/filing-status">了解有關報稅身分的更多資訊<span
      class="usa-sr-only"> (opens in a new tab)</span>。</a>
  modal-qualifying-child-eitc:
    heading: 符合資格的子女
    p-7356ad: 如希望與符合資格的子女一起申請 EITC，該子女必須在 2025 年申報表到期日或之前擁有社保局頒發的有效 SSN（包括延期）。
    p-ac8914: 如果社會保障卡上寫著“憑 DHS 授權工作有效”或“憑 INS 授權工作有效”，那麼只要授權仍然有效，這就是有效的 SSN。
    p-558a40: 對於 EITC，我們不接受：
    ul-0:
      li-5e5f3e: 美國國稅局個人納稅人識別號（ITIN）
      li-5fc9b7: 領養納稅識別號碼（ATIN）
      li-9f487b: 僅為允許社會安全號碼的接收者申請或獲得聯邦資助的福利（如聯邦醫療補助）而簽發的社會安全號碼
      li-19d3d7: 僅出於申請或領取聯邦資助的福利（例如 Medicaid）之目的頒發的社會安全號碼
    p-0d323a: 如果您的子女透過四項測試，您的子女就是符合資格的子女。這四項測試是：
    ul-1:
      li-fbc977: 關係，
      li-9d8d2d: 年齡，
      li-23863d: 居住權，以及
      li-ca34c2: 共同報稅表
    p-e00960: '如需瞭解更多資訊，<a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">請參閱</a> '
  modal-main-home-us:
    heading: 美國的主要住宅
    p-9cbbc6: 您在美國居住有超過半年的時間嗎？
    p-775779: 您的家在 <fg-show path="/taxYear"/> 年中必須有超過一半的時間是在美國。美國包括 50 個州和哥倫比亞特區。它不包括關島、維爾京群島或波多黎各等美國屬地。
    h3-398dfd: 駐紮在美國境外的從軍人士
    p-7dbfa0: 如果您是美軍的成員，並且您在美國境外長期服役，請選擇 yes。
  modal-keeping-up-home:
    heading: 維持家庭開支
    p-c0958f: 如果您支付的總金額超過總費用的一半，則您滿足支付一半以上的家庭維護費用的要求。
    h3-e8b30a: 具體費用包括：
    ul-0:
      li-b9b2e1: 租金、抵押貸款利息、房地產稅和房屋保險
      li-313963: 維修和公用事業
      li-61e699: 家庭消耗的食物
    p-fec463: 注意：透過公共援助支付的費用將被視為納稅人支付的費用。
    h3-3e0b53: 費用不包括：
    ul-1:
      li-edaa99: 服裝、教育和假期費用
      li-40b84f: 醫療、醫療保險付款和處方藥
      li-5eae2b: 人壽保險
      li-c64365: 保險、租賃付款或公共交通等交通費用
      li-04dec0: 您或您家庭成員的服務價值
  modal-legal-separation:
    heading: 合法分居和普通法
    h3-ef7665: 合法分居
    p-198345: 在此處，「合法分居」指的是根據離婚或單獨撫養的法令合法分居。
    h3-357344: 普通法婚姻
    p-f560ea: 部分州允許普通法婚姻。請與您所在的州確認您是否根據普通法被視為已婚。
  modal-joint-return-mfj:
    heading: 共同報稅表
    p-75997a: 您可以透過選擇 <strong> 作為您的報稅身份來選擇與您的配偶一起報稅。這使您可以在計算稅務優惠、扣除額和納稅義務時結合您的收入和支出。
  modal-joint-deceased-spouse:
    heading: 與已故配偶申報共同報稅表
    p-85e581: 如果您的配偶在 <fg-show path="/taxYear"/>, 年間去世，您可以透過選擇 <fg-show path="/taxYear"/>
      作為您的報稅身份來選擇與您的配偶一起報稅。這使您可以在計算稅務優惠、扣除額和納稅義務時結合您的收入和支出。
  modal-spouse-lived-together:
    heading: 配偶 —— 同居
    p-906815: 由於下列特殊情況，當您們中的一個或兩個暫時缺席時，一個人能被視為與您同住：
    ul-0:
      li-8ec6de: 疾病、
      li-de7a22: 教育、
      li-d6e6cb: 業務、
      li-2c48dd: 假期，或
      li-8fdca6: 兵役。
    p-2392bb: 必須合理地假設缺席者將在暫時缺席後返回家中。
  modal-valid-ssn:
    heading: 有效的社會安全號碼
    p-527528: 您必須在 <fg-show path="/taxYear"/> 年納稅申報表（包括延期）到期日或之前擁有由社保局頒發的有效社會安全號碼
      （SSN）。
    p-45ae0e: 如果您的社會保卡上寫著「經國土安全部授權可用於工作」或「經 INS 授權可用於工作」，只要該授權仍然有效，則這張卡上的 SSN 仍然有效。
    p-558a40: 對於 EITC，我們不接受：
    ul-0:
      li-5e5f3e: 美國國稅局個人納稅人識別號（ITIN）
      li-5fc9b7: 領養納稅識別號碼（ATIN）
      li-9f487b: 僅為允許社會安全號碼的接收者申請或獲得聯邦資助的福利（如聯邦醫療補助）而簽發的社會安全號碼
      li-a69a30: 僅出於申請或領取聯邦資助的福利（例如 Medicaid）之目的頒發的社會安全號碼
    p-f554f7: 有關有效社會安全號碼的更多資訊，請參閱《出版物 596》。
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: 確認
    p-30861e: 從<strong>已婚聯合申報</strong>更改為其他報稅身分將清除您之前輸入的符合條件的兒童資料。您仍想繼續嗎？
    button-70d9be: 確認
    button-ea4788: 取消
  modal-claiming-dependents:
    heading: 我可以申領誰作為被撫養人？（英文）
    p-fc792e: 受撫養人通常是：
    ul-0:
      li-7673e2: 19歲以下的子女；
      li-e9750c: 與父母同住的 24 歲以下學生
      li-9a6fc3: 從您那裡獲得一半以上財務支持，且總收入低於 <fg-show path="/eitcChildGrossIncomeLimit"/>
        的親屬或家庭成員
    p-6b3acc: 如果您聯合申報，則不能將配偶申請為受撫養人。
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/dependents">了解有關被撫養人的更多資訊。</a>
