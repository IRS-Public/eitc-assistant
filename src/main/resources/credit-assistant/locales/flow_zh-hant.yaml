  h2-c0af17: 估算您的調整後總收入 (AGI)
  p-308236: 在此步驟中，我們將估算您和您配偶的共同收入、調整後的總收入以及對其進行的任何調整。
  p-100130: 請選擇並填入您在 <fg-show path="/taxYear"/> 年的收入和調整項。每項來源只選擇一項。
  p-bb8818: 確保還包括您配偶的收入和調整。
  h3-40c7ae: 勞動所得
