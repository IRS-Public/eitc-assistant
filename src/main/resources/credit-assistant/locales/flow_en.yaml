  modal-main-home-us:
    heading: Main Home in the United States
    p-9cbbc6: Your home must have been in the United States for more than half of
      <fg-show path="/taxYear"/>.
    p-775779: The United States includes the 50 states and the District of Columbia.
      It does not include United States possessions such as Guam, the Virgin Islands,
