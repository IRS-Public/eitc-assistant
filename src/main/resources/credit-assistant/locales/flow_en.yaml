  modal-keeping-up-home:
    heading: Keeping Up a Home
    p-c0958f: If the total amount you paid is more than half the total cost, you meet
      the requirement of paying more than half the cost of keeping up the home.
    h3-e8b30a: 'Costs include:'
    ul-0:
      li-b9b2e1: Rent, mortgage interest, real estate taxes, and home insurance
      li-313963: Repairs and utilities
      li-61e699: Food eaten in the home
    p-fec463: <strong>Note:</strong> Costs paid with public assistance are considered
      costs paid by the taxpayer.
    h3-3e0b53: 'Costs don''t include:'
    ul-1:
      li-edaa99: Clothing, education, and vacations expenses
      li-40b84f: Medical treatment, medical insurance payments, and prescription drugs
