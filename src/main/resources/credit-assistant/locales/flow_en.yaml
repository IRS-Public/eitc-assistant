  h2-c0af17: <strong>Estimate Your <fg-show path="/taxYear"/> Adjusted Gross Income
    (AGI)</strong>
  p-308236: In this step, we'll estimate your <span condition="/isFilingStatusMFJ"
    operator="isTrue">and your spouse's joint</span> earned income, adjusted gross
    income, and any adjustments to it.
  p-100130: Please select and enter your <fg-show path="/taxYear"/> <span condition="/isFilingStatusMFJ"
    operator="isTrue">and your spouse's</span> income and adjustments. Only select
    one item per source. All fields marked with an asterisk are required.
  p-bb8818: <strong>Please note:</strong> Make sure to also include your spouse's
    income and adjustments.
  h2-40c7ae: Earned Income
  fg-detail-c90011:
    summary: Wages, salary, or tips
    /jobsIncomeTotal:
      question: Wages, salary, or tips where federal income taxes are withheld
      modalLink: <modal-link for="modal-wages-salaries-tips">Wages Salaries and Tips
        / Military &amp; Combat Pay</modal-link>
  fg-detail-c0e18b:
    summary: Self-employment income and expenses
    /selfEmploymentGrossIncome:
      question: Self-employment Gross income
      modalLink: <modal-link for="modal-self-employment-gross-income">What is self-employment
        income</modal-link>
    /selfEmploymentGrossIncomeWorkRelatedExpenses:
      question: Total self-employment work-related expenses you <span condition="/isFilingStatusMFJ"
        operator="isTrue">and your spouse</span> deducted in <fg-show path="/taxYear"/>
      hint: It is okay to leave this blank.
      modalLink: <modal-link for="modal-self-employment-deductions">What are self-employment
        deductible expenses?</modal-link>
  fg-detail-2fc9c0:
    summary: Disability retirement benefits
    /disabilityRetirementBenefits:
      question: Disability retirement benefits before minimum retirement age
      modalLink: <modal-link for="modal-disability-retirement">What are disability
        retirement benefits?</modal-link>
  fg-detail-cd8e26:
    summary: Foreign earned income
    /non2555ForeignIncome:
      question: Foreign earned income not reported on Form 2555
      modalLink: <modal-link for="modal-foreign-income-non2555">What is foreign earned
        income?</modal-link>
  h3-20a2b1: Other Income
  fg-detail-89425f:
    summary: Investment income
    /investmentIncomeTotal:
      question: Investment income
      modalLink: <modal-link for="modal-investment-income">What is your total investment
        income?</modal-link>
  fg-detail-fbe1af:
    summary: Pension income
    /pensionsIncomeTotal:
      question: Taxable portion of any pension
      modalLink: <modal-link for="modal-taxable-pension">What is the taxable portion
        of a pension?</modal-link>
  fg-detail-2e467d:
    summary: Pre-tax retirement accounts
    /preTaxRetirementAccountIncome:
      question: Total distributions you <span condition="/isFilingStatusMFJ" operator="isTrue">and
        your spouse</span> received from pre-tax retirement accounts in <fg-show path="/taxYear"/>
      hint: Don't include distributions from Roth (post-tax) accounts.
      modalLink: <modal-link for="modal-what-counts-pre-tax-retirement">What counts
        as pre-tax retirement?</modal-link>
  fg-detail-3fa626:
    summary: Unemployment insurance
    /unemploymentIncome:
      question: Unemployment insurance
      modalLink: <modal-link for="modal-unemployment-compensation">What counts as
        unemployment insurance?</modal-link>
  fg-detail-0fb46a:
    summary: Social Security and railroad retirement benefits
    /socialSecurityIncome:
      question: Taxable portion of Social Security and Railroad Retirement Benefits
      modalLink: <modal-link for="modal-social-security">What counts as Social Security
        and Railroad Retirement Benefits?</modal-link>
  fg-detail-d994db:
    summary: Scholarships or grants
    /taxableScholarship:
      question: A scholarship or grant that must be counted as income
      modalLink: <modal-link for="modal-scholarship-grants">What counts as a scholarship
        or grant?</modal-link>
  fg-detail-50ec28:
    summary: Pay earned as an inmate
    /inmatePay:
      question: Pay received for work while an inmate in a penal institution
      modalLink: <modal-link for="modal-inmate-pay">What is inmate pay?</modal-link>
  fg-detail-7a5ac3:
    summary: Other miscellaneous income
    /nonSpecificOtherIncome:
      question: Total amount of any other income you <span condition="/isFilingStatusMFJ"
        operator="isTrue">and your spouse</span> received in <fg-show path="/taxYear"/>
      hint: You should enter one total amount for all other income.
      modalLink: <modal-link for="modal-other-taxable-income">What are other taxable
        incomes?</modal-link>
  h2-9fa8b1: Adjustments
  p-233dd3: Select and enter any of these types of adjustments to income you had in
    <fg-show path="/taxYear"/>. Do not enter the same adjustment in multiple places.
  p-624555: <modal-link for="modal-what-are-adjustments">What are adjustments?</modal-link>
  fg-detail-2c7735:
    summary: Student loan interest deduction
    /studentLoanInterestAmount:
      question: |-
        Student loan interest <span condition="/isFilingStatusMFJ" operator="isFalse">you</span>
                            <span condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span> paid in <fg-show path="/taxYear"/>
      hint: (max <fg-show path="/maxStudentLoanDeduction"/>)
      modalLink: <modal-link for="modal-student-loan-interest">What is the student
        loan interest deduction?</modal-link>
  fg-detail-9166fe:
    summary: Educator expense deduction
    /educatorExpenses/:
      question: Educator expenses <span condition="/isFilingStatusMFJ" operator="isFalse">you</span><span
        condition="/isFilingStatusMFJ" operator="isTrue">you and your spouse</span>
        paid in <fg-show path="/taxYear"/>
      hint: (max <fg-show path="/maxEducatorExpensesLimit"/>)
      modalLink: <modal-link for="modal-educator-expenses">What are educator expenses?</modal-link>
  fg-detail-57c26a:
    summary: Deduction for contributions to an IRA that is not included in payroll
