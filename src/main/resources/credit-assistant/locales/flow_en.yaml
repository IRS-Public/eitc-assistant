    p-99f873: You can't claim the EITC because your spouse doesn't have a valid Social
      Security number issued on or before the due date of your tax return.
    p-91ee91: You can't claim the EITC if you choose to file a joint return with your
      deceased spouse because your spouse did not have a valid social security number
      on the day they passed away.
    p-d4d927: You may qualify for the EITC if you don't file a joint return with your
      deceased spouse.
    p-065d1b: To claim the EITC, your home must have been in the United States for
      more than half the year. The United States includes the 50 states and the District
      of Columbia.
  modal-filing-status:
    heading: Which filing status should I use?
    p-c0b92c: If there's no change in your marital status or family situation this
      year, then you may want to use the same filing status from your <fg-show path="/lastTaxYear"/>
      tax return.
    p-391f95: If you had a change in your marital status or household in the past
      year, you may need to use a different filing status for a more accurate estimate.
    p-496916: Each filing status has different requirements.
    p-49f30f: <strong>Single:</strong>
    ul-0:
      li-c717a5: You can't be married
    p-5f63cd: <strong>Married Filing Jointly:</strong>
    ul-1:
      li-6aab7e: You're married or your spouse died during the year
    p-80c02f: <strong>Married Filing Separately:</strong>
    ul-2:
      li-595e35: You're married
      li-1e72dd: You don't plan to file together with your spouse (most couples save
        money by filing jointly)
    p-d69332: <strong>Head of Household:</strong>
    ul-3:
      li-dfe41a: You can't be married (or you're considered unmarried for tax purposes)
      li-38ff2f: You paid more than half the cost of keeping up a home for a family
        member or member of your household for a specific amount of time, and they
        must meet certain requirements
    p-57317d: <strong>Qualifying Surviving Spouse:</strong>
    ul-4:
      li-2bf38a: Your spouse died in <fg-show path="/lastTaxYear"/> or <fg-show path="/taxYearMinusTwo"/>
      li-4ef74f: You didn't remarry before <fg-show path="/taxYear"/>
      li-939762: You have a dependent child who lives with you all year
      li-bad5a3: You pay more than half the cost of keeping up your home
    p-5b3ae2: <a target="_blank" href="https://www.irs.gov/filing/filing-status">Learn
      more about filing statuses<span class="usa-sr-only"> (opens in a new tab)</span>.</a>
  modal-qualifying-child-eitc:
    heading: Qualifying Child
    p-7356ad: To claim EITC with a qualifying child your child must have a valid SSN
      issued on or before the due date of your <fg-show path="/taxYear"/> return (including
      extensions).
    p-ac8914: If the Social Security card reads &quot;Valid for work with DHS authorization&quot;
      or “Valid for work with INS authorization” on it, it is a valid SSN if the authorization
      is still valid.
    p-558a40: 'For the EITC, we don''t accept:'
    ul-0:
