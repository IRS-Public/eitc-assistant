  h2-fee560: Your Filing Status is <fg-show path="/flowReadableFilingStatus"/>
  fg-alert-334e2e:
    heading: You don't qualify for the Earned Income Tax Credit (EITC)
    p-b6bd9e: You don't qualify for EITC without a qualifying child unless you, or
      your spouse if filing a joint return, are between age 25 and 64.
    p-ae739d: For more information, see <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596, Earned Income Credit</a>.
    p-6b339b: 'You can claim the EIC if you are married, not filing a joint return,
      had a qualifying child who lived with you for more than half of 2025, and either
      of the following apply:'
    ul-0:
      li-abca25: You lived apart from your spouse for the last 6 months of 2025, or
