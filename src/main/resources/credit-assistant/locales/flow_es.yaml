
/:
  title: Información general
  h2-5e286b: Información general
  p-c2c8a0: Responda algunas preguntas rápidas sobre usted para saber si califica.
  /chosenTaxYear: 
    question: 'Seleccione el año tributario para el que le gustaría corroborar la elegibilidad para el crédito tributario por ingreso del trabajo (EITC):'
    modalLink: <modal-link for="modal-tax-year">¿Qué año debería usar?</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien: 
    question: ¿Fue un ciudadano estadounidense o extranjero residente durante todo el año 2025?
    modalLink: <modal-link for="modal-citizen">¿Califico como ciudadano/a estadounidense o residente para EITC?</modal-link>
    options:
      'true':
        name: Sí
      'false':
        name: No
  fg-alert-8b7db9:
    heading: Usted no reúne los requisitos para el Crédito Tributario por Ingreso del Trabajo (EITC por sus siglas en inglés).
    p-091688: Debe ser un ciudadano estadounidense o extranjero residente para reclamar el crédito tributario por ingreso del trabajo. Consulte <a target="_blank" class="usa-link" href="https://www.irs.gov/es/forms-pubs/about-publication-519">la Publicación 519, Guía tributaria estadounidense para extranjeros</a>, para determinar si usted es un extranjero residente de los Estados Unidos durante todo el año.
    p-f72c3e: <strong>Aviso:</strong> eleccione <strong>Sí</strong> si presenta una declaración conjunta con su cónyuge para el año <fg-show path="/taxYear"/> y usted o su cónyuge fueron ciudadanos estadounidenses o extranjeros residentes durante todo el año.
    p-b85d77: No puede reclamar el crédito tributario por ingreso del trabajo porque usted no tiene un número de seguro social válido emitido en la fecha de vencimiento de su declaración de impuestos o antes de esta.
    p-93a6b5: Para obtener más información, visite <a target="_blank" class="usa-link" href="https://www.irs.gov/es/forms-pubs/about-publication-596">la Publicación 596, Crédito tributario por ingreso del trabajo.</a>
    p-4c0c0d: No puede reclamar el crédito por ingreso del trabajo si presentó <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">un Formulario 2555, Ingresos devengados en el extranjero (en inglés).</a>
    p-236b69: Consulte <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-54">la publicación Publicación 54, Guía tributaria para ciudadanos y residentes de los Estados Unidos que están en el extranjero (en inglés) </a> para obtener más información
    p-5e637b: No califica para el crédito tributario por ingreso del trabajo (EITC) si usted es el hijo calificado de alguien más para el crédito tributario por ingreso del trabajo (EITC).
    p-ec145e: Para obtener más información sobre si alguien lo puede reclamar como hijo calificado, visite <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publicación 596, Crédito por ingreso del trabajo, Usted no puede ser el hijo calificado de otra persona (en inglés)</a>.
    p-363ef2: No califica para el crédito tributario por ingreso del trabajo (EITC) si usted es la persona dependiente de alguien más a menos que tenga un hijo calificado para el crédito tributario por ingreso del trabajo (EITC).
  /hasValidSSN:
    question: ¿Usted tiene un Número de Seguro Social válido emitido en la fecha de vencimiento de la declaración del año 2025 o antes de esta (incluidas las prórrogas)?
    modalLink: <modal-link for="modal-valid-ssn-filer">¿Qué se considera un Número de Seguro Social válido?</modal-link>
    options:
      'true':
        name: Si
      'false':
        name: No
  /hasForeignEarnedIncome:
    question: ¿Presenta un Formulario 2555, Ingresos devengados en el extranjero?
    modalLink: <modal-link for="modal-foreign-income">¿Qué son ingreso devengado en el extranjero excluido de los ingresos brutos?</modal-link>
    options:
      'true':
        name: Si
      'false':
        name: No
  /isClaimedAsDependent:
    question: ¿Alguien más lo reclamará como persona dependiente o hijo calificado para el crédito tributario por ingreso del trabajo en la declaración de impuestos?
    modalLink: <modal-link for="modal-claimed-dependent">¿Cómo sé si soy como persona dependiente o hijo calificado?</modal-link>
    options:
      'true':
        name: Si
      'false':
        name: No
  /ageRange:
    question: Seleccione la franja que mejor describa su edad al final del año 2025
    options:
      under24:
        name: 24 años y menos
      age25to64:
        name: Entre 25 y 64 años
      65andOlder:
        name: 65 años y más 65 años y más
  modal-tax-year:
    heading: Año tributario
    p-aa5a47: 'Para el sueldo y otros ingresos devengados en:'
    ul-0:
      li-28dd34: 2025, seleccione 2025
      li-174a8b: 2024, seleccione 2024
      li-0a25dc: 2023, seleccione 2023
  modal-citizen:
    heading: Ciudadano estadounidense o extranjero residente
    p-18e680: Si usted no es un ciudadano de los Estados Unidos, se considera que es un extranjero.
    p-fe70ca: Se considera que usted es un extranjero residente para el crédito tributario por ingreso del trabajo si tiene una tarjeta verde o si vivió en los Estados Unidos durante más que un número determinado días.
    p-2c8f8f: Para obtener más información y excepciones importantes, consulte <a target="_blank"
      class="usa-link" href="https://www.irs.gov/es/forms-pubs/about-publication-519">la Publicación 519, Guía tributaria estadounidense para extranjeros</a>.
  modal-valid-ssn-filer:
    heading: Número de Seguro Social válido
    p-527528: Usted tiene que tener un número de Seguro Social (SSN por sus siglas en inglés) válido, emitido por la Administración de Seguro Social en o antes de la fecha de vencimiento de su declaración de impuestos del <fg-show
      path="/taxYear"/> (inclusive de las prórrogas).
    p-45ae0e: Si su tarjeta de Seguro Social tiene impresas las palabras “Valid for work with DHS authorization” o “Valid for work with INS authorization” (Válido para el empleo con autorización del Departamento de Seguridad Nacional (DHS por sus siglas en inglés)) o con la autorización del Servicio de inmigración y nacionalización (INS por sus siglas en inglés)), entonces el SSN es válido siempre que la autorización siga vigente.
    p-558a40: 'Para los propósitos del Crédito Tributario por Ingreso del Trabajo (EITC, por sus siglas en inglés), no aceptamos:'
    ul-0:
      li-5e5f3e: Número de identificación personal del contribuyente del IRS (ITIN, por sus siglas en inglés)
      li-5fc9b7: Número identificación del contribuyente en proceso de adopción (ATIN, por sus siglas en inglés)
      li-9f487b: Número de Seguro Social emitido luego de la fecha de vencimiento de la declaración, incluidas las prórrogas
      li-a69a30: Número de Seguro Social emitido únicamente para los propósitos de recibir un beneficio financiado con fondos federales, tal como el Medicaid.
    p-f554f7: Consulte <a target="_blank"
      class="usa-link" href="https://www.irs.gov/publications/p596sp"> Publicación 596</a> para más información sobre los números de Seguro Social válidos.
  modal-foreign-income:
    heading: Ingreso devengado en el extranjero excluido de los ingresos brutos
    p-f45b03: Esto hace referencia al ingreso que devengó fuera de los Estados Unidos, el Distrito de Columbia o las posesiones o territorios de los Estados Unidos que usted eligió excluir en <a target="_blank"
      class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">una Formulario 2555, Ingresos devengados en el extranjero (en inglés)</a>.
  modal-claimed-dependent:
    heading: Usted como persona dependiente o hijo calificado
    p-faf8d8: En la mayoría de los casos, no puede ser una persona dependiente o hijo calificado de otro contribuyente y reclamar el crédito tributario por ingreso del trabajo (EITC).
    p-98d6db: En la mayoría de los casos, si usted tiene menos de 19 años o es un estudiante menor de 24 años y vive con sus padres u otros parientes en los Estados Unidos durante más de la mitad del año, seleccione <strong>Sí</strong>.
    p-038f13: Si usted para efectos de la declaración de impuestos federales está casado y presenta una declaración conjunta, no puede ser reclamado como un dependiente, a menos que presente la declaración conjunta únicamente para reclamar un reembolso del impuesto sobre los ingresos retenido o de los impuestos estimados pagados.
    p-ceda6c: Para obtener más información sobre si alguien lo puede reclamar como persona dependiente, visite <a target="_blank"
      class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">¿A quién puedo reclamar como una persona dependiente (en inglés)</a>?
    p-d11380: Para obtener más información sobre si alguien lo puede reclamar como hijo calificado, visite <a target="_blank"
      class="usa-link" href="https://www.irs.gov/publications/p596sp"> Publicación 596, Crédito tributario por ingreso del trabajo, Usted no puede ser el hijo calificado de otra persona.</a>
    p-16aba9: Le preguntaremos sobre los hijos o parientes que usted podría reclamar más adelante.
  modal-primary-claimed-as-dependent:
    heading:
    p-d3187d:
    p-762495:
    ul-0:
      li-b17276:
      li-c82d5e:
      li-5a5073:
    p-752de3:
    p-5a0201:
  modal-confirm-tax-year-change:
    heading: Atención
    p-31c7da: El cambio de año borrará los datos ingresados anteriormente. ¿Desea continuar?
    button-70d9be: Confirmar
    button-ea4788: Cancelar
/filing-status:
  title: Estado civil para los efectos de la declaración
  h2-c01d87: Estado civil para los efectos de la declaración
  p-9bda8f: En este paso, se le harán preguntas sobre cómo planea presentar sus impuestos del año <fg-show path="/taxYear"/>.
  /knowsFilingStatus:
    question: ¿Conoce el estado civil para los efectos de la declaración que utilizará cuando presente de declaración de impuestos del año <fg-show path="/taxYear"/>?
  /initialFilingStatus:
    question: 'Seleccione el estado civil para los efectos de la declaración que utilizará cuando presente sus impuestos del año <fg-show path="/taxYear"/>:'
    modalLink: <modal-link for="modal-filing-status">¿Cuál estado civil debo usar?</modal-link>
    options:
      single:
        name: Soltero/a
      marriedFilingJointly:
        name: Casado/a que presenta una declaración conjunta
      marriedFilingSeparately:
        name: Casado/a que presenta una declaración por separado
      headOfHousehold:
        name: Cabeza de familia
      qualifiedSurvivingSpouse:
        name: Cónyuge sobreviviente que califica
  /maritalStatus:
    question: ¿Cuál fue su estado civil el 31 de diciembre del año <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-legal-separation">¿Qué significa estar en un matrimonio de hecho o estar legalmente separado?</modal-link>
    options:
      married:
        name: Casado/aCasado/a
      divorced:
        name: Divorciado/a o legalmente separado/a
      widowed:
        name: Cónyuge sobreviviente que califica
      single:
        name: Nunca se casóNunca se casó
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: ¿Cuándo falleció su cónyuge?
    options:
      taxYear:
        name: Durante el año 2025
      taxYearMinusOneOrTwo:
        name: Durante el año 2023 o 2024
      beforeTaxYearMinusTwo:
        name: Antes del 2023
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: ¿Cuándo falleció su cónyuge?
    options:
      taxYear:
        name: Durante el año 2024
      taxYearMinusOneOrTwo:
        name: Durante el año 2022 o 2023
      beforeTaxYearMinusTwo:
        name: Antes del 2022
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: ¿Cuándo falleció su cónyuge?
    options:
      taxYear:
        name: Durante el año 2023
      taxYearMinusOneOrTwo:
        name: Durante el año 2021 o 2022
      beforeTaxYearMinusTwo:
        name: Antes del 2021
  /isHOHMarried:
    question: ¿Está casado/a?
  /intendsToFileJointlyWidow:
    question: ¿Tiene la intención de presentar una declaración conjunta con el cónyuge que falleción para el año <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-joint-deceased-spouse">¿Qué significa presentar una declaración conjunta con un cónyuge fallecido?</modal-link>
  /intendsToFileJointlyMFJ:
    question: ¿Usted y su cónyuge planean presentar declaraciones conjuntas?
    modalLink: <modal-link for="modal-joint-return-mfj">¿Qué significa presentar una declaración conjunta?</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: ¿Usted y su cónyuge han tenido la misma residencia principal durante los últimos 6 meses del año <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-spouse-lived-together">¿Qué significa para los cónyuges vivir juntos?</modal-link>
  /samePrincipalResidenceLast6Months:
    question: ¿Usted y su cónyuge han tenido la misma residencia principal durante los últimos 6 meses del año <fg-show path="/taxYear"/>?
  /writableSeparationAgreement:
    question: ¿Estaba usted legalmente separado según las leyes en su estado, con un acuerdo de separación escrito o un decreto de manutención por separado, y no vivía con su cónyuge en el último día del <fg-show path="/taxYear"/>?
  /entitledToPreviouslyFileJointReturn:
    question: ¿Tenía derecho a presentar una declaración conjunta con su cónyuge el año en que falleció?
  /paidMoreThanHalfHomeCostsForChild:
    question: ¿En el año 2025, pagó más de la mitad del costo de mantener el hogar en el que vivió que también fue el hogar principal de su <span
      condition="/flowQSSQCQuestionText" operator="isTrue">hijo o hijastro</span><span condition="/flowQSSQCQuestionText" operator="isFalse">hijo dependiente, hijastro o hijo de crianza</span> para todo el año <fg-show path="/taxYear"/> (incluida cualquier ausencia temporal)?
    modalLink: <modal-link for="modal-keeping-up-home">¿Cómo calculo "Mantener un hogar"?</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: ¿Puede reclamar a su hijo o hijastro que vivió con usted como su persona dependiente para el año <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-claiming-dependents">¿A quién puedo reclamar como dependiente?</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: 'Podría reclamar a su hijo o hijastro como persona dependiente EXCEPTO que, en el año <fg-show path="/taxYear"/>: 1) El hjo tenía ingresos brutos que superaban el límite de <fg-show path="/eitcChildGrossIncomeLimit"/> para el año <fg-show path="/taxYear"/>; 2) El hijo presentó una declaración conjunta; o 3) ¿Usted podría ser reclamado como persona dependiente en la declaración de otra persona?'
    modalLink: <modal-link for="modal-claiming-dependents">¿A quién puedo reclamar como dependiente?</modal-link>
  /homeUpkeepScenario:
    question: ¿Pagó usted más del 50% del costo de la manutención del hogar para el año <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-keeping-up-home">¿Cómo calculo "Mantener un hogar"?</modal-link>
    options:
      livedWithDependent:
        name: Donde haya vivido más de la mitad del año con una persona dependiente (un hijo, nieto, hermano, sobrina, sobrino, padre/madre o abuelo)
      custodialParentNonDependent:
        name: Donde haya vivido más de la mitad del año con un hijo que no es su persona dependiente, a pesar de que sea el padre que tiene la custodia (por la regla para hijos de padres divorciados o separados)
      dependentParentElsewhere:
        name: Para un padre/madre que puede reclamar como persona dependiente, pero que no vivió con usted
      none:
        name: Ninguna de las opciones anteriores
  /secondaryFilerHasValidSSN:
    question: ¿Su cónyuge tiene un número de seguro social válido emitido en la fecha de vencimiento de la declaración del año <fg-show path="/taxYear"/> o antes de esta (incluidas las prórrogas)?
    modalLink: <modal-link for="modal-valid-ssn">¿Qué se considera un Número de Seguro Social válido?</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: ¿El cónyuge tenía un número de seguro social válido el día en que falleció?
    modalLink: <modal-link for="modal-valid-ssn">¿Qué se considera un Número de Seguro Social válido?</modal-link>
  /spouseAliveEndOfTaxYear:
    question: ¿Su cónyuge estuvo con vida el 31 de diciembre de <fg-show path="/taxYear"/>?
  /ageRangeSecondary:
    question: Seleccione la franja de edad que mejor describa la edad <span condition="/spouseAliveEndOfTaxYear"
      operator="isFalse">que tenía el cónyuge cuando falleció</span><span condition="/spouseAliveEndOfTaxYear"
      operator="isTrue">de su cónyuge al final del año <fg-show path="/taxYear"/></span>.
    options:
      under24:
        name: 24 años y menos
      age25to64:
        name: Entre 25 y 64 años
      65andOlder:
        name: 65 años y más
  /primaryFilerIsClaimingQualifyingChildren:
    question: ¿Tiene previsto solicitar el crédito tributario por ingreso del trabajo (EITC, en inglés) para sus hijos u otros familiares con números de Seguro Social válidos?
    modalLink: <modal-link for="modal-qualifying-child-eitc">¿A quién puedo reclamar para el Crédito Tributario por Ingreso del Trabajo (EITC)?</modal-link>
  /hasLivedInUSMore6Months:
    question: ¿Su hogar principal estuvo en los Estados Unidos durante más de la mitad del año <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-main-home-us">¿Qué se considera una vivienda principal en los Estados Unidos?</modal-link>
  h2-7864de: Según sus elecciones, su estado civil para los efectos de la declaración es <fg-show path="/flowReadableFilingStatus"/>
  fg-alert-334e2e:
    heading: Usted no reúne los requisitos para el Crédito Tributario por Ingreso del Trabajo (EITC por sus siglas en inglés).
    p-b6bd9e: Usted no califica para el EITC si no tiene un hijo calificado a menos que usted, o su cónyuge si presentan una declaración conjunta, tengan entre 25 y 64 años.
    p-ae739d: Para más información, consulte la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, el Crédito Tributario por Ingreso del Trabajo (EITC por sus siglas en inglés)</a>.
    p-47ef52: 'Usted puede reclamar el Crédito por Ingreso del Trabajo (EIC, por sus siglas en inglés) si para efectos de la declaración está casado, no presenta una declaración conjunta, tiene un hijo calificado que vivió con usted durante más de la mitad del <fg-show path="/taxYear"/> y le corresponde algunas de las siguientes situaciones:'
    ul-0:
      li-207749: Vivió por separado de su cónyuge durante los últimos 6 meses del <fg-show
        path="/taxYear"/>, ó
      li-93a6ef: Está separado legalmente de su cónyuge según las leyes en su estado, con un acuerdo de separación escrito o un decreto de manutención por separado, y no vivía en el mismo hogar que su cónyuge al final del <fg-show path="/taxYear"/>.
    p-3630b4: Para más información, consulte la página de información sobre la <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501" class="usa-link">About Publication 501, Dependents, Standard Deduction, and Filing Information.<span class="usa-sr-only"> (abre en una nueva pestaña)</span></a> (Publicación 501, dependientes, deducción estándar e información para la presentación de la declaración) en inglés.
    p-99f873: No puede reclamar el crédito tributario por ingreso del trabajo porque su cónyuge no tiene un Número de Seguro Social válido emitido en la fecha de vencimiento de su declaración de impuestos o antes de esta.
    p-91ee91: No puede reclamar el crédito tributario por ingreso del trabajo si elige presentar una declaración conjunta con su cónyuge fallecido porque su cónyuge no tenía un número de seguro social válido el día en que falleció.
    p-d4d927: Es posible que califique para el crédito tribuario por ingreso del trabajo (EITC) si no presenta una declaración conjunta con el cónyuge que falleció.
    p-065d1b: Para reclamar el crédito tributario por ingreso del trabajo, su hogar debe haber sido en los Estados Unidos durante más de la mitad del Año year. Los Estados Unidos incluyen los 50 estados y el Distrito de Columbia.
  modal-filing-status:
    heading: ¿Cuál estado civil debo usar?
    p-c0b92c: Si no hubo un cambio en tu estado civil o situación familiar este año, podrías usar el estado civil de tu declaración del <fg-show path="/lastTaxYear"/>.
    p-391f95: Si hubo un cambio en tu estado civil o situación familiar en el último año, podrías necesitar usar un estado civil diferente para una estimado más preciso.
    p-496916: Cada estado civil tiene requisitos diferentes.
    p-49f30f: <strong>Soltero(a):</strong>
    ul-0:
      li-c717a5: No puedes estar casado(a)
    p-5f63cd: <strong>Casado que presenta una declaración conjunta:</strong>
    ul-1:
      li-6aab7e: Estás casado(a) o tu esposo(a) falleció durante el año
    p-80c02f: <strong>Casado que presenta una declaración por separado:</strong>
    ul-2:
      li-595e35: Estás casado(a)
      li-1e72dd: No presentarás una declaración con tu esposo(a) (la mayoría de las personas ahorra dinero presentando una declaración conjunta)
    p-d69332: <strong>Cabeza de familia:</strong>
    ul-3:
      li-dfe41a: No puedes estar casado (o no se te considera casado para propósitos de impuestos)
      li-38ff2f: Pagaste más de la mitad del costo de mantener un hogar para un miembro de tu familia o miembro de tu hogar durante un período específico de tiempo y esta persona tiene que cumplir con ciertos requisitos
    p-57317d: <strong>Esposo(a) sobreviviente calificado:</strong>
    ul-4:
      li-2bf38a: Tu esposo(a) falleció en el <fg-show path="/lastTaxYear"/> ó <fg-show path="/taxYearMinusTwo"/>
      li-4ef74f: No te volviste a casar antes del <fg-show path="/taxYear"/>
      li-939762: Tienes un hijo(a) dependiente que vive contigo todo el año
      li-bad5a3: agas más de la mitad del costo de mantener tu hogar
    p-5b3ae2: <a target="_blank" class="usa-link" href="https://www.irs.gov/es/filing/filing-status">Conoce más sobre cada estado civil<span class="usa-sr-only"> (abre en una nueva pestaña)</span></a>
  modal-qualifying-child-eitc:
    heading: Hijo calificado
    p-7356ad: Para poder reclamar el Crédito Tributario por Ingreso del Trabajo (EITC, por sus siglas en inglés) con un hijo calificado, dicho hijo tiene que tener un número de Seguro Social válido, emitido por la Administración de Seguro Social en o antes de la fecha de vencimiento de su declaración de impuestos para el <fg-show path="/taxYear"/> (inclusive de las prórrogas).
    p-ac8914: Si la tarjeta del Seguro Social indica "Válida para trabajar con autorización del DHS" o "Válida para trabajar con autorización del INS", se trata de un número de Seguro Social válido si la autorización sigue vigente.
    p-558a40: 'Para los propósitos del EITC, no aceptamos:'
    ul-0:
      li-5e5f3e: Número de identificación personal del contribuyente del IRS (ITIN por sus siglas en inglés)
      li-5fc9b7: Número identificación del contribuyente en proceso de adopción (ATIN por sus siglas en inglés)
      li-9f487b: Número de Seguro Social emitido luego de la fecha de vencimiento de la declaración, incluidas las prórrogas
      li-19d3d7: Número de Seguro Social emitido únicamente para los propósitos de recibir un beneficio financiado por fondos federales, tal como el Medicaid.
    p-0d323a: 'Su hijo es un hijo calificado si el hijo cumple los cuatro requisitos. Los requisitos son:'
    ul-1:
      li-fbc977: Parentesco,
      li-9d8d2d: Edad,
      li-23863d: Residencia, y
      li-ca34c2: Declaración conjunta
    p-e00960: Para más información, consulte la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596</a>, y obtener información sobre un número de Seguro Social válido y si tiene un hijo calificado.
  modal-main-home-us:
    heading: Hogar principal en los Estados Unidos
    p-9cbbc6: Su hogar debe haber sido en los Estados Unidos durante más de la mitad del año <fg-show path="/taxYear"/>.
    p-775779: Los Estados Unidos incluyen los 50 estados y el Distrito de Columbia. No incluye las Posesiones de los Estados Unidos, como, por ejemplo, Guam, las Islas Vírgenes o Puerto Rico.
    h3-398dfd: Personal militar destacado fuera de los Estados Unidos
    p-7dbfa0: Si usted es un miembro del personal militar de los Estados Unidos y estuvo destacado fuera de los Estados Unidos en servicio activo prolongado, seleccione <strong>Sí</strong>.
  modal-keeping-up-home:
    heading: Mantener un hogar
    p-c0958f: Si el total de lo que usted pagó es más de la mitad del costo total, usted cumple con el requisito de pagar más de la mitad del costo de la manutención del hogar.
    h3-e8b30a: 'Los costos incluyen:'
    ul-0:
      li-b9b2e1: Alquiler, intereses hipotecarios, impuestos sobre bienes inmuebles, y seguro para el hogar
      li-313963: Reparaciones y servicios públicos
      li-61e699: Comida consumida en la casa
    p-fec463: <strong>Nota:</strong> Los costos pagados con la asistencia pública se consideran costos pagados por el contribuyente.
    h3-3e0b53: 'Los costos no incluyen:'
    ul-1:
      li-edaa99: Ropa, educación, y gastos de vacaciones
      li-40b84f: Tratamientos médicos, pagos del seguro médico, y medicamentos recetados
      li-5eae2b: Seguro de vida
      li-c64365: Costos de transporte, tal como seguro, pagos de arrendamiento, o transporte público
      li-04dec0: El valor de sus servicios o los de un miembro de su hogar
  modal-legal-separation:
    heading: Separación legal y matrimonio de hecho
    h3-ef7665: Legalmente separados
    p-198345: '"Legalmente separado" para este propósito significa estar legalmente separado de conformidad con un fallo de divorcio o manutención por separación judicia'
    h3-357344: Matrimonio de hecho
    p-f560ea: Algunos estados permiten los matrimonios de hecho. Corrobore con su estado para conocer si se considera que está casado/a de conformidad con el derecho consuetudinario.
  modal-joint-return-mfj:
    heading: Declaración conjunta
    p-75997a: Puede elegir presentar una declaración con su cónyuge seleccionando <strong>Casado/a que presenta una declaración conjunta</strong> como su estado civil para los efectos de la declaración. Esto le permite combinar sus ingresos y gastos cuando calcula sus créditos, deducciones y obligación tributaria.
  modal-joint-deceased-spouse:
    heading: Declaración conjunta con un cónyuge fallecido
    p-85e581: Si su cónyuge falleció durante el año <fg-show path="/taxYear"/>, puede elegir presentar una declaración con su cónyuge seleccionado <strong>Casado/a que presenta una declaración conjunta</strong> como su estado civil para los efectos de la declaración. Esto le permite combinar sus ingresos y gastos cuando calcula sus créditos, deducciones y obligación tributaria.
  modal-spouse-lived-together:
    heading: Cónyuge - Vivieron juntos
    p-906815: 'Se considera que una persona ha vivido con usted durante los períodos cuando uno o ambos estuvieron ausentes temporalmente debido a circunstancias especiales tales como:'
    ul-0:
      li-8ec6de: Enfermedad,
      li-de7a22: Educación,
      li-d6e6cb: Negocio,
      li-2c48dd: Vacaciones, o
      li-8fdca6: Servicio militar.
    p-2392bb: Debe ser razonable suponer que la persona ausente regresará al hogar luego de la ausencia temporal.
  modal-valid-ssn:
    heading: Número de Seguro Social válido
    p-527528: Usted tiene que tener un número de Seguro Social (SSN por sus siglas en inglés) válido, emitido por la Administración de Seguro Social en o antes de la fecha de vencimiento de su declaración de impuestos del <fg-show path="/taxYear"/> (inclusive de las prórrogas).
    p-45ae0e: Si su tarjeta de Seguro Social tiene impresas las palabras “Valid for work with DHS authorization” o “Valid for work with INS authorization” (Válido para el empleo con autorización del Departamento de Seguridad Nacional (DHS por sus siglas en inglés)) o con la autorización del Servicio de inmigración y nacionalización (INS por sus siglas en inglés)), entonces el SSN es válido siempre que la autorización siga vigente.
    p-558a40: 'Para los propósitos del Crédito Tributario por Ingreso del Trabajo (EITC, por sus siglas en inglés), no aceptamos:'
    ul-0:
      li-5e5f3e: Número de identificación personal del contribuyente del IRS (ITIN, por sus siglas en inglés)
      li-5fc9b7: Número identificación del contribuyente en proceso de adopción (ATIN, por sus siglas en inglés)
      li-9f487b: Número de Seguro Social emitido luego de la fecha de vencimiento de la declaración, incluidas las prórrogas
      li-a69a30: Número de Seguro Social emitido únicamente para los propósitos de recibir un beneficio financiado con fondos federales, tal como el Medicaid.
    p-f554f7: Consulte la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596</a> para más información sobre los números de Seguro Social válidos.
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: Confirmación
    p-30861e: Cambiar de <strong>Casado que presenta declaración conjunta</strong> a otro estado civil para la declaración de impuestos borrará los datos del hijo que haya ingresado previamente. ¿Desea continuar?
    button-70d9be: Confirmar
    button-ea4788: Cancel
  modal-claiming-dependents:
    heading: ¿A quién puedo reclamar como dependiente?
    p-fc792e: "Los dependientes típicamente son:"
    ul-0:
      li-7673e2: Hijos menores de 19 años
      li-e9750c: Estudiantes menores de 24 años que viven con sus padres
      li-9a6fc3: Parientes o miembros de tu hogar que reciben de ti más de la mitad de sus costos de vida y tienen un sueldo bruto menor de <fg-show path="/eitcChildGrossIncomeLimit"/>
    p-6b3acc: No puedes reclamar a tu esposo(a) como tu dependiente si presentan una declaración conjunta.
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/es/credits-deductions/individuals/dependents">Conoce más sobre los dependientes.</a>
