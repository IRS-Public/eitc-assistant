  p-35b0d2: |-
    Puede usar la aplicación móvil
            <a target="_blank" class="usa-link" href="https://www.irs.gov/es/help/irs2goapp">
              IRS2Go app<span class="usa-sr-only"> (se abre en una pestaña nueva)</span>
            </a>
            para verificar el estado de tu reembolso, hacer un pago, encontrar asistencia gratuita para la preparación de impuestos, registrarte para recibir consejos útiles sobre impuestos y más!
