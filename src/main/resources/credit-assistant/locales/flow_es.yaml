  modal-student-loan-interest:
    heading: Deducción de los intereses del préstamo para estudios
    p-3ac7ce: Ingrese hasta <fg-show path="/maxStudentLoanDeduction"/> de los intereses que pagó sobre su préstamo estudiantil calificado. Puede encontrar esto en su Formulario 1098-E si pagó más de $600 en intereses.
    p-e4b825: 'El préstamo debe haber pagado gastos de educación superior calificados para asistir a una institución educativa elegible. Además, los gastos deben haber sido:'
    ul-0:
      li-bb1c73: Para usted, su cónyuge o una persona que era su dependiente cuando obtuvo el préstamo;
      li-829f26: Pagados o incurridos en un período de tiempo razonable antes o después de obtener el préstamo; y
      li-562ff0: Para la educación impartida durante un período académico para un estudiante elegible.
    p-75f422: No puede reclamar la deducción si no tiene la obligación legal de realizar pagos sobre el préstamo.
    p-1f2dd3: Para obtener más información, consulte la <a target="_blank" href="https://www.irs.gov/es/forms-pubs/about-publication-970" class="usa-link">Publicación 970, Beneficios tributarios por educación (en inglés)<span class="usa-sr-only"> (opens in a new tab)</span></a>.
  modal-educator-expenses:
    heading: Deducción de los gastos de educador
    p-e117c8: 'Si trabaja es un/a maestro/a, ingrese hasta <fg-show path="/maxEducatorExpensesNonMFJ"/>
          (<fg-show path="/maxEducatorExpensesMFJ"/> si está casado/a y presenta una declaración
          conjunta y si usted y su cónyuge son maestros) de los gastos no reembolsados
          tales como:'
    ul-0:
      li-8829c6: Honorarios por la participación en cursos de desarrollo profesional
      li-751127: Libros y materiales
      li-0c78ca: Equipamiento de computación (incluidos los servicios y software relacionados)
      li-6ef6c8: Otro equipamiento
      li-6d4170: Materiales complementarios que se utilizan en el salón de clase
    p-86c6e4: Para obtener más información, visite <a target="_blank" href="https://www.irs.gov/es/taxtopics/tc458"
      class="usa-link">Tema del IRS 458<span class="usa-sr-only"> (opens in a new tab)</span></a>.
  modal-ira-contributions:
    heading: Deducción de la cuenta IRA
    p-5979d5: Ingrese cualquier aportación a una cuenta IRA que realizó fuera de sus
      aportaciones de la nómina.
    p-a49375: Para obtener más información, consulte <a target="_blank" href="https://www.irs.gov/retirement-plans/ira-deduction-limits"
      class="usa-link">Límites en la deducción de la cuenta IRA (en inglés)<span
      class="usa-sr-only"> (opens in a new tab)</span></a>.
  modal-self-employed-retirement:
    heading: Planes SEP, SIMPLE y otros planes que califican
    p-ca0a8f: 'Si trabaja por cuenta propia, calcula la compensación de su plan calificado restando lo siguiente de su ingreso neto del trabaja por cuenta propia:'
    p-0d133f:
    ul-0:
      li-6c246a: La parte deducible de su impuesto sobre el trabajo por cuenta propia
        (SE, por las siglas en inglés) de su declaración del Formulario 1040, página
        1 y
      li-a2595a: El monto de la aportación a su plan de jubilación de su declaración
        del Formulario 1040, página 1, en la línea correspondiente a los planes SEP,
        SIMPLE y planes calificados para trabajadores por cuenta propia.
      li-f6cddf:
    p-3622b4:
    ul-1:
      li-ff93fe:
      li-200ab4:
      li-e7dbe4:
      li-765afa:
    p-af5a4a:
    p-add56c:
    p-3248f2: Para obtener más información, consulte <a target="_blank" href="https://www.irs.gov/retirement-plans/self-employed-individuals-calculating-your-own-retirement-plan-contribution-and-deduction"
      class="usa-link">Trabajadores por cuenta propia - Cómo calcular sus aportaciones
      y deducciones de su propio plan de jubilación (en inglés)<span class="usa-sr-only">
      (opens in a new tab)</span></a>.
  modal-hsa-deductions:
    heading: Deducción de una cuenta de ahorro para la salud
    p-2ab752: Ingrese cualquier aportación a una cuenta de ahorro para la salud (HSA)
      que no está incluida en la sección de las cuentas HSA, FSA y otros "planes
      cafetería".
    p-a7d9fc: Para obtener más información, visite <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-969"
      class="usa-link">Información sobre la Publicación 969, Cuentas de ahorro para
      la salud y otros planes de salud favorecidos por los impuestos (en inglés)<span
      class="usa-sr-only"> (opens in a new tab)</span></a>.
  modal-alimony-paid:
    heading: Pensión para el cónyuge divorciado pagada
    p-fa1de9: Se pagó la pensión para el cónyuge divorciado o la manutención por separación
      conforme a una orden judicial ejecutada antes del 1 de enero de 2019 y la orden
      no indicaba específicamente que no puede deducir sus pagos, ingrese aquí el monto
      que pagó durante el año.
    p-7b97e1: 'No incluya los montos que usted pagó por:'
    p-7948e4: <strong>Family or child support</strong>
    p-358bc5: Tampoco incluya los montos si se modificó la orden judicial o si indica
      que no puede deducir sus pagos.
    p-06a405:
    p-4b335c: Para obtener más información, visite <a target="_blank" href="https://www.irs.gov/taxtopics/tc452"
      class="usa-link">Tema tributario 452<span class="usa-sr-only"> (opens in a
      new tab)</span></a>.
  modal-early-withdrawal:
    heading: Multa por retiro prematuro de los ahorros
    p-7e8d5b: Si retiró fondos de un certificado de depósito u otra cuenta de intereses
      diferidos antes del vencimiento, es posible que se le cobre una multa. Puede
      encontrar esta multa en el Formulario 1099-IN, en la casilla 2. Ingrese aquí
      el monto.
  modal-moving-expenses:
    heading: Gastos de mudanza
    p-6f18fd: 'Si es un miembro de las fuerzas armadas en servicio activo, y se le
          ordenó que cambiara su lugar de asignación de manera permanente, ingrese aquí
          cualquier gasto de mudanza que las fuerzas armadas no le reembolsaron. Los gastos
          de mudanza incluyen los siguientes:'
    ul-0:
      li-60efa3: Viaje directo de su hogar anterior al nuevo
      li-efbbb1: Costo para empaquetar y trasladar sus efectos personales
    p-6536cb: Para obtener más información, visite <a target="_blank" href="https://www.irs.gov/es/taxtopics/tc455"
      class="usa-link">Tema tributario 455<span class="usa-sr-only"> (opens in a
      new tab)</span></a>.
  modal-employee-business-expenses:
    heading: Ciertos gastos de negocio del empleado
    p-c92011: 'Si usted es:'
    ul-0:
      li-9bde67: Reservista de las fuerzas armadas
      li-053ac1: Artista escénico calificado
      li-e03b09: Funcionario del gobierno estatal o local que recibe honorarios
      li-0d1488: Empleado con gastos de trabajo relacionados con una discapacidad
    p-cc9b68: Puede incluir los gastos que son comunes y aceptados en su ámbito
      comercial, negocio o profesión, o los gastos por cosas que son de ayuda y adecuadas
      para su negocio.
    p-d46373: Si no entra en ninguna de las categorías enumeradas, no puede reclamar
      los ajustes para estos gastos.
    p-eb68a5: Para obtener más información y una lista de los gastos calificados,
      consulte <a target="_blank" href="https://www.irs.gov/forms-pubs/about-form-2106"
      class="usa-link">Formulario 2106, Gastos de negocio del empleado (en inglés)<span
      class="usa-sr-only"> (opens in a new tab)</span></a>.
  modal-self-employed-health-insurance:
    heading: Deducción del seguro de salud del trabajo por cuenta propia
    p-598073: Ingrese el monto que pagó para el seguro de salud para usted, su cónyuge
      y sus personas dependientes, si trabaja por cuenta propia.
    p-d60394:
    p-13dece: Para obtener más información, consulte el <a target="_blank" href="https://www.irs.gov/publications/p535"
      class="usa-link">Capítulo 6 de la Publicación 535, Gastos de negocio para la
      información de elegibilidad (en inglés)<span class="usa-sr-only"> (opens in a
      new tab)</span></a>.
/qualifying-children:
  title: Hijos que reúnen los requisitos
  h2-dbaf54: Hijos que reúnen los requisitos
  p-9b177d: Según sus respuestas anteriores, no tiene ningún hijo calificado. Si esto no es así, vuelva a <a class="usa-link" href="/app/eitc/es/filing-status/">Estado civil para los efectos de la declaración</a> y cambie sus respuestas. 
  p-c1a0dd: Vaya al siguiente paso para ver los resultados.
  p-3178be: En este paso, veremos cuántos de sus hijos u otros familiares son sus hijos calificados a efectos de solicitar y calcular el EITC.
  p-e28c1e: Puede solicitar el EITC para un máximo de tres hijos calificados.
  p-adf161: Para solicitar el crédito tributario por ingresos del trabajo, debe tener un hijo calificado.
  collection/familyAndHousehold:
    /familyAndHousehold/*/livedWithYouUS:
      question: ¿Este menor ha vivido con usted más de la mitad de <fg-show path="/taxYear"/> en los Estados Unidos?
      modalLink: <modal-link for="modal-residency">¿Qué significa "vivir contigo"?</modal-link>
    fg-alert-b7d816:
      heading: El menor no califica para el crédito tributario por ingreso del trabajo (EITC)
      p-7666ea: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo</a>.
    /familyAndHousehold/*/someoneElseCanClaim:
      question: ¿Alguien más puede reclamar a este hijo para recibir el crédito tributario por ingreso del trabajo (EITC)?
      modalLink: <modal-link for="modal-claimed-someone-else">¿Qué ocurre si más de una persona puede reclamarlos?</modal-link>
    /familyAndHousehold/*/isClaimingQCRegardless:
      question: Es posible que no pueda reclamar a un hijo para el crédito tributario por ingreso del trabajo (EITC) si ciertas personas elegibles también lo reclaman. ¿Aún desea reclamar a este hijo?
      modalLink: <modal-link for="modal-claimed-someone-else">¿Qué ocurre si más de una persona puede reclamarlos?</modal-link>
    /familyAndHousehold/*/marriedFilingJointly:
      question: ¿Este hijo está casado y presentará una declaración conjunta con su cónyuge para el año <fg-show path="/taxYear"/>?
      modalLink: <modal-link for="modal-joint-return">¿Puedo reclamar como dependiente a alguien que presenta una declaración conjunta?</modal-link>
    /familyAndHousehold/*/mfjForRefundOnly:
      question: ¿Este hijo presenta una declaración conjunta para el año <fg-show path="/taxYear"/> solo para reclamar un reembolso de impuestos retenidos o impuestos estimados pagados y no reclamará ningún crédito tributario como el crédito tributario por ingreso del trabajo (EITC)?
      modalLink: <modal-link for="modal-joint-return-with-another-person-exception">¿Cuándo puede reclamar a alguien que presenta una declaración conjunta?</modal-link>
    /familyAndHousehold/*/isPermanentlyDisabled:
      question: ¿Este hijo está incapacitado permanente y totalmente?
      modalLink: <modal-link for="modal-disabled">¿Qué se considera incapacidad permanente y total?</modal-link>
    /familyAndHousehold/*/relationship:
      question: 'Seleccione el parentesco de este hijo con usted:'
      modalLink: <modal-link for="modal-relationship">¿Quién se considera hijastro, hijo adoptivo o hijo de crianza?</modal-link>
      options:
        childStepFoster:
          name: Hijo, hija, hijastro, hijastra, hijo adoptivo, hija adoptiva o hijo o hija de crianza
        sibling:
          name: Hermano, hermana, medio hermano, media hermana o hermanastro o hermanastra
        descendant:
          name: Nieto, nieta, sobrina o sorbino
        none:
          name: Ninguna de las opciones anteriores
    /familyAndHousehold/*/ageRange:
      question: ¿Cuántos años tenía este hijo al final del año <fg-show path="/taxYear"/>?
      options:
        under19:
          name: 18 años o menos
        between19And23:
          name: Entre 19 y 23 años
        over24:
          name: 24 años o más
    /familyAndHousehold/*/isFullTimeStudent:
      question: ¿Este hijo fue un estudiante a tiempo completo durante alguna parte de cualquier período de 5 meses durante el año tributario?
      modalLink: <modal-link for="modal-student">¿Cómo puedo saber si esta persona es estudiante a tiempo completo?</modal-link>
    /familyAndHousehold/*/isQCYoungerThanSelfOrSpouse:
      question: ¿Esta persona dependiente es más joven que <span condition="/isFilingStatusMFJ"
        operator="isFalse">usted?</span><span condition="/isFilingStatusMFJ" operator="isTrue">usted o su cónyuge?</span>?
      modalLink: <modal-link for="modal-age-comparison">¿Por qué preguntamos si son más jóvenes que <span condition="/isFilingStatusMFJ" operator="isFalse">usted?</span><span
        condition="/isFilingStatusMFJ" operator="isTrue">usted o su cónyuge?</span></modal-link>
    /familyAndHousehold/*/validSSN:
      question: ¿Este hijo tiene un seguro social válido emitido en la fecha de vencimiento de la declaración o antes de esta (incluidas las prórrogas)?
      modalLink: <modal-link for="modal-valid-ssn-qc">¿Qué se considera un número de Seguro Social válido?</modal-link>
    fg-alert-a004cd:
      heading: Tenga en cuenta
      p-8374d8: Este hijo es un hijo que califica. Pero, como no tiene un número de seguro social válido, este hijo no lo hace elegible para un aumento en el crédito por ingreso del trabajo.
    h2-eaf308: Este menor califica para solicitar y calcular el EITC.
  p-5aea65: Según sus datos, tiene <fg-show path="/eitcQualifyingChildren"/> hijos calificados con números de Seguro Social válidos. Puede solicitar el EITC para un máximo de tres hijos calificados.
  fg-alert-9510e7:
    heading: Debes tener un hijo calificado 
    p-b6bd9e: Usted no califica para el EITC si no tiene un hijo calificado a menos que usted, o su cónyuge si presentan una declaración conjunta, tengan entre 25 y 64 años.
    p-93a6b5: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo</a>.
  fg-alert-64891c:
    heading: Usted no reúne los requisitos para el Crédito Tributario por Ingreso del Trabajo (EITC por sus siglas en inglés).
    p-cdf53e: Según los montos que ingresó, no puede reclamar el crédito por ingreso del trabajo porque sus ingresos del trabajo superan el límite para su estado civil para los efectos de la declaración y el número de hijos que reúnen los requisitos.
    p-93a6b5: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo</a>.
  h2-34370a: Según sus datos, tiene <fg-show path="/eitcQualifyingChildren"/> hijos calificados con números de Seguro Social válidos. 
  modal-residency:
    heading: ¿Qué significa "Vivir contigo"?
    h3-7c913b: Vivió con usted
    p-ff8f12: Un hijo calificado debe tener el mismo hogar principal que usted durante más de la mitad de <fg-show path="/taxYear"/> y ese hogar debe ser en los Estados Unidos. Estados Unidos incluye los 50 estados y el Distrito de Columbia. No incluye Puerto Rico ni territorios de Estados Unidos como Guam. En cuanto al crédito tributario por ingreso del trabajo (EITC, por sus siglas en inglés), el IRS considera que el personal militar estadounidense destinado fuera de los Estados Unidos en servicio activo prolongado tiene un hogar principal en los Estados Unidos durante ese período de servicio.
    h3-46d8f4: Nacimiento o fallecimiento de un hijo
    p-e27b79: Si el hijo nació o falleció en el año <fg-show path="/taxYear"/>, debe haber vivido con usted por más de la mitad del año en que estuvo vivo.
    h3-16617c: Hijos adoptados o de crianza
    p-c623b2: Si usted adoptó a un hijo en el <fg-show path="/taxYear"/>, el hijo fue puesto bajo su custodia legalmente para que usted luego lo adoptara en el <fg-show path="/taxYear"/>, o si el hijo fue hijo de crianza elegible puesto bajo su custodia durante el <fg-show path="/taxYear"/>, su vivienda principal tiene que haber sido la vivienda principal del hijo durante más de la mitad del tiempo a partir del momento en que fue adoptado o puesto bajo su custodia en el <fg-show path="/taxYear"/>.
    h3-6839b6: Ausencia temporal
    p-658cca: 'Para el Crédito tributario por ingreso del trabajo, una ausencia temporal cuenta como tiempo vivido con usted. Algunos ejemplos son:'
    ul-0:
      li-76cf60: Enfermedad y hospitalización
      li-1b3986: Asistencia a la escuela, vaciones, negocio o servicio militar
      li-dae417: Detención en una institución penitenciaria para jóvenes
      li-de99d6: Hijo secuestrado
    p-8b99ed: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo, Requisito de la residencia</a>.
  modal-joint-return:
    heading: Declaración conjunta con otra persona
    p-9b8921: Por lo general, no se puede reclamar a una persona casada como un hijo calificado para el Crédito tributario por ingreso del trabajo si él o ella presenta una declaración conjunta.
    p-bdfc89: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo, Requisito de la declaración conjunta</a>.
  modal-joint-return-with-another-person-exception:
    heading: Excepción de la declaración conjunta con otra persona
    p-93a25e: Puede reclamar a una persona casada que presenta una declaración conjunta como un hijo calificado para el Crédito tributario por ingreso del trabajo si el hijo y el cónyuge presentan la declaración conjunta solo para solicitar un reembolso del impuesto sobre el ingreso retenido de su paga o los impuestos estimados que pagaron. No pueden reclamar ningún crédito como el Crédito tributario por ingreso del trabajo en su declaración.
    p-bdfc89: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo, Requisito de la declaración conjunta</a>.
  modal-disabled:
    heading: Incapacitado permanente y totalmente
    p-a09e23: 'Para el Crédito tributario por ingreso del trabajo, se considera que un hijo tiene una incapacidad permanente y total si las siguientes dos condiciones son verdaderas:'
    ul-0:
      li-35e112: El hijo no puede realizar tareas significativas durante un período de tiempo razonable mientras trabaja por una paga o ganancia en una situación laboral competitiva por, al menos, el sueldo mínimo debido a una enfermedad física o mental, y
      li-f9618f: Un médico determina que la enfermedad ha durado o puede durar de forma continuada durante al menos un año o que puede causar la muerte
    p-de127e: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo, Permanente y totalmente incapacitado.</a>
  modal-relationship:
    heading: Hijastros, hijos adoptivos y hijos de crianza
    h3-523a2e: Hijastro
    p-3a1769: El parentesco de familias ensambladas se forma producto de un matrimonio. Para el Crédito tributario por ingreso del trabajo, un parentesco producto.
    h3-3cc097: Hijo adoptivo
    p-165b15: Un hijo adoptado siempre es considerado como hijo propio. Este término incluye a un hijo que ha sido colocado legalmente con usted para su adopción legal.
    h3-872822: Hijo de crianza
    p-d91342: Puede reclamar a un hijo de crianza solo si el niño fue colocado con usted por una agencia de colocación autorizada o por orden judicial.
    h3-2fd110: Agencia de adoptciones autorizada
    p-b80621: Este término incluye una agencia gubernamental estatal o local o un gobierno de tribus indígenas. También incluye a una organización libre de impuestos autorizada por un estado o un gobierno de tribus indígenas.
  modal-student:
    heading: Definición de "estudiante a tiempo completo"
    h3-f803ae: Estudiante a tiempo completo
    p-ef6d3a: Para ser considerado a tiempo completo, el estudiante debe haberse inscripto en la cantidad de horas o cursos que la escuela considera como asistencia a tiempo completo.
    p-69b838: Los estudiantes que tienen empleos de "co-op" en empresas privadas como parte de un curso regular de formación presencial y práctica se consideran estudiantes a tiempo completo.
    h3-754ddf: Definición de escuela
    p-dfaecc: 'Para el EITC, una escuela es:'
    ul-0:
      li-5f78b0: Escuela primaria
      li-f8aab3: Escuela media o secundaria
      li-39d2fa: Instituto superior o universidad
      li-96892f: Escuela técnica, de oficios o mecánica
    p-986cc5: 'Una escuela no es:'
    ul-1:
      li-775eb9: Curso de capacitación en el trabajo
      li-b2e8f2: Educación a distancia
      li-767c35: Escuela que ofrece cursos solo a través de Internet
    p-81198a: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Definición de estudiante y definición de escuela.</a>.
  modal-valid-ssn-qc:
    heading: Número de seguro social válido para el hijo que reúne los requisitos
    p-d68f7a: El monto de su crédito tributario por ingreso del trabajo depende del número de hijos que reúnen los requisitos que usted tiene con un número de seguro social válido. Cada hijo o pariente que usted reclame a los efectos de calcular el monto del crédito tributario por ingreso del trabajo debe tener un número de seguro social (SNN) válido que la Administración de Seguro Social haya emitido en la fecha de vencimiento de la declaración de impuestos o antes (incluidas las prórrogas).
    p-0464ad: Para el crédito tributario por ingreso del trabajo, un SSN es un SSN válido a menos que tenga impreso el texto "No válido para un empleo" en la tarjeta de seguro social y que se haya emitido el número únicamente para permitir al beneficiario del SSN solicitar o recibir un beneficio financiado con fondos federales. Un ejemplo de un beneficio financiado con fondos federales es Medicaid.
    p-a708ff: Aceptamos una Tarjeta de Seguro Social que tenga impreso el texto "Válido para trabajar con la autorización del DHS" siempre y cuando la autorización del DHS sea válida.
    p-558a40: 'Para los propósitos del EITC, no aceptamos:'
    ul-0:
      li-5e5f3e: Número de identificación personal del contribuyente del IRS (ITIN por sus siglas en inglés)
      li-5fc9b7: Número identificación del contribuyente en proceso de adopción (ATIN por sus siglas en inglés)
      li-19d3d7: Número de Seguro Social emitido luego de la fecha de vencimiento de la declaración, incluidas las prórrogas
  modal-claimed-someone-else:
    heading: Reclamado en la declaración de impuestos de alguien más
    p-9b277e: Solo una persona puede reclamar a cada hijo para el Crédito tributario por ingreso del trabajo.
    p-911aff: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo, Solo una persona puede utilizar a su hijo calificado</a>.
  modal-age-comparison:
    heading: El hijo tiene que ser menor que <span condition="/isFilingStatusMFJ" operator="isFalse">usted</span><span
        condition="/isFilingStatusMFJ" operator="isTrue">usted o su cónyuge</span>
    p-626c78: Para ser un hijo calificado, el niño debe ser menor que <span condition="/isFilingStatusMFJ" operator="isFalse">usted</span><span condition="/isFilingStatusMFJ" operator="isTrue">usted o su cónyuge</span>, a menos que tenga una discapacidad permanente y total en cualquier momento del año <fg-show path="/taxYear"/>.
    p-1a035f: Para obtener más información, visite la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, Crédito por ingreso del trabajo, Requisito de edad</a>.
