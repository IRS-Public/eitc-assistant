
/:
  title: Acerca de ti
  h2-5e286b: Acerca de ti
  p-c2c8a0: Cuéntanos sobre ti. Tus respuestas nos ayudarán a determinar si califica para el Crédito tributario por ingreso del trabajo (EITC, por sus siglas en inglés).
  /chosenTaxYear: 
    question: 'Selecciona el año tributario para el que te gustaría verificar tu elegibilidad para el EITC:'
    modalLink: <modal-link for="modal-tax-year">¿Qué año debo seleccionar?</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien: 
    question: ¿Fuiste ciudadano(a) estadounidense o extranjero(a) residente durante todo el año 2025?
    modalLink: <modal-link for="modal-citizen">¿Califico como ciudadano(a) estadounidense o residente para el EITC?</modal-link>
    options:
      'true':
        name: Sí
      'false':
        name: No
  fg-alert-8b7db9:
    heading: No calificas para el Crédito tributario por ingreso del trabajo (EITC, por sus siglas en inglés)
    p-091688: Debes ser un ciudadano(a) estadounidense o extranjero residente para reclamar el EITC. Consulta <a target="_blank" class="usa-link" href="https://www.irs.gov/es/forms-pubs/about-publication-519">la Publicación 519, Guía tributaria estadounidense para extranjeros</a>, para determinar si eres un extranjero residente de los Estados Unidos durante todo el año.
    p-f72c3e: <strong>Aviso:</strong> Selecciona <strong>Sí</strong> si vas a presentar tu declaración del impuesto conjunta con tu esposo(a) para el año <fg-show path="/taxYear"/> y si tú o tu esposo(a) fueron ciudadanos estadounidenses o extranjeros residentes durante todo el año.
    p-b85d77: No puedes reclamar el EITC porque no tienes un número de Seguro Social válido emitido en o antes de la fecha de vencimiento de tu declaración de impuestos.
    p-93a6b5: Para más información, visita <a target="_blank" class="usa-link" href="https://www.irs.gov/es/forms-pubs/about-publication-596">la Publicación 596, Crédito tributario por ingreso del trabajo.</a>
    p-4c0c0d: No puedes reclamar el EITC si presentas <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">el Formulario 2555, Ingreso devengado en el extranjero (en inglés).</a>
    p-236b69: Consulta <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-54">la Publicación 54, Guía tributaria para ciudadanos y residentes de los Estados Unidos que están en el extranjero (en inglés) </a> para obtener más información
    p-5e637b: No calificas para el EITC si eres el hijo calificado de otra persona para el EITC.
    p-ec145e: Para más información sobre si alguien puede reclamarte como hijo calificado, visita <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publicación 596, Crédito por ingreso del trabajo, Usted no puede ser el hijo calificado de otra persona (en inglés)</a>.
    p-363ef2: No calificas para el EITC si eres dependiente de otra persona, a menos que tengas un hijo calificado para el EITC.
  /hasValidSSN:
    question: ¿Tienes un número de Seguro Social válido que te haya sido emitido en o antes de la fecha de vencimiento de tu declaración de impuestos del 2025 (incluidas las prórrogas)?
    modalLink: <modal-link for="modal-valid-ssn-filer">¿Qué se considera un número de Seguro Social válido?</modal-link>
    options:
      'true':
        name: Sí
      'false':
        name: No
  /hasForeignEarnedIncome:
    question: ¿Estás presentando el Formulario 2555, Ingreso devengado en el extranjero?
    modalLink: <modal-link for="modal-foreign-income">¿Qué es ingreso devengado en el extranjero excluidos de los ingresos brutos?</modal-link>
    options:
      'true':
        name: Sí
      'false':
        name: No
  /isClaimedAsDependent:
    question: ¿Otra persona te reclamará como dependiente o hijo calificado para el EITC en su declaración de impuestos?
    modalLink: <modal-link for="modal-claimed-dependent">¿Cómo sé si soy dependiente o hijo calificado?</modal-link>
    options:
      'true':
        name: Sí
      'false':
        name: No
  /ageRange:
    question: Selecciona el rango que mejor describe tu edad al final de 2025
    options:
      under24:
        name: 24 años y menos
      age25to64:
        name: Entre 25 y 64 años
      65andOlder:
        name: 65 años y más
  modal-tax-year:
    heading: Año tributario
    p-aa5a47: 'Para el sueldo y otros ingresos de trabajo en el año:'
    ul-0:
      li-28dd34: 2025, selecciona 2025
      li-174a8b: 2024, selecciona 2024
      li-0a25dc: 2023, selecciona 2023
  modal-citizen:
    heading: Ciudadano(a) estadounidense o extranjero residente
    p-18e680: Si no eres un(a) ciudadano(a) de los Estados Unidos, eres considerado un extranjero.
    p-fe70ca: Eres considerado un extranjero residente para el Crédito tributario por ingreso del trabajo (EITC, por sus siglas en inglés) si tienes una tarjeta verde o si viviste en los Estados Unidos durante más de un cierto número de días.
    p-2c8f8f: Para más información y excepciones importantes, consulta <a target="_blank"
      class="usa-link" href="https://www.irs.gov/es/forms-pubs/about-publication-519">la Publicación 519, Guía tributaria estadounidense para extranjeros</a>.
  modal-valid-ssn-filer:
    heading: Número de Seguro Social válido
    p-527528: Tienes que tener un número de Seguro Social (SSN por sus siglas en inglés) válido, emitido por la Administración de Seguro Social en o antes de la fecha de vencimiento de tu declaración de impuestos del <fg-show
      path="/taxYear"/> (incluidas las prórrogas).
    p-45ae0e: Si tu tarjeta de Seguro Social tiene impresas las palabras “Valid for work with DHS authorization” o “Valid for work with INS authorization” (Válido para el empleo con autorización del Departamento de Seguridad Nacional (DHS por sus siglas en inglés)) o con la autorización del Servicio de inmigración y nacionalización (INS por sus siglas en inglés)), entonces el SSN es válido siempre que la autorización siga vigente.
    p-558a40: 'Para los propósitos del Crédito tributario por ingreso del trabajo (EITC, por sus siglas en inglés), no aceptamos:'
    ul-0:
      li-5e5f3e: Número de identificación personal del contribuyente del IRS (ITIN, por sus siglas en inglés)
      li-5fc9b7: Número identificación del contribuyente en proceso de adopción (ATIN, por sus siglas en inglés)
      li-9f487b: Número de Seguro Social emitido luego de la fecha de vencimiento de la declaración, incluidas las prórrogas
      li-a69a30: Número de Seguro Social emitido únicamente para los propósitos de recibir un beneficio financiado con fondos federales, tal como el Medicaid
    p-f554f7: Consulta <a target="_blank"
      class="usa-link" href="https://www.irs.gov/publications/p596sp"> Publicación 596</a> para más información sobre los números de Seguro Social válidos.
  modal-foreign-income:
    heading: Ingreso devengado en el extranjero excluido de los ingresos brutos
    p-f45b03: Esto se refiere al ingreso que que obtuviste fuera de los Estados Unidos, el Distrito de Columbia o las posesiones o territorios de los Estados Unidos que has que has decidido excluir mediante <a target="_blank"
      class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555"> el Formulario 2555, Ingreso devengado en el extranjero (en inglés)</a>.
  modal-claimed-dependent:
    heading: Tú como dependiente o hijo calificado
    p-faf8d8: En la mayoría de los casos, no puedes ser dependiente o hijo calificado de otro contribuyente y reclamar el Crédito tributario por ingreso del trabajo (EITC, por sus siglas en inglés).
    p-98d6db: En la mayoría de los casos, si tienes menos de 19 años o si eres un estudiante menor de 24 años y vives con tus padres u otros parientes en los Estados Unidos durante más de la mitad del año, seleccione <strong>Sí</strong>.
    p-038f13: Si estás casado(a) y presentas una declaración  conjunta, no pueden reclamarte como dependiente, a menos que presentes la declaración conjunta únicamente para reclamar un reembolso de impuestos sobre los ingresos retenido o de los impuestos estimados pagados.
    p-ceda6c: Para más información sobre si alguien puede reclamarte como dependiente, visita <a target="_blank"
      class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">¿A quién puedo reclamar como una persona dependiente (en inglés)</a>?
    p-d11380: Para más información sobre si alguien puede reclamarte como hijo calificado, visita <a target="_blank"
      class="usa-link" href="https://www.irs.gov/publications/p596sp"> la Publicación 596, Crédito tributario por ingreso del trabajo, Usted no puede ser el hijo calificado de otra persona.</a>
    p-16aba9: Más adelante te preguntaremos sobre hijos o parientes que podrías reclamar.
  modal-primary-claimed-as-dependent:
    heading: ¿Cómo sé si soy el dependiente de alguien?
    p-d3187d: Si dependió de otra persona (que no sea su cónyuge) para su sustento en <fg-show path="/taxYear"/>, es posible que puedan reclamarlo como dependiente en su declaración de impuestos federal.
    p-762495: 'Hay algunos factores que determinan si alguien puede reclamarlo como dependiente, entre ellos:'
    ul-0:
      li-b17276: Su parentesco con esa persona
      li-c82d5e: Cuánto le apoyaron, financieramente y de otras maneras
      li-5a5073: Si vivió con ellos y durante cuánto tiempo
    p-752de3: Revise la Tabla 5 en la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000196863">Publicación 501 del IRS</a> para determinar si otra persona podría reclamarlo.
    p-5a0201: Tenga en cuenta que no es dependiente de otra persona si pagó más de la mitad de su propio sustento (o si lo hizo su cónyuge).
  modal-confirm-tax-year-change:
    heading: Atención
    p-31c7da: El cambio de año borrará los datos ingresados anteriormente. ¿Desea continuar?
    button-70d9be: Confirmar
    button-ea4788: Cancelar
/filing-status:
  title: Estado civil para los efectos de la declaración
  h2-c01d87: Estado civil para los efectos de la declaración
  p-9bda8f: En este paso se te preguntará cómo planeas presentar tus impuestos del <fg-show path="/taxYear"/>.
  /knowsFilingStatus:
    question: ¿Sabes cuál será el estado civil que usarás al presentar tu declaración de impuestos del <fg-show path="/taxYear"/>?
  /initialFilingStatus:
    question: '¿Cuál estado civil usarás para presentar tu declaración del impuesto federal en el <fg-show path="/taxYear"/>?'
    modalLink: <modal-link for="modal-filing-status">¿Cuál estado civil debo usar?</modal-link>
    options:
      single:
        name: Soltero(a)
      marriedFilingJointly:
        name: Casado(a) que presenta una declaración conjunta
      marriedFilingSeparately:
        name: Casado(a) que presenta una declaración por separado
      headOfHousehold:
        name: Cabeza de familia
      qualifiedSurvivingSpouse:
        name: Esposo(a) sobreviviente calificado
  /maritalStatus:
    question: ¿Cuál fue tu estado civil el 31 de diciembre del <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-legal-separation">¿Qué significa estar casado(a) y legalmente separado?</modal-link>
    options:
      married:
        name: Casado(a)
      divorced:
        name: Divorciado(a) o legalmente separado(a)
      widowed:
        name: Esposo(a) sobreviviente calificado
      single:
        name: Nunca casado(a)
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: ¿Cuándo falleció tu esposo(a)?
    options:
      taxYear:
        name: Durante el 2025
      taxYearMinusOneOrTwo:
        name: Durante el 2023 o 2024
      beforeTaxYearMinusTwo:
        name: Antes del 2023
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: ¿Cuándo falleció tu esposo(a)?
    options:
      taxYear:
        name: Durante el 2024
      taxYearMinusOneOrTwo:
        name: Durante el 2022 o 2023
      beforeTaxYearMinusTwo:
        name: Antes del 2022
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: ¿Cuándo falleció tu esposo(a)?
    options:
      taxYear:
        name: Durante el 2023
      taxYearMinusOneOrTwo:
        name: Durante el 2021 o 2022
      beforeTaxYearMinusTwo:
        name: Antes del 2021
  /isHOHMarried:
    question: ¿Estás casado(a)?
  /intendsToFileJointlyWidow:
    question: ¿Tienes la intención de presentar una declaración conjunta con tu esposo(a) fallecido(a) el <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-joint-deceased-spouse">¿Qué significa presentar una declaración conjunta con un esposo(a) fallecido?</modal-link>
  /intendsToFileJointlyMFJ:
    question: ¿Tú y tu esposa(a) planean presentar una declaración conjunta?
    modalLink: <modal-link for="modal-joint-return-mfj">¿Qué significa presentar una declaración conjunta?</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: ¿Tu esposo(a) vivió contigo en tu casa en algún momento durante los últimos 6 meses del año <fg-show path="/taxYear"/> (incluidas las ausencias temporales)?
    modalLink: <modal-link for="modal-spouse-lived-together">¿Qué significa que esposos vivan juntos?</modal-link>
  /samePrincipalResidenceLast6Months:
    question: ¿Tú y tu esposo(a) tuvieron la misma residencia principal durante los últimos 6 meses de <fg-show path="/taxYear"/>?
  /writableSeparationAgreement:
    question: ¿Estabas legalmente separado(a) según las leyes de tu estado, bajo un acuerdo escrito de separación o una orden de manutención por separado, y no viviste con tu esposo(a) el último día del <fg-show path="/taxYear"/>?
  /entitledToPreviouslyFileJointReturn:
    question: ¿Tenías derecho a presentar una declaración conjunta con tu esposo(a) el año en que falleció?
  /paidMoreThanHalfHomeCostsForChild:
    question: ¿En el 2025, pagaste más de la mitad del costo de mantener un hogar en el que viviste y que también fue el hogar principal de tu <span
      condition="/flowQSSQCQuestionText" operator="isTrue">hijo(a) o hijastro</span><span condition="/flowQSSQCQuestionText" operator="isFalse">hijo dependiente, hijastro o hijo de crianza</span> para todo el año <fg-show path="/taxYear"/> (incluidas las ausencias temporales)?
    modalLink: <modal-link for="modal-keeping-up-home">¿Cómo calculo "Mantener un hogar"?</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: ¿Puedes reclamar a tu hijo(a) o hijastro(a) que vivió contigo como dependiente para el <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-claiming-dependents">¿A quién puedo reclamar como dependiente?</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: '¿Podrías reclamar a tu hijo(a) o hijastro(a) como dependiente EXCEPTO que, para el 2025: 1) El hijo(a) tenía ingresos brutos superiores al límite de $5,200 para el 2025; 2) El hijo(a) presentó una declaración conjunta; o 3) Tú podrías ser reclamado(a) como dependiente en la declaración de otra persona'
    modalLink: <modal-link for="modal-claiming-dependents">¿A quién puedo reclamar como dependiente?</modal-link>
  /homeUpkeepScenario:
    question: ¿Pagaste más del 50% del costo de mantener un hogar en el <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-keeping-up-home">¿Cómo calculo "Mantener un hogar"?</modal-link>
    options:
      livedWithDependent:
        name: Donde haya vivido más de la mitad del año con una persona dependiente (un hijo, nieto, hermano, sobrina, sobrino, padre/madre o abuelo)
      custodialParentNonDependent:
        name: Donde haya vivido más de la mitad del año con un hijo que no es su persona dependiente, a pesar de que sea el padre que tiene la custodia (por la regla para hijos de padres divorciados o separados)
      dependentParentElsewhere:
        name: Para un padre/madre que puede reclamar como persona dependiente, pero que no vivió con usted
      none:
        name: Ninguna de las opciones anteriores
  /secondaryFilerHasValidSSN:
    question: ¿Tu esposo(a) tiene un número de Seguro Social válido que haya sido emitido en o antes de la fecha de vencimiento de tu declaración de impuestos del <fg-show path="/taxYear"/> (incluidas las prórrogas)?
    modalLink: <modal-link for="modal-valid-ssn">¿Qué se considera un número de Seguro Social válido?</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: ¿Tu esposo(a) tenía un número de Seguro Social válido el día de su fallecimiento?
    modalLink: <modal-link for="modal-valid-ssn">¿Qué se considera un número de Seguro Social válido?</modal-link>
  /spouseAliveEndOfTaxYear:
    question: ¿Su esposo(a) estuvo con vida el 31 de diciembre del <fg-show path="/taxYear"/>?
  /ageRangeSecondary:
    question: Selecciona el rango que mejor describe la edad <span condition="/spouseAliveEndOfTaxYear"
      operator="isFalse">que tenía tu esposo(a) cuando falleció</span><span condition="/spouseAliveEndOfTaxYear"
      operator="isTrue">de tu esposo(a) al final del año <fg-show path="/taxYear"/></span>.
    options:
      under24:
        name: 24 años y menos
      age25to64:
        name: Entre 25 y 64 años
      65andOlder:
        name: 65 años y más
  /primaryFilerIsClaimingQualifyingChildren:
    question: ¿Planeas reclamar hijos(as) u otros familiares con números de Seguro Social válidos para el EITC?
    modalLink: <modal-link for="modal-qualifying-child-eitc">¿Quién puede reclamar el Crédito por ingreso del trabajo (EITC)?</modal-link>
  /hasLivedInUSMore6Months:
    question: ¿Tu hogar principal y el de tu esposo(a) estuvo en los Estados Unidos por más de la mitad del <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-main-home-us">¿Qué se considera una vivienda principal en los Estados Unidos?</modal-link>
  h2-7864de: Según tus respuestas, tu estado civil para los efectos de la declaración es <fg-show path="/flowReadableFilingStatus"/>
  fg-alert-334e2e:
    heading: No calificas para el Crédito tributario por ingreso del trabajo (EITC por sus siglas en inglés)
    p-b6bd9e: No calificas para el EITC sin un hijo(a) calificado(a) a menos que tú, o tu esposo(a) si presentan una declaración conjunta, tengan entre 25 y 64 años.
    p-ae739d: Para más información, consulta la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596, el Crédito Tributario por Ingreso del Trabajo (EITC por sus siglas en inglés)</a>.
    p-47ef52: 'Puedes reclamar el EITC si estás casado(a), no presentas una declaración conjunta, tuviste un hijo(a) calificado(a) que vivió contigo por más de la mitad del <fg-show path="/taxYear"/>, y se cumple alguna de las siguientes condiciones:'
    ul-0:
      li-207749: Viviste separado(a) de tu esposo(a) durante los últimos 6 meses del <fg-show
        path="/taxYear"/>, ó
      li-93a6ef: Estás legalmente separado(a) según las leyes de tu estado, bajo un acuerdo escrito de separación o una orden de manutención por separado, y no viviste en el mismo hogar que tu esposo(a) al final del <fg-show path="/taxYear"/>.
    p-3630b4: Para más información, consulta la página de información sobre la <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501" class="usa-link">Publicación 501, dependientes, deducción estándar e información para la presentación de la declaración (en inglés).<span class="usa-sr-only"> (abre en una nueva pestaña)</span></a>
    p-99f873: No puedes reclamar el EITC porque tu esposo(a) no tiene un número de Seguro Social válido emitido en o antes de la fecha de vencimiento de tu declaración de impuestos.
    p-91ee91: No puedes reclamar el EITC si eliges presentar una declaración conjunta con tu esposo(a) fallecido(a) porque tu esposo(a) no tenía un número de Seguro Social válido el día de su fallecimiento.
    p-d4d927: Podrías calificar para el EITC si no presentas una declaración conjunta con tu esposo(a) fallecido(a).
    p-065d1b: Para reclamar el EITC, tu hogar debe haber estado en los Estados Unidos por más de la mitad del año. Los Estados Unidos incluyen los 50 estados y el Distrito de Columbia.
  modal-filing-status:
    heading: ¿Cuál estado civil debo usar?
    p-c0b92c: Si no hubo un cambio en tu estado civil o situación familiar este año, podrías usar el estado civil de tu declaración del <fg-show path="/lastTaxYear"/>.
    p-391f95: Si hubo un cambio en tu estado civil o situación familiar en el último año, podrías necesitar usar un estado civil diferente para una estimado más preciso.
    p-496916: Cada estado civil tiene requisitos diferentes.
    p-49f30f: <strong>Soltero(a):</strong>
    ul-0:
      li-c717a5: No puedes estar casado(a)
    p-5f63cd: <strong>Casado que presenta una declaración conjunta:</strong>
    ul-1:
      li-6aab7e: Estás casado(a) o tu esposo(a) falleció durante el año
    p-80c02f: <strong>Casado que presenta una declaración por separado:</strong>
    ul-2:
      li-595e35: Estás casado(a)
      li-1e72dd: No presentarás una declaración con tu esposo(a) (la mayoría de las personas ahorra dinero presentando una declaración conjunta)
    p-d69332: <strong>Cabeza de familia:</strong>
    ul-3:
      li-dfe41a: No puedes estar casado (o no se te considera casado para propósitos de impuestos)
      li-38ff2f: Pagaste más de la mitad del costo de mantener un hogar para un miembro de tu familia o miembro de tu hogar durante un período específico de tiempo y esta persona tiene que cumplir con ciertos requisitos
    p-57317d: <strong>Esposo(a) sobreviviente calificado:</strong>
    ul-4:
      li-2bf38a: Tu esposo(a) falleció en el <fg-show path="/lastTaxYear"/> ó <fg-show path="/taxYearMinusTwo"/>
      li-4ef74f: No te volviste a casar antes del <fg-show path="/taxYear"/>
      li-939762: Tienes un hijo(a) dependiente que vive contigo todo el año
      li-bad5a3: agas más de la mitad del costo de mantener tu hogar
    p-5b3ae2: <a target="_blank" class="usa-link" href="https://www.irs.gov/es/filing/filing-status">Conoce más sobre cada estado civil<span class="usa-sr-only"> (abre en una nueva pestaña)</span></a>
  modal-qualifying-child-eitc:
    heading: Hijo calificado
    p-7356ad: Para reclamar el el Crédito por ingreso del trabajo (EITC, por sus siglas en inglés) con un hijo calificado, tu hijo(a) debe tener un número de Seguro Social válido, emitido por la Administración de Seguro Social en o antes de la fecha de vencimiento de tu declaración de <fg-show path="/taxYear"/> (incluidas las prórrogas).
    p-ac8914: Si la tarjeta del Seguro Social dice “Válido para trabajar con autorización del DHS” o “Válido para trabajar con autorización del INS”, es un Seguro Social válido si la autorización sigue vigente.
    p-558a40: 'Para el EITC, no aceptamos:'
    ul-0:
      li-5e5f3e: Número de identificación personal del contribuyente del IRS (ITIN por sus siglas en inglés)
      li-5fc9b7: Número identificación del contribuyente en proceso de adopción (ATIN por sus siglas en inglés)
      li-9f487b: Número de Seguro Social emitido luego de la fecha de vencimiento de la declaración, incluidas las prórrogas
      li-19d3d7: Número de Seguro Social emitido únicamente para los propósitos de recibir un beneficio financiado por fondos federales, tal como el Medicaid.
    p-0d323a: 'Tu hijo(a) es un hijo calificado si cumple con cuatro pruebas:'
    ul-1:
      li-fbc977: Relación
      li-9d8d2d: Edad
      li-23863d: Residencia
      li-ca34c2: Declaración conjunta
    p-e00960: Consulta la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596</a>, para más información sobre un número de Seguro Social válido y si tiene un hijo calificado.
  modal-main-home-us:
    heading: Hogar principal en los Estados Unidos
    p-9cbbc6: Tu hogar debe haber estado en los Estados Unidos por más de la mitad del año<fg-show path="/taxYear"/>.
    p-775779: Los Estados Unidos incluyen los 50 estados y el Distrito de Columbia. No incluye las Posesiones de los Estados Unidos, como, por ejemplo, Guam, las Islas Vírgenes o Puerto Rico.
    h3-398dfd: Personal militar destacado fuera de los Estados Unidos
    p-7dbfa0: Si eres miembro del ejército de los Estados Unidos y estuviste destinado fuera de los Estados Unidos en servicio activo prolongado, selecciona <strong>Sí</strong>.
  modal-keeping-up-home:
    heading: Mantener un hogar
    p-c0958f: Si el monto total de lo que pagaste es más de la mitad del costo total, cumples con el requisito de haber pagado más de la mitad del costo de mantener el hogar.
    h3-e8b30a: 'Los costos incluyen:'
    ul-0:
      li-b9b2e1: Alquiler, intereses hipotecarios, impuestos sobre bienes inmuebles, y seguro para el hogar
      li-313963: Reparaciones y servicios públicos
      li-61e699: Comida consumida en la casa
    p-fec463: <strong>Nota:</strong> Los costos pagados con la asistencia pública se consideran costos pagados por el contribuyente.
    h3-3e0b53: 'Los costos no incluyen:'
    ul-1:
      li-edaa99: Ropa, educación, y gastos de vacaciones
      li-40b84f: Tratamientos médicos, pagos del seguro médico, y medicamentos recetados
      li-5eae2b: Seguro de vida
      li-c64365: Costos de transporte, tal como seguro, pagos de arrendamiento, o transporte público
      li-04dec0: El valor de tus servicios o los de un miembro de tu hogar
  modal-legal-separation:
    heading: Separación legal y unión libre (conocida como “common law” en inglés)
    h3-ef7665: Legalmente separados
    p-198345: '"Legalmente separado" para este propósito significa estar legalmente separado de conformidad con un fallo de divorcio o manutención por separación judicia.'
    h3-357344: Matrimonio de hecho
    p-f560ea: Algunos estados permiten el matrimonio por unión libre. Consulta con tu estado para ver si se te considera casado(a) bajo la unión libre.
  modal-joint-return-mfj:
    heading: Declaración conjunta
    p-75997a: Puedes elegir presentar una declaración con tu esposo(a)seleccionando <strong>Casado(a) que presenta una declaración conjunta</strong> como tu estado civil para los efectos de la declaración. Esto le permite combinar sus ingresos y gastos cuando calcula sus créditos, deducciones y obligación tributaria.
  modal-joint-deceased-spouse:
    heading: Declaración conjunta con un esposo(a) fallecido
    p-85e581: Si tu esposo(a) falleció durante el <fg-show path="/taxYear"/>, puedes elegir presentar una declaración con tu esposo(a) seleccionado <strong>Casado(a) que presenta una declaración conjunta</strong> como tu estado civil para los efectos de la declaración. Esto te permite combinar tus ingresos y gastos al calcular tus créditos, deducciones y la cantidad de impuestos que debes.
  modal-spouse-lived-together:
    heading: Esposos - Vivieron juntos
    p-906815: 'Se considera que una persona ha vivido contigo durante los periodos en que uno de los dos, o ambos, están ausentes de forma temporal debido a circunstancias especiales como:'
    ul-0:
      li-8ec6de: Enfermedad
      li-de7a22: Educación
      li-d6e6cb: Negocio
      li-2c48dd: Vacaciones
      li-8fdca6: Servicio militar
    p-2392bb: Debe ser razonable suponer que la persona ausente regresará al hogar luego de la ausencia temporal.
  modal-valid-ssn:
    heading: Número de Seguro Social válido
    p-527528: Tienes que tener un número de Seguro Social (SSN, por sus siglas en inglés) válido, emitido por la Administración de Seguro Social en o antes de la fecha de vencimiento de tu declaración de impuestos del año <fg-show path="/taxYear"/> (incluidas las prórrogas).
    p-45ae0e: Si tu tarjeta de Seguro Social tiene impresas las palabras “Valid for work with DHS authorization” o “Valid for work with INS authorization” (Válido para el empleo con autorización del Departamento de Seguridad Nacional (DHS por sus siglas en inglés)) o con la autorización del Servicio de inmigración y nacionalización (INS por sus siglas en inglés)), entonces el SSN es válido siempre que la autorización siga vigente.
    p-558a40: 'Para los propósitos del Crédito tributario por ingreso del trabajo (EITC, por sus siglas en inglés), no aceptamos:'
    ul-0:
      li-5e5f3e: Número de identificación personal del contribuyente del IRS (ITIN, por sus siglas en inglés)
      li-5fc9b7: Número identificación del contribuyente en proceso de adopción (ATIN, por sus siglas en inglés)
      li-9f487b: Número de Seguro Social emitido luego de la fecha de vencimiento de la declaración, incluidas las prórrogas
      li-a69a30: Número de Seguro Social emitido únicamente para los propósitos de recibir un beneficio financiado con fondos federales, tal como el Medicaid
    p-f554f7: Consulta la <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596sp">Publicación 596</a> para más información sobre los números de Seguro Social válidos.
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: Confirmación
    p-30861e: Cambiar de <strong>Casado que presenta declaración conjunta</strong> a otro estado civil para la declaración de impuestos borrará los datos del hijo que haya ingresado previamente. ¿Desea continuar?
    button-70d9be: Confirmar
    button-ea4788: Cancel
  modal-claiming-dependents:
    heading: ¿A quién puedo reclamar como dependiente?
    p-fc792e: "Los dependientes típicamente son:"
    ul-0:
      li-7673e2: Hijos menores de 19 años
      li-e9750c: Estudiantes menores de 24 años que viven con sus padres
      li-9a6fc3: Parientes o miembros de tu hogar que reciben de ti más de la mitad de sus costos de vida y tienen un sueldo bruto menor de <fg-show path="/eitcChildGrossIncomeLimit"/>
    p-6b3acc: No puedes reclamar a tu esposo(a) como tu dependiente si presentan una declaración conjunta.
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/es/credits-deductions/individuals/dependents">Conoce más sobre los dependientes.</a>
