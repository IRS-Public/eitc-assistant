        td-86d753: <fg-show path="/flowReadableFilingStatus"/>
        td-7a1efb: <a class="usa-link" href="/app/eitc/filing-status/">Editar estado civil</a>
      tr-2:
        th-b1d475: Ingreso bruto ajustado
        td-5637e9: <fg-show path="/agi"/>
        td-1c1ab4: <a class="usa-link" href="/app/eitc/income/">Editar ingresos y ajustes</a>
      tr-3:
        th-40c7ae: Ingreso del trabajo
        td-d604bc: 'Total del sueldo y salario: <fg-show path="/jobsIncomeTotal"/>'
