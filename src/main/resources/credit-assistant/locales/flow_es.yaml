  p-35b0d2: |-
    Puede usar la aplicación móvil
            <a target="_blank" class="usa-link" href="https://www.irs.gov/es/help/irs2goapp">
              IRS2Go app<span class="usa-sr-only"> (se abre en una pestaña nueva)</span>
            </a>
            para verificar el estado de su reembolso, realizar un pago, encontrar ayuda gratuita para la preparación de impuestos, regístrese para recibir consejos tributarios útiles y más!
