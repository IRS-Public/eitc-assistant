/:
  title: Enfòmasyon Jeneral
  h2-5e286b: Enfòmasyon Jeneral
  p-c2c8a0: Reponn kèk ti kesyon byen rapid konsènan oumenm pou ou konnen si ou kalifye
  /chosenTaxYear:
    question: Seleksyone ane fiskal ou ta renmen verifye kalifikasyon EITC ou pou
      li a :*
    modalLink: <modal-link for="modal-tax-year">Ki ane m ta dwe itilize?</modal-link>
    options:
      '2025':
        name: '2025'
      '2024':
        name: '2024'
      '2023':
        name: '2023'
  /isUSCitizenOrResidentAlien:
    question: Èske ou te yon sitwayen ameriken oubyen rezidan etranje pou tout ou
      <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-citizen">Èske m kalifye kòm sitwayen ameriken
      oswa kòm yon moun ki abite nan peyi a pou jwenn EITC?</modal-link>
    options:
      'true':
        name: Wi
      'false':
        name: Non
  fg-alert-8b7db9:
    heading: Ou pa kalifye pou kredi taks sou revni (EITC).
    p-091688: Ou dwe yon sitwayen ameriken oubyen rezidan etranje pou reklame kredi
      taks sou revni ou fè. Gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit., pou detèmine si w se yon etranje k ap viv Ozetazini
      pandan tout ane a.
    p-f72c3e: 'Seleksyone: wi si w ap ranpli yon deklarasyon kolektif ak konjwen
      ou pou <fg-show path="/taxYear"/> epi ou menm oubyen konjwen ou te yon sitwayen
      ameriken oubyen rezidan etranje pandan tout ane a.'
    p-b85d77: Ou pa kapab aplike pou EITC paske ou pa gen yon nimewo Sekirite Sosyal
      ki valab ki te bay nan dat delè deklarasyon taks ou a.
    p-93a6b5: Pou plis enfòmasyon, gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
    p-4c0c0d: Ou pa ka reklame kredi revni ou touche a si w ranpli <a target="_blank"
      class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-2555">Fòm 2555</a>,
      Revni Touche nan Peyi Etranje.
    p-236b69: Gade Piblikasyon 54, Tax Guide for U.S. Citizens and Foreign Resident Aliens, pou plis enfòmasyon
    p-5e637b: Ou pa kalifye pou EITC si ou se pitit yon lòt moun ki kalifye pou EITC.
    p-ec145e: Pou plis enfòmasyon sou si yon moun ka reklame w kòm yon timoun ki kalifye
      pou EITC a, gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Piblikasyon
      596</a>, Kredi Revni Ou Touche, Ou Pa Ka Yon Timoun Ki Kalifye Pou Yon Lòt Moun
      Kap Peye Taks.
    p-363ef2: Ou pa elijib pou EITC si ou depann de yon lòt moun, sof si ou gen yon
      timoun ki kalifye pou EITC.
  /hasValidSSN:
    question: Èske w gen yon nimewo sekirite sosyal ki valab ki te bay nan dat limit
      oubyen anvan deklarasyon taks <fg-show path="/taxYear"/> (ki gen ladan ekstansyon)?
    modalLink: <modal-link for="modal-valid-ssn-filer">Yon nimewo sekirite sosyal
      valab obligatwa</modal-link>
    options:
      'true':
        name: Wi
      'false':
        name: Non
  /hasForeignEarnedIncome:
    question: Ou depoze Fòmilè 2555, Revni Ou Fè Aletranje?
    modalLink: <modal-link for="modal-foreign-income">Revni ki Touche Aletranje ki
      eskli nan Revni Brit</modal-link>
    options:
      'true':
        name: Wi
      'false':
        name: Non
  /isClaimedAsDependent:
    question: Èske yon lòt moun pral rapòte w kòm yon timoun depandan oubyen ki kalifye
      pou EITC sou deklarasyon taks yo?
    modalLink: <modal-link for="modal-claimed-dependent">Ou kòm yon timoun depandan
      oubyen ki kalifye</modal-link>
    options:
      'true':
        name: Wi
      'false':
        name: Non
  /ageRange:
    question: Tanpri Seleksyone seri ki dekri laj ou nan fen <fg-show path="/taxYear"/>.
    options:
      under24:
        name: 24 lane ak pi piti
      age25to64:
        name: Ant 25 ak 64 lane
      65andOlder:
        name: 65 an epi pi gran
  modal-tax-year:
    heading: Ane taksasyon
    p-aa5a47: 'Pou salè ak lòt revni ou touche nan:'
    ul-0:
      li-28dd34: 2025, seleksyone 2025
      li-174a8b: 2024, seleksyone 2024
      li-0a25dc: 2023, seleksyone 2023
  modal-citizen:
    heading: Sitwayen ameriken oubyen etranje rezidan
    p-18e680: Si w pa yon sitwayen ameriken, yo konsidere w kòm yon etranje.
    p-fe70ca: Yo konsidere w kòm yon etranje rezidan pou EITC si w gen yon kat vèt
      oubyen si w ap viv Ozetazini pou plis pase yon sèten kantite jou.
    p-2c8f8f: Pou plis enfòmasyon ak eksepsyon enpòtan, gade <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Publication 596</a>, Earned Income
      Credit.
  modal-valid-ssn-filer:
    heading: Nimewo sekirite sosyal valab
    p-527528: Ou dwe gen yon nimewo Sekirite Sosyal (SSN) ki valid ke Administrasyon
      Sekirite Sosyal la bay nan dat limit deklarasyon taks 2025 ou a oswa anvan (ki
      gen ladan ekstansyon yo).
    p-45ae0e: Si kat Sekirite Sosyal ou a ekri "Valid pou travay avèk otorizasyon
      DHS" oswa "Valid pou travay avèk otorizasyon INS" sou li, li se yon SSN valid
      si otorizasyon an toujou valid.
    p-558a40: 'Pou EITC a, nou pa aksepte:'
    ul-0:
      li-5e5f3e: Nimewo idantifikasyon taks endividyèl IRS (ITIN)
      li-5fc9b7: Nimewo idantifikasyon taks adopsyon (ATIN)
      li-9f487b: Nimewo Sekirite Sosyal yo bay sèlman pou pèmèt moun k ap resevwa
        SSN a aplike oubyen resevwa yon benefis finansman federal, tankou Medicaid.
      li-a69a30: Nimewo Sekirite Sosyal ki te pibliye apre dat limit delarasyon an,
        ki gen ladan ekstansyon yo
    p-f554f7: Gade Piblikasyon 596 pou plis enfòmasyon sou yon Nimewo Sekirite Sosyal
      ki valid.
  modal-foreign-income:
    heading: Revni ki Touche Aletranje ki eskli nan Revni Brit
    p-f45b03: Sa a se revni ou te touche andeyò peyi Etazini, Distri Columbia, oubyen
      byen oubyen teritwa Etazini ke ou Seleksyone pou eskli <a target="_blank" class="usa-link"
      href="https://www.irs.gov/forms-pubs/about-form-2555">sou</a>
  modal-claimed-dependent:
    heading: Ou kòm yon timoun depandan oubyen ki kalifye
    p-faf8d8: Nan pifò ka yo, ou pa kapab yon timoun depandan oubyen elijib yon lòt
      kontribyab epi reklame EITC.
    p-98d6db: Nan pifò ka yo, si w gen mwens pase 19 oubyen se yonetidyan anba 24
      lane epi w ap viv ak paran w oubyen lòt fanmi Ozetazini pou plis pase mwatye
      ane a, Seleksyone <strong>Wi</strong>.
    p-038f13: Si ou marye epi w ap ranpli yon deklarasyon konjwen, yo pa ka deklare
      w kòm yon depandan, sof si w ap ranpli yon deklarasyon konjwen sèlman pou reklame
      yon ranbousman taks sou revni yo te pran oswa estimasyon taks ki peye.
    p-ceda6c: Pou chèche konnen si yon moun ka reklame ou kòm yon depandan, <a target="_blank"
      class="usa-link" href="https://www.irs.gov/help/ita/whom-may-i-claim-as-a-dependent">vizite</a>
    p-d11380: Pou plis enfòmasyon sou si yon moun ka deklare w yon timoun ki kalifye
      pou EITC, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2021_publink1000298540">gade</a>
      .
    p-16aba9: N ap poze w kesyon sou timoun oubyen paran ou ka reklame pita.
  modal-primary-claimed-as-dependent:
    heading: Kijan mwen fè konnen si mwen se depandan yon moun?
    p-d3187d: Si ou te depann de yon lòt moun (apa de mari oswa madanm ou) pou sipò nan <fg-show path="/taxYear"/>, yo ta ka kapab deklare ou kòm yon depandan sou deklarasyon taks federal yo.
    p-762495: 'Gen kèk faktè ki detèmine si yon moun ka deklare w kòm yon depandan, tankou:'
    ul-0:
      li-b17276: Relasyon ou genyen ak moun sa a
      li-c82d5e: Konbyen yo te sipòte w, nan domèn finansye ak lòt fason
      li-5a5073: Si ou te viv avèk yo ak pou konbyen tan
    p-752de3: Revize Tablo 5 nan <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p501#en_US_2024_publink1000196863">Piblikasyon 501 IRS</a> pou detèmine si yon lòt moun ta ka kapab deklare w kòm depandan.
    p-5a0201: Kenbe nan tèt ou ke ou pa depandan yon lòt moun si ou te peye pou plis pase mwatye nan pwòp sipò pa ou (oswa si mari oswa madanm ou te fè sa).
  modal-confirm-tax-year-change:
    heading: 'Atansyon:'
    p-31c7da: Si ou chanje <strong>ane</strong> a sa ap efase done ou te antre deja
      yo. Èske ou toujou vle kontinye?
    button-70d9be: Pou konfime
    button-ea4788: Anile
/filing-status:
  title: Kondisyon Fiskal
  h2-c01d87: Kondisyon Fiskal
  p-9bda8f: Nan etap sa a, yo pral mande w ki jan ou fè plan pou depoze <fg-show path="/taxYear"/>
    ou.
  /knowsFilingStatus:
    question: Èske w konnen estati ranplisaj w ap itilize lè w ap ranpli w la <fg-show
      path="/taxYear"/> taxes?
  /initialFilingStatus:
    question: 'Tanpri Seleksyone estati ranplisaj w ap itilize lè w ap ranpli taks
      pou <fg-show path="/taxYear"/>:'
    modalLink: <modal-link for="modal-filing-status">Ki estati deklarasyon m ta dwe
      itilize?</modal-link>
    options:
      single:
        name: Sèlman
      marriedFilingJointly:
        name: Marye Depoze ansanm
      marriedFilingSeparately:
        name: Veterinè cheval ranpli separeman
      headOfHousehold:
        name: chèf fanmi
      qualifiedSurvivingSpouse:
        name: Konjwen Vivan ki Kalifye
  /maritalStatus:
    question: Kisasitiyasyon sivil ou te ye 31 desanm, <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-legal-separation">Kisa sa vle di pou ou marye
      epi separe legalman?</modal-link>
    options:
      married:
        name: Marye
      divorced:
        name: Divòse oubyen separe legalman
      widowed:
        name: Konjwen Vivan ki Kalifye
      single:
        name: Pa t Janm Marye
  /yearOfSpouseDeathCurrentTaxYearIsChosen:
    question: Ki lè konjwen ou te mouri?
    options:
      taxYear:
        name: Pandan <fg-show path="/taxYear"/>
      taxYearMinusOneOrTwo:
        name: Pandan 2023 oubyen 2024
      beforeTaxYearMinusTwo:
        name: Anvan 2023
  /yearOfSpouseDeathLastTaxYearIsChosen:
    question: Ki lè konjwen ou te mouri?
    options:
      taxYear:
        name: Pandan 2024
      taxYearMinusOneOrTwo:
        name: Pandan 2022 oubyen 2023
      beforeTaxYearMinusTwo:
        name: Anvan 2022
  /yearOfSpouseDeathTwoTaxYearsAgoIsChosen:
    question: Ki lè konjwen ou te mouri?
    options:
      taxYear:
        name: Pandan 2023
      taxYearMinusOneOrTwo:
        name: Pandan 2021 oubyen 2022
      beforeTaxYearMinusTwo:
        name: Anvan 2021
  /isHOHMarried:
    question: Ou marye?
  /intendsToFileJointlyWidow:
    question: Èske ou gen entansyon ranpli yon deklarasyon kolektif ak konjwen ou
      ki mouri pou <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-joint-deceased-spouse">Èske ou te gen dwa fè
      yon deklarasyon kolektif ak konjwen ou pou ane lanmò li a?</modal-link>
  /intendsToFileJointlyMFJ:
    question: Èske ou menm ak konjwen ou planifye pou fè yon deklarasyon kolektif?
    modalLink: <modal-link for="modal-joint-return-mfj">Marye Depoze ansanm</modal-link>
  /spouseLivedWithTaxpayerLastSixMonths:
    question: Eske ou menm ak mari oubyen madanm ou te gen menm rezidans prensipal
      la pandan 6 dènye mwa yo <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-spouse-lived-together">Kisa sa vle di pou mari
      ak madanm ap viv ansanm?</modal-link>
  /samePrincipalResidenceLast6Months:
    question: Eske ou menm ak mari oubyen madanm ou te gen menm rezidans prensipal
      la pandan 6 dènye mwa yo <fg-show path="/taxYear"/>?
  /writableSeparationAgreement:
    question: Èske ou te separe legalman dapre lwa eta w la dapre yon akò separasyon
      ekri, oswa yon dekrè pou antretyen separe epi ou pa t abite avèk mari oswa madanm
      ou nan dènye jou <fg-show path="/taxYear"/> lan? ?
  /entitledToPreviouslyFileJointReturn:
    question: Èske ou te gen dwa fè yon deklarasyon kolektif ak konjwen ou pou ane
      lanmò li a?
  /paidMoreThanHalfHomeCostsForChild:
    question: An <fg-show path="/taxYear"/>, èske ou te peye plis pase mwatye nan
      depans antretyen yon kay kote ou te rete a ki te tou rezidans prensipal pitit
      ou a, bofis ou oubyen pitit adoptif ou pou tout <fg-show path="/taxYear"/> (ki
      gen ladan absans tanporè)?
    modalLink: <modal-link for="modal-keeping-up-home">Ki jan m ka kalkile "Koute
      pou Kenbe Yon Kay"?</modal-link>
  /canClaimChildAsDependentInCurrentTaxYear:
    question: Èske ou ka reklame pitit ou a oubyen bofi ou ki te rete avèk ou kòm
      yon depandan pandan <fg-show path="/taxYear"/>?
    modalLink: <modal-link for="modal-claiming-dependents">Ki moun mwen ka reklame
      kòm yon depandan?</modal-link>
  /couldClaimChildAsDependentInCurrentTaxYearWithExceptions:
    question: 'Èske ou ta ka reklame pitit ou a oswa bofis/bèlfi ou kòm yon moun ki
      depann EKSÈPTE ke, pou <fg-show path="/taxYear"/>: 1) Timoun nan te gen revni
      brit ki te pi wo pase limit <fg-show path="/eitcChildGrossIncomeLimit"/> pou
      <fg-show path="/taxYear"/>; 2) Timoun nan te fè yon deklarasyon ansanm; oswa
      3) Ou ta ka reklame kòm yon moun ki depann sou deklarasyon yon lòt moun?'
    modalLink: <modal-link for="modal-claiming-dependents">Ki moun mwen ka reklame
      kòm yon depandan?</modal-link>
  /homeUpkeepScenario:
    question: Èske ou te peye plis pase 50% nan depans pou antretyen yon kay??
    modalLink: <modal-link for="modal-keeping-up-home">Kijan mwen ka kalkile &quot;Kenbe
      Yon Kay&quot;?</modal-link>
    options:
      livedWithDependent:
        name: Kote ou te rete plis pase mwatye ane a ak yon depandan (tankou yon timoun,
          pitit pitit, frè ak sè, nyès, neve, paran oubyen granparan)
      custodialParentNonDependent:
        name: Kote ou te viv plis pase mwatye ane a ak yon timoun ki pa nan swen ou
          menm si ou se paran gadyen an (akòz règ pou timoun ki gen paran divòse oubyen
          separe)
      dependentParentElsewhere:
        name: Pou yon fanmi ou ka reklame kòm yon depandan, men ki pa t ap viv avèk
          ou
      none:
        name: Okenn nan repons sa yo
  /secondaryFilerHasValidSSN:
    question: Èske konjwen ou gen yon nimewo Sekirite Sosyal ki valab ki te bay nan
      dat limit la oubyen anvan deklarasyon taks <fg-show path="/taxYear"/> a (ki
      gen ladan ekstansyon)?
    modalLink: <modal-link for="modal-valid-ssn">Yon nimewo sekirite sosyal valab
      obligatwa</modal-link>
  /deceasedSpouseValidSSNOnDateOfDeath:
    question: Èske konjwen ou te gen yon nimewo sekirite sosyal valab nan jou lanmò
      li a?
    modalLink: <modal-link for="modal-valid-ssn">Yon nimewo sekirite sosyal valab
      obligatwa</modal-link>
  /spouseAliveEndOfTaxYear:
    question: Eske konjwen ou te vivan le 31 desanm, <fg-show path="/taxYear"/>?
  /ageRangeSecondary:
    question: Tanpri Seleksyone seri laj ki pi byen dekri laj konjwen ou nan fen <fg-show
      path="/taxYear"/>.
    options:
      under24:
        name: 24 lane ak pi piti
      age25to64:
        name: Ant 25 ak 64 lane
      65andOlder:
        name: 65 lane ak plis
  /primaryFilerIsClaimingQualifyingChildren:
    question: Èske w gen plan pou reklame timoun oswa lòt fanmi ki gen nimewo Sekirite
      Sosyal valid pou EITC?
    modalLink: <modal-link for="modal-qualifying-child-eitc">Èske yon lòt moun kapab
      deklare timoun sa a pou EITC a?</modal-link>
  /hasLivedInUSMore6Months:
    question: Èske rezidans prensipal ou te Ozetazini pou plis pase mwatye <fg-show
      path="/taxYear"/>?
    modalLink: <modal-link for="modal-main-home-us">Kisa k konte kòm yon kay prensipal
      nan peyi Etazini?</modal-link>
  h2-7864de: Tou depan de chwa w yo, estati ranplisaj la se <fg-show path="/flowReadableFilingStatus"/>.
  fg-alert-334e2e:
    heading: Ou pa kalifye pou kredi taks sou revni (EITC).
    p-b6bd9e: Ou pa kalifye pou EITC a san yon timoun kalifye sof si ou, oswa konjwen
      w lan si n ap fè yon deklarasyon konjwen, genyen ant 25 ak 64 lane.
    p-ae739d: Pou jwenn plis enfòmasyon, gade <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Piblikasyon 596, Kredi Revni Ou
      Touche</a>.
    p-47ef52: Ou kapab reklame EIC a si ou marye, si ou pa ranpli yon deklarasyon
      konjwen, si ou te gen yon timoun ki kalifye ki te abite avèk ou pou plis pase
      mwatye ane <fg-show path="/taxYear"/> lan, epi youn nan sa ki annapre yo aplike.
    ul-0:
      li-207749: Ou te viv apa de mari oswa madanm ou pandan 6 dènye mwa <fg-show
        path="/taxYear"/> yo, oswa
      li-93a6ef: Ou separe legalman selon lwa eta w lan dapre yon akò separasyon ekri,
        oswa yon dekrè pou antretyen separe epi ou pat abite nan menm kay ak mari
        oswa madanm ou nan fen ane <fg-show path="/taxYear"/> lan.
    p-3630b4: Pou plis enfòmasyon, <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-501"
      class="usa-link">gade</a>
    p-99f873: Ou pa kapab aplike pou EITC paske konjwen ou pa gen yon nimewo Sekirite
      Sosyal ki valab ki te bay nan dat delè pou deklarasyon taks ou a.
    p-91ee91: Ou pa kapab fè reklamasyon EITC a si w chwazi fè yon deklarasyon kolektif
      ak konjwen ou mouri paske konjwen ou pa t gen yon nimewo Sekirite Sosyal valab
      nan jou lanmò li.
    p-d4d927: Ou ka elijib pou EITC si ou pa fè yon deklarasyon konjwen ak konjwen
      ou ki mouri.
    p-065d1b: Pou aplike pou EITC, kay ou dwe te Ozetazini pou plis pase mwatye nan
      ane a. Etazini gen ladan tout 50 eta ak Distri Columbia.
  modal-filing-status:
    heading: Ki estati deklarasyon m ta dwe itilize?
    p-c0b92c: Si pa gen okenn chanjman nan estati matrimonyal ou oswa nan sitiyasyon
      fanmi ou ane sa a, Lè sa a, ou ka vle sèvi ak menm estati deklarasyon nan deklarasyon
      taks ou nan <fg-show path="/lastTaxYear"/>.
    p-391f95: Si te gen yon chanjman nan estati matrimonyal ou oswa nan kay ou ane
      ki sot pase a, ou ka bezwen itilize yon lòt estati deklarasyon pou yon estimasyon
      ki pi egzak.
    p-496916: Chak estati deklarasyon gen kondisyon ki diferan.
    p-49f30f: Sèlman
    ul-0:
      li-c717a5: Ou pa kapab marye
    p-5f63cd: Marye Depoze ansanm
    ul-1:
      li-6aab7e: Ou marye oswa mari/madanm ou te mouri pandan ane a
    p-80c02f: Marye Ranpli Separeman
    ul-2:
      li-595e35: Ou marye?
      li-1e72dd: Ou pa planifye pou ranpli ansanm ak mari oswa madanm ou (pi fò koup
        ekonomize lajan lè yo ranpli ansanm)
    p-d69332: chèf fanmi
    ul-3:
      li-dfe41a: Ou pa ka marye (oswa yo konsidere w kòm yon moun ki pa marye pou
        rezon taks)
      li-38ff2f: Ou te peye plis pase mwatye nan depans pou kenbe yon kay pou yon
        manm nan fanmi an oswa yon manm nan kay ou pou yon kantite tan espesifik,
        epi yo dwe ranpli sèten kondisyon.
    p-57317d: <strong>Mari oswa Madanm ki Kalifye k ap Siviv:</strong>
    ul-4:
      li-2bf38a: Mari oswa madanm ou te mouri nan <fg-show path="/lastTaxYear"/> oswa
        <fg-show path="/taxYearMinusTwo"/>
      li-4ef74f: Ou pa t remarye anvan <fg-show path="/taxYear"/>
      li-939762: Ou gen yon timoun ki depann de ou ki ap viv avèk ou tout ane a
      li-bad5a3: Ou te peye plis pase mwatye pri pou kenbe yon kay pou ane a.
    p-5b3ae2: <a target="_blank" href="https://www.irs.gov/filing/filing-status">Aprann
      plis sou estati deklarasyon yo<span class="usa-sr-only"> (opens in a new tab)</span>.</a>
  modal-qualifying-child-eitc:
    heading: Timoun ki kalifye
    p-7356ad: Pou reklame EITC ak yon timoun ki kalifye, timoun lan dwe gen yon SSN
      ki valid Administrasyon Sekirite Sosyal la bay nan dat limit deklarasyon <fg-show
      path="/taxYear"/> ou a oswa anvan (ki gen ladan ekstansyon yo).
    p-ac8914: Si kat Sekirite Sosyal la di "Valab pou travay ak otorizasyon DHS" oswa
      "Valab pou travay ak otorizasyon INS" sou li, li se yon SSN ki valab si otorizasyon
      an toujou valab.
    p-558a40: 'Pou EITC a, nou pa aksepte:'
    ul-0:
      li-5e5f3e: Nimewo idantifikasyon taks endividyèl IRS (ITIN)
      li-5fc9b7: Nimewo idantifikasyon taks adopsyon (ATIN)
      li-9f487b: Nimewo Sekirite Sosyal yo bay sèlman pou pèmèt moun k ap resevwa
        SSN a aplike oubyen resevwa yon benefis finansman federal, tankou Medicaid.
      li-19d3d7: Nimewo Sekirite Sosyal ki te pibliye apre dat limit delarasyon an,
        ki gen ladan ekstansyon yo
    p-0d323a: 'Pitit ou a se yon timoun ki kalifye si pitit ou a satisfè kat tès.
      Kat tès yo se:'
    ul-1:
      li-fbc977: Relasyon,
      li-9d8d2d: Laj,
      li-23863d: Rezidans epi
      li-ca34c2: deklarasyon kolektif
    p-e00960: Pou plis enfòmasyon, <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">gade</a>
      , Earned Income Credit pou plis enfòmasyon sou yon Nimewo Sekirite Sosyal ki
      valid epi si ou gen yon timoun ki kalifye.
  modal-main-home-us:
    heading: Rezidans prensipal Ozetazini
    p-9cbbc6: Èske ou t abite Ozetazini pandan plis pase mwatye ane a?
    p-775779: Kay ou dwe te Ozetazini pou plis pase mwatye nan <fg-show path="/taxYear"/>
      . Etazini gen ladan tout 50 eta ak Distri Columbia. Li pa gen ladann byen Etazini
      tankou Guam, Zile Vyèj yo, oubyen Pòtoriko.
    h3-398dfd: Pèsonèl Militè Estasyone Andeyò Lèzetazini
    p-7dbfa0: Si ou se yon manm lame Etazini epi ou te estasyone andeyò Lèzetazini
      nan sèvis aktif pwolonje, Seleksyone wi.
  modal-keeping-up-home:
    heading: Antretyen yon Kay
    p-c0958f: Si kantite lajan total ou te peye a plis pase mwatye pri total la, ou
      ranpli kondisyon pou peye plis pase mwatye pri pou antretyen kay la.
    h3-e8b30a: 'Depans yo enkli:'
    ul-0:
      li-b9b2e1: Lwaye, enterè ipotèk, taks byen imobilye ak asirans kay
      li-313963: Reparasyon ak sèvis piblik
      li-61e699: Manje yo manje nan kay la
    p-fec463: 'Nòt: Depans yo peye ak asistans piblik yo konsidere kòm depans kontribyab
      la peye.'
    h3-3e0b53: 'Depans yo pa enkli:'
    ul-1:
      li-edaa99: Rad, edikasyon ak depans pou vakans
      li-40b84f: Tretman medikal, peman asirans medikal, ak medikaman sou preskripsyon
      li-5eae2b: Asirans lavi
      li-c64365: Depans transpò tankou asirans, peman lwaye, oswa transpò piblik
      li-04dec0: Valè sèvis ou yo oswa yon manm nan fwaye lakay ou
  modal-legal-separation:
    heading: Separasyon Legal ak Lwa Komen
    h3-ef7665: Legalman separe
    p-198345: '"Separe legalman" pou objektif sa a vle di separe legalman grasa yon
      dekrè divòs oubyen sipò pou timoun separe.'
    h3-357344: Maryaj sivil
    p-f560ea: Kèk eta pèmèt maryaj lwa komen. Tcheke ak eta w la pou w wè si yo konsidere
      w marye anba yon relasyon komen.
  modal-joint-return-mfj:
    heading: deklarasyon kolektif
    p-75997a: Ou ka Seleksyone pou fè yon sèl deklarasyon ak konjwen ou lè w Seleksyone
      <strong> estati ranpli w. Sa a pèmèt ou konbine revni ou ak depans lè w ap kalkile
      kredi ou, dediksyon ak taks ou peye.
  modal-joint-deceased-spouse:
    heading: deklarasyon kolektif ak konjwen ki mouri a
    p-85e581: Si konjwen ou te mouri pandan <fg-show path="/taxYear"/>, ou ka Seleksyone
      pou ranpli yon sèl deklarasyon ak konjwen ou lè w Seleksyone <fg-show path="/taxYear"/>
      kòm estati ranplisaj ou. Sa a pèmèt ou konbine revni ou ak depans lè w ap kalkile
      kredi ou, dediksyon ak taks ou pe. This allows you to combine your income and
      expenses when figuring your credits, deductions, and tax liability.
  modal-spouse-lived-together:
    heading: Konjwen - K ap viv ansanm
    p-906815: 'Yo konsidere yon moun k ap viv avèk ou pandan peryòd kote youn oubyen
      toulede nan nou absan tanporèman akòz sikonstans espesyal tankou:'
    ul-0:
      li-8ec6de: Maladi,
      li-de7a22: Edikasyon,
      li-d6e6cb: Biznis,
      li-2c48dd: vakans, oubyen
      li-8fdca6: Sèvis militè.
    p-2392bb: Li dwe rezonab pou sipoze moun ki absan an ap retounen lakay li apre
      absans tanporè a.
  modal-valid-ssn:
    heading: Nimewo sekirite sosyal valab
    p-527528: Ou dwe gen yon nimewo Sekirite Sosyal (SSN) ki valid ke Administrasyon
      Sekirite Sosyal la bay nan dat limit deklarasyon taks 2025 ou a oswa anvan (ki
      gen ladan ekstansyon yo).
    p-45ae0e: Si kat Sekirite Sosyal ou a ekri "Valid pou travay avèk otorizasyon
      DHS" oswa "Valid pou travay avèk otorizasyon INS" sou li, li se yon SSN valid
      si otorizasyon an toujou valid.
    p-558a40: 'Pou EITC a, nou pa aksepte:'
    ul-0:
      li-5e5f3e: Nimewo idantifikasyon taks endividyèl IRS (ITIN)
      li-5fc9b7: Nimewo idantifikasyon taks adopsyon (ATIN)
      li-9f487b: Nimewo Sekirite Sosyal yo bay sèlman pou pèmèt moun k ap resevwa
        SSN a aplike oubyen resevwa yon benefis finansman federal, tankou Medicaid.
      li-a69a30: Nimewo Sekirite Sosyal ki te pibliye apre dat limit delarasyon an,
        ki gen ladan ekstansyon yo
    p-f554f7: Gade Piblikasyon 596 pou plis enfòmasyon sou yon Nimewo Sekirite Sosyal
      ki valid.
  modal-confirm-mfj-to-nonmfj-qc-clear:
    heading: Konfimasyon
    p-30861e: Si w chanje soti nan <strong>Marye k ap Fè yon Deklarasyon Ansanm</strong>
      pou yon lòt estati deklarasyon y ap efase done timoun ou te deja mete yo ki
      kalifye yo. Èske ou toujou vle kontinye?
    button-70d9be: Pou konfime
    button-ea4788: Anile
  modal-claiming-dependents:
    heading: Ki moun mwen ka reklame kòm yon depandan?
    p-fc792e: 'Moun ki depann yo jeneralman se:'
    ul-0:
      li-7673e2: Timoun anba 19;
      li-e9750c: Elèv ki poko gen 24 an k ap viv avèk paran yo
      li-9a6fc3: Fanmi oswa manm nan kay ou ki jwenn plis pase mwatye sipò finansye
        yo nan men ou epi ki gen yon revni brit ki mwens pase <fg-show path="/eitcChildGrossIncomeLimit"/>
    p-6b3acc: Ou pa kapab reklame mari/madanm ou kòm yon moun ki depann si ou deklare
      ansanm.
    p-40e480: <a target="_blank" class="usa-link" href="https://www.irs.gov/credits-deductions/individuals/dependents">Aprann
      plis sou depandan yo.</a>
