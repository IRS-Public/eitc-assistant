  h3-a7b819: 'AGI Ou se:'
  fg-alert-334e2e:
    heading: Ou pa kalifye pou kredi taks sou revni (EITC).
    p-f3c23d: Baze sou montan ou antre a, ou pa kapab reklame kredi sou revni genyen
      yo paske AGI ou depase limit estati depo w ak kantite timoun elijib
    p-93a6b5: Pou plis enf‼masyon apwopo limit revni pou kredi genyen an, <a target="_blank"
      class="usa-link" href="https://www.irs.gov/publications/p596">gade</a> .
  modal-wages-salaries-tips:
    heading: Ki revni mwen ta dwe mete?
    h3-53ed11: Salè ak Poubwa
    p-40d79a: Anplwayè w la te rapòte salè w yo, frè w yo, ti kòb ou yo, ak lòt konpansasyon
      nan bwat 1 Fòm W-2 ou a.
    p-ab967b: Anplwayè w la te rapòte salè ou, poubwa ak lòt konpansasyon ou nan Box
      1 Fòm W-2 ou a. Mete tout kantite poubwa ak revni siplemantè nan kalkil revni
      touche a lè w ap detèmine kalifikasyon pou kredi taks sou revni yo, menm si
      tout oswa yon pati se franchiz.
    p-cb2522: Enkli tout montan deklare nan Box 1 Fòmilè W-2 pou ou menm ak konjwen
      w si w ap ranpli yon deklarasyon taks ansanm konjwent.
    p-1f7f24: Don't Include Fòmilè W-2 kontribisyon anvan taks ou nan seksyon kontribisyon
      anvan taks yo.
    h3-af3590: Pèman Militè & Konba
    p-3fdb7d: Ou ka Seleksyone tou pou w enkli pèman konba ki pa enpozab ou nan revni
      ou touche pou EITC a. Anplwayè ou deklare pèman konba w ki pa enpozab nan Box
      12 ak Code Q sou Fòmilè W-2 ou.
    p-d9b0e5: Chwa sa a ka ogmante oubyen diminye EITC ou. Pou plis enfòmasyon <a
      target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2025_publink1000297672">gade</a>
    h3-84091c: Asirans Tanporè & Akoutèm Pou Envalidite
    p-bee3d8: Si ou te pran konje paran oubyen ou te andikape tanporèman pandan ane
      a epi patwon ou te peye ou, yo te deklare salè ou sou W-2 ou. Antre revni sa
      a la a.
  modal-work-no-taxes-withheld:
    heading: Revni kote yo pa te kenbe taks federal yo
    p-7ca214: Rapòte revni ou fè nan travay siplemantè, menm si se yon ti djob, a tan pasyèl oswa tanporè.
    p-9048f5: Antre revni yo la a si w fè lajan nan yon travay menm si yo pa te kenbe taks sou revni yo. Ou ka te resevwa oswa ou pa te resevwa yon Fòm 1099 pou tout revni yo.
    p-8f1d83: 'Revni an ta ka te fèt atravè yon aplikasyon oswa yon sit entènèt pou:'
    ul-0:
      li-014f6e: Kondwi yon machin pou woulib oswa livrezon yo te kòmande
      li-816827: Fè komisyon oswa ranpli travay
      li-ac1297: Bay sèvis kreyatif oswa pwofesyonèl
      li-743818: Bay lòt travay tanporè, sou demann oswa travay endepandan
    p-ccdadf: Revni brit ou a gen ladan l tout revni ou te resevwa. N ap soustrè depans ou yo pita.
    p-5465af: Pou jwenn plis enfòmasyon, ale sou <a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">Jere taks pou travay siplemantè w yo (an anglè)</a>
  modal-self-employment-gross-income:
    heading: Revni Brit Travay Endepandan
    p-3ef7b9: 'Si ou:'
    ul-0:
      li-0d8073: Ki se travayè endepandan
      li-f5836c: Fè lajan nan founi travay sou demann, sès oubyen produi
      li-d6da48: Jere yon biznis oubyen fèm
      li-604ec3: Se yon minis oubyen manb yon lòd relijye
      li-de3005: Se yon minis oswa yon manm yon lòd relijye
    p-ccdadf: Pou plis enfòmasyon, <a target="_blank" class="usa-link" href="https://www.irs.gov/businesses/small-businesses-self-employed/manage-taxes-for-your-gig-work">visit</a>
    p-a21d1b: Pou jwenn plis enfòmasyon, vizite <a target="_blank" class="usa-link"
      href="https://www.irs.gov/businesses/small-businesses-self-employed/self-employed-individuals-tax-center">Sant
      taks pou moun k ap travay pou pwòp kont yo</a>
  modal-disability-retirement:
    heading: Retrèt Andikap kòm Revni ou Touche
    p-514b79: Si ou pran retrèt ou sou andikap, nou konsidere benefis taksab ou te
      resevwa nan revni ou touche sou plan retrèt andikap anplwayè w la pou rezon
      EITC a jiskaske ou rive laj minimòm pou pran retrèt. Laj pou pran retrèt minimòm
      se laj pi bonè kote ou te kapab resevwa yon pansyon oswa pansyon anyèl si ou
      pa te andikape.
    p-e7df54: Laj pou pran retrèt minimòm se laj ki pi bonè kote w te kapab resevwa
      yon pansyon oswa anwite si w pa te andikape.
    p-2e7e6e: Mete andikap tanporè oswa pou yon andikap akoutèm nan salè ou.
  modal-inmate-pay:
    heading: Pay Earned as an Inmate
    p-0ced8d: Lajan ou te resevwa pou travay ou te fè pandan ou te nan prizon nan
      yon enstitisyon penal se pa revni yo konsidere lè y ap kalkile kredi revni touche
      a.
    p-435d89: Sa enkli travay ou peye pou li ou te fè pandan ou nan yon pwogram liberasyon
      pou travay oswa pandan ou nan yon mezon tranzisyon.
    p-1dc488: Piblikasyon 596, Kredi Sou Revni Ou Fè, Salè Antanke Rezidan
  modal-foreign-income-non2555:
    heading: Revni ou Touche Altranje
    p-6821fc: Revni yo touche aletranje se revni yo touche pandan y ap viv ak travay
      andeyò Etazini, Distri Columbia, oswa posesyon oswa teritwa Etazini.
    p-86d28e: Si ou se yon anplwaye gouvènman ameriken k ap travay andeyò Etazini,
      revni sa a pa konsidere kòm revni ki touche aletranje.
    p-231cd1: Si ou pa yon anplwaye gouvènman an epi wap travay nan yon anbasad, nou
      konsidere revni sa kòm revni ki touche aletranje.
    p-87f12e: Pou jwenn plis enfòmasyon, gade <a target="_blank" class="usa-link"
      href="https://www.irs.gov/forms-pubs/about-form-2555">Fòm 2555</a>, Revni Touche
      nan Peyi Etranje.
    p-90826b: 'Nòt: Si ou chwazi ranpli Fòm 2555, ou pa kalifye pou reklame EITC a.'
  modal-taxable-pension:
    heading: Pansyon
    p-a523b6: Si ou resevwa avantaj retrèt sou fòm peman pansyon oswa pansyon anyèl
      nan yon plan retrèt anplwayè ki kalifye, tout oswa yon pati nan montan ou resevwa
      yo ka taksab.
    p-ce034e: 'Tout taksab si:'
    ul-0:
      li-21fe33: Ou pa kontribye nan anyen oubyen yo pa konsidere ou kontribye nan
        anyen pou pansyon w osinon rant ou
      li-c4c784: anplwayè ou a pa pran kotizasyon sou salè ou oubyen
      li-a75167: Ou resevwa tout kontribisyon ou yo an egzonerasyon pandan ane anvan
        yo
    p-63555f: 'Yon pati ladan taksab si:'
    ul-1:
      li-6d40a9: Ou kontribiye an dola aprè enpo (itilize règ jeneral ak metòd senplifye
        a pou kalkile)
    p-24ecdd: Règ anplis aplike si ou te resevwa peman anvan laj 59 an e demi, si
      ou se yon sivivan oswa benefisyè, oswa si ou gen lòt sitiyasyon.
  modal-unemployment-compensation:
    heading: Konpansasyon Kont Chomaj (Asirans)
    p-ec0a26: Pou EITC, enkli tout benefis alokasyon kont chomaj ou. Ou jwenn revni
      sa a sou Fòmile 1099-G.
    p-97117c: Si fon anplwayè w la bay benefis adisyonèl, enkli tout montandeklare
      sou Fòmilè W-2, Box 1.
  modal-social-security:
    heading: Revni Sosyal Sekirite
    p-f2d061: Pou EITC a, mete sèlman pati taksab nan Sekirite Sosyal ak benefis retrèt
      tren ou yo.
    p-e8b50a: Pou plis enfòmasyon <a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc423">vizite</a>
    p-2b31f6: Pou kalkile kantite lajan taksab nan benefis ou yo, gade &quot;Ki fèy
      travay pou itilize&quot; nan <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-915">Piblikasyon
      915</a>, Sekirite Sosyal ak Benefis Retrèt Chemennfè Ekivalan.
  modal-scholarship-grants:
    heading: Scholarship or Fellowship Grants
    p-0e0c43: Antre kèlkeswa kantite lajan bous ki taksab ki pa te rapòte nan Fòm
      W-2 ou a.
    p-ce8e34: 'Kantite lajan sa a gen ladan lajan bousdetid oswa sibvansyon yo pa
      jwenn nan W-2 ou si lajan an te:'
    ul-0:
      li-13d8db: Itilize pou frè divès, tankou ebèjeman ak anbakman, vwayaj, ekipman
        opsyonèl
      li-b94d4b: Resevwa kòm pèman pou ansèyman, rechèch, oubyen lòt sèvis nesesè
        kèm kondisyon pou resevwa bous detid oubyen bous rechèch
    p-adf913: Pa enkli montan ou resevwa pou sèvis yo mande nan Pwogram Bous Detid
      Kò Sèvis Sante Nasyonal la, Bous Detid ak Pwogram Asistans Finansye pou Pwofesyonèl
      Sante Fòs Lame a, oubyen yon pwogram etid konplè sèvis aprantisaj-travay yon
      kolèj dirije.
    p-0c59d8: Pou plis <a target="_blank" class="usa-link" href="https://www.irs.gov/taxtopics/tc421">enfòmasyon</a>
  fg-alert-64891c:
    heading: Ou pa kalifye pou kredi taks sou revni (EITC).
    p-cdf53e: Sou baz montan ou antre a, ou pa ka reklame kredi paske revni ou genyen
      depase limit deklarasyon estati w ak kantite timoun elijib.
    p-93a6b5: Pou plis enf‼masyon apwopo limit revni pou kredi genyen an, <a target="_blank"
      class="usa-link" href="https://www.irs.gov/publications/p596">gade</a> .
  fg-alert-8b7db9:
    heading: Ou pa kalifye pou kredi taks sou revni (EITC).
    p-3abe5f: Pou reklame EITC a, ou dwe gen revni ou touche (pa egzanp, salè oswa
      salè nèt nan travay poukont ou). Dapre revni ou te antre a, revni ou touche
      pou <fg-show path="/taxYear"/> te zewo oswa mwens, kidonk ou pa kalifye pou
      EITC a.
    p-93a6b5: Pou jwenn plis enfòmasyon, gade <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Piblikasyon 596</a>, Kredi Revni
      Ou Touche.
    p-d04ce1: Ou pa kapab reklame Kredi Sou Revni Ou Fè si revni envèstisman ou plis
      pase <fg-show path="/eitcInvestmentIncomeLimit"/>.
    p-241cb8: 'Revni envesti enkli:'
    ul-0:
      li-12d3b7: Enterè (alafwa enpozab e egzonere)
      li-0a9a83: dividann
      li-e74f5d: Revni sou kapital
      li-e42b99: Kèk lwaye ak redevans oswa
      li-7c0731: Revni nèt sou aktivite pasif
    p-9c482c: Pou jwenn plis enfòmasyon, gade <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p550">Piblikasyon 550</a>, Revni ak Depans
      Envestisman. Pou kalkile total revni envestisman w lan, ou ta dwe itilize Fèy
      Travay 1 nan <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Piblikasyon
      596</a>, Kredi Revni Ou Touche.
  modal-self-employment-deductions:
    heading: Ki depans ki ka dedwi nan travay endepandan?
    p-4838ea: Lè w te travay pou kont ou, yon travayè endepandan, oswa ou te posede
      epi jere yon biznis, ou te ka gen posiblite pou dedwi sèten depans biznis nan
      revni ou pou w peye mwens taks.
    p-f24032: 'Depans biznis yo ka gen ladan:'
    ul-0:
      li-6a4179: Depans pou biwo nan kay
      li-e2f63f: Depans machin ak kamyon
      li-7f4118: Lwaye
      li-9f53a8: Peman pou anplwaye ak pansyon
      li-eaff1b: Asirans
      li-6c49ac: Enterè sou dèt
      li-761662: Frè legal ak pwofesyonèl
      li-719fec: Taks
      li-849c98: Vwayaj ak repa
    p-9ff7b2: Dediksyon sa yo diferan de dediksyon pèsonèl ou fè yo si ou te chwazi
      fè yon lis dediksyon w yo. Ou ka dedwi depans biznis ou yo isit la epi ou ka
      toujou chwazi dediksyon estanda a pita.
    p-0651e4: <strong>Kouman pou tcheke deklarasyon taks ane pase a?</strong>
    p-a81df3: Si ou t ap travay pou kont ou nan <fg-show path="/taxYear"/>, ou ka
      jwenn depans franchiz ou yo nan liy 28 nan Orè C a.
    p-4ca1ce: <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p334#en_US_2024_publink1000313491">Aprann
      plis sou depans biznis yo</a>
  modal-estimate-interest-income-en:
    heading: Kisa ki te revni enterè epi kijan mwen ka kalkile l?
    p-cda131: Kalite komen revni enterè yo gen ladan l enterè ou fè nan kont labank oswa lè w prete lajan.
    p-bc395c: <strong>Kijan pou w tcheke deklarasyon taks ane pase a</strong>
    p-ec3579: 'Si w te fè revni enterè nan <fg-show path="/taxYear"/>, tcheke pou yon montan nan:'
    ul-0:
      li-7b5662: Liy 2b sou Fòm 1040 deklarasyon taks federal <fg-show path="/taxYear"/> ou a
  modal-investment-income:
    heading: Revni Envestisman
    p-b07c20: 'Revni envestisman pou EITC a gen ladan:'
    ul-0:
      li-12d3b7: Enterè (alafwa enpozab e egzonere)
      li-0a9a83: dividann
      li-81f254: Revni sou kapital
      li-498151: Kèk lwaye ak redevans oswa
      li-7c0731: Revni nèt sou aktivite pasif
    p-4c8f5e: <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-publication-550">Gade</a>
      pou plis enfòmasyon.
    p-df5956: 'Sèvi ak Fèy Travay 1 nan <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Piblikasyon
      596</a>, Kredi Revni Ou Touche, pou w kalkile revni envestisman w si youn nan
      deklarasyon sa yo vre pou 2025:'
    ul-1:
      li-0f3c1b: Ou ap ranpli Barèm E (Fòm 1040)
      li-782dae: Ou ap rapòte revni nan lokasyon pwopriyete pèsonèl ki pa itilize
        nan yon komès oswa biznis.
      li-e0ebc1: Ou ap rapòte nan Fòm 8814 (ki gen rapò ak eleksyon pou rapòte enterè
        timoun ak dividann)
      li-a00ee1: Ou gen revni oswa pèt nan yon aktivite pasif.
      li-143cd9: Ou ap depoze Fòm 4797 (ki gen rapò ak lavant pwopriyete biznis)
  modal-other-taxable-income:
    heading: Lòt tip revni
    p-ba0ae2: 'Lòt tip revni yo enkli:'
    ul-0:
      li-83fa6a: Distribisyon kont retrè endividyèl (IRA) (eksepte Roth IRAs)
      li-7ae32a: kapitak pèdi (se pa gen)
      li-248c6a: Pèman pansyon alimantè ou resevwa nan yon divòs oubyen akò separasyon
        konkli 2020
      li-6dac33: Lokasyon imobilye, dwa dotè, patenarya,sosyete S, kowalisyon, elatriye.
      li-13b588: Revni ki soti nan lokasyon byen pèsonèl si ou angaje nan lokasyon
        a bi likratif men ou pa yon antrepriz k ap lwe byen sa yo
      li-ad5cc5: Dispozisyon enpozab apati yon kont epay edikasyon Coverdell (ESA)
        ak gen program edikasyon elijib
      li-ece5cb: Revni program eskolarite elijib Yo
      li-0f1015: Pri, rekonpans, ak gen aza
      li-7e9756: Frè sèvis jire
      li-737e99: Fon dividann pèmanan Alaska
      li-e833f1: Ranbousman ak lòt montan resevwa pou atik ki dedui nan ane anvan,
        tankou frè medikal, enpo fonsye, oubyen enterè sou ipotèk.
    p-fda53f: 'Ki Pa Enkli:'
    ul-1:
      li-0eb181: Pèman pansyon alimantè ou resevwa nan yon divòs oubyen separasyon
        alamyab konkli aprè 2019
      li-e46f68: Asistans pou minè
      li-b144cb: Avantaj sosyal tankou Asistans Tanporè pou Fanmi nan Bezwen (TANF),
        bon alimantè, alokasyon pou lojman atik 8
      li-63523b: Pèman Fanmi dakèy non enpozab
      li-a8d386: Nontaxable employee benefits such as education assistance
      li-f2a3d6: Avantaj pou veteran, enkli pèman reyabtasyon VA
      li-080a95: Endemnizasyon ouvriye
      li-57e5cb: Pwosedi asirans vi resevwa poutèt lanmò yon moun
      li-764dd4: Lajan oubyen byen ki erite, lege oubyen resevwa kòm kado
      li-6f920a: Alokasyon kont chomaj
    p-745735: Piblikasyon 525, Revni Enpozab Ak Revni Non Enpozab
  modal-student-loan-interest:
    heading: Prelèvman Enterè Sou Prè Etidyan
    p-3ac7ce: Antre jiska <fg-show path="/maxStudentLoanDeduction"/> enterè ou peye
      sou prè elèv elijib ou a. Ou ka jwenn li sou Fòmilè 1098-E ou si ou peye plis
      pase $600 enterè.
    p-e4b825: 'Prè a dwe peye depans etidn siperyè elijib pou ale nan yon enstitisyon
      edikasyonèl elijib. Anplis de sa, depans yo dwe:'
    ul-0:
      li-bb1c73: Pou ou, konjwen w oubyen moun ki te sou kont ou nan moman ou pran
        pè a;
      li-829f26: Ki peye oswa ki fèt nan yon peryòd tan rezonab anvan oswa apre ou
        te pran prè a; ak
      li-562ff0: Pou edikasyon ki dispanse pandan yon peryòd akademik pou yon etidyan
        elijib
    p-75f422: Ou pa kapab reklame dediksyon an si ou pa legalman oblije fè pèman sou
      prè a.
    p-1f2dd3: Pou plis enfòmasyon, <a target="_blank" href="https://www.irs.gov/forms-pubs/about-publication-970"
      class="usa-link">gade</a> .
  modal-educator-expenses:
    heading: Prelèvman Sou Tarif Edikatè
    p-e117c8: 'Si ou se yon pwofesè, antre jiska <fg-show path="/maxEducatorExpensesNonMFJ"/>
      (<fg-show path="/maxEducatorExpensesLimit"/> si konjwen ap deklare ansanm epi
      toulède ou menm ak madanm ou se pwofesè) nan depans ki pa ranbouse tankou:'
    ul-0:
      li-8829c6: Frè pou patisipasyon nan kou devlopman pwofesyonèl
      li-751127: Liv ak founiti
      li-0c78ca: Materyèl enfòmatik (enkli lojisyèl ak sèvis asosye)
      li-6ef6c8: Lòt ekipman
      li-6d4170: Materyèl siplemantè ou itilize nan sal klas
    p-86c6e4: Pou plis enfòmasyon <a target="_blank" href="https://www.irs.gov/taxtopics/tc458"
      class="usa-link">gade</a>
  modal-ira-contributions:
    heading: Prelèvman IRA
    p-5979d5: Antre nenpòt kontribisyon IRA ou te fè andeyò kontribisyon sou pewòl
      ou.
    p-a49375: Pou plis enfòmasyon <a target="_blank" href="https://www.irs.gov/retirement-plans/ira-deduction-limits"
      class="usa-link">gade</a>
  modal-self-employed-retirement:
    heading: 'SEP, SENP, ak lòt plan elijib:'
    p-ca0a8f: 'Si w se travayè endepandan, ou kalkile plan konpansasyon elijib ou
      nan retire sa ki annapre a nan salè nèt travay endepandan ou:'
    p-0d133f: 'Pou kalifye, ou menm oswa mari oswa madanm ou dwe genyen:'
    ul-0:
      li-6c246a: Pòsyon dediktib sou taks SE ou apati deklarasyon Fòmilè 1040 ou,
        paj 1, e
      li-a2595a: Montan kontribisyon plan retrèt ou apati deklarasyon Fòmilè 1040
        ou, paj 1,nan liy sou travay endepandan SEP, SENP, ak plan elijib
      li-f6cddf: Te gen yon konpayi responsablite limite
    p-3622b4: 'Plan ki elijib yo ta ka gen ladan yo:'
    ul-1:
      li-ff93fe: Plan Pansyon Senplifye pou Anplwaye (SEP)
      li-200ab4: Plan Match Ankourajman Epary pou Anplwaye yo
      li-e7dbe4: Solo-401(k)
      li-765afa: Lòt plan retrèt ki kalifye
    p-af5a4a: <strong>Pa mete ladan l</strong> kontribisyon nan Aranjman Retrèt Endividyèl (IRA).
    p-add56c: Ou dwe te itilize yon règ espesyal pou kalkile kontribisyon nan plan retrèt pou tèt ou.
    p-3248f2: Endividi Travayè Endepandan – Kalkile Pwòp Kontribisyon Ak Prelèvman
      Plan Retrèt Ou
  modal-hsa-deductions:
    heading: 'Prelèvman Kont Epay Sante:'
    p-2ab752: Antre nenpòt kontribisyon Kont Epay Sante (HSA) ke ou pa t ajoute anba
      HSA, FSA, oubyen lòt "plan kafeterya" anlè a.
    p-a7d9fc: Apwopo Piblikasyon 969, Kont Epay Sante Ak Lòt Plan Sante Non Enpozab
  modal-alimony-paid:
    heading: Pansyon Alimantè Peye
    p-fa1de9: Si ou vèse pansyon alimantè oubyen pèman antresyen separe selon òdonans
      yon tribinal egzekite anvan 1 janvye, 2019 epi lòd la pa endike ou pa ka dedui
      pèman ou, antre monte ou peye pandan an la.
    p-7b97e1: 'Pa enkli montan ou peye anvan:'
    p-7948e4: <strong>Sipò pou fanmi oswa timoun</strong>
    p-358bc5: Pa enkli montan yo non plis si òdonans tribinal la te modifye e deklare
      ou pa ka dedui pèman ou
    p-06a405: Pansyon alimantè oswa antretyen separe ki fèt daprè yon lòd tribinal ki egzekite aprè 31 desanm 2024
    p-4b335c: Pou plis enfòmasyon <a target="_blank" href="https://www.irs.gov/taxtopics/tc452"
      class="usa-link">vizite</a>
  modal-early-withdrawal:
    heading: Sanksyon pou retrè antisipe sou epay
    p-7e8d5b: Si ou retire fon apati yon sètifika oubyen yon depo oubyen lòt kont
      enterè difere navan matirasyon, yo kapab chaje w penalite. Ou kapab jwenn penalite
      sa a an Fòmilè 1099-INT nan Box 2. Antre montan sa a la
  modal-moving-expenses:
    heading: Tarif Deplasman
    p-6f18fd: 'Si w se yon manm aktif nan fòs lame, epi lame te ba ou lòd pou w tout
      tan ap chanje pozisyon estasyon travay ou, antre nenpòt frè deplasman lame pa
      te ranbouse w la a. Frè deplasman yo enkli:'
    ul-0:
      li-60efa3: Vwayaj dirèk soti nan ansyen kay ou pou nouvo kay ou
      li-efbbb1: Frè anbalaj ak deplasman zafè pèsonèl ou
    p-6536cb: Pou plis enfòmasyon <a target="_blank" href="https://www.irs.gov/taxtopics/tc455"
      class="usa-link">vizite</a>
  modal-employee-business-expenses:
    heading: Kèk Tarif Anplwaye Pwofesyonèl
    p-c92011: 'Si ou se yon:'
    ul-0:
      li-9bde67: Rezèvis Fòs lame
      li-053ac1: Atis Entèprèt elijib
      li-e03b09: Fonksyonè leta oubyen ofisyèl gouvènman lokal
      li-0d1488: Anplwaye ak frè travay lye a andikap
    p-cc9b68: Ou kapab enkli depans ki kouran e aksepte nan domèn komès ou, biznis,
      oubyen pwofesyon, oubyen depans pou bagay ki itil ak apwopriye pou biznis ou.
    p-d46373: Si ou pa matche nan youn nan kategori yo, ou pa dwe reklame ajisteman
      pou depasn sa yo.
    p-eb68a5: Pou plis enfòmasyon ak yon list depans elijib, <a target="_blank" href="https://www.irs.gov/forms-pubs/about-form-2106"
      class="usa-link">gade</a> .
  modal-self-employed-health-insurance:
    heading: 'Prelèvman Asirans Sante Travay endepandan:'
    p-598073: Antre montan ou peye pou asirans maladi pou tèt ou, konjwen ou, epi
      sa k sou kont ou, si ou se yon travayè endepandan.
    p-d60394: Prim ki elijib yo se te asirans swen medikal, dantè, vizyon, ak swen alontèm. Règleman asirans lan te kapab pou ou, mari oswa madanm ou, ak depandan ou yo. Règleman an te kapab kouvri pitit ou a tou ki te poko gen laj 27 an nan fen ane a, menm si pitit la pa t depandan w.
    p-13dece: Pou plis enfòmasyon gade Chapit <a target="_blank" href="https://www.irs.gov/instructions/i7206"
      class="usa-link">6</a> .
/qualifying-children:
  title: Timoun Kalifye
  h2-dbaf54: Timoun Kalifye
  p-9b177d: Konsideran antre anvan w yo, ou pa gen okenn timoun ki kalifye. Si sa
    pa kòrèk, tanpri retounen nan <a class="usa-link" href="/app/eitc/filing-status/">Filing
    Status</a> epi modifye repons ou yo.
  p-c1a0dd: Tanpri ale nan pwochen etap la pou wè rezilta ou yo.
  p-3178be: Nan etap sa a, n ap wè konbyen nan pitit ou yo oswa lòt fanmi ou yo ki
    se pitit ou ki kalifye pou fè reklamasyon ak kalkile EITC a. Ou ka reklame jiska
    twa timoun ki kalifye pou EITC.
  p-e28c1e: Ou ka reklame jiska twa timoun ki kalifye pou EITC a
  p-adf161: Pou ou elijib pou EITC, ou dwe gen omwen yon timoun ki kalifye.
  collection/familyAndHousehold:
    /familyAndHousehold/*/livedWithYouUS:
      question: Èske timoun sa a te viv avèk ou plis pase mwatye nan ane <fg-show
        path="/taxYear"/> a Etazini?
      modalLink: <modal-link for="modal-residency">Kisa ki konte kòm tan yo fè ap
        viv avèk ou a?</modal-link>
    fg-alert-b7d816:
      heading: Ou pa kalifye pou Kredi Enpo sou Revni ou Touche a (EITC)
      p-7666ea: Pou plis enfòmasyon, gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
        596</a>, Earned Income Credit..
    /familyAndHousehold/*/someoneElseCanClaim:
      question: Èske yon lòt moun kapab deklare timoun sa a pou EITC a?
      modalLink: <modal-link for="modal-claimed-someone-else">Kisa m ta dwe fè si
        gen plis pase yon moun ki kapab deklare yo?</modal-link>
    /familyAndHousehold/*/isClaimingQCRegardless:
      question: Ou gendwa pa kapab reklame yon timoun pou EITC si sèten moun ki elijib
        reklame yo tou. Ou toujou vle reklame pitit sa a?
      modalLink: <modal-link for="modal-claimed-someone-else">Kisa k pase si gen plis
        pase yon moun ki ka reklame yo?</modal-link>
    /familyAndHousehold/*/marriedFilingJointly:
      question: Èske pitit sa a marye epi èske li ap ranpli yon deklarasyon kolektif
        ak konjwen l an <fg-show path="/taxYear"/>?
      modalLink: <modal-link for="modal-joint-return">Èske mwen ka reklame yon moun
        ki fè yon deklarasyon ansanm ak yon moun?</modal-link>
    /familyAndHousehold/*/mfjForRefundOnly:
      question: I Èske timoun sa a fè yon deklarasyonkon jwent an <fg-show path="/taxYear"/>
        pou sèlman reklame yon ranbousman taks yo te kenbe oubyen estime taks peye,
        epi yo pa p reklame okenn kredi taks tankou EITC a?
      modalLink: <modal-link for="modal-joint-return-with-another-person-exception">Kilè
        ou ka reklame yon moun ki fè yon deklarasyon ansanm ak yon moun?</modal-link>
    /familyAndHousehold/*/isPermanentlyDisabled:
      question: Èske timoun sa a andikape nèt ak totalman?
      modalLink: <modal-link for="modal-disabled">Kisa k konte kòm pèmanan epi ki
        enfim nèt ale?</modal-link>
    /familyAndHousehold/*/relationship:
      question: 'Seleksyone relasyon pitit sa a genyen ak ou:'
      modalLink: <modal-link for="modal-relationship">Kiyès ki konte kòm bofis/bèlfi,
        pitit adoptif, oswa timoun ou pran pou w okipe?</modal-link>
      options:
        childStepFoster:
          name: Timoun, bofi, timoun adopte oubyen timoun adoptif
        sibling:
          name: Frè, demi frè oubyen demi frè
        descendant:
          name: Pitit pitit, nyès oubyen neve
        none:
          name: Okenn nan repons sa yo
    /familyAndHousehold/*/ageRange:
      question: Ki laj timoun sa a te genyen nan fen <fg-show path="/taxYear"/>?
      options:
        under19:
          name: 18 e mwens
        between19And23:
          name: Ant 19 & 23
        over24:
          name: 24 e plis
    /familyAndHousehold/*/isFullTimeStudent:
      question: Èske timoun nan t ap etidye aplentan pandan yon pati nan 5 mwa ane
        a?
      modalLink: <modal-link for="modal-student">Ki jan m fè konnen si yo se elèv
        k ap etidye a plen tan?</modal-link>
    /familyAndHousehold/*/isQCYoungerThanSelfOrSpouse:
      question: Èske depandan an pi piti pase ou?
      modalLink: <modal-link for="modal-age-comparison">Poukisa nou mande si yo pi
        piti pase <span condition="/isFilingStatusMFJ" operator="isFalse">ou?</span><span
        condition="/isFilingStatusMFJ" operator="isTrue">ou menm oswa mari/madanm
        ou?</span></modal-link>
    /familyAndHousehold/*/validSSN:
      question: Èske timoun sa a gen yon sekirite sosyal ki valab nan dat deklarasyon
        an oubyen anvan dat la (enkli ekstansyon)?
      modalLink: <modal-link for="modal-valid-ssn-qc">Yon nimewo sekirite sosyal valab
        obligatwa</modal-link>
    fg-alert-a004cd:
      heading: Tanpri sonje
      p-8374d8: Timoun sa a se pitit ou ki elijib. Men, paske yo pa gen yon SSN ki
        valab, timoun sa a pa kalifye ou pou yon kredi pou ogmante revni ou touche.
    h2-eaf308: Timoun sa a kalifye pou fè reklamasyon ak kalkile EITC a.
  p-5aea65: Dapre sa w antre, ou gen 3 timoun ki kalifye ki gen nimewo Sekirite Sosyal
    ki valab epi ou rive nan kantite maksimòm ou ka reklame pou EITC.
  fg-alert-9510e7:
    heading: Egzijans pou timoun ki kalifye
    p-b6bd9e: Ou pa kalifye pou EITC a san yon timoun kalifye sof si ou, oswa konjwen
      w lan si n ap fè yon deklarasyon konjwen, genyen ant 25 ak 64 lane.
    p-93a6b5: Pou plis enfòmasyon, gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
  fg-alert-64891c:
    heading: Ou pa kalifye pou kredi taks sou revni (EITC).
    p-cdf53e: Sou baz montan ou antre a, ou pa ka reklame kredi paske revni ou genyen
      depase limit deklarasyon estati w ak kantite timoun elijib.
    p-93a6b5: Pou plis enfòmasyon, gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
  h2-34370a: Dapre sa w antre, ou gen <fg-show path="/eitcQualifyingChildren"/> timoun
    ki kalifye ak nimewo Sekirite Sosyal ki valab.
  modal-residency:
    heading: Tès Rezidans
    h3-7c913b: Ap viv avèk ou
    p-ff8f12: Yon timoun ki kalifye dwe gen menm kay prensipal ak ou pou plis pase
      mwatye ane <fg-show path="/taxYear"/> a e kay sa a te dwe sitiye Etazini. Etazini
      gen ladan 50 eta yo ak Distri Columbia. Li pa enkli Pòtoriko oswa teritwa Etazini
      yo tankou Guam. Pou EITC a, IRS la konsidere pèsonèl militè Ameriken ki estasyone
      andeyò Etazini nan sèvis aktif pwolonje tankou yo gen yon kay prensipal Etazini
      pandan peryòd sèvis sa a.
    h3-46d8f4: Nesans oubyen lanmò yon timoun
    p-e27b79: Si timoun nan te fèt oubyen te mouri nan <fg-show path="/taxYear"/>,
      timoun nan dwe viv avèk ou pou plis pase mwatye ane li te vivan an.
    h3-16617c: Timoun yo adopte ak timoun yo plase nan fanmi akèy
    p-c623b2: Si ou te adopte yon timoun an <fg-show path="/taxYear"/>, ou te swiv
      pwosedi legal yo pou adopsyon legal timoun nan nan <fg-show path="/taxYear"/>
      a, oswa timoun nan te yon timoun kalifye ki te plase lakay ou nan <fg-show path="/taxYear"/>3
      a, rezidans prensipal ou te dwe rezidans timoun sa a pandan plis pase mwatye
      tan depi lè ou te adopte li oswa depi lè li te plase lakay ou nan <fg-show path="/taxYear"/>4
      a
    h3-6839b6: Absans tanporè
    p-658cca: 'Pou EITC a, yon absans tanporè konte kòm tan pase avèk ou. Egzanp yo
      enkli:'
    ul-0:
      li-76cf60: Malad oubyen entène lopital
      li-1b3986: Ale lekòl, vakans, travay, oubyen sèvis militè
      li-dae417: Detansyon nan yon enstitisyon pou minè
      li-de99d6: timoun kidnape
    p-8b99ed: Chwa sa a ka ogmante oubyen diminye EITC ou. Pou plis enfòmasyon <a
      target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">gade</a>
  modal-joint-return:
    heading: deklarasyon kolektif ak yon lòt moun
    p-9b8921: An jeneral, ou pa ka deklare yon moun ki marye kòm yon timoun ki elijib
      pou EITC si li fè yon deklarasyon kolektif.
    p-bdfc89: Piblikasyon 596, Kredi Sou Revni Ou Fè, Tès Deklrarasyon Konjwent
  modal-joint-return-with-another-person-exception:
    heading: Eksepsyon deklarasyon kolektif ak yon lòt moun
    p-93a25e: Ou ka reklame yon moun ki marye ki ranpli yon deklarasyon kolektif kòm
      yon timoun ki elijib pou EITC a si timoun nan ak mari oubyen madanm yo ap ranpli
      deklarasyon an ansanm sèlman pou reklame yon ranbousman taks sou revni yo te
      kenbe nan chèk peman yo oubyen taks estime yo te peye. Yo pa kapab reklame okenn
      kredi tankou EITC lè yo retounen.
    p-bdfc89: Piblikasyon 596, Kredi Sou Revni Ou Fè, Tès Deklrarasyon Konjwent
  modal-disabled:
    heading: Envalidite definitif e total
    p-a09e23: 'Pou EITC a, nou konsidere yon timoun andikape nèt ak totalman si de
      kondisyon sa yo ranpli:'
    ul-0:
      li-35e112: Timoun nan pa ka travay anpil pandan yon peryòd tan rezonab pandan
        l ap travay pou psalè oubyen pou pwofi nan yon sitiyasyon travay konpetitif
        pou omwen salè minimòm akòz yon kondisyon fizik oubyen mantal, epi
      li-f9618f: Yon doktè detèmine kondisyon an te dire oubyen n ka espere l ap dire
        kontinyèlman pou omwen yon ane oubyen ka lakòz lanmò.
    p-de127e: Piblikasyon 596, Kredi Sou Revni Ou Fè, Definitivman Ak Totalman Andikape
  modal-relationship:
    heading: Definisyon Relasyon ak Timoun
    h3-523a2e: Bèlfi
    p-3a1769: Yon relasyon etap se yon relasyon ki fòme pa maryaj. Pou EITC a, yon
      relasyon ki fòme pa maryaj, tankou bèlfi, bofis, demi frè oubyen demi sè, pa
      fini si maryaj la fini.
    h3-3cc097: Timoun adopte
    p-165b15: Yon timoun adopte toujou trete kòm pwòp pitit ou. Tèm sa a gen ladann
      yon timoun ki te mete avè w legalman pou adopsyon legal.
    h3-872822: Timoun adopte
    p-d91342: Yon timoun adopte toujou trete kòm pwòp pitit ou. Tèm sa a gen ladann
      yon timoun ki te mete avè w legalman pou adopsyon legal.
    h3-2fd110: Ajans plasman apwouve
    p-b80621: Tèm sa a gen ladan yon ajans gouvènman leta oubyen lokal oubyen yon
      gouvènman tribi Endyen. Li gen ladan tou yon òganizasyon egzante taks ki gen
      lisans pa yon eta Endyen oubyen yon gouvènman tribi.
  modal-student:
    heading: Etidyan aplentan
    h3-f803ae: Etidyan aplentan
    p-ef6d3a: Pou yo konsidere elèv la aplentan, li dwe enskri pou kantite èdtan oubyen
      klas lekòl la konsidere kòm prezans aplentan.
    p-69b838: Elèv ki travay nan travay "kooperativ" nan endistri prive kòm yon pati
      nan kou regilye yon lekòl nan fòmasyon teyorik ak pratik yo konsidere kòm elèv
      aplentan.
    h3-754ddf: Lekòl defini
    p-dfaecc: 'Pou EITC a, yon lekòl se:'
    ul-0:
      li-5f78b0: Lekòl primè
      li-f8aab3: Elemantè oubyen lekòl segondè
      li-39d2fa: kolèj oubyen inivèsite
      li-96892f: Lekòl teknik, komèsyal oubyen mekanik
    p-986cc5: 'A school is not:'
    ul-1:
      li-775eb9: Fòmasyon nan travay la
      li-b2e8f2: Lekòl pa korespondans
      li-767c35: Lekòl la ofri kou sèlman apati Entènèt
    p-81198a: Pou plis enfòmasyon, gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596">Publication
      596</a>, Earned Income Credit..
  modal-valid-ssn-qc:
    heading: Nimewo sekirite sosyal valab pou timoun ki elijib yo
    p-d68f7a: Kantite EITC ou a depann de kantite timoun ki elijib ou genyen ak SSN
      valab. Chak timoun oubyen paran w ap reklame pou w ka kalkile montan EITC a
      dwe genyen yon Nimewo Sekirite Sosyal (SSN) ki valab ke Administrasyon Sekirite
      Sosyal la te bay nan dat li te retounen ou an oubyen anvan ou (enkli ekstansyon).
    p-0464ad: Pou EITC a, yon SSN se yon SSN valab sof si "Pa Valid pou Travay" yo
      enprime sou kat Sekirite Sosyal la epi yo te bay nimewo a sèlman pou pèmèt moun
      k ap resevwa SSN a aplike oubyen resevwa yon benefis finansman federal. Medicaid
      se yon egzanp yon benefis federal finanse.
    p-a708ff: Nou aksepte yon kat sekirite sosyal ki make "Valab pou travay avèk otorizasyon
      DHS" sèlman toutotan otorizasyon DHS la toujou valab.
    p-558a40: 'Pou EITC a, nou pa aksepte:'
    ul-0:
      li-5e5f3e: Nimewo idantifikasyon taks endividyèl IRS (ITIN)
      li-5fc9b7: Nimewo idantifikasyon taks adopsyon (ATIN)
      li-19d3d7: Nimewo Sekirite Sosyal yo bay sèlman pou pèmèt moun k ap resevwa
        SSN a aplike oubyen resevwa yon benefis finansman federal, tankou Medicaid.
  modal-claimed-someone-else:
    heading: Reklame sou deklarasyon taks yon lòt moun
    p-9b277e: Se yon sèl moun ki ka reklame chak timoun pou EITC. Si plis pase yon
      moun fè reklamasyon pou timoun nan, IRS aplike règ retire yo.
    p-911aff: Piblikasyon 596, Kredi Sou Revni Ou Fè, Pitit Elijib Ou A Pa Kapab sèvi
      Pou Plis Pase Yon Moun.
  modal-age-comparison:
    heading: Timoun Nan Dwe Pi Piti Pase Ou Ak Konjwen w
    p-626c78: Pou yon timoun ki kalifye, timoun nan dwe pi piti pase ou, sof si li
      andikape nèt ale nan nenpòt ki lè pandan <fg-show path="/taxYear">.
    p-1a035f: Pou jwenn plis enfòmasyon gade <a target="_blank" class="usa-link" href="https://www.irs.gov/publications/p596#en_US_2019_publink1000298140">Piblikasyon
      596</a>, Kredi Revni Ou Touche, Tès Laj.
/results:
  title: Rezilta Ou yo
  h2-88e7ef: Rezilta Ou yo
  fg-alert-64891c:
    heading: Ou pa kalifye pou Kredi Enpo sou Revni ou Touche a (EITC)
    p-cdf53e: Dapre enfòmasyon ou bay yo, ou pa kapab reklame kredi pou revni ou touche
      paske revni ou touche depase limit fikse pou estati deklarasyon ou ak kantite
      timoun ki kalifye yo.
    p-93a6b5: Pou jwenn plis enfòmasyon, gade <a target="_blank" class="usa-link"
      href="https://www.irs.gov/publications/p596">Piblikasyon 596</a>, Kredi Revni
      Ou Touche.
  p-578b13: 'Dapre enfòmasyon ou te bay yo, ou kalifye pou kantite kredi taks sou
    revni ke ou te fè yo:'
  p-adf6bb: Kantite kredi sa a ap redwi ou <fg-show path="/taxYear"/> taks lè ou ranpli
    deklarasyon taks ou ak IRS. Si kredi a diminye taks ou a mwens pase zewo, ou ka
    jwenn yon ranbousman.
  h2-259962: 'Pwochen etap: Kijan pou w aplike nan EITC'
  p-508e29: Yo nan lòd yo resevwa montan an estime nan <strong><fg-show path="/earnedIncomeCredit"/></strong>*
    , ou dwe soumèt ou <fg-show path="/taxYear"/> deklarasyon taks federal. Si w ap
    aplike pou EITC, dapre lalwa IRS pa ka bay ranbousman taks ou jiska mitan mwa
    fevriye. <fg-show path="/nextTaxYear"/>, menm pati ki pa asosye ak EITC la.
  h3-54f664: Nan liy
  p-a5939a: Si ou vle ranpli taks ou sou Entènèt, ou ka itilize pwogram IRS Free Files.
    Tanpri sonje ke pwogram nan disponib sèlman nan mwa janvye rive oktòb.
  p-3ef53a: <a target="_blank" class="usa-link" href="https://www.irs.gov/filing/free-file-do-your-federal-taxes-for-free">
    Depoze sou entènèt kounye a<span class="usa-sr-only"> (opens in a new tab)</span>
    </a>
  h3-792a4e: An pèson
  p-787398: Si ou prefere travay avèk yon moun ki prepare taks an pèsòn, ou gen opsyon
    pou w fè sa nan yon Klinik Asistans Taks Volontè (VITA) IRS.
  p-25a83e: <a target="_blank" class="usa-link" href="https://www.irs.gov/individuals/free-tax-return-preparation-for-qualifying-taxpayers">
    Èd an pèsòn gratis<span class="usa-sr-only"> (opens in a new tab)</span> </a>
  h3-c7457b: Fòm papye
  p-b8834f: Piske w gen yon timoun ki kalifye, ou dwe ranpli <a target="_blank" class="usa-link"
    href="https://www.irs.gov/forms-pubs/about-schedule-eic-form-1040"> Orè EIC (PDF)<span
    class="usa-sr-only"> (opens in a new tab)</span> </a> epi atache li sou ou <a
    target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    Fòm 1040 (PDF)<span class="usa-sr-only"> (opens in a new tab)</span> </a> oswa
    <a target="_blank" class="usa-link" href="https://www.irs.gov/forms-pubs/about-form-1040">
    Fòm 1040-SR (PDF)<span class="usa-sr-only"> (opens in a new tab)</span> </a> pou
    ane fiskal <fg-show path="/taxYear"/>.
  h2-a3da4a: Rezime enfòmasyon ou yo
  p-5a6eac: Tablo ki anba a se yon rezime enfòmasyon ou te antre nan zouti a. Si nenpòt
    nan enfòmasyon sa yo pa kòrèk, tanpri klike sou modifye pou mete ajou li, sinon
    li ka afekte rezilta ou yo.
