# Note that these errors use CamelCase because they come from the Fact Graph. Some of these errors
# are user errors (i.e. they entered an amount larger than the limit) but not all of them are (i.e.
# if the limit is misconfigured). I've tried to the denote the ones that should only appear if
# there's a bug that needs to be fixed.
errors:
  # Dollar errors
  CombinedHyphensAndParentheses: "Введите только цифры и десятичную точку."
  # Not obvious to me why the fact graph breaks down invalid characters
  # this way but I don't think it needs to be exposed to the user
  InvalidCharacters: "Введите только цифры и десятичную точку."
  InvalidDollar: "Введите только цифры и десятичную точку."
  InvalidHyphens: "Введите только цифры и десятичную точку."
  InvalidParentheses: "Введите только цифры и десятичную точку."
  TooManyDecimals: "Введите число только с одной десятичной точкой."
  TooManyFractionalDigits: "Введите только два знака после запятой."

  # Day errors
  InvalidDay: "Введите действительный день."
  InvalidDayDueToLeapYear: "Недействительный день из-за високосного года."
  InvalidMonth: "Введите действительный месяц."
  InvalidDate: "Введите действительную дату."
  InvalidLimit: "Установлен недействительный лимит."
  IncompleteWritableDate: "Введите полную дату или оставьте поле пустым."

  # Enum errors
  BlankEnum: "Значение было пустым."
  InvalidEnum: "Значение не найдено."

  Required: "Этот вопрос обязателен для заполнения"
  Default: "Извините, что-то пошло не так"

  # Limit errors
  #
  # There are a few other limits types in the Fact Graph, but we don't use them for TWE. Strangely,
  # Dollar et. al. have their own limit validations, like ExceedsMaxLimit. I don't know under what
  # circumstances those would trigger; I think it's a vestige of a different way of setting limits
  #
  # Yes, it would be nice to do proper parameterization rather than just appending the limit value
  # to the end of the string
  Max: "Введите сумму меньше"
  Min: "Введите сумму больше"

