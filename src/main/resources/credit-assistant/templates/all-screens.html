<!DOCTYPE html>
<html th:lang="${languageCode}">
<head>
    <meta th:replace="fragments/head">
    <link rel="stylesheet" href="/app/eitc/resources/styles/all-screens.css">
</head>

<body class="view--column all-screens">
<a class="usa-skipnav" href="#main-content">Skip to main content</a>
<header>
    <div th:replace="fragments/usa-banner"></div>
    <div class="logo-banner">
        <div class="grid-container">
            <a href="https://www.irs.gov" th:aria-label="#{layout.irs.domain}">
                <img src="/app/eitc/resources/img/irs-logo.svg" alt="" />
            </a>

            <div th:if="${supportedLocales != null}" class="language-switcher">
                <label class="usa-sr-only" for="language-selector">Select Language</label>

                <select class="usa-select"
                        id="language-selector"
                        name="language-selector"
                        onchange="if(this.value) window.location.href=this.value"
                        style="width: auto; margin-top: 0;">

                    <option value="" disabled selected>Select Language</option>

                    <option th:each="lang : ${supportedLocales}"
                            th:value="${lang.key == 'en'} ? |/app/eitc${currentPageRoute}| : |/app/eitc/${lang.key}${currentPageRoute}|"
                            th:text="${lang.value}">
                    </option>

                </select>
            </div>
        </div>
    </div>
</header>

<div class="all-screens__toolbar" role="toolbar" th:aria-label="#{all-screens.toolbar.label}">
    <div class="all-screens__toolbar-inner">

        <div class="all-screens__toolbar-group">
            <div class="usa-checkbox">
                <input class="usa-checkbox__input" id="all-screens-toggle-conditions" type="checkbox" checked />
                <label class="usa-checkbox__label" for="all-screens-toggle-conditions"
                       th:text="#{all-screens.toolbar.show-conditions}">Show conditions</label>
            </div>
            <div class="usa-checkbox">
                <input class="usa-checkbox__input" id="all-screens-toggle-layout" type="checkbox" />
                <label class="usa-checkbox__label" for="all-screens-toggle-layout"
                       th:text="#{all-screens.toolbar.horizontal-layout}">Horizontal layout</label>
            </div>
        </div>

    </div>
    <nav class="all-screens__section-tabs" th:aria-label="#{all-screens.toolbar.section-label}">
        <button type="button" class="all-screens__section-tab all-screens__section-tab--active"
                data-section=""
                th:text="#{all-screens.toolbar.section-all}">All sections</button>
        <button th:each="section : ${sections}"
                type="button"
                class="all-screens__section-tab"
                th:data-section="${section.slug}"
                th:text="${section.title}">Section</button>
    </nav>
</div>

<div class="usa-in-page-nav-container">
    <main id="main-content" class="main-content usa-prose">
        <section th:each="section : ${sections}"
                 class="all-screens__section"
                 th:data-section="${section.slug}">
            <header class="all-screens__section-header">
                <h2 th:id="${section.slug}" th:text="${section.title}">Section</h2>
                <span class="all-screens__section-meta">
                    <span th:text="#{all-screens.section.page-count(${section.pageCount})}">N pages</span>
                    <span class="all-screens__section-meta-sep" aria-hidden="true">·</span>
                    <span th:text="#{all-screens.section.condition-count(${section.conditionCount})}">N conditions</span>
                </span>
            </header>

            <article th:each="page : ${section.pages}"
                     class="screen"
                     th:data-route="${page.route}"
                     th:data-condition-count="${page.conditionCount}">
                <header class="screen__header">
                    <h3 class="screen__title" th:text="${page.title}">Page Title</h3>
                    <span class="screen__meta">
                        <code class="screen__route" th:text="${page.route}">/route</code>
                        <span class="screen__meta-sep" aria-hidden="true">·</span>
                        <span class="screen__condition-count"
                              th:text="#{all-screens.screen.condition-count(${page.conditionCount})}">N conditions</span>
                    </span>
                </header>
                <div class="screen__content" th:utext="${page.content}">Lorem Ipsum</div>
            </article>
        </section>
    </main>
</div>

<template th:replace="fragments/js-templates"></template>

<script type="module">
    import { initAllScreens } from '/app/eitc/resources/js/all-screens.js'
    initAllScreens()
</script>
</body>
</html>
